<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-Day Counter</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* ============================================
       노시언 위젯 시그니처 디자인 토큰
       ============================================ */
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      width: 360px;
      position: relative;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
      text-align: center;
    }

    .card.dragging { cursor: grabbing; }

    /* ── 표시 모드 ── */
    .display-mode { display: none; flex-direction: column; }
    .display-mode.show { display: flex; }

    .label {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .event-title {
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--foreground);
      margin-bottom: 1.75rem;
      letter-spacing: -0.015em;
      line-height: 1.3;
    }

    .dday-wrap {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.25rem;
      margin-bottom: 0.5rem;
    }

    .dday-prefix {
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .dday-number {
      font-size: 4.5rem;
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .dday-number.today {
      font-size: 3rem;
      letter-spacing: -0.025em;
    }

    .divider {
      height: 1px;
      background: var(--border);
      opacity: 0.5;
      margin: 0 -0.25rem 1.125rem;
    }

    .target-date-display {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      margin-bottom: 1.125rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.005em;
    }

    .edit-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      align-self: center;
      padding: 0.4375rem 1rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted-foreground);
      font-size: 0.75rem;
      font-weight: 500;
      font-family: inherit;
      letter-spacing: -0.005em;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }
    .edit-btn:hover {
      background: var(--muted);
      color: var(--foreground);
    }

    /* ── 설정 모드 ── */
    .setup-mode { display: none; flex-direction: column; text-align: left; }
    .setup-mode.show { display: flex; }

    .setup-title {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--foreground);
      margin-bottom: 1.25rem;
      letter-spacing: -0.015em;
      text-align: center;
    }

    .field {
      margin-bottom: 0.875rem;
    }
    .field label {
      display: block;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.375rem;
    }
    .field input {
      width: 100%;
      padding: 0.5625rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--foreground);
      background: var(--card);
      outline: none;
      transition: border-color var(--transition);
      letter-spacing: -0.005em;
    }
    .field input:focus {
      border-color: var(--foreground);
    }
    .field input::placeholder {
      color: var(--muted-foreground);
      opacity: 0.5;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.25rem;
    }

    .btn-cancel {
      flex: 1;
      padding: 0.5625rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted-foreground);
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }
    .btn-cancel:hover {
      background: var(--muted);
      color: var(--foreground);
    }

    .btn-save {
      flex: 2;
      padding: 0.5625rem;
      border: 1px solid var(--foreground);
      border-radius: 999px;
      background: var(--foreground);
      color: var(--card);
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .btn-save:hover { opacity: 0.85; }

    /* ── 첫 실행 모드 ── */
    .first-run {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 0;
    }
    .first-run.show { display: flex; }

    .first-run .icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.625rem;
      color: var(--muted-foreground);
    }

    .first-run .icon svg {
      width: 20px;
      height: 20px;
    }

    .first-run .title-text {
      font-size: 1rem;
      font-weight: 500;
      color: var(--foreground);
      margin-bottom: 0.25rem;
      letter-spacing: -0.015em;
    }

    .first-run .sub-text {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      margin-bottom: 1.25rem;
      letter-spacing: -0.005em;
    }

    .first-run .btn-start {
      padding: 0.5625rem 1.5rem;
      border: 1px solid var(--foreground);
      border-radius: 999px;
      background: var(--foreground);
      color: var(--card);
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .first-run .btn-start:hover { opacity: 0.85; }

    /* === 우측 컨트롤 (노시언 시그니처) === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }

    .control-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }

    .control-btn:hover:not(:disabled) {
      color: var(--foreground);
    }

    .control-btn svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }

    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }
      /* unify-resize: 내용은 고정폭, 카드를 키우면 바깥 여백만 늘어남 */
    .card {
      align-items: safe center;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: inherit;
      width: 100%;
    }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동 + 8방향 리사이즈) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      position: absolute; width: auto; height: auto;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; left: auto; bottom: auto;
      display: flex; flex-direction: row; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; padding: 0; }
    #card.card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .rz { position: absolute; z-index: 20; touch-action: none; }
    .rz-n { top: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-s { bottom: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-e { top: 0; bottom: 0; right: 0; width: 7px; cursor: ew-resize; }
    .rz-w { top: 0; bottom: 0; left: 0; width: 7px; cursor: ew-resize; }
    .rz-ne, .rz-nw, .rz-se, .rz-sw { width: 14px; height: 14px; z-index: 21; }
    .rz-ne { top: 0; right: 0; cursor: nesw-resize; }
    .rz-nw { top: 0; left: 0; cursor: nwse-resize; }
    .rz-se { bottom: 0; right: 0; cursor: nwse-resize; }
    .rz-sw { bottom: 0; left: 0; cursor: nesw-resize; }
    .rz-e::after, .rz-w::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 2px; height: 28px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    .rz-n::after, .rz-s::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 2px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    #card.card:hover .rz-n::after, #card.card:hover .rz-s::after, #card.card:hover .rz-e::after, #card.card:hover .rz-w::after { opacity: 0.7; }
    .rz:hover::after { background: var(--muted-foreground) !important; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-body">

      <!-- 표시 모드 -->
      <div class="display-mode" id="displayMode">
        <div class="label">D-Day</div>
        <div class="event-title" id="eventTitle">목표일</div>

        <div class="dday-wrap">
          <span class="dday-prefix" id="ddayPrefix">D-</span>
          <span class="dday-number" id="ddayNumber">0</span>
        </div>

        <div class="divider"></div>
        <div class="target-date-display" id="targetDateDisplay"></div>

        <button class="edit-btn" id="openSetupBtn" type="button">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M11.5 2.5l2 2L5 13H3v-2L11.5 2.5z"/>
          </svg>
          날짜 변경
        </button>
      </div>

      <!-- 첫 실행 -->
      <div class="first-run" id="firstRun">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div class="title-text">D-Day 카운터</div>
        <div class="sub-text">목표일을 설정해보세요</div>
        <button class="btn-start" id="firstStartBtn" type="button">시작하기</button>
      </div>

      <!-- 설정 모드 -->
      <div class="setup-mode" id="setupMode">
        <div class="setup-title">날짜 설정</div>
        <div class="field">
          <label for="inputTitle">이벤트 이름</label>
          <input type="text" id="inputTitle" placeholder="예: 수능 D-Day, 런칭일, 기념일" maxlength="30" />
        </div>
        <div class="field">
          <label for="inputDate">목표 날짜</label>
          <input type="date" id="inputDate" />
        </div>
        <div class="btn-row">
          <button class="btn-cancel" id="cancelSetupBtn" type="button">취소</button>
          <button class="btn-save" id="saveSetupBtn" type="button">저장</button>
        </div>
      </div>

      <!-- 4방향 리사이즈 핸들 -->
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="크기 초기화" title="크기 초기화"
              type="button" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

      <div class="rz rz-n"  data-rz="n"></div>
      <div class="rz rz-s"  data-rz="s"></div>
      <div class="rz rz-e"  data-rz="e"></div>
      <div class="rz rz-w"  data-rz="w"></div>
      <div class="rz rz-ne" data-rz="ne"></div>
      <div class="rz rz-nw" data-rz="nw"></div>
      <div class="rz rz-se" data-rz="se"></div>
      <div class="rz rz-sw" data-rz="sw"></div>
</div>

    <!-- 우측 컨트롤 -->

  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ============================================
       D-Day Counter — 로직
       ============================================ */
    const STORAGE_KEY = 'nosion-dday-counter-v1';

    const displayModeEl = document.getElementById('displayMode');
    const firstRunEl = document.getElementById('firstRun');
    const setupModeEl = document.getElementById('setupMode');
    const eventTitleEl = document.getElementById('eventTitle');
    const ddayPrefixEl = document.getElementById('ddayPrefix');
    const ddayNumberEl = document.getElementById('ddayNumber');
    const targetDateDisplayEl = document.getElementById('targetDateDisplay');
    const inputTitleEl = document.getElementById('inputTitle');
    const inputDateEl = document.getElementById('inputDate');

    function loadData() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; }
      catch (e) { return null; }
    }

    function saveData(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
      catch (e) {}
    }

    /**
     * "YYYY-MM-DD" 문자열을 로컬 자정 Date 객체로 변환
     * (new Date("YYYY-MM-DD")는 UTC 자정으로 파싱되어 KST 같은 양수 TZ는 정상이지만
     *  UTC 음수 TZ에서는 하루 어긋남 — 로컬 파싱으로 일관성 보장)
     */
    function parseLocalDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function calcDday(targetDateStr) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = parseLocalDate(targetDateStr);
      target.setHours(0, 0, 0, 0);
      return Math.round((target - today) / (1000 * 60 * 60 * 24));
    }

    function formatDate(dateStr) {
      const d = parseLocalDate(dateStr);
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`;
    }

    function showOnly(modeEl) {
      [displayModeEl, firstRunEl, setupModeEl].forEach(el => {
        el.classList.toggle('show', el === modeEl);
      });
    }

    function renderDisplay(data) {
      showOnly(displayModeEl);
      const diff = calcDday(data.date);
      eventTitleEl.textContent = data.title || '목표일';
      targetDateDisplayEl.textContent = formatDate(data.date);

      if (diff === 0) {
        ddayPrefixEl.textContent = '';
        ddayNumberEl.textContent = 'D-Day';
        ddayNumberEl.classList.add('today');
      } else if (diff > 0) {
        ddayPrefixEl.textContent = 'D-';
        ddayNumberEl.textContent = diff;
        ddayNumberEl.classList.remove('today');
      } else {
        ddayPrefixEl.textContent = 'D+';
        ddayNumberEl.textContent = Math.abs(diff);
        ddayNumberEl.classList.remove('today');
      }
    }

    function renderFirst() { showOnly(firstRunEl); }

    function openSetup() {
      const data = loadData();
      showOnly(setupModeEl);
      if (data) {
        inputTitleEl.value = data.title || '';
        inputDateEl.value = data.date || '';
      } else {
        inputTitleEl.value = '';
        const d = new Date();
        d.setDate(d.getDate() + 30);
        inputDateEl.value = d.toISOString().slice(0, 10);
      }
      setTimeout(() => inputTitleEl.focus(), 0);
    }

    function cancelSetup() {
      const data = loadData();
      if (data) renderDisplay(data);
      else renderFirst();
    }

    function saveSetup() {
      const title = inputTitleEl.value.trim() || '목표일';
      const date = inputDateEl.value;
      if (!date) {
        inputDateEl.focus();
        return;
      }
      const data = { title, date };
      saveData(data);
      renderDisplay(data);
    }

    document.getElementById('openSetupBtn').addEventListener('click', (e) => { e.stopPropagation(); openSetup(); });
    document.getElementById('firstStartBtn').addEventListener('click', (e) => { e.stopPropagation(); openSetup(); });
    document.getElementById('cancelSetupBtn').addEventListener('click', (e) => { e.stopPropagation(); cancelSetup(); });
    document.getElementById('saveSetupBtn').addEventListener('click', (e) => { e.stopPropagation(); saveSetup(); });

    // 매 자정 갱신
    function scheduleNextDay() {
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(0, 0, 0, 0);
      const ms = tomorrow - now;
      setTimeout(() => {
        const data = loadData();
        if (data && displayModeEl.classList.contains('show')) renderDisplay(data);
        scheduleNextDay();
      }, ms);
    }

    (function init() {
      const data = loadData();
      if (data) renderDisplay(data);
      else renderFirst();
      scheduleNextDay();
    })();


    /* ===================================================================
       드래그 이동 + 8방향 리사이즈 (frame{x,y,w,h} · Pointer Events)
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-dday-counter-frame-v1', minW: 300, minH: 200, defaultW: 360 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, Math.min(frame.w, window.innerWidth)); frame.h = Math.max(MIN_H, Math.min(frame.h, window.innerHeight));
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';

      /* ----- 8방향 리사이즈 (document 리스너) ----- */
      card.querySelectorAll('[data-rz]').forEach(handle => {
        handle.addEventListener('pointerdown', (e) => {
          if (active) return; active = true;
          e.preventDefault(); e.stopPropagation();
          const dir = handle.dataset.rz, sx = e.clientX, sy = e.clientY, f0 = { x: frame.x, y: frame.y, w: frame.w, h: frame.h };
          card.classList.add('resizing');
          const mv = (ev) => {
            const dx = ev.clientX - sx, dy = ev.clientY - sy;
            if (dir.includes('e')) frame.w = Math.max(MIN_W, f0.w + dx);
            if (dir.includes('s')) frame.h = Math.max(MIN_H, f0.h + dy);
            if (dir.includes('w')) { const nw = Math.max(MIN_W, f0.w - dx); frame.x = f0.x + (f0.w - nw); frame.w = nw; }
            if (dir.includes('n')) { const nh = Math.max(MIN_H, f0.h - dy); frame.y = f0.y + (f0.h - nh); frame.h = nh; }
            applyFrame();
          };
          const up = () => {
            document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
            card.classList.remove('resizing'); active = false; clampFrame(); applyFrame(); saveFrame();
          };
          document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
        });
      });

      /* ----- 드래그 이동 (이동 임계값으로 클릭과 충돌 방지) ----- */
      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-rz], [data-no-drag]')) return;
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        let started = false;
        const mv = (ev) => {
          const ddx = ev.clientX - dx0, ddy = ev.clientY - dy0;
          if (!started) {
            if (Math.abs(ddx) < 4 && Math.abs(ddy) < 4) return;
            started = true; active = true; card.classList.add('dragging');
          }
          frame.x = sx + ddx; frame.y = sy + ddy; applyFrame();
        };
        const up = () => {
          document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
          if (started) {
            card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame();
            const sc = (ce) => { ce.stopPropagation(); ce.preventDefault(); };
            window.addEventListener('click', sc, { capture: true, once: true });
            setTimeout(() => window.removeEventListener('click', sc, true), 0);
          }
        };
        document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
      });

      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });
      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
</script>
</body>
</html>
