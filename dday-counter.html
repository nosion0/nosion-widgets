<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-Day Counter</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* ============================================
       노시언 위젯 시그니처 디자인 토큰
       ============================================ */
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0; min-height: 0;
      text-align: center;
    }

    .card.dragging { cursor: grabbing; }

    /* ── 표시 모드 ── */
    .display-mode { display: none; flex-direction: column; }
    .display-mode.show { display: flex; }

    .label {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .event-title {
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--foreground);
      margin-bottom: 1.75rem;
      letter-spacing: -0.015em;
      line-height: 1.3;
    }

    .dday-wrap {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.25rem;
      margin-bottom: 0.5rem;
    }

    .dday-prefix {
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .dday-number {
      font-size: 4.5rem;
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .dday-number.today {
      font-size: 3rem;
      letter-spacing: -0.025em;
    }

    .divider {
      height: 1px;
      background: var(--border);
      opacity: 0.5;
      margin: 0 -0.25rem 1.125rem;
    }

    .target-date-display {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      margin-bottom: 1.125rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.005em;
    }

    .edit-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      align-self: center;
      padding: 0.4375rem 1rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted-foreground);
      font-size: 0.75rem;
      font-weight: 500;
      font-family: inherit;
      letter-spacing: -0.005em;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }
    .edit-btn:hover {
      background: var(--muted);
      color: var(--foreground);
    }

    /* ── 설정 모드 ── */
    .setup-mode { display: none; flex-direction: column; text-align: left; }
    .setup-mode.show { display: flex; }

    .setup-title {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--foreground);
      margin-bottom: 1.25rem;
      letter-spacing: -0.015em;
      text-align: center;
    }

    .field {
      margin-bottom: 0.875rem;
    }
    .field label {
      display: block;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.375rem;
    }
    .field input {
      width: 100%;
      padding: 0.5625rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--foreground);
      background: var(--card);
      outline: none;
      transition: border-color var(--transition);
      letter-spacing: -0.005em;
    }
    .field input:focus {
      border-color: var(--foreground);
    }
    .field input::placeholder {
      color: var(--muted-foreground);
      opacity: 0.5;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.25rem;
    }

    .btn-cancel {
      flex: 1;
      padding: 0.5625rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted-foreground);
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }
    .btn-cancel:hover {
      background: var(--muted);
      color: var(--foreground);
    }

    .btn-save {
      flex: 2;
      padding: 0.5625rem;
      border: 1px solid var(--foreground);
      border-radius: 999px;
      background: var(--foreground);
      color: var(--card);
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .btn-save:hover { opacity: 0.85; }

    /* ── 첫 실행 모드 ── */
    .first-run {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 0;
    }
    .first-run.show { display: flex; }

    .first-run .icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.625rem;
      color: var(--muted-foreground);
    }

    .first-run .icon svg {
      width: 20px;
      height: 20px;
    }

    .first-run .title-text {
      font-size: 1rem;
      font-weight: 500;
      color: var(--foreground);
      margin-bottom: 0.25rem;
      letter-spacing: -0.015em;
    }

    .first-run .sub-text {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      margin-bottom: 1.25rem;
      letter-spacing: -0.005em;
    }

    .first-run .btn-start {
      padding: 0.5625rem 1.5rem;
      border: 1px solid var(--foreground);
      border-radius: 999px;
      background: var(--foreground);
      color: var(--card);
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .first-run .btn-start:hover { opacity: 0.85; }

    /* === 우측 컨트롤 (노시언 시그니처) === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }

    .control-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }

    .control-btn:hover:not(:disabled) {
      color: var(--foreground);
    }

    .control-btn svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }

    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }
      /* unify-resize: 내용은 고정폭, 카드를 키우면 바깥 여백만 늘어남 */
    .card {
      align-items: safe center;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: inherit;
      width: 100%;
    }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; left: auto; bottom: auto;
      display: flex; flex-direction: row; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; padding: 0; }
    #card.card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
  
    /* === NOSION FRAME SPEC (드래그 이동 + 8방향 리사이즈) === */
    html,body{background:transparent;height:100%;overflow:hidden;}
    *{box-sizing:border-box;}
    .stage{position:fixed;inset:0;}
    .card{position:absolute;display:flex;flex-direction:column;touch-action:none;container-type:size;}
    .card.dragging,.card.resizing{user-select:none;box-shadow:0 12px 36px rgba(55,53,47,.16);}
    .whead{flex:none;cursor:grab;min-height:20px;width:100%;position:relative;z-index:2;background:inherit;}
    .whead:active{cursor:grabbing;}
    .wbody{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
    .rz{position:absolute;z-index:5;}
    .rz.n{top:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.s{bottom:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.e{right:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.w{left:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.ne{top:-5px;right:-5px;width:14px;height:14px;cursor:nesw-resize;}
    .rz.nw{top:-5px;left:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.se{bottom:-5px;right:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.sw{bottom:-5px;left:-5px;width:14px;height:14px;cursor:nesw-resize;}
  </style>
</head>
<body>
  <div class="stage">
    <div class="card" id="w">
      <div class="whead"></div>
      <div class="wbody">

      <!-- 표시 모드 -->
      <div class="display-mode" id="displayMode">
        <div class="label">D-Day</div>
        <div class="event-title" id="eventTitle">목표일</div>

        <div class="dday-wrap">
          <span class="dday-prefix" id="ddayPrefix">D-</span>
          <span class="dday-number" id="ddayNumber">0</span>
        </div>

        <div class="divider"></div>
        <div class="target-date-display" id="targetDateDisplay"></div>

        <button class="edit-btn" id="openSetupBtn" type="button">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">

          </svg>
          날짜 변경
        </button>
      </div>

      <!-- 첫 실행 -->
      <div class="first-run" id="firstRun">
        <div class="icon" aria-hidden="true">

          </svg>
        </div>

          <input type="text" id="inputTitle" placeholder="예: 수능 D-Day, 런칭일, 기념일" maxlength="30" />

      <!-- 4방향 리사이즈 핸들 -->
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="위치 초기화" title="위치 초기화"
              type="button" aria-label="카드 위치 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>

      </button>

              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

</div>

    <!-- 우측 컨트롤 -->

  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ============================================
       D-Day Counter — 로직
       ============================================ */
    const STORAGE_KEY = 'nosion-dday-counter-v1';

    const displayModeEl = document.getElementById('displayMode');
    const firstRunEl = document.getElementById('firstRun');
    const setupModeEl = document.getElementById('setupMode');
    const eventTitleEl = document.getElementById('eventTitle');
    const ddayPrefixEl = document.getElementById('ddayPrefix');
    const ddayNumberEl = document.getElementById('ddayNumber');
    const targetDateDisplayEl = document.getElementById('targetDateDisplay');
    const inputTitleEl = document.getElementById('inputTitle');
    const inputDateEl = document.getElementById('inputDate');

    function loadData() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; }
      catch (e) { return null; }
    }

    function saveData(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
      catch (e) {}
    }

    /**
     * "YYYY-MM-DD" 문자열을 로컬 자정 Date 객체로 변환
     * (new Date("YYYY-MM-DD")는 UTC 자정으로 파싱되어 KST 같은 양수 TZ는 정상이지만
     *  UTC 음수 TZ에서는 하루 어긋남 — 로컬 파싱으로 일관성 보장)
     */
    function parseLocalDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function calcDday(targetDateStr) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = parseLocalDate(targetDateStr);
      target.setHours(0, 0, 0, 0);
      return Math.round((target - today) / (1000 * 60 * 60 * 24));
    }

    function formatDate(dateStr) {
      const d = parseLocalDate(dateStr);
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`;
    }

    function showOnly(modeEl) {
      [displayModeEl, firstRunEl, setupModeEl].forEach(el => {
        el.classList.toggle('show', el === modeEl);
      });
    }

    function renderDisplay(data) {
      showOnly(displayModeEl);
      const diff = calcDday(data.date);
      eventTitleEl.textContent = data.title || '목표일';
      targetDateDisplayEl.textContent = formatDate(data.date);

      if (diff === 0) {
        ddayPrefixEl.textContent = '';
        ddayNumberEl.textContent = 'D-Day';
        ddayNumberEl.classList.add('today');
      } else if (diff > 0) {
        ddayPrefixEl.textContent = 'D-';
        ddayNumberEl.textContent = diff;
        ddayNumberEl.classList.remove('today');
      } else {
        ddayPrefixEl.textContent = 'D+';
        ddayNumberEl.textContent = Math.abs(diff);
        ddayNumberEl.classList.remove('today');
      }
    }

    function renderFirst() { showOnly(firstRunEl); }

    function openSetup() {
      const data = loadData();
      showOnly(setupModeEl);
      if (data) {
        inputTitleEl.value = data.title || '';
        inputDateEl.value = data.date || '';
      } else {
        inputTitleEl.value = '';
        const d = new Date();
        d.setDate(d.getDate() + 30);
        inputDateEl.value = d.toISOString().slice(0, 10);
      }
      setTimeout(() => inputTitleEl.focus(), 0);
    }

    function cancelSetup() {
      const data = loadData();
      if (data) renderDisplay(data);
      else renderFirst();
    }

    function saveSetup() {
      const title = inputTitleEl.value.trim() || '목표일';
      const date = inputDateEl.value;
      if (!date) {
        inputDateEl.focus();
        return;
      }
      const data = { title, date };
      saveData(data);
      renderDisplay(data);
    }

    document.getElementById('openSetupBtn').addEventListener('click', (e) => { e.stopPropagation(); openSetup(); });
    document.getElementById('firstStartBtn').addEventListener('click', (e) => { e.stopPropagation(); openSetup(); });
    document.getElementById('cancelSetupBtn').addEventListener('click', (e) => { e.stopPropagation(); cancelSetup(); });
    document.getElementById('saveSetupBtn').addEventListener('click', (e) => { e.stopPropagation(); saveSetup(); });

    // 매 자정 갱신
    function scheduleNextDay() {
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(0, 0, 0, 0);
      const ms = tomorrow - now;
      setTimeout(() => {
        const data = loadData();
        if (data && displayModeEl.classList.contains('show')) renderDisplay(data);
        scheduleNextDay();
      }, ms);
    }

    (function init() {
      const data = loadData();
      if (data) renderDisplay(data);
      else renderFirst();
      scheduleNextDay();
    })();
</script>
  <script>
(function(){
  var card=document.getElementById('w');
  var head=card.querySelector('.whead');
  var KEY='nosion-dday-counter-frame', MINW=230, MINH=200, DEFW=340, DEFH=300;
  ['n','s','e','w','ne','nw','se','sw'].forEach(function(d){
    var el=document.createElement('div');el.className='rz '+d;el.setAttribute('data-rz',d);card.appendChild(el);
  });
  var frame=load();
  function load(){try{var f=JSON.parse(localStorage.getItem(KEY));if(f&&f.w)return f;}catch(e){}
    var w=Math.min(DEFW,window.innerWidth-28),h=Math.min(DEFH,window.innerHeight-28);
    return{x:(window.innerWidth-w)/2,y:Math.max(14,(window.innerHeight-h)/2),w:w,h:h};}
  function clamp(){frame.w=Math.max(MINW,Math.min(frame.w,window.innerWidth-8));
    frame.h=Math.max(MINH,Math.min(frame.h,window.innerHeight-8));
    frame.x=Math.max(4,Math.min(frame.x,window.innerWidth-frame.w-4));
    frame.y=Math.max(4,Math.min(frame.y,window.innerHeight-frame.h-4));}
  function apply(){clamp();card.style.left=frame.x+'px';card.style.top=frame.y+'px';
    card.style.width=frame.w+'px';card.style.height=frame.h+'px';}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(frame));}catch(e){}}
  head.addEventListener('pointerdown',function(e){
    if(e.target.closest('button,input,a,.seg,.ic,.pill,[data-nodrag]'))return;drag(e);});
  card.querySelectorAll('.rz').forEach(function(hd){
    hd.addEventListener('pointerdown',function(e){resize(e,hd.getAttribute('data-rz'));});});
  function drag(e){e.preventDefault();card.classList.add('dragging');
    var sx=e.clientX,sy=e.clientY,ox=frame.x,oy=frame.y;
    function m(ev){frame.x=ox+(ev.clientX-sx);frame.y=oy+(ev.clientY-sy);apply();}
    function u(){card.classList.remove('dragging');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  function resize(e,dir){e.preventDefault();e.stopPropagation();card.classList.add('resizing');
    var sx=e.clientX,sy=e.clientY,o={x:frame.x,y:frame.y,w:frame.w,h:frame.h};
    function m(ev){var dx=ev.clientX-sx,dy=ev.clientY-sy;
      if(dir.indexOf('e')>=0){frame.w=Math.max(MINW,o.w+dx);}
      if(dir.indexOf('s')>=0){frame.h=Math.max(MINH,o.h+dy);}
      if(dir.indexOf('w')>=0){var nw=Math.max(MINW,o.w-dx);frame.x=o.x+(o.w-nw);frame.w=nw;}
      if(dir.indexOf('n')>=0){var nh=Math.max(MINH,o.h-dy);frame.y=o.y+(o.h-nh);frame.h=nh;}
      apply();}
    function u(){card.classList.remove('resizing');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  window.addEventListener('resize',apply);
  apply();
})();
</script>
</body>
</html>
