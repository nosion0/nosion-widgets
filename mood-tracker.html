<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노시언 감정 트래커</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* ============================================
       노시언 위젯 시그니처 디자인 토큰
       ============================================ */
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 10% 55%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --dot-on: hsl(220 13% 15%);
      --dot-off: hsl(220 10% 88%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .widget-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      position: relative;
      width: fit-content;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 1.75rem 1.5rem;
      width: 360px;
      position: relative;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    /* 드래그 영역은 헤더로 한정 */
    .card .header {
      cursor: grab;
    }

    .card.dragging .header {
      cursor: grabbing;
    }

    .card .header {
      flex-shrink: 0;
    }

    .card .divider {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .header-left,
    .header-right {
      display: flex;
      flex-direction: column;
    }

    .header-right {
      align-items: flex-end;
    }

    .header-center {
      flex: 1 1 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 1.5rem 6px;
      min-width: 60px;
    }

    .trend-chart {
      width: 100%;
      height: 36px;
      display: block;
      overflow: visible;
    }

    .trend-chart .trend-line {
      fill: none;
      stroke: var(--muted-foreground);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.45;
      vector-effect: non-scaling-stroke;
    }

    .week-label,
    .rate-label {
      font-size: 0.75rem;
      letter-spacing: 0.025em;
      color: var(--muted-foreground);
      margin-bottom: 0.375rem;
      font-weight: 400;
    }

    .stats {
      display: flex;
      align-items: baseline;
      gap: 0.125rem;
      line-height: 1;
    }

    .stats .done {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--muted-foreground);
    }

    .stats .divider-slash {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--muted-foreground);
      opacity: 0.6;
      margin: 0 0.125rem;
      font-variant-numeric: tabular-nums;
    }

    .stats .total {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
    }

    /* 우측 상단 평균 점수 */
    .total-rate {
      display: flex;
      align-items: baseline;
      line-height: 1;
    }

    .total-rate .percent-num {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--muted-foreground);
    }

    .total-rate .percent-symbol {
      font-size: 1.5rem;
      font-weight: 400;
      padding-left: 0.125rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
    }

    .total-rate.complete .percent-num {
      color: var(--foreground);
    }

    .divider {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    /* 그리드: [아이콘 32px] [도트 7개 1fr씩] [카운트 auto] / [헤더 행] + [5 감정 행] */
    .tracker {
      display: grid;
      grid-template-columns: 32px repeat(7, minmax(0, 1fr)) auto;
      grid-template-rows: auto repeat(5, minmax(0, 1fr));
      gap: 0.5rem 0.5rem;
      align-items: center;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .day-header {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      padding-bottom: 0.25rem;
      user-select: none;
    }

    /* 감정 아이콘 (lucide-react 스타일 라인 페이스) */
    .mood-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      margin: 0 auto;
      color: var(--muted-foreground);
      opacity: 0.55;
      transition: color var(--transition), opacity var(--transition);
      position: relative;
      cursor: help;
      flex-shrink: 0;
    }

    .mood-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mood-icon.has-data {
      color: var(--foreground);
      opacity: 1;
    }

    /* 아이콘 호버 시 한글 이름 툴팁 (우측 등장) */
    .mood-icon[data-tooltip]::before,
    .mood-icon[data-tooltip]::after {
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .mood-icon[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .mood-icon[data-tooltip]::after {
      content: '';
      left: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-left: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(45deg);
    }

    .mood-icon[data-tooltip]:hover::before,
    .mood-icon[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }

    /* 도트 셀 */
    .dot-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--dot-off);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.15s ease, transform 0.15s ease;
      position: relative;
      flex-shrink: 0;
    }

    .dot:hover {
      transform: scale(1.15);
    }

    .dot.on {
      background: var(--dot-on);
    }

    /* 감정별 카운트 */
    .habit-rate {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      text-align: right;
      user-select: none;
      transition: opacity var(--transition), color var(--transition);
      padding-left: 0.375rem;
      white-space: nowrap;
    }

    .habit-rate.has-data {
      color: var(--foreground);
      opacity: 1;
    }

    /* 우측 컨트롤 */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0.25;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }

    .widget-wrapper:hover .controls {
      opacity: 1;
    }

    .control-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }

    .control-btn:hover:not(:disabled) {
      color: var(--foreground);
    }

    .control-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .control-btn svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }

    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }

    /* 4방향 리사이즈 핸들 */
    .resize-handle {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      z-index: 20;
    }

    .resize-handle .bar {
      background: var(--border);
      transition: opacity var(--transition), background var(--transition),
                  width 0.15s ease, height 0.15s ease;
      border-radius: 999px;
      opacity: 0;
    }

    .widget-wrapper:hover .resize-handle .bar {
      opacity: 1;
    }

    .resize-handle:hover .bar {
      background: var(--muted-foreground);
    }

    .handle-top {
      top: 0;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 16px;
      cursor: ns-resize;
    }
    .handle-top .bar { width: 36px; height: 1px; }
    .handle-top:hover .bar { height: 3px; }

    .handle-bottom {
      bottom: 0;
      left: 50%;
      transform: translate(-50%, 50%);
      width: 36px;
      height: 16px;
      cursor: ns-resize;
    }
    .handle-bottom .bar { width: 36px; height: 1px; }
    .handle-bottom:hover .bar { height: 3px; }

    .handle-left {
      left: 0;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 36px;
      cursor: ew-resize;
    }
    .handle-left .bar { width: 1px; height: 36px; }
    .handle-left:hover .bar { width: 3px; }

    .handle-right {
      right: 0;
      top: 50%;
      transform: translate(50%, -50%);
      width: 16px;
      height: 36px;
      cursor: ew-resize;
    }
    .handle-right .bar { width: 1px; height: 36px; }
    .handle-right:hover .bar { width: 3px; }

    /* 리셋 확인 다이얼로그 */
    .reset-confirm {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      z-index: 100;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
      min-width: 200px;
    }

    .reset-confirm.show { display: flex; }

    .reset-confirm p {
      font-size: 0.8125rem;
      color: var(--foreground);
      text-align: center;
      letter-spacing: -0.005em;
    }

    .reset-confirm .actions {
      display: flex;
      gap: 0.5rem;
    }

    .reset-confirm button {
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.375rem 0.875rem;
      border-radius: 0.375rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--foreground);
      cursor: pointer;
      transition: all var(--transition);
    }

    .reset-confirm button:hover { background: var(--muted); }

    .reset-confirm button.danger {
      background: var(--foreground);
      color: var(--card);
      border-color: var(--foreground);
    }

    .reset-confirm button.danger:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">
    <div class="card" id="card">

      <!-- 헤더: 좌(기록 N/7) | 중앙(트렌드) | 우(평균/5) -->
      <div class="header">
        <div class="header-left">
          <div class="week-label" id="weekLabel">이번 주</div>
          <div class="stats">
            <span class="done" id="statsDone">0</span>
            <span class="divider-slash">/</span>
            <span class="total" id="statsTotal">7</span>
          </div>
        </div>

        <div class="header-center">
          <svg class="trend-chart" viewBox="0 0 100 30" preserveAspectRatio="none" aria-hidden="true">
            <path class="trend-line" id="trendLine" d="" />
          </svg>
        </div>

        <div class="header-right">
          <div class="rate-label">평균</div>
          <div class="total-rate" id="totalRate">
            <span class="percent-num" id="percentNum">—</span>
            <span class="percent-symbol">/ 5</span>
          </div>
        </div>
      </div>

      <div class="divider">
        <div class="tracker" id="tracker"></div>
      </div>

      <div class="reset-confirm" id="resetConfirm">
        <p>이번 주 기록을 초기화할까요?</p>
        <div class="actions">
          <button id="cancelReset" type="button">취소</button>
          <button class="danger" id="confirmReset" type="button">초기화</button>
        </div>
      </div>

      <div class="resize-handle handle-top" data-direction="top"><div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left" data-direction="left"><div class="bar"></div></div>
      <div class="resize-handle handle-right" data-direction="right"><div class="bar"></div></div>
    </div>

    <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="크기 초기화" title="크기 초기화"
              type="button" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="resetBtn"
              data-tooltip="이번 주 초기화" title="이번 주 초기화"
              type="button" aria-label="이번 주 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    /* ============================================
       노시언 감정 트래커 - 로직
       모델: 1주(월~일) × 5단계 (위에서 아래로 좋음→나쁨)
       한 컬럼(하루)에는 1개 감정만 선택 가능
       ============================================ */
    const STORAGE_KEY = 'nosion-mood-tracker-v1';
    const DAYS_KO = ['월', '화', '수', '목', '금', '토', '일'];
    const LEVELS_COUNT = 5;
    const DAYS_COUNT = 7;
    const NOT_LOGGED = -1;

    // 5단계 감정 — 위에서 아래로 좋음 → 나쁨
    // lucide-react Laugh / Smile / Meh / Frown / Angry 아이콘
    const MOOD_LABELS = ['매우좋음', '좋음', '평범', '나쁨', '화남'];
    const MOOD_ICONS = [
      // 0. Laugh (매우좋음)
      '<circle cx="12" cy="12" r="10"/><path d="M18 13a6 6 0 0 1-6 5 6 6 0 0 1-6-5h12Z"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>',
      // 1. Smile (좋음)
      '<circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>',
      // 2. Meh (평범)
      '<circle cx="12" cy="12" r="10"/><line x1="8" y1="15" x2="16" y2="15"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>',
      // 3. Frown (나쁨)
      '<circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>',
      // 4. Angry (화남)
      '<circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><path d="m7.5 8 2.5 1.5"/><path d="m16.5 8-2.5 1.5"/>'
    ];

    function getMondayKey(date = new Date()) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    function getTodayIndex() {
      const d = new Date().getDay();
      return d === 0 ? 6 : d - 1;
    }

    // 행 인덱스 → 점수 (위쪽이 좋은 감정 = 높은 점수)
    function levelScore(idx) { return LEVELS_COUNT - idx; }

    const defaultState = () => ({
      weekKey: getMondayKey(),
      // 각 요일에 선택된 감정 행 인덱스 (-1 = 미기록)
      data: Array(DAYS_COUNT).fill(NOT_LOGGED)
    });

    let state = defaultState();
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.weekKey !== state.weekKey) {
          // 새 주 → 데이터 리셋
          state = { weekKey: state.weekKey, data: Array(DAYS_COUNT).fill(NOT_LOGGED) };
        } else {
          const data = (Array.isArray(parsed.data) && parsed.data.length === DAYS_COUNT)
            ? parsed.data.map(v => (typeof v === 'number' && v >= 0 && v < LEVELS_COUNT) ? v : NOT_LOGGED)
            : state.data;
          state = { weekKey: parsed.weekKey, data };
        }
      }
    } catch (e) {
      console.error('localStorage load error:', e);
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }

    const trackerEl = document.getElementById('tracker');
    const statsDoneEl = document.getElementById('statsDone');
    const statsTotalEl = document.getElementById('statsTotal');
    const percentNumEl = document.getElementById('percentNum');
    const totalRateEl = document.getElementById('totalRate');
    const trendLineEl = document.getElementById('trendLine');
    const resetBtn = document.getElementById('resetBtn');
    const resetConfirm = document.getElementById('resetConfirm');
    const cancelReset = document.getElementById('cancelReset');
    const confirmReset = document.getElementById('confirmReset');

    const rateRefs = [];
    // dotRefs[level][day] = <button>
    const dotRefs = Array.from({ length: LEVELS_COUNT }, () => Array(DAYS_COUNT).fill(null));

    function countForLevel(l) {
      let c = 0;
      for (let d = 0; d < DAYS_COUNT; d++) if (state.data[d] === l) c++;
      return c;
    }

    function loggedDays() {
      return state.data.filter(v => v !== NOT_LOGGED).length;
    }

    function averageScore() {
      let sum = 0, n = 0;
      for (let d = 0; d < DAYS_COUNT; d++) {
        if (state.data[d] !== NOT_LOGGED) {
          sum += levelScore(state.data[d]);
          n++;
        }
      }
      return n === 0 ? null : sum / n;
    }

    function updateRowRate(l) {
      const rateEl = rateRefs[l];
      const iconEl = iconRefs[l];
      const c = countForLevel(l);
      if (rateEl) {
        rateEl.textContent = `${c}/${DAYS_COUNT}`;
        rateEl.classList.toggle('has-data', c > 0);
      }
      if (iconEl) {
        iconEl.classList.toggle('has-data', c > 0);
      }
    }

    function refreshColumn(d) {
      for (let l = 0; l < LEVELS_COUNT; l++) {
        const dot = dotRefs[l][d];
        if (!dot) continue;
        const selected = state.data[d] === l;
        dot.classList.toggle('on', selected);
        // 스크린리더용 aria-label도 현재 상태로 동기화
        dot.setAttribute('aria-label',
          `${MOOD_LABELS[l]} ${DAYS_KO[d]}요일 ${selected ? '선택됨' : '미선택'}`
        );
      }
    }

    /* Catmull-Rom → Cubic Bezier 부드러운 곡선 */
    function pointsToSmoothPath(pts, tension = 0.2) {
      if (pts.length === 0) return '';
      if (pts.length === 1) {
        const [x, y] = pts[0];
        return `M ${x.toFixed(2)},${y.toFixed(2)} L ${(x + 0.5).toFixed(2)},${y.toFixed(2)}`;
      }
      let d = `M ${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`;
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[i + 2] || p2;
        const c1x = p1[0] + (p2[0] - p0[0]) * tension;
        const c1y = p1[1] + (p2[1] - p0[1]) * tension;
        const c2x = p2[0] - (p3[0] - p1[0]) * tension;
        const c2y = p2[1] - (p3[1] - p1[1]) * tension;
        d += ` C ${c1x.toFixed(2)},${c1y.toFixed(2)} ${c2x.toFixed(2)},${c2y.toFixed(2)} ${p2[0].toFixed(2)},${p2[1].toFixed(2)}`;
      }
      return d;
    }

    function updateTrendChart() {
      // 기록된 날짜의 (요일index, 점수) 만 선으로 연결
      const Y_BOTTOM = 28;
      const Y_TOP = 4;
      const SCORE_MIN = 1;
      const SCORE_MAX = 5;
      const points = [];
      for (let d = 0; d < DAYS_COUNT; d++) {
        if (state.data[d] === NOT_LOGGED) continue;
        const score = levelScore(state.data[d]);
        const x = (d / (DAYS_COUNT - 1)) * 100;
        const y = Y_BOTTOM - ((score - SCORE_MIN) / (SCORE_MAX - SCORE_MIN)) * (Y_BOTTOM - Y_TOP);
        points.push([x, y]);
      }
      trendLineEl.setAttribute('d', pointsToSmoothPath(points, 0.25));
    }

    function updateTotalStats() {
      const done = loggedDays();
      statsDoneEl.textContent = done;
      statsTotalEl.textContent = DAYS_COUNT;
      const avg = averageScore();
      if (avg === null) {
        percentNumEl.textContent = '—';
        totalRateEl.classList.remove('complete');
      } else {
        percentNumEl.textContent = avg.toFixed(1);
        // 평균 4.0 이상이면 강조
        totalRateEl.classList.toggle('complete', avg >= 4);
      }
      updateTrendChart();
    }

    const iconRefs = [];

    function renderTracker() {
      trackerEl.innerHTML = '';
      rateRefs.length = 0;
      iconRefs.length = 0;
      for (let l = 0; l < LEVELS_COUNT; l++) {
        for (let d = 0; d < DAYS_COUNT; d++) dotRefs[l][d] = null;
      }

      // 1행: 빈 셀 + 요일 7개 + 빈 셀
      trackerEl.appendChild(document.createElement('div'));
      DAYS_KO.forEach((day) => {
        const dh = document.createElement('div');
        dh.className = 'day-header';
        dh.textContent = day;
        trackerEl.appendChild(dh);
      });
      trackerEl.appendChild(document.createElement('div'));

      // 2~6행: 감정 아이콘 + 도트 7개 + 카운트
      for (let l = 0; l < LEVELS_COUNT; l++) {
        const icon = document.createElement('div');
        icon.className = 'mood-icon';
        icon.dataset.tooltip = MOOD_LABELS[l];
        icon.setAttribute('aria-label', MOOD_LABELS[l]);
        icon.setAttribute('title', MOOD_LABELS[l]);
        icon.innerHTML =
          `<svg viewBox="0 0 24 24" aria-hidden="true">${MOOD_ICONS[l]}</svg>`;
        if (countForLevel(l) > 0) icon.classList.add('has-data');
        trackerEl.appendChild(icon);
        iconRefs[l] = icon;

        for (let d = 0; d < DAYS_COUNT; d++) {
          const cell = document.createElement('div');
          cell.className = 'dot-cell';

          const dot = document.createElement('button');
          dot.className = 'dot';
          dot.type = 'button';
          if (state.data[d] === l) dot.classList.add('on');
          dot.setAttribute('aria-label',
            `${MOOD_LABELS[l]} ${DAYS_KO[d]}요일 ${state.data[d] === l ? '선택됨' : ''}`
          );

          dot.addEventListener('click', () => {
            // 같은 점을 다시 누르면 해제, 다른 행이면 그 행으로 변경
            if (state.data[d] === l) {
              state.data[d] = NOT_LOGGED;
            } else {
              state.data[d] = l;
            }
            save();
            refreshColumn(d);
            // 영향을 받는 모든 행 카운트 갱신
            for (let row = 0; row < LEVELS_COUNT; row++) updateRowRate(row);
            updateTotalStats();
          });

          cell.appendChild(dot);
          dotRefs[l][d] = dot;
          trackerEl.appendChild(cell);
        }

        // 행 우측 카운트
        const rate = document.createElement('div');
        rate.className = 'habit-rate';
        const c = countForLevel(l);
        rate.textContent = `${c}/${DAYS_COUNT}`;
        if (c > 0) rate.classList.add('has-data');
        trackerEl.appendChild(rate);
        rateRefs[l] = rate;
      }
    }

    // 리셋 흐름
    resetBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      resetConfirm.classList.add('show');
    });
    cancelReset.addEventListener('click', () => {
      resetConfirm.classList.remove('show');
    });
    confirmReset.addEventListener('click', () => {
      state.data = Array(DAYS_COUNT).fill(NOT_LOGGED);
      save();
      renderTracker();
      updateTotalStats();
      resetConfirm.classList.remove('show');
    });
    document.addEventListener('click', (e) => {
      if (resetConfirm.classList.contains('show')) {
        if (!resetConfirm.contains(e.target) && !resetBtn.contains(e.target)) {
          resetConfirm.classList.remove('show');
        }
      }
    });

    renderTracker();
    updateTotalStats();

    // 새 주 자동 감지
    setInterval(() => {
      const currentMonday = getMondayKey();
      if (currentMonday !== state.weekKey) {
        state.weekKey = currentMonday;
        state.data = Array(DAYS_COUNT).fill(NOT_LOGGED);
        save();
        renderTracker();
        updateTotalStats();
      }
    }, 60000);

    /* ============================================
       4방향 리사이즈
       ============================================ */
    const SIZE_KEY = 'nosion-mood-tracker-size-v1';
    const MIN_WIDTH = 320;
    const MAX_WIDTH = 720;
    const MIN_HEIGHT = 260;
    const MAX_HEIGHT = 720;

    const cardEl = document.getElementById('card');

    let cardWidth = 360;
    let cardHeight = null;

    try {
      const savedSize = localStorage.getItem(SIZE_KEY);
      if (savedSize) {
        const s = JSON.parse(savedSize);
        if (typeof s.width === 'number') {
          cardWidth = Math.max(MIN_WIDTH, Math.min(MAX_WIDTH, s.width));
        }
        if (typeof s.height === 'number' && s.height > 0) {
          cardHeight = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, s.height));
        }
      }
    } catch (e) {}

    function applyCardSize() {
      cardEl.style.width = cardWidth + 'px';
      if (cardHeight !== null) {
        cardEl.style.height = cardHeight + 'px';
      } else {
        cardEl.style.height = '';
      }
    }

    function saveSize() {
      try {
        localStorage.setItem(SIZE_KEY, JSON.stringify({
          width: cardWidth,
          height: cardHeight
        }));
      } catch (e) {}
    }

    let resizeDrag = null;
    let startLeft = 0, startTop = 0;

    function startResize(direction, x, y) {
      const rect = cardEl.getBoundingClientRect();
      resizeDrag = {
        direction,
        startX: x,
        startY: y,
        startWidth: rect.width,
        startHeight: rect.height
      };
      startLeft = parseFloat(widgetEl.style.left) || 0;
      startTop = parseFloat(widgetEl.style.top) || 0;
      document.body.style.userSelect = 'none';
      document.body.style.cursor =
        (direction === 'left' || direction === 'right') ? 'ew-resize' : 'ns-resize';
    }

    function moveResize(x, y) {
      if (!resizeDrag) return;
      const dx = x - resizeDrag.startX;
      const dy = y - resizeDrag.startY;
      const dir = resizeDrag.direction;
      if (dir === 'right' || dir === 'left') {
        const delta = dir === 'right' ? dx : -dx;
        cardWidth = Math.max(MIN_WIDTH, Math.min(MAX_WIDTH, resizeDrag.startWidth + delta * 2));
        const actualDelta = cardWidth - resizeDrag.startWidth;
        if (widgetEl.style.position === 'fixed') {
          widgetEl.style.left = (startLeft - actualDelta / 2) + 'px';
        }
      } else if (dir === 'bottom' || dir === 'top') {
        const delta = dir === 'bottom' ? dy : -dy;
        cardHeight = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, resizeDrag.startHeight + delta * 2));
        const actualDelta = cardHeight - resizeDrag.startHeight;
        if (widgetEl.style.position === 'fixed') {
          widgetEl.style.top = (startTop - actualDelta / 2) + 'px';
        }
      }
      applyCardSize();
    }

    function endResize() {
      if (resizeDrag) {
        saveSize();
        if (widgetEl.style.position === 'fixed') {
          try { localStorage.setItem(POS_KEY, JSON.stringify({ x: offsetX, y: offsetY, left: widgetEl.style.left, top: widgetEl.style.top })); } catch (e) {}
        }
        resizeDrag = null;
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
      }
    }

    const handles = document.querySelectorAll('.resize-handle');
    handles.forEach(handle => {
      let direction = handle.dataset.direction || '';
      if (!direction) {
        if (handle.classList.contains('handle-top')) direction = 'top';
        else if (handle.classList.contains('handle-bottom')) direction = 'bottom';
        else if (handle.classList.contains('handle-left')) direction = 'left';
        else if (handle.classList.contains('handle-right')) direction = 'right';
      }
      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        startResize(direction, e.clientX, e.clientY);
      });
      handle.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        startResize(direction, t.clientX, t.clientY);
      }, { passive: false });
    });

    document.addEventListener('mousemove', (e) => {
      if (resizeDrag) {
        e.preventDefault();
        moveResize(e.clientX, e.clientY);
      }
    });
    document.addEventListener('mouseup', endResize);
    document.addEventListener('mouseleave', endResize);
    document.addEventListener('touchmove', (e) => {
      if (resizeDrag) {
        const t = e.touches[0];
        moveResize(t.clientX, t.clientY);
      }
    }, { passive: true });
    document.addEventListener('touchend', endResize);
    document.addEventListener('touchcancel', endResize);

    applyCardSize();

    /* ============================================
       위치 이동 (카드 빈 영역 드래그)
       ============================================ */
    const POS_KEY = 'nosion-mood-tracker-pos-v1';
    const widgetEl = document.getElementById('widget');

    let offsetX = 0;
    let offsetY = 0;
    let moveDrag = null;

    try {
      const savedPos = localStorage.getItem(POS_KEY);
      if (savedPos) {
        const p = JSON.parse(savedPos);
        if (typeof p.x === 'number') offsetX = p.x;
        if (typeof p.y === 'number') offsetY = p.y;
      }
    } catch (e) {}

    function applyPosition() {
      widgetEl.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
    }

    function savePosition() {
      try {
        localStorage.setItem(POS_KEY, JSON.stringify({ x: offsetX, y: offsetY }));
      } catch (e) {}
    }

    function isDraggableTarget(target) {
      if (!target.closest) return false;
      // 카드 빈 영역 전체에서 드래그 허용 (인터랙티브 요소만 제외)
      const blocked = ['.control-btn', '.resize-handle', 'button', '[contenteditable]', 'a', 'input'];
      for (const sel of blocked) {
        if (target.closest(sel)) return false;
      }
      return true;
    }

    function startMove(x, y) {
      moveDrag = {
        startX: x,
        startY: y,
        startOffsetX: offsetX,
        startOffsetY: offsetY
      };
      document.body.style.userSelect = 'none';
      cardEl.classList.add('dragging');
    }

    function doMove(x, y) {
      if (!moveDrag) return;
      offsetX = moveDrag.startOffsetX + (x - moveDrag.startX);
      offsetY = moveDrag.startOffsetY + (y - moveDrag.startY);
      applyPosition();
    }

    function endMove() {
      if (moveDrag) {
        savePosition();
        moveDrag = null;
        document.body.style.userSelect = '';
        cardEl.classList.remove('dragging');
      }
    }

    applyPosition();

    cardEl.addEventListener('mousedown', (e) => {
      if (!isDraggableTarget(e.target)) return;
      e.preventDefault();
      startMove(e.clientX, e.clientY);
    });

    cardEl.addEventListener('touchstart', (e) => {
      if (!isDraggableTarget(e.target)) return;
      const t = e.touches[0];
      startMove(t.clientX, t.clientY);
    }, { passive: true });

    document.addEventListener('mousemove', (e) => {
      if (moveDrag) {
        e.preventDefault();
        doMove(e.clientX, e.clientY);
      }
    });
    document.addEventListener('mouseup', endMove);
    document.addEventListener('mouseleave', endMove);
    document.addEventListener('touchmove', (e) => {
      if (moveDrag) {
        const t = e.touches[0];
        doMove(t.clientX, t.clientY);
      }
    }, { passive: true });
    document.addEventListener('touchend', endMove);
    document.addEventListener('touchcancel', endMove);

    // 크기 초기화 버튼 — 크기와 위치 모두 원복
    const DEFAULT_WIDTH = 360;
    const resizeResetBtn = document.getElementById('resizeResetBtn');
    resizeResetBtn.addEventListener('click', () => {
      cardWidth = DEFAULT_WIDTH;
      cardHeight = null;
      applyCardSize();
      saveSize();

      offsetX = 0;
      offsetY = 0;
      applyPosition();
      savePosition();
    });
  </script>
</body>
</html>
