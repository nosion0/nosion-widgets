<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노시언 감정 트래커</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* ============================================
       노시언 위젯 시그니처 디자인 토큰
       ============================================ */
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --dot-on: hsl(220 13% 15%);
      --dot-off: hsl(220 10% 88%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      width: 360px;
      position: relative;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    /* 드래그 영역은 헤더로 한정 */
    .card .header {
      cursor: grab;
    }

    .card.dragging .header {
      cursor: grabbing;
    }

    .card .header {
      flex-shrink: 0;
    }

    .card .divider {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .header-left,
    .header-right {
      display: flex;
      flex-direction: column;
    }

    .header-right {
      align-items: flex-end;
    }

    .header-center {
      flex: 1 1 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 1.5rem 6px;
      min-width: 60px;
    }

    .trend-chart {
      width: 100%;
      height: 36px;
      display: block;
      overflow: visible;
    }

    .trend-chart .trend-line {
      fill: none;
      stroke: var(--muted-foreground);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.45;
      vector-effect: non-scaling-stroke;
    }

    .week-label,
    .rate-label {
      font-size: 0.75rem;
      letter-spacing: 0.025em;
      color: var(--muted-foreground);
      margin-bottom: 0.375rem;
      font-weight: 400;
    }

    .stats {
      display: flex;
      align-items: baseline;
      gap: 0.125rem;
      line-height: 1;
    }

    .stats .done {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--muted-foreground);
    }

    .stats .divider-slash {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--muted-foreground);
      opacity: 0.6;
      margin: 0 0.125rem;
      font-variant-numeric: tabular-nums;
    }

    .stats .total {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
    }

    /* 우측 상단 평균 점수 */
    .total-rate {
      display: flex;
      align-items: baseline;
      line-height: 1;
    }

    .total-rate .percent-num {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--muted-foreground);
    }

    .total-rate .percent-symbol {
      font-size: 1.5rem;
      font-weight: 400;
      padding-left: 0.125rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
    }

    .total-rate.complete .percent-num {
      color: var(--foreground);
    }

    .divider {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    /* 그리드: [아이콘 32px] [도트 7개 1fr씩] [카운트 auto] / [헤더 행] + [5 감정 행] */
    .tracker {
      display: grid;
      grid-template-columns: 32px repeat(7, minmax(0, 1fr)) auto;
      grid-template-rows: auto repeat(5, minmax(0, 1fr));
      gap: 0.5rem 0.5rem;
      align-items: center;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .day-header {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      padding-bottom: 0.25rem;
      user-select: none;
    }

    /* 감정 아이콘 (lucide-react 스타일 라인 페이스) */
    .mood-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      margin: 0 auto;
      color: var(--muted-foreground);
      opacity: 0.55;
      transition: color var(--transition), opacity var(--transition);
      position: relative;
      cursor: help;
      flex-shrink: 0;
    }

    .mood-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mood-icon.has-data {
      color: var(--foreground);
      opacity: 1;
    }

    /* 아이콘 호버 시 한글 이름 툴팁 (우측 등장) */
    .mood-icon[data-tooltip]::before,
    .mood-icon[data-tooltip]::after {
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .mood-icon[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .mood-icon[data-tooltip]::after {
      content: '';
      left: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-left: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(45deg);
    }

    .mood-icon[data-tooltip]:hover::before,
    .mood-icon[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }

    /* 도트 셀 */
    .dot-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--dot-off);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.15s ease, transform 0.15s ease;
      position: relative;
      flex-shrink: 0;
    }

    .dot:hover {
      transform: scale(1.15);
    }

    .dot.on {
      background: var(--dot-on);
    }

    /* 감정별 카운트 */
    .habit-rate {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      text-align: right;
      user-select: none;
      transition: opacity var(--transition), color var(--transition);
      padding-left: 0.375rem;
      white-space: nowrap;
    }

    .habit-rate.has-data {
      color: var(--foreground);
      opacity: 1;
    }

    /* 우측 컨트롤 */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }

    .control-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }

    .control-btn:hover:not(:disabled) {
      color: var(--foreground);
    }

    .control-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .control-btn svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }

    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }

    /* 리셋 확인 다이얼로그 */
    .reset-confirm {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      z-index: 100;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
      min-width: 200px;
    }

    .reset-confirm.show { display: flex; }

    .reset-confirm p {
      font-size: 0.8125rem;
      color: var(--foreground);
      text-align: center;
      letter-spacing: -0.005em;
    }

    .reset-confirm .actions {
      display: flex;
      gap: 0.5rem;
    }

    .reset-confirm button {
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.375rem 0.875rem;
      border-radius: 0.375rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--foreground);
      cursor: pointer;
      transition: all var(--transition);
    }

    .reset-confirm button:hover { background: var(--muted); }

    .reset-confirm button.danger {
      background: var(--foreground);
      color: var(--card);
      border-color: var(--foreground);
    }

    .reset-confirm button.danger:hover { opacity: 0.85; }
      /* unify-resize: 내용은 고정폭, 카드를 키우면 바깥 여백만 늘어남 */
    .card {
      justify-content: safe center;
      align-items: safe center;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: inherit;
      width: 100%;
    }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      position: absolute; width: auto; height: auto;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; left: auto; bottom: auto;
      display: flex; flex-direction: row; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; padding: 0; }
    #card.card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    /* 그리드 반응형 채움: 감정 격자가 카드 높이를 채움 */
    #card.card > .card-body { display: flex; flex-direction: column; }
    .tracker { flex: 1 1 auto; height: auto; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-body">

      <!-- 헤더: 좌(기록 N/7) | 중앙(트렌드) | 우(평균/5) -->
      <div class="header">
        <div class="header-left">
          <div class="week-label" id="weekLabel">이번 주</div>
          <div class="stats">
            <span class="done" id="statsDone">0</span>
            <span class="divider-slash">/</span>
            <span class="total" id="statsTotal">7</span>
          </div>
        </div>

        <div class="header-center">
          <svg class="trend-chart" viewBox="0 0 100 30" preserveAspectRatio="none" aria-hidden="true">
            <path class="trend-line" id="trendLine" d="" />
          </svg>
        </div>

        <div class="header-right">
          <div class="rate-label">평균</div>
          <div class="total-rate" id="totalRate">
            <span class="percent-num" id="percentNum">—</span>
            <span class="percent-symbol">/ 5</span>
          </div>
        </div>
      </div>

      <div class="divider">
        <div class="tracker" id="tracker"></div>
      </div>

      <div class="reset-confirm" id="resetConfirm">
        <p>이번 주 기록을 초기화할까요?</p>
        <div class="actions">
          <button id="cancelReset" type="button">취소</button>
          <button class="danger" id="confirmReset" type="button">초기화</button>
        </div>
      </div>

      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="위치 초기화" title="위치 초기화"
              type="button" aria-label="카드 위치 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="control-btn" id="resetBtn"
              data-tooltip="이번 주 초기화" title="이번 주 초기화"
              type="button" aria-label="이번 주 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
      </button>
    </div>

</div>


  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ============================================
       노시언 감정 트래커 - 로직
       모델: 1주(월~일) × 5단계 (위에서 아래로 좋음→나쁨)
       한 컬럼(하루)에는 1개 감정만 선택 가능
       ============================================ */
    const STORAGE_KEY = 'nosion-mood-tracker-v1';
    const DAYS_KO = ['월', '화', '수', '목', '금', '토', '일'];
    const LEVELS_COUNT = 5;
    const DAYS_COUNT = 7;
    const NOT_LOGGED = -1;

    // 5단계 감정 — 위에서 아래로 좋음 → 나쁨
    // lucide-react Laugh / Smile / Meh / Frown / Angry 아이콘
    const MOOD_LABELS = ['매우좋음', '좋음', '평범', '나쁨', '화남'];
    const MOOD_ICONS = [
      // 0. Laugh (매우좋음)
      '<circle cx="12" cy="12" r="10"/><path d="M18 13a6 6 0 0 1-6 5 6 6 0 0 1-6-5h12Z"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>',
      // 1. Smile (좋음)
      '<circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>',
      // 2. Meh (평범)
      '<circle cx="12" cy="12" r="10"/><line x1="8" y1="15" x2="16" y2="15"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>',
      // 3. Frown (나쁨)
      '<circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>',
      // 4. Angry (화남)
      '<circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><path d="m7.5 8 2.5 1.5"/><path d="m16.5 8-2.5 1.5"/>'
    ];

    function getMondayKey(date = new Date()) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    function getTodayIndex() {
      const d = new Date().getDay();
      return d === 0 ? 6 : d - 1;
    }

    // 행 인덱스 → 점수 (위쪽이 좋은 감정 = 높은 점수)
    function levelScore(idx) { return LEVELS_COUNT - idx; }

    const defaultState = () => ({
      weekKey: getMondayKey(),
      // 각 요일에 선택된 감정 행 인덱스 (-1 = 미기록)
      data: Array(DAYS_COUNT).fill(NOT_LOGGED)
    });

    let state = defaultState();
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.weekKey !== state.weekKey) {
          // 새 주 → 데이터 리셋
          state = { weekKey: state.weekKey, data: Array(DAYS_COUNT).fill(NOT_LOGGED) };
        } else {
          const data = (Array.isArray(parsed.data) && parsed.data.length === DAYS_COUNT)
            ? parsed.data.map(v => (typeof v === 'number' && v >= 0 && v < LEVELS_COUNT) ? v : NOT_LOGGED)
            : state.data;
          state = { weekKey: parsed.weekKey, data };
        }
      }
    } catch (e) {
      console.error('localStorage load error:', e);
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }

    const trackerEl = document.getElementById('tracker');
    const statsDoneEl = document.getElementById('statsDone');
    const statsTotalEl = document.getElementById('statsTotal');
    const percentNumEl = document.getElementById('percentNum');
    const totalRateEl = document.getElementById('totalRate');
    const trendLineEl = document.getElementById('trendLine');
    const resetBtn = document.getElementById('resetBtn');
    const resetConfirm = document.getElementById('resetConfirm');
    const cancelReset = document.getElementById('cancelReset');
    const confirmReset = document.getElementById('confirmReset');

    const rateRefs = [];
    // dotRefs[level][day] = <button>
    const dotRefs = Array.from({ length: LEVELS_COUNT }, () => Array(DAYS_COUNT).fill(null));

    function countForLevel(l) {
      let c = 0;
      for (let d = 0; d < DAYS_COUNT; d++) if (state.data[d] === l) c++;
      return c;
    }

    function loggedDays() {
      return state.data.filter(v => v !== NOT_LOGGED).length;
    }

    function averageScore() {
      let sum = 0, n = 0;
      for (let d = 0; d < DAYS_COUNT; d++) {
        if (state.data[d] !== NOT_LOGGED) {
          sum += levelScore(state.data[d]);
          n++;
        }
      }
      return n === 0 ? null : sum / n;
    }

    function updateRowRate(l) {
      const rateEl = rateRefs[l];
      const iconEl = iconRefs[l];
      const c = countForLevel(l);
      if (rateEl) {
        rateEl.textContent = `${c}/${DAYS_COUNT}`;
        rateEl.classList.toggle('has-data', c > 0);
      }
      if (iconEl) {
        iconEl.classList.toggle('has-data', c > 0);
      }
    }

    function refreshColumn(d) {
      for (let l = 0; l < LEVELS_COUNT; l++) {
        const dot = dotRefs[l][d];
        if (!dot) continue;
        const selected = state.data[d] === l;
        dot.classList.toggle('on', selected);
        // 스크린리더용 aria-label도 현재 상태로 동기화
        dot.setAttribute('aria-label',
          `${MOOD_LABELS[l]} ${DAYS_KO[d]}요일 ${selected ? '선택됨' : '미선택'}`
        );
      }
    }

    /* Catmull-Rom → Cubic Bezier 부드러운 곡선 */
    function pointsToSmoothPath(pts, tension = 0.2) {
      if (pts.length === 0) return '';
      if (pts.length === 1) {
        const [x, y] = pts[0];
        return `M ${x.toFixed(2)},${y.toFixed(2)} L ${(x + 0.5).toFixed(2)},${y.toFixed(2)}`;
      }
      let d = `M ${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`;
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[i + 2] || p2;
        const c1x = p1[0] + (p2[0] - p0[0]) * tension;
        const c1y = p1[1] + (p2[1] - p0[1]) * tension;
        const c2x = p2[0] - (p3[0] - p1[0]) * tension;
        const c2y = p2[1] - (p3[1] - p1[1]) * tension;
        d += ` C ${c1x.toFixed(2)},${c1y.toFixed(2)} ${c2x.toFixed(2)},${c2y.toFixed(2)} ${p2[0].toFixed(2)},${p2[1].toFixed(2)}`;
      }
      return d;
    }

    function updateTrendChart() {
      // 기록된 날짜의 (요일index, 점수) 만 선으로 연결
      const Y_BOTTOM = 28;
      const Y_TOP = 4;
      const SCORE_MIN = 1;
      const SCORE_MAX = 5;
      const points = [];
      for (let d = 0; d < DAYS_COUNT; d++) {
        if (state.data[d] === NOT_LOGGED) continue;
        const score = levelScore(state.data[d]);
        const x = (d / (DAYS_COUNT - 1)) * 100;
        const y = Y_BOTTOM - ((score - SCORE_MIN) / (SCORE_MAX - SCORE_MIN)) * (Y_BOTTOM - Y_TOP);
        points.push([x, y]);
      }
      trendLineEl.setAttribute('d', pointsToSmoothPath(points, 0.25));
    }

    function updateTotalStats() {
      const done = loggedDays();
      statsDoneEl.textContent = done;
      statsTotalEl.textContent = DAYS_COUNT;
      const avg = averageScore();
      if (avg === null) {
        percentNumEl.textContent = '—';
        totalRateEl.classList.remove('complete');
      } else {
        percentNumEl.textContent = avg.toFixed(1);
        // 평균 4.0 이상이면 강조
        totalRateEl.classList.toggle('complete', avg >= 4);
      }
      updateTrendChart();
    }

    const iconRefs = [];

    function renderTracker() {
      trackerEl.innerHTML = '';
      rateRefs.length = 0;
      iconRefs.length = 0;
      for (let l = 0; l < LEVELS_COUNT; l++) {
        for (let d = 0; d < DAYS_COUNT; d++) dotRefs[l][d] = null;
      }

      // 1행: 빈 셀 + 요일 7개 + 빈 셀
      trackerEl.appendChild(document.createElement('div'));
      DAYS_KO.forEach((day) => {
        const dh = document.createElement('div');
        dh.className = 'day-header';
        dh.textContent = day;
        trackerEl.appendChild(dh);
      });
      trackerEl.appendChild(document.createElement('div'));

      // 2~6행: 감정 아이콘 + 도트 7개 + 카운트
      for (let l = 0; l < LEVELS_COUNT; l++) {
        const icon = document.createElement('div');
        icon.className = 'mood-icon';
        icon.dataset.tooltip = MOOD_LABELS[l];
        icon.setAttribute('aria-label', MOOD_LABELS[l]);
        icon.setAttribute('title', MOOD_LABELS[l]);
        icon.innerHTML =
          `<svg viewBox="0 0 24 24" aria-hidden="true">${MOOD_ICONS[l]}</svg>`;
        if (countForLevel(l) > 0) icon.classList.add('has-data');
        trackerEl.appendChild(icon);
        iconRefs[l] = icon;

        for (let d = 0; d < DAYS_COUNT; d++) {
          const cell = document.createElement('div');
          cell.className = 'dot-cell';

          const dot = document.createElement('button');
          dot.className = 'dot';
          dot.type = 'button';
          if (state.data[d] === l) dot.classList.add('on');
          dot.setAttribute('aria-label',
            `${MOOD_LABELS[l]} ${DAYS_KO[d]}요일 ${state.data[d] === l ? '선택됨' : ''}`
          );

          dot.addEventListener('click', () => {
            // 같은 점을 다시 누르면 해제, 다른 행이면 그 행으로 변경
            if (state.data[d] === l) {
              state.data[d] = NOT_LOGGED;
            } else {
              state.data[d] = l;
            }
            save();
            refreshColumn(d);
            // 영향을 받는 모든 행 카운트 갱신
            for (let row = 0; row < LEVELS_COUNT; row++) updateRowRate(row);
            updateTotalStats();
          });

          cell.appendChild(dot);
          dotRefs[l][d] = dot;
          trackerEl.appendChild(cell);
        }

        // 행 우측 카운트
        const rate = document.createElement('div');
        rate.className = 'habit-rate';
        const c = countForLevel(l);
        rate.textContent = `${c}/${DAYS_COUNT}`;
        if (c > 0) rate.classList.add('has-data');
        trackerEl.appendChild(rate);
        rateRefs[l] = rate;
      }
    }

    // 리셋 흐름
    resetBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      resetConfirm.classList.add('show');
    });
    cancelReset.addEventListener('click', () => {
      resetConfirm.classList.remove('show');
    });
    confirmReset.addEventListener('click', () => {
      state.data = Array(DAYS_COUNT).fill(NOT_LOGGED);
      save();
      renderTracker();
      updateTotalStats();
      resetConfirm.classList.remove('show');
    });
    document.addEventListener('click', (e) => {
      if (resetConfirm.classList.contains('show')) {
        if (!resetConfirm.contains(e.target) && !resetBtn.contains(e.target)) {
          resetConfirm.classList.remove('show');
        }
      }
    });

    renderTracker();
    updateTotalStats();

    // 새 주 자동 감지 — 지난 주 데이터는 history에 보관 후 새 주 시작
    setInterval(() => {
      const currentMonday = getMondayKey();
      if (state.weekKey && currentMonday !== state.weekKey) {
        if (!state.history) state.history = {};
        state.history[state.weekKey] = state.data;
        state.weekKey = currentMonday;
        state.data = Array(DAYS_COUNT).fill(NOT_LOGGED);
        save();
        renderTracker();
        updateTotalStats();
      }
    }, 60000);


    /* ===================================================================
       드래그 이동 (frame{x,y} · Pointer Events)
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-mood-tracker-frame-v1', minW: 320, minH: 280, defaultW: 360 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, Math.min(frame.w, window.innerWidth)); frame.h = Math.max(MIN_H, Math.min(frame.h, window.innerHeight));
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';


      /* ----- 드래그 이동 (이동 임계값으로 클릭과 충돌 방지) ----- */
      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-no-drag]')) return;
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        let started = false;
        const mv = (ev) => {
          const ddx = ev.clientX - dx0, ddy = ev.clientY - dy0;
          if (!started) {
            if (Math.abs(ddx) < 4 && Math.abs(ddy) < 4) return;
            started = true; active = true; card.classList.add('dragging');
          }
          frame.x = sx + ddx; frame.y = sy + ddy; applyFrame();
        };
        const up = () => {
          document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
          if (started) {
            card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame();
            const sc = (ce) => { ce.stopPropagation(); ce.preventDefault(); };
            window.addEventListener('click', sc, { capture: true, once: true });
            setTimeout(() => window.removeEventListener('click', sc, true), 0);
          }
        };
        document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
      });

      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });
      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
</script>
</body>
</html>
