<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>식물 키우기</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --foreground:       hsl(220 13% 18%);
      --muted-foreground: hsl(215 14% 50%);
      --border:           hsl(220 9% 76%);
      --muted:            hsl(210 20% 96%);
      --radius:           0.5rem;

      /* Plant palette (monochrome) */
      --ink:    hsl(220 13% 20%);
      --stem:   hsl(220 12% 34%);
      --leaf:   hsl(220 10% 60%);
      --fill:   hsl(220 10% 80%);
      --accent: hsl(220 13% 26%);
      --pot:    hsl(220 10% 87%);
      --soil:   hsl(220 9% 64%);
      --blush:  hsl(220 14% 74%);
      --shine:  hsl(0 0% 100% / .55);
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--card);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== Left panel (hover only) ===== */
    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      flex-shrink: 0;
    }

    .panel-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 0.375rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--foreground);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease;
      height: 2rem;
    }

    .panel-btn:hover { background: var(--muted); }
    .panel-btn.muted-bg { background: var(--muted); }

    .panel-btn svg {
      width: 16px; height: 16px; flex-shrink: 0;
      stroke: currentColor; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ===== Card ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem 1.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: grab;
    }

    /* 반응형 zoom 대상: 카드 폭에 비례해 콘텐츠 전체를 확대 */
    .card-body {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card.dragging { cursor: grabbing; }

    /* ===== Plant stage ===== */
    .plant-stage {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding-bottom: 2rem; /* lift the plant up so the pot isn't flush with the bottom */
    }

    .plant-svg {
      width: auto;
      height: 100%;
      max-height: 260px;
      overflow: visible;
      transition: opacity 0.25s ease;
    }

    .plant-body { transform-origin: 60px 104px; }

    /* Idle "alive" motion — the main plant gently sways on a slow loop */
    @keyframes idle {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(-1.1deg); }
      60%  { transform: rotate(0.9deg); }
      100% { transform: rotate(0deg); }
    }
    .plant-svg .plant-body { animation: idle 4.5s ease-in-out infinite; }
    /* keep the small gallery thumbnails still */
    .slot .plant-body { animation: none; }

    /* Watering: gentle happy bob (revives from wilt) */
    @keyframes sway {
      0%,100% { transform: rotate(0deg) translateY(0); }
      18%     { transform: rotate(-3deg) translateY(-1.5px); }
      48%     { transform: rotate(2.4deg) translateY(0); }
      74%     { transform: rotate(-1.2deg); }
    }
    .plant-svg.watering .plant-body { animation: sway 0.85s ease; }

    /* Water drops — several droplets fall in, staggered (delays set inline per drop) */
    .drop { opacity: 0; }
    @keyframes drop-fall {
      0%   { transform: translateY(-10px); opacity: 0; }
      16%  { opacity: 1; }
      84%  { opacity: 1; }
      100% { transform: translateY(72px); opacity: 0; }
    }
    .plant-svg.watering .drop { animation: drop-fall 0.8s ease-in; }

    /* Soil ripple when the water lands */
    .ripple { opacity: 0; transform-box: fill-box; transform-origin: center; }
    @keyframes ripple {
      0%, 50% { opacity: 0;   transform: scale(0.35); }
      66%     { opacity: 0.5; transform: scale(0.7); }
      100%    { opacity: 0;   transform: scale(1.45); }
    }
    .plant-svg.watering .ripple { animation: ripple 1s ease-out; }

    /* New flowers/buds gently bloom in (instead of popping) when a stage adds them */
    .bloom-in { transform-box: fill-box; transform-origin: center; animation: bloom-in 0.5s ease-out both; }
    @keyframes bloom-in {
      0%   { transform: scale(0);    opacity: 0; }
      65%  { transform: scale(1.18); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }

    /* Wilted look (idle pauses so the droop stays put) */
    .plant-svg.wilted .plant-body {
      animation: none;
      opacity: 0.55;
      transform: rotate(4deg);
    }

    /* Respect reduced-motion: drop the ambient idle sway */
    @media (prefers-reduced-motion: reduce) {
      .plant-svg .plant-body { animation: none; }
      .bloom-in { animation: none; }
    }

    /* ===== Hover info overlay ===== */
    .info-top, .info-bottom {
      position: absolute;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
      padding: 0 1.25rem;
    }
    .info-top    { top: 1.25rem; }
    .info-bottom { bottom: 1.25rem; }

    .plant-name {
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--foreground);
    }

    .plant-meta {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      letter-spacing: 0.01em;
    }

    .water-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--foreground);
      padding: 0.5rem 1.1rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .water-btn:hover { background: var(--muted); }
    /* watered today: still a white button, but the droplet icon fills in */
    .water-btn.done {
      color: var(--foreground);
      cursor: default;
    }
    .water-btn.done:hover { background: var(--card); }
    .water-btn svg { width: 15px; height: 15px; }
    .water-btn svg path { fill: none; transition: fill 0.2s ease; }
    .water-btn.done svg path { fill: currentColor; }

    /* ===== Collection gallery ===== */
    .gallery {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      gap: 0.75rem;
    }
    .card.collection .plant-stage,
    .card.collection .info-top,
    .card.collection .info-bottom { display: none; }
    .card.collection .gallery { display: flex; }

    .gallery-title {
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      flex-shrink: 0;
    }
    .gallery-hint {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      text-align: center;
      margin-top: -0.4rem;
      flex-shrink: 0;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      flex: 1;
      align-content: start;
      overflow-y: auto;
    }

    .slot {
      position: relative;
      aspect-ratio: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--card);
      transition: border-color 0.15s ease, background 0.15s ease;
      overflow: hidden;
    }
    .slot:hover { background: var(--muted); }
    .slot.current { border-color: var(--foreground); border-width: 2px; }
    .slot svg { width: 78%; height: 78%; overflow: visible; }
    .slot.locked svg { opacity: 0.16; }

    .slot .badge {
      position: absolute;
      top: 3px; right: 4px;
      font-size: 0.5625rem;
      line-height: 1;
      color: var(--muted-foreground);
    }
    .slot.done .badge { color: var(--foreground); }
    .slot .slot-name {
      position: absolute;
      bottom: 2px; left: 0; right: 0;
      text-align: center;
      font-size: 0.5625rem;
      color: var(--muted-foreground);
    }

    .controls { display: flex; flex-direction: column; gap: 2px; opacity: 0; transition: opacity 0.2s ease; padding-top: 0.25rem; align-self: flex-start; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color 0.2s ease; border-radius: 4px; position: relative; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .control-btn[data-tooltip]::before, .control-btn[data-tooltip]::after { position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); opacity: 0; pointer-events: none; transition: opacity 0.15s ease 0s; z-index: 50; }
    .control-btn[data-tooltip]::before { content: attr(data-tooltip); background: var(--card); color: var(--foreground); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.3125rem 0.625rem; font-size: 0.6875rem; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .control-btn[data-tooltip]::after { content: ''; right: calc(100% + 3px); width: 5px; height: 5px; background: var(--card); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transform: translateY(-50%) rotate(-45deg); }
    .control-btn[data-tooltip]:hover::before, .control-btn[data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }

  
    /* ===== NOSION FRAME SYSTEM (드래그 이동) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    /* .controls를 카드 바깥 우측으로 — 마우스 오버 시 노출 (호버 브리지로 끊김 방지) */
    #w.card { overflow: visible; }
    #w.card::after { content: ''; position: absolute; top: 0; bottom: 0; right: -40px; width: 40px; pointer-events: auto; }
    #w .controls { position: absolute; top: 0.5rem; right: -34px; left: auto; bottom: auto;
      display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: opacity 0.2s ease 0.1s; z-index: 30; padding: 0; pointer-events: none; }
    #w:hover .controls, #w .controls:hover { opacity: 1; pointer-events: auto; transition-delay: 0s; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    /* 좌상단 호버 패널 (컬렉션) — 카드 내부로 이동 */
    #card.card > .left-panel { position: absolute; top: 0.75rem; left: 0.75rem; z-index: 30; margin: 0; }
    #card.card:hover .left-panel, #card.card:focus-within .left-panel { opacity: 1; pointer-events: auto; }
    /* 호버 시 식물 이름·물주기 버튼 노출 */
    #w:hover .info-top, #w:hover .info-bottom { opacity: 1; }
    #w:hover .info-bottom { pointer-events: auto; }
  
    /* === NOSION FRAME SPEC (드래그 이동 + 8방향 리사이즈) === */
    html,body{background:transparent;height:100%;overflow:hidden;}
    *{box-sizing:border-box;}
    .stage{position:fixed;inset:0;}
    .card{position:absolute;display:flex;flex-direction:column;touch-action:none;container-type:size;}
    .card.dragging,.card.resizing{user-select:none;box-shadow:0 12px 36px rgba(55,53,47,.16);}
    .whead{flex:none;cursor:grab;min-height:20px;width:100%;position:relative;z-index:2;background:inherit;}
    .whead:active{cursor:grabbing;}
    .wbody{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;overflow:hidden;width:100%;align-self:stretch;}
    .rz{position:absolute;z-index:5;}
    .rz.n{top:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.s{bottom:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.e{right:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.w{left:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.ne{top:-5px;right:-5px;width:14px;height:14px;cursor:nesw-resize;}
    .rz.nw{top:-5px;left:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.se{bottom:-5px;right:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.sw{bottom:-5px;left:-5px;width:14px;height:14px;cursor:nesw-resize;}
  </style>
</head>
<body>
  <!-- shared hand-drawn "rough" filter: smoothly wobbles every line so shapes look hand-drawn -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <filter id="rough" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="1" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs></svg>

  <div class="stage">

    <!-- Main card -->
    <div class="card" id="w">
      <div class="whead"></div>
      <!-- Left hover panel (카드 좌상단 호버 노출) -->
      <div class="left-panel" id="leftPanel">
        <button class="panel-btn" id="collectionBtn" type="button">
          <svg viewBox="0 0 24 24" stroke-width="1.75">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span id="collectionBtnLabel">컬렉션</span>
        </button>
      </div>
      <div class="wbody">
        <div class="info-top">
          <div class="plant-name" id="plantName">새싹</div>
          <div class="plant-meta" id="plantMeta"></div>
        </div>

        <div class="plant-stage" id="plantStage"></div>

        <div class="info-bottom">
          <button class="water-btn" id="waterBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2.5C12 2.5 5.5 9.5 5.5 14.5a6.5 6.5 0 0 0 13 0C18.5 9.5 12 2.5 12 2.5z"/>
            </svg>
            <span id="waterBtnLabel">물주기</span>
          </button>
        </div>

        <!-- Collection gallery -->
        <div class="gallery">
          <div class="gallery-title" id="galleryTitle">내 식물 컬렉션</div>
          <div class="gallery-hint" id="galleryHint">탭하여 키울 식물을 선택하세요</div>
          <div class="gallery-grid" id="galleryGrid"></div>
        </div>
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn" data-tooltip="위치 초기화" title="위치 초기화" type="button" aria-label="카드 위치 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>

</div>


  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ============ SVG helpers ============ */
    const INK = 'var(--ink)', STEM = 'var(--stem)', LEAF = 'var(--leaf)',
          FILL = 'var(--fill)', ACC = 'var(--accent)', SOIL = 'var(--soil)';

    const petalRing = (x, y, s, n, c = FILL, ry = 8.5) =>
      `<g transform="translate(${x},${y}) scale(${s})">` +
      Array.from({length: n}, (_, i) =>
        `<ellipse cx="0" cy="-15" rx="4.2" ry="${ry}" fill="${c}" stroke="${INK}" stroke-width="1.8"
          transform="rotate(${(360/n)*i})"/>`).join('') + `</g>`;
    const blossom = (x, y, s = 1) =>
      `<g transform="translate(${x},${y}) scale(${s})">` +
      [0,72,144,216,288].map(a =>
        `<ellipse cx="0" cy="-4.5" rx="2.6" ry="4" fill="${FILL}" stroke="${INK}" stroke-width="1.1"
          transform="rotate(${a})"/>`).join('') +
      `<circle cx="0" cy="0" r="2" fill="${ACC}"/></g>`;

    /* Joguman-style face: small dot eyes + faint, thin little smile.
       Mood is governed by the module-level FACE_MOOD flag, set right before a plant is generated
       (so the many baked-in face() calls — incl. tomato's 3 faces — all follow it without threading). */
    let FACE_MOOD = 'happy';
    const face = (cx, cy, s = 1) =>
      `<g transform="translate(${cx},${cy}) scale(${s})">`
      + `<circle cx="-4.6" cy="-2.4" r="1.8" fill="${INK}"/>`
      + `<circle cx="4.6" cy="-2.4" r="1.8" fill="${INK}"/>`
      + (FACE_MOOD === 'sad'
          ? `<path d="M-2.4 4.9 Q0 3.7 2.4 4.9" fill="none" stroke="${INK}" stroke-width="1.2" stroke-linecap="round"/>`
          : `<path d="M-2.4 4.9 Q0 5.9 2.4 4.9" fill="none" stroke="${INK}" stroke-width="1.2" stroke-linecap="round"/>`)
      + `</g>`;

    /* ===== Joguman helpers: bold outline, flat fill, explicit growth stages ===== */
    const SW = 2.5, WHITE = '#fff';
    const fO = (f = FILL) => `fill="${f}" stroke="${INK}" stroke-width="${SW}" stroke-linejoin="round" stroke-linecap="round"`;
    const oO = (extra = '') => `fill="none" stroke="${INK}" stroke-width="${SW}" stroke-linecap="round" stroke-linejoin="round" ${extra}`;
    const stemLine = (d, w = SW, c = STEM) => `<path d="${d}" fill="none" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>`;

    /* Flat hand-drawn pot (bold outline, no shine); BACK behind plant, FRONT over its base */
    const POT_BACK =
      `<path d="M45 104 L49 134 Q49.5 137 52.5 137 L67.5 137 Q70.5 137 71 134 L75 104 Z" fill="var(--pot)" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>` +
      `<ellipse cx="60" cy="104" rx="15" ry="2.6" fill="${SOIL}"/>`;
    const POT_FRONT = `<rect x="39" y="99" width="42" height="10" rx="5" fill="var(--pot)" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round"/>`;
    const DROP =
      `<path class="drop" d="M60 27 q5 8 0 13 q-5 -5 0 -13z" fill="${ACC}"/>` +
      `<path class="drop" style="animation-delay:.12s" d="M51 23 q4.2 6.6 0 11 q-4.2 -4.6 0 -11z" fill="${ACC}"/>` +
      `<path class="drop" style="animation-delay:.24s" d="M68 25 q4.4 7 0 12 q-4.4 -5 0 -12z" fill="${ACC}"/>` +
      `<path class="drop" style="animation-delay:.36s" d="M61 21 q3.6 5.8 0 9.5 q-3.6 -4 0 -9.5z" fill="${ACC}"/>` +
      `<ellipse class="ripple" cx="60" cy="97" rx="11" ry="2.4" fill="none" stroke="${ACC}" stroke-width="1.4"/>`;

    /* ============ Developmental 10-stage growth (ported from the approved design source) ============ */
    /* Stages 1..9 are generated by P[id](n); stage 10 is the approved final F[id]().
       Faces are baked into each drawing and follow the module-level FACE_MOOD flag. */
    const cap  = (v, a, b) => Math.max(a, Math.min(b, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const scG  = (u, s) => `<g transform="translate(60,105) scale(${s.toFixed(3)}) translate(-60,-105)">${u}</g>`;

    F.tomato = () => stemLine('M60 106 C61 96 58 90 58 82 C57 74 60 68 60 60', 3.2) + stemLine('M58 84 C52 82 46 80 42 77', 2.6) + stemLine('M59 76 C66 76 73 74 78 71', 2.6) + armL(49, 97) + armR(71, 96) + tomFruit(42, 73, 10) + tomFruit(78, 67, 10) + tomFruit(60, 54, 11);
    F.bamboo = () => `<path d="M47 106 C46 96 46 64 47 54 C48 49 72 49 73 54 C74 64 74 96 73 106Z" ${fO()}/>` + `<path d="M45 70 Q60 73 75 70 M45 88 Q60 91 75 88" ${oO('opacity="0.45"')}/>` + `<path d="M66 49 C74 39 86 39 87 46 C82 53 72 53 66 50Z" ${fO(LEAF)}/>` + `<path d="M54 49 C46 39 34 39 33 46 C38 53 48 53 54 50Z" ${fO(LEAF)}/>` + `<path d="M60 47 C58 38 60 30 62 27 C64 32 63 41 60 47Z" ${fO(LEAF)}/>` + face(60, 81, 1.2);
    F.cherry = () => `<path d="M53 106 C52 94 53 80 55 74 L65 74 C67 80 68 94 67 106Z" ${fO()}/>` + `<path d="${scallop(60, 50, 24, 11)}" ${fO()}/>` + blossom(56, 36, 0.72) + blossom(43, 44, 0.6) + blossom(72, 40, 0.66) + blossom(78, 52, 0.56) + blossom(46, 57, 0.5) + face(60, 58, 1.15);
    F.sunflower = () => `<path d="M58.2 106 C57.4 96 57.4 76 58.2 66 L61.8 66 C62.6 76 62.6 96 61.8 106Z" ${fO(STEM)}/>` + armL(50, 90) + armR(70, 90) + petalRing(60, 52, 1.25, 12) + `<circle cx="60" cy="52" r="15" ${fO()}/>` + face(60, 52, 1.2);
    F.mushroom = () => mushStem + mushCap + `<circle cx="46" cy="48" r="5.5" ${fO(WHITE)}/>` + `<circle cx="66" cy="44" r="6.5" ${fO(WHITE)}/>` + `<circle cx="77" cy="55" r="4.5" ${fO(WHITE)}/>` + face(60, 88, 1.05);
    F.oldtree = () => oldTrunk + oldCrown + face(60, 86, 1.3);

    /* dispatch: stages 1..9 grow, stage 10 = approved final (n is clamped defensively) */
    function draw(id, n) { n = Math.max(1, Math.min(10, Math.floor(n) || 1)); return n >= 10 ? F[id]() : P[id](n); }

    const PLANTS = [
      { id: 'tulip',     name: '튤립' },
      { id: 'cactus',    name: '선인장' },
      { id: 'clover',    name: '클로버' },
      { id: 'monstera',  name: '몬스테라' },
      { id: 'tomato',    name: '토마토' },
      { id: 'bamboo',    name: '대나무' },
      { id: 'cherry',    name: '벚꽃나무' },
      { id: 'sunflower', name: '해바라기' },
      { id: 'mushroom',  name: '버섯' },
      { id: 'oldtree',   name: '고목' },
    ];

    const TOTAL = PLANTS.length;
    const STAGE_THRESHOLDS = [0, 2, 4, 7, 10, 13, 17, 21, 25, 30]; // water count → stage 1..10
    const MAX_WATER = 30;
    const MAX_STAGE = STAGE_THRESHOLDS.length; // 10

    function stageOf(w) {
      let s = 1;
      for (let i = 0; i < STAGE_THRESHOLDS.length; i++) if (w >= STAGE_THRESHOLDS[i]) s = i + 1;
      return Math.min(MAX_STAGE, s);
    }

    /* ============ State ============ */
    const K_STATE = 'nosion-plant-v1';
    let state = {
      current: 'tulip',
      water: {},            // { plantId: count }
      lastWater: null,      // 'YYYY-MM-DD'
      streak: 0,
      best: 0,
    };

    try {
      const saved = JSON.parse(localStorage.getItem(K_STATE) || 'null');
      if (saved && typeof saved === 'object') state = Object.assign(state, saved);
    } catch (e) {}

    /* URL 데모 파라미터
       ?demo=<plantId>          → 새싹부터 시작, 클릭마다 자람 (일일 제한 없음, localStorage 저장 안 함)
       ?demo=<plantId>&grown=1  → 다 자란 상태로 바로 표시 */
    let DEMO_MODE = false;
    try {
      const u = new URL(location.href);
      const demo = u.searchParams.get('demo');
      const grown = u.searchParams.get('grown');
      if (demo) {
        DEMO_MODE = true;
        const waterCount = grown ? 30 : 0;
        state = { current: demo, water: { [demo]: waterCount }, lastWater: null, streak: 0, best: 0 };
      }
    } catch (e) {}
    if (!state.water || typeof state.water !== 'object' || Array.isArray(state.water)) state.water = {};
    PLANTS.forEach(p => {
      let v = state.water[p.id];
      if (typeof v !== 'number' || !Number.isFinite(v)) v = 0;
      state.water[p.id] = Math.max(0, Math.min(MAX_WATER, Math.floor(v)));
    });
    if (!PLANTS.some(p => p.id === state.current)) state.current = 'tulip';
    if (typeof state.streak !== 'number' || !Number.isFinite(state.streak) || state.streak < 0) state.streak = 0;
    if (typeof state.best !== 'number' || !Number.isFinite(state.best) || state.best < 0) state.best = 0;
    if (typeof state.lastWater !== 'string') state.lastWater = null;

    function save() { if (DEMO_MODE) return; try { localStorage.setItem(K_STATE, JSON.stringify(state)); } catch (e) {} }

    /* ============ Date helpers ============ */
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function daysBetween(a, b) {
      if (!a || !b) return Infinity;
      const da = new Date(a + 'T00:00:00'), db = new Date(b + 'T00:00:00');
      if (!Number.isFinite(da.getTime()) || !Number.isFinite(db.getTime())) return Infinity;
      return Math.round((db - da) / 86400000);
    }

    /* ============ Build SVG ============ */
    function buildPlantSVG(plantId, stage, wilted, svgId = 'plantSvg') {
      FACE_MOOD = wilted ? 'sad' : 'happy';
      const body = draw(plantId, stage); // faces are baked in and follow FACE_MOOD
      FACE_MOOD = 'happy';
      const idAttr = svgId ? ` id="${svgId}"` : '';
      return `<svg class="plant-svg ${wilted ? 'wilted' : ''}"${idAttr} viewBox="0 0 120 150"
                preserveAspectRatio="xMidYMax meet">
        <g filter="url(#rough)">
          ${POT_BACK}
          <g class="plant-body">${body}</g>
          ${POT_FRONT}
          ${DROP}
        </g>
      </svg>`;
    }

    /* ============ Render main ============ */
    const card = document.getElementById('w');
    const plantStage = document.getElementById('plantStage');
    const plantName = document.getElementById('plantName');
    const plantMeta = document.getElementById('plantMeta');
    const waterBtn = document.getElementById('waterBtn');
    const waterBtnLabel = document.getElementById('waterBtnLabel');

    function isWilted() {
      if (DEMO_MODE) return false;
      return daysBetween(state.lastWater, todayStr()) >= 2;
    }
    function wateredToday() {
      if (DEMO_MODE) return false;
      return state.lastWater === todayStr();
    }

    function render() {
      const plant = PLANTS.find(p => p.id === state.current);
      const w = state.water[state.current];
      const stage = stageOf(w);
      const wilted = isWilted() && w > 0;
      const done = w >= MAX_WATER;

      plantStage.innerHTML = buildPlantSVG(state.current, stage, wilted);

      plantName.textContent = plant.name;
      plantMeta.textContent = done ? '🏆 완성!' : ''; // no numeric progress — keep growth a surprise

      // completed plants stay waterable daily (new plant is chosen via the collection panel)
      if (wateredToday()) {
        waterBtn.classList.add('done');
        waterBtnLabel.textContent = '오늘 완료';
      } else {
        waterBtn.classList.remove('done');
        waterBtnLabel.textContent = wilted ? '물주기 (시듦)' : '물주기';
      }
    }

    /* ============ Watering ============ */
    function water() {
      /* 데모 모드: 한 번 누르면 물방울 떨어진 뒤 성장 단계 거쳐 완성형으로 ~1초에 자람 */
      if (DEMO_MODE) {
        const id = state.current;
        if (state.water[id] >= MAX_WATER) return; // already full
        // 물방울 먼저 떨어뜨리기 (현재 새싹 SVG에 .watering)
        const svg0 = document.getElementById('plantSvg');
        if (svg0) { svg0.classList.remove('wilted'); svg0.classList.add('watering'); }
        const steps = STAGE_THRESHOLDS.slice(1).concat([MAX_WATER]); // 10 frames
        let i = 0;
        const tick = () => {
          state.water[id] = steps[i];
          state.lastWater = todayStr();
          render();
          // 매 단계마다 새로 만든 SVG에 .watering 재부여(물방울이 계속 보이도록)
          const svg = document.getElementById('plantSvg');
          if (svg) { svg.classList.remove('wilted'); svg.classList.add('watering'); }
          i++;
          if (i < steps.length) setTimeout(tick, 100);
        };
        // 첫 물방울이 떨어지기 시작한 뒤 ~250ms 후부터 성장 캐스케이드 → 총 ~1.25초
        setTimeout(tick, 250);
        return;
      }
      if (wateredToday()) return;
      // completed plants (30/30) can still be watered daily — count stays capped at MAX_WATER,
      // so the plant keeps its final form while daily care/streak continues.
      const today = todayStr();
      const gap = daysBetween(state.lastWater, today);
      state.streak = (gap === 1) ? state.streak + 1 : 1;
      state.best = Math.max(state.best, state.streak);

      const id = state.current;
      const before = state.water[id];
      state.water[id] = Math.min(MAX_WATER, before + 1);
      state.lastWater = today;
      save();

      // animate then re-render
      const svg = document.getElementById('plantSvg');
      if (svg) {
        svg.classList.remove('wilted');   // reviving look
        svg.classList.add('watering');
      }
      setTimeout(render, 1250); // let the droplets land + ripple finish before re-rendering (anim ≈1.16s)

      if (before < MAX_WATER && state.water[id] >= MAX_WATER) {
        // only celebrate if this plant is still complete & still selected
        setTimeout(() => { if (state.current === id && state.water[id] >= MAX_WATER) celebrate(); }, 1300);
      }
    }

    function celebrate() {
      openCollection(true);
    }

    waterBtn.addEventListener('click', e => {
      e.stopPropagation();
      water(); // completed plants are still waterable; new plant is chosen via the collection panel
    });

    /* ============ Collection gallery ============ */
    const collectionBtn = document.getElementById('collectionBtn');
    const collectionBtnLabel = document.getElementById('collectionBtnLabel');
    const galleryGrid = document.getElementById('galleryGrid');
    const galleryTitle = document.getElementById('galleryTitle');
    const galleryHint = document.getElementById('galleryHint');
    let inCollection = false;

    function renderGallery(justCompleted) {
      const doneCount = PLANTS.filter(p => state.water[p.id] >= MAX_WATER).length;
      galleryTitle.textContent = justCompleted ? '🎉 식물을 완성했어요!' : `내 식물 컬렉션 ${doneCount}/${TOTAL}`;
      galleryHint.textContent = justCompleted ? '다음에 키울 식물을 선택하세요' : '탭하여 키울 식물을 선택하세요';

      galleryGrid.innerHTML = '';
      PLANTS.forEach(p => {
        const w = state.water[p.id];
        const done = w >= MAX_WATER;
        const started = w > 0;
        const isCurrent = p.id === state.current;
        const slot = document.createElement('div');
        slot.className = 'slot' + (done ? ' done' : (started ? '' : ' locked')) + (isCurrent ? ' current' : '');
        // keyboard-accessible: behaves like a button
        slot.setAttribute('role', 'button');
        slot.setAttribute('tabindex', '0');
        slot.setAttribute('aria-label', `${p.name}${done ? ' · 완성' : (started ? ' · 키우는 중' : '')}`);
        // show final form if done, else current grown stage (or silhouette final stage if untouched)
        const showStage = done ? MAX_STAGE : (started ? stageOf(w) : MAX_STAGE);
        slot.innerHTML = buildPlantSVG(p.id, showStage, false, '')
          + `<span class="badge">${done ? '✓' : ''}</span>`
          + `<span class="slot-name">${p.name}</span>`;
        const pick = e => {
          e.stopPropagation();
          state.current = p.id;
          save();
          closeCollection();
          render();
        };
        slot.addEventListener('click', pick);
        slot.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); pick(e); }
        });
        galleryGrid.appendChild(slot);
      });
    }

    function openCollection(justCompleted) {
      inCollection = true;
      card.classList.add('collection');
      collectionBtnLabel.textContent = '식물로';
      renderGallery(justCompleted);
    }
    function closeCollection() {
      inCollection = false;
      card.classList.remove('collection');
      collectionBtnLabel.textContent = '컬렉션';
    }
    collectionBtn.addEventListener('click', () => {
      inCollection ? closeCollection() : openCollection(false);
    });

    /* ============ Persistence keys (pos/size) ============ */
    /* ============ Keep UI fresh across midnight / refocus ============ */
    document.addEventListener('visibilitychange', () => { if (!document.hidden && !inCollection) render(); });
    window.addEventListener('focus', () => { if (!inCollection) render(); });

    render();
</script>
  <script>
(function(){
  var card=document.getElementById('w');
  var head=card.querySelector('.whead');
  var KEY='nosion-plant-grower-frame', MINW=230, MINH=200, DEFW=340, DEFH=300;
  ['n','s','e','w','ne','nw','se','sw'].forEach(function(d){
    var el=document.createElement('div');el.className='rz '+d;el.setAttribute('data-rz',d);card.appendChild(el);
  });
  var frame=load();
  function load(){try{var f=JSON.parse(localStorage.getItem(KEY));if(f&&f.w)return f;}catch(e){}
    var w=Math.min(DEFW,window.innerWidth-28),h=Math.min(DEFH,window.innerHeight-28);
    return{x:(window.innerWidth-w)/2,y:Math.max(14,(window.innerHeight-h)/2),w:w,h:h};}
  function clamp(){frame.w=Math.max(MINW,Math.min(frame.w,window.innerWidth-8));
    frame.h=Math.max(MINH,Math.min(frame.h,window.innerHeight-8));
    frame.x=Math.max(4,Math.min(frame.x,window.innerWidth-frame.w-4));
    frame.y=Math.max(4,Math.min(frame.y,window.innerHeight-frame.h-4));}
  function apply(){clamp();card.style.left=frame.x+'px';card.style.top=frame.y+'px';
    card.style.width=frame.w+'px';card.style.height=frame.h+'px';}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(frame));}catch(e){}}
  head.addEventListener('pointerdown',function(e){
    if(e.target.closest('button,input,a,.seg,.ic,.pill,[data-nodrag]'))return;drag(e);});
  card.querySelectorAll('.rz').forEach(function(hd){
    hd.addEventListener('pointerdown',function(e){resize(e,hd.getAttribute('data-rz'));});});
  function drag(e){e.preventDefault();card.classList.add('dragging');
    var sx=e.clientX,sy=e.clientY,ox=frame.x,oy=frame.y;
    function m(ev){frame.x=ox+(ev.clientX-sx);frame.y=oy+(ev.clientY-sy);apply();}
    function u(){card.classList.remove('dragging');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  function resize(e,dir){e.preventDefault();e.stopPropagation();card.classList.add('resizing');
    var sx=e.clientX,sy=e.clientY,o={x:frame.x,y:frame.y,w:frame.w,h:frame.h};
    function m(ev){var dx=ev.clientX-sx,dy=ev.clientY-sy;
      if(dir.indexOf('e')>=0){frame.w=Math.max(MINW,o.w+dx);}
      if(dir.indexOf('s')>=0){frame.h=Math.max(MINH,o.h+dy);}
      if(dir.indexOf('w')>=0){var nw=Math.max(MINW,o.w-dx);frame.x=o.x+(o.w-nw);frame.w=nw;}
      if(dir.indexOf('n')>=0){var nh=Math.max(MINH,o.h-dy);frame.y=o.y+(o.h-nh);frame.h=nh;}
      apply();}
    function u(){card.classList.remove('resizing');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  window.addEventListener('resize',apply);
  apply();
})();
</script>
