<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>식물 키우기</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --foreground:       hsl(220 13% 18%);
      --muted-foreground: hsl(215 14% 50%);
      --border:           hsl(220 9% 76%);
      --muted:            hsl(210 20% 96%);
      --radius:           0.5rem;

      /* Plant palette (monochrome) */
      --ink:    hsl(220 13% 20%);
      --stem:   hsl(220 12% 34%);
      --leaf:   hsl(220 10% 60%);
      --fill:   hsl(220 10% 80%);
      --accent: hsl(220 13% 26%);
      --pot:    hsl(220 10% 87%);
      --soil:   hsl(220 9% 64%);
      --blush:  hsl(220 14% 74%);
      --shine:  hsl(0 0% 100% / .55);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: hsl(0 0% 100%);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== Widget wrapper ===== */
    .widget-wrapper {
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      width: fit-content;
    }

    /* ===== Left panel (hover only) ===== */
    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      flex-shrink: 0;
    }

    .widget-wrapper:hover .left-panel {
      opacity: 1;
      pointer-events: auto;
    }

    .panel-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: hsl(0 0% 100%);
      padding: 0.375rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--foreground);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease;
      height: 2rem;
    }

    .panel-btn:hover { background: var(--muted); }
    .panel-btn.muted-bg { background: var(--muted); }

    .panel-btn svg {
      width: 16px; height: 16px; flex-shrink: 0;
      stroke: currentColor; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ===== Card ===== */
    .card {
      background: hsl(0 0% 100%);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      width: 300px;
      height: 360px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: grab;
    }

    .card.dragging { cursor: grabbing; }

    /* ===== Plant stage ===== */
    .plant-stage {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .plant-svg {
      width: auto;
      height: 100%;
      max-height: 260px;
      overflow: visible;
      transition: opacity 0.25s ease;
    }

    .plant-body { transform-origin: 60px 104px; }

    /* Watering sway */
    @keyframes sway {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(-3.5deg); }
      55%     { transform: rotate(2.5deg); }
      80%     { transform: rotate(-1.2deg); }
    }
    .plant-svg.watering .plant-body { animation: sway 0.7s ease; }

    /* Water drop */
    .drop { opacity: 0; }
    @keyframes drop-fall {
      0%   { transform: translateY(-26px); opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(83px); opacity: 0; }
    }
    .plant-svg.watering .drop { animation: drop-fall 0.9s ease; }

    /* Wilted look */
    .plant-svg.wilted .plant-body {
      opacity: 0.55;
      transform: rotate(4deg);
    }

    /* ===== Hover info overlay ===== */
    .info-top, .info-bottom {
      position: absolute;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
      padding: 0 1.25rem;
    }
    .info-top    { top: 1.25rem; }
    .info-bottom { bottom: 1.25rem; }

    .widget-wrapper:hover .info-top,
    .widget-wrapper:hover .info-bottom { opacity: 1; }
    .widget-wrapper:hover .info-bottom { pointer-events: auto; }

    .plant-name {
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--foreground);
    }

    .plant-meta {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      letter-spacing: 0.01em;
    }

    /* progress bar */
    .progress {
      width: 120px;
      height: 4px;
      border-radius: 99px;
      background: var(--muted);
      overflow: hidden;
      margin-top: 0.35rem;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .water-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--foreground);
      color: hsl(0 0% 100%);
      padding: 0.5rem 1.1rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s ease, background 0.15s ease;
    }
    .water-btn:hover { opacity: 0.88; }
    .water-btn.done {
      background: hsl(0 0% 100%);
      color: var(--muted-foreground);
      cursor: default;
    }
    .water-btn.done:hover { opacity: 1; }
    .water-btn svg { width: 15px; height: 15px; }

    /* ===== Collection gallery ===== */
    .gallery {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      gap: 0.75rem;
    }
    .card.collection .plant-stage,
    .card.collection .info-top,
    .card.collection .info-bottom { display: none; }
    .card.collection .gallery { display: flex; }

    .gallery-title {
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      flex-shrink: 0;
    }
    .gallery-hint {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      text-align: center;
      margin-top: -0.4rem;
      flex-shrink: 0;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      flex: 1;
      align-content: start;
      overflow-y: auto;
    }

    .slot {
      position: relative;
      aspect-ratio: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: hsl(0 0% 100%);
      transition: border-color 0.15s ease, background 0.15s ease;
      overflow: hidden;
    }
    .slot:hover { background: var(--muted); }
    .slot.current { border-color: var(--foreground); border-width: 2px; }
    .slot svg { width: 78%; height: 78%; overflow: visible; }
    .slot.locked svg { opacity: 0.16; }

    .slot .badge {
      position: absolute;
      top: 3px; right: 4px;
      font-size: 0.5625rem;
      line-height: 1;
      color: var(--muted-foreground);
    }
    .slot.done .badge { color: var(--foreground); }
    .slot .slot-name {
      position: absolute;
      bottom: 2px; left: 0; right: 0;
      text-align: center;
      font-size: 0.5625rem;
      color: var(--muted-foreground);
    }

    /* ===== Resize handles ===== */
    .resize-handle {
      position: absolute; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    .handle-top, .handle-bottom { left: 0; right: 0; height: 16px; cursor: ns-resize; }
    .handle-top    { top: 0; }
    .handle-bottom { bottom: 0; }
    .handle-left, .handle-right { top: 0; bottom: 0; width: 16px; cursor: ew-resize; }
    .handle-left  { left: 0; }
    .handle-right { right: 0; }
    .resize-handle .bar {
      border-radius: 99px; background: var(--border);
      opacity: 0; transition: opacity 0.15s ease;
    }
    .handle-top .bar, .handle-bottom .bar { width: 36px; height: 3px; }
    .handle-left .bar, .handle-right .bar { width: 3px; height: 36px; }
    .resize-handle:hover .bar { opacity: 1; }
  </style>
</head>
<body>
  <!-- shared hand-drawn "rough" filter: smoothly wobbles every line so shapes look hand-drawn -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <filter id="rough" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="1" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs></svg>

  <div class="widget-wrapper" id="widget">

    <!-- Left hover panel -->
    <div class="left-panel" id="leftPanel">
      <button class="panel-btn" id="collectionBtn" type="button">
        <svg viewBox="0 0 24 24" stroke-width="1.75">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span id="collectionBtnLabel">컬렉션</span>
      </button>
    </div>

    <!-- Main card -->
    <div class="card" id="card">
      <div class="info-top">
        <div class="plant-name" id="plantName">새싹</div>
        <div class="plant-meta" id="plantMeta">1단계 · 0/30</div>
      </div>

      <div class="plant-stage" id="plantStage"></div>

      <div class="info-bottom">
        <button class="water-btn" id="waterBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2.5C12 2.5 5.5 9.5 5.5 14.5a6.5 6.5 0 0 0 13 0C18.5 9.5 12 2.5 12 2.5z"/>
          </svg>
          <span id="waterBtnLabel">물주기</span>
        </button>
        <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <!-- Collection gallery -->
      <div class="gallery">
        <div class="gallery-title" id="galleryTitle">내 식물 컬렉션</div>
        <div class="gallery-hint" id="galleryHint">탭하여 키울 식물을 선택하세요</div>
        <div class="gallery-grid" id="galleryGrid"></div>
      </div>

      <div class="resize-handle handle-top"    data-direction="top">   <div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left"   data-direction="left">  <div class="bar"></div></div>
      <div class="resize-handle handle-right"  data-direction="right"> <div class="bar"></div></div>
    </div>
  </div>

  <script>
    /* ============ SVG helpers ============ */
    const INK = 'var(--ink)', STEM = 'var(--stem)', LEAF = 'var(--leaf)',
          FILL = 'var(--fill)', ACC = 'var(--accent)',
          BLUSH = 'var(--blush)', SHINE = 'var(--shine)', SOIL = 'var(--soil)';

    const leaf = (x, y, r, s, c = LEAF) =>
      `<path d="M0 0 Q-7 -9 0 -22 Q7 -9 0 0Z" fill="${c}" stroke="${INK}" stroke-width="1.8"
        transform="translate(${x},${y}) rotate(${r}) scale(${s})"/>`;
    const stem = (d, w = 2.8) =>
      `<path d="${d}" fill="none" stroke="${STEM}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>`;
    const disc = (x, y, r, c = LEAF, w = 1.8) =>
      `<circle cx="${x}" cy="${y}" r="${r}" fill="${c}" stroke="${INK}" stroke-width="${w}"/>`;
    const bulb = (y, rx, ry, c = FILL) =>
      `<ellipse cx="60" cy="${y}" rx="${rx}" ry="${ry}" fill="${c}" stroke="${INK}" stroke-width="2.4"/>`;
    /* fat rounded leaf (chunky/cute), base at (x,y) pointing up */
    const fleaf = (x, y, r, s, c = LEAF) =>
      `<path d="M0 0 C-11 -3 -12 -17 0 -21 C12 -17 11 -3 0 0Z" fill="${c}" stroke="${INK}" stroke-width="2.2"
        transform="translate(${x},${y}) rotate(${r}) scale(${s})"/>`;
    const petalRing = (x, y, s, n, c = FILL, ry = 8.5) =>
      `<g transform="translate(${x},${y}) scale(${s})">` +
      Array.from({length: n}, (_, i) =>
        `<ellipse cx="0" cy="-15" rx="4.2" ry="${ry}" fill="${c}" stroke="${INK}" stroke-width="1.8"
          transform="rotate(${(360/n)*i})"/>`).join('') + `</g>`;
    const blossom = (x, y, s = 1) =>
      `<g transform="translate(${x},${y}) scale(${s})">` +
      [0,72,144,216,288].map(a =>
        `<ellipse cx="0" cy="-4.5" rx="2.6" ry="4" fill="${FILL}" stroke="${INK}" stroke-width="1.1"
          transform="rotate(${a})"/>`).join('') +
      `<circle cx="0" cy="0" r="2" fill="${ACC}"/></g>`;

    /* Joguman-style face: small dot eyes + faint, thin little smile (sad when wilted) */
    const face = (cx, cy, s = 1, mood = 'happy') =>
      `<g transform="translate(${cx},${cy}) scale(${s})">
        <circle cx="-4.6" cy="-2.4" r="1.8" fill="${INK}"/>
        <circle cx="4.6" cy="-2.4" r="1.8" fill="${INK}"/>
        ${mood === 'sad'
          ? `<path d="M-2.7 5 Q0 3 2.7 5" fill="none" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>`
          : `<path d="M-2.7 4.6 Q0 6.6 2.7 4.6" fill="none" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>`}
      </g>`;

    /* ===== Joguman helpers: bold outline, flat fill, explicit growth stages ===== */
    const SW = 2.5, WHITE = '#fff';
    const fO = (f = FILL) => `fill="${f}" stroke="${INK}" stroke-width="${SW}" stroke-linejoin="round" stroke-linecap="round"`;
    const oO = (extra = '') => `fill="none" stroke="${INK}" stroke-width="${SW}" stroke-linecap="round" stroke-linejoin="round" ${extra}`;
    const stemLine = (d, w = SW, c = STEM) => `<path d="${d}" fill="none" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>`;
    function def(s6,h6){return{stages:['', ...s6],head:[null,...h6]};}

    /* Flat hand-drawn pot (bold outline, no shine); BACK behind plant, FRONT over its base */
    const POT_BACK =
      `<path d="M45 104 L49 134 Q49.5 137 52.5 137 L67.5 137 Q70.5 137 71 134 L75 104 Z" fill="var(--pot)" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>` +
      `<ellipse cx="60" cy="104" rx="15" ry="2.6" fill="${SOIL}"/>`;
    const POT_FRONT = `<rect x="39" y="99" width="42" height="10" rx="5" fill="var(--pot)" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round"/>`;
    const DROP =
      `<path class="drop" d="M60 16 q5 8 0 13 q-5 -5 0 -13z" fill="${ACC}"/>` +
      `<path class="drop" style="animation-delay:.2s" d="M65 10 q4 6.5 0 11 q-4 -4.5 0 -11z" fill="${ACC}"/>`;

    /* ============ V2 grow() system for scaling-based plants ============ */
    const SCALES_G = [0.46, 0.58, 0.70, 0.82, 0.92, 1.0];
    function grow(unit, fx, fy, fs) {
      const stages = [''], head = [null];
      SCALES_G.forEach(sc => {
        stages.push(`<g transform="translate(60,105) scale(${sc}) translate(-60,-105)">${unit}</g>`);
        head.push([Math.round((60 + (fx - 60) * sc) * 10) / 10,
                   Math.round((105 + (fy - 105) * sc) * 10) / 10,
                   Math.round(fs * sc * 100) / 100]);
      });
      return { stages, head };
    }

    /* V2 silhouettes ― integrated single-path designs, scaled per stage by grow() */
    const U_tulip =
      `<path d="M53 79 C48 73 44 64 46 56 C49 49 55 47 59 52 C61 55 61 63 58 72 C56 76 54 78 53 79Z" ${fO()}/>` +
      `<path d="M67 79 C72 73 76 64 74 56 C71 49 65 47 61 52 C59 55 59 63 62 72 C64 76 66 78 67 79Z" ${fO()}/>` +
      `<path d="M60 106 C46 106 40 98 40 89 C40 80 47 75 53 76 C55 76 57 78 57 79 L63 79 C63 78 65 76 67 76 C73 75 80 80 80 89 C80 98 74 106 60 106Z" ${fO()}/>`;
    const U_cactus =
      `<path d="M50 106 C48.5 98 48.5 90 49 85 C45 86 39 84 37.5 78 C36 72 38.5 67 43 68 C47 69 48 74 49.5 79 C49 72 48 63 50.5 57 C53 50 67 50 69.5 57 C72 63 71 71 71 77 C73 72 79.5 70 83 74 C87 78.5 85 85 79 84.5 C74 84 72 89 71 95 C70.5 99 70.5 103 70 106Z" ${fO()}/>` +
      `<g transform="translate(60,50)">` + [0,72,144,216,288].map(a =>
        `<path d="M0 -2 C-3 -3 -3 -7 0 -8 C3 -7 3 -3 0 -2Z" ${fO(WHITE)} transform="rotate(${a})"/>`
      ).join('') + `<circle r="2.4" fill="${INK}"/></g>`;
    const U_monstera =
      `<path d="M60 106 C40 104 33.5 83 37 64 C40 47 50 41 60 41 C70 41 80 47 83 64 C86.5 83 80 104 60 106Z" ${fO()}/>` +
      `<ellipse cx="50" cy="70" rx="3.1" ry="4.5" ${fO(WHITE)}/>` +
      `<ellipse cx="70" cy="70" rx="3.1" ry="4.5" ${fO(WHITE)}/>`;
    const U_bamboo =
      `<path d="M52 106 C51 96 51 70 52 52 C52.5 47 67.5 47 68 52 C69 70 69 96 68 106Z" ${fO()}/>` +
      `<path d="M49 70 Q60 73 71 70 M49 88 Q60 91 71 88" ${oO('opacity="0.5"')}/>` +
      `<path d="M64 52 C72 45 81 47 80 53 C76 58 68 58 63 55Z" ${fO(LEAF)}/>` +
      `<path d="M56 52 C48 45 39 47 40 53 C44 58 52 58 57 55Z" ${fO(LEAF)}/>`;
    const U_oldtree =
      `<path d="M60 73 C50 73 37 68 33 57 C29 46 36 37 46 36 C52 35 57 40 60 44 C63 40 68 35 74 36 C84 37 91 46 87 57 C83 68 70 73 60 73Z" ${fO(LEAF)}/>` +
      `<path d="M48 106 C46 96 45 87 47 80 C49 74 52 72 60 72 C68 72 71 74 73 80 C75 87 74 96 72 106Z" ${fO()}/>`;

    /* ============ Ten plants: V2 silhouettes (grow) + V1 explicit stages ============ */
    const P_tulip    = grow(U_tulip,    60,  89, 1.10);
    const P_cactus   = grow(U_cactus,   60,  72, 1.25);
    const P_monstera = grow(U_monstera, 60,  92, 1.20);
    const P_bamboo   = grow(U_bamboo,   60,  84, 1.20);
    const P_oldtree  = grow(U_oldtree,  60,  89, 1.05);

    /* V1 clover: three-leaf shamrock → four-leaf clover at final stage */
    const P_clover = (() => {
      const tre = (cx, cy, s, four) => {
        const angs = four ? [45,135,225,315] : [90,210,330];
        return `<g transform="translate(${cx},${cy}) scale(${s})">` +
          angs.map(a => `<circle cx="0" cy="-7" r="7.5" fill="${FILL}" stroke="${INK}" stroke-width="2.4" transform="rotate(${a})"/>`).join('') +
          `</g>`;
      };
      return def([
        stem('M60 106 V96', 3.0) + tre(60, 91, 0.70),
        stem('M60 106 V94', 3.2) + tre(60, 88, 0.95),
        stem('M60 106 V93', 3.3) + tre(60, 86, 1.12),
        stem('M60 106 V92', 3.4) + tre(60, 84, 1.28),
        stem('M60 106 V91', 3.4) + tre(60, 83, 1.40),
        stem('M60 106 V90', 3.4) + tre(60, 82, 1.50, true),
      ], [[60,90,0.72],[60,87,0.92],[60,85,1.05],[60,83,1.15],[60,82,1.20],[60,81,1.25]]);
    })();

    /* V1 tomato: green bud → big round tomatoes */
    const P_tomato = (() => {
      const tom = (x, y, r) =>
        `<circle cx="${x}" cy="${y}" r="${r}" fill="${FILL}" stroke="${INK}" stroke-width="2.6"/>` +
        `<path d="M${x-3} ${y-r+1} q3 -4 6 0" fill="none" stroke="${STEM}" stroke-width="1.8" stroke-linecap="round"/>`;
      const bud = (y, r) =>
        `<circle cx="60" cy="${y}" r="${r}" fill="${LEAF}" stroke="${INK}" stroke-width="2.6"/>`;
      return def([
        stem('M60 106 V100', 3.2) + bud(96, 6),
        stem('M60 106 V96',  3.2) + fleaf(60, 96, -46, 0.72) + fleaf(60, 96,  46, 0.72) + bud(89, 7),
        stem('M60 106 V92',  3.3) + fleaf(60, 93, -48, 0.86) + fleaf(60, 93,  48, 0.86) + bud(83, 8),
        stem('M60 106 V90',  3.4) + fleaf(60, 92, -50, 0.92) + fleaf(60, 92,  50, 0.92) + tom(60, 80, 9.5),
        stem('M60 106 V88',  3.4) + fleaf(60, 91, -52, 0.96) + fleaf(60, 91,  52, 0.96) + tom(51, 82, 7.5) + tom(69, 82, 7.5) + tom(60, 73, 11),
        stem('M60 106 V86',  3.4) + fleaf(60, 90, -54, 1.00) + fleaf(60, 90,  54, 1.00) + tom(50, 82, 7.5) + tom(70, 82, 7.5) + tom(60, 71, 12),
      ], [[60,96,0.66],[60,89,0.74],[60,83,0.82],[60,80,0.90],[60,73,1.00],[60,71,1.05]]);
    })();

    /* V1 cherry tree: fat trunk grows, round blossom canopy appears + fills with flowers */
    const P_cherry = (() => {
      const trunk = (top, w) =>
        `<path d="M${60-w} 106 Q${60-w*0.5} ${(top+106)/2} ${60-w*0.5} ${top} L${60+w*0.5} ${top} Q${60+w*0.5} ${(top+106)/2} ${60+w} 106 Z" fill="${FILL}" stroke="${INK}" stroke-width="2.6" stroke-linejoin="round"/>`;
      const canopy = (cy, r) =>
        `<circle cx="60" cy="${cy}" r="${r}" fill="${FILL}" stroke="${INK}" stroke-width="2.6"/>` +
        [[0,0],[-0.5,-0.25],[0.5,-0.15],[-0.28,0.45],[0.34,0.4]].map(o => blossom(60 + o[0]*r, cy + o[1]*r, 0.62)).join('');
      return def([
        trunk(88, 5) + canopy(80, 12),
        trunk(82, 6) + canopy(73, 15),
        trunk(76, 7) + canopy(65, 18),
        trunk(72, 8) + canopy(58, 21),
        trunk(68, 9) + canopy(53, 23),
        trunk(64,10) + canopy(49, 25),
      ], [[60,98,0.52],[60,96,0.60],[60,94,0.66],[60,92,0.72],[60,90,0.78],[60,88,0.82]]);
    })();

    /* V1 sunflower: bud on stem → 10-petal head grows taller and brighter */
    const P_sunflower = (() => {
      const headF = (cy, s) =>
        `<g transform="translate(60,${cy}) scale(${s})">`
        + Array.from({length:10}, (_, i) =>
          `<ellipse cx="0" cy="-17" rx="5.6" ry="9" fill="${FILL}" stroke="${INK}" stroke-width="2.2" transform="rotate(${i*36})"/>`
        ).join('')
        + `<circle r="15" fill="${LEAF}" stroke="${INK}" stroke-width="2.8"/></g>`;
      return def([
        stem('M60 106 V99', 3.4) + bulb(95, 5, 5),
        stem('M60 106 V92', 3.5) + fleaf(60, 95, 56, 0.72) + bulb(87, 7, 7),
        stem('M60 106 V82', 3.6) + fleaf(60, 92, 58, 0.85) + headF(73, 0.62),
        stem('M60 106 V72', 3.7) + fleaf(60, 90, 60, 0.95) + headF(62, 0.82),
        stem('M60 106 V64', 3.8) + fleaf(60, 88, 60, 1.00) + headF(54, 0.95),
        stem('M60 106 V60', 3.8) + fleaf(60, 86, 62, 1.00) + headF(50, 1.05),
      ], [[60,95,0.55],[60,87,0.66],[60,73,0.78],[60,62,1.00],[60,54,1.20],[60,50,1.35]]);
    })();

    /* V1 mushroom: one big chunky cap + stout stem; small satellites appear */
    const P_mushroom = (() => {
      const mush = (cx, s) =>
        `<g transform="translate(${cx},106) scale(${s})">` +
        `<rect x="-9" y="-26" width="18" height="26" rx="9" fill="hsl(220 10% 90%)" stroke="${INK}" stroke-width="2.6"/>` +
        `<path d="M-28 -24 Q-28 -56 0 -56 Q28 -56 28 -24 Q0 -14 -28 -24Z" fill="${FILL}" stroke="${INK}" stroke-width="2.6"/>` +
        `<circle cx="-14" cy="-36" r="3.6" fill="#fff" stroke="${INK}" stroke-width="1.4"/>` +
        `<circle cx="11"  cy="-40" r="2.8" fill="#fff" stroke="${INK}" stroke-width="1.4"/></g>`;
      return def([
        mush(60, 0.50),
        mush(60, 0.72),
        mush(60, 0.95),
        mush(57, 1.05) + mush(76, 0.58),
        mush(56, 1.12) + mush(77, 0.66) + mush(44, 0.50),
        mush(56, 1.18) + mush(77, 0.72) + mush(44, 0.56),
      ], [[60,90,0.50],[60,84,0.72],[60,78,0.95],[57,76,1.00],[56,74,1.05],[56,72,1.10]]);
    })();

    const PLANTS = [
      { id: 'tulip',     name: '튤립',       ...P_tulip },
      { id: 'cactus',    name: '선인장',     ...P_cactus },
      { id: 'clover',    name: '클로버',     ...P_clover },
      { id: 'monstera',  name: '몬스테라',   ...P_monstera },
      { id: 'tomato',    name: '토마토',     ...P_tomato },
      { id: 'bamboo',    name: '대나무',     ...P_bamboo },
      { id: 'cherry',    name: '벚꽃나무',   ...P_cherry },
      { id: 'sunflower', name: '해바라기',   ...P_sunflower },
      { id: 'mushroom',  name: '버섯',       ...P_mushroom },
      { id: 'oldtree',   name: '고목',       ...P_oldtree },
    ];

    const TOTAL = PLANTS.length;
    const STAGE_THRESHOLDS = [0, 2, 5, 9, 15, 22, 30]; // water count → stage 1..7
    const MAX_WATER = 30;

    function stageOf(w) {
      let s = 1;
      for (let i = 0; i < STAGE_THRESHOLDS.length; i++) if (w >= STAGE_THRESHOLDS[i]) s = i + 1;
      return Math.min(7, s);
    }

    /* ============ State ============ */
    const K_STATE = 'nosion-plant-v1';
    let state = {
      current: 'tulip',
      water: {},            // { plantId: count }
      lastWater: null,      // 'YYYY-MM-DD'
      streak: 0,
      best: 0,
    };

    try {
      const saved = JSON.parse(localStorage.getItem(K_STATE) || 'null');
      if (saved && typeof saved === 'object') state = Object.assign(state, saved);
    } catch (e) {}
    if (!state.water || typeof state.water !== 'object' || Array.isArray(state.water)) state.water = {};
    PLANTS.forEach(p => {
      let v = state.water[p.id];
      if (typeof v !== 'number' || !Number.isFinite(v)) v = 0;
      state.water[p.id] = Math.max(0, Math.min(MAX_WATER, Math.floor(v)));
    });
    if (!PLANTS.some(p => p.id === state.current)) state.current = 'tulip';
    if (typeof state.streak !== 'number' || !Number.isFinite(state.streak) || state.streak < 0) state.streak = 0;
    if (typeof state.best !== 'number' || !Number.isFinite(state.best) || state.best < 0) state.best = 0;
    if (typeof state.lastWater !== 'string') state.lastWater = null;

    function save() { try { localStorage.setItem(K_STATE, JSON.stringify(state)); } catch (e) {} }

    /* ============ Date helpers ============ */
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function daysBetween(a, b) {
      if (!a || !b) return Infinity;
      const da = new Date(a + 'T00:00:00'), db = new Date(b + 'T00:00:00');
      if (!Number.isFinite(da.getTime()) || !Number.isFinite(db.getTime())) return Infinity;
      return Math.round((db - da) / 86400000);
    }

    /* ============ Build SVG ============ */
    function buildPlantSVG(plantId, stage, wilted, svgId = 'plantSvg') {
      const plant = PLANTS.find(p => p.id === plantId);
      const body = (plant.stages[stage - 1] || '');
      const hp = plant.head[stage - 1];
      const faceSvg = hp ? face(hp[0], hp[1], hp[2], wilted ? 'sad' : 'happy') : '';
      const idAttr = svgId ? ` id="${svgId}"` : '';
      return `<svg class="plant-svg ${wilted ? 'wilted' : ''}"${idAttr} viewBox="0 0 120 150"
                preserveAspectRatio="xMidYMax meet">
        <g filter="url(#rough)">
          ${POT_BACK}
          <g class="plant-body">${body}${faceSvg}</g>
          ${POT_FRONT}
          ${DROP}
        </g>
      </svg>`;
    }

    /* ============ Render main ============ */
    const card = document.getElementById('card');
    const plantStage = document.getElementById('plantStage');
    const plantName = document.getElementById('plantName');
    const plantMeta = document.getElementById('plantMeta');
    const progressFill = document.getElementById('progressFill');
    const waterBtn = document.getElementById('waterBtn');
    const waterBtnLabel = document.getElementById('waterBtnLabel');

    function isWilted() {
      return daysBetween(state.lastWater, todayStr()) >= 2;
    }
    function wateredToday() {
      return state.lastWater === todayStr();
    }
    // streak is broken the moment a full day is missed (gap >= 2)
    function effectiveStreak() {
      return daysBetween(state.lastWater, todayStr()) >= 2 ? 0 : state.streak;
    }

    function render() {
      const plant = PLANTS.find(p => p.id === state.current);
      const w = state.water[state.current];
      const stage = stageOf(w);
      const wilted = isWilted() && w > 0;
      const done = w >= MAX_WATER;
      const streak = effectiveStreak();

      plantStage.innerHTML = buildPlantSVG(state.current, stage, wilted);

      plantName.textContent = plant.name;
      plantMeta.textContent = done
        ? '🏆 완성!'
        : `${stage}단계 · ${w}/${MAX_WATER}${streak > 0 ? ' · 🔥' + streak + '일' : ''}`;
      progressFill.style.width = Math.min(100, (w / MAX_WATER) * 100) + '%';

      if (done) {
        // completed: button guides to picking a new plant (no more watering)
        waterBtn.classList.remove('done');
        waterBtnLabel.textContent = '새 식물 선택';
      } else if (wateredToday()) {
        waterBtn.classList.add('done');
        waterBtnLabel.textContent = '오늘 완료 ✓';
      } else {
        waterBtn.classList.remove('done');
        waterBtnLabel.textContent = wilted ? '물주기 (시듦)' : '물주기';
      }
    }

    /* ============ Watering ============ */
    function water() {
      if (wateredToday()) return;
      if (state.water[state.current] >= MAX_WATER) return; // already complete
      const today = todayStr();
      const gap = daysBetween(state.lastWater, today);
      state.streak = (gap === 1) ? state.streak + 1 : 1;
      state.best = Math.max(state.best, state.streak);

      const id = state.current;
      const before = state.water[id];
      state.water[id] = Math.min(MAX_WATER, before + 1);
      state.lastWater = today;
      save();

      // animate then re-render
      const svg = document.getElementById('plantSvg');
      if (svg) {
        svg.classList.remove('wilted');   // reviving look
        svg.classList.add('watering');
      }
      setTimeout(render, 720);

      if (before < MAX_WATER && state.water[id] >= MAX_WATER) {
        // only celebrate if this plant is still complete & still selected
        setTimeout(() => { if (state.current === id && state.water[id] >= MAX_WATER) celebrate(); }, 760);
      }
    }

    function celebrate() {
      openCollection(true);
    }

    waterBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (state.water[state.current] >= MAX_WATER) { openCollection(false); return; }
      water();
    });

    /* ============ Collection gallery ============ */
    const collectionBtn = document.getElementById('collectionBtn');
    const collectionBtnLabel = document.getElementById('collectionBtnLabel');
    const galleryGrid = document.getElementById('galleryGrid');
    const galleryTitle = document.getElementById('galleryTitle');
    const galleryHint = document.getElementById('galleryHint');
    let inCollection = false;

    function renderGallery(justCompleted) {
      const doneCount = PLANTS.filter(p => state.water[p.id] >= MAX_WATER).length;
      galleryTitle.textContent = justCompleted ? '🎉 식물을 완성했어요!' : `내 식물 컬렉션 ${doneCount}/${TOTAL}`;
      galleryHint.textContent = justCompleted ? '다음에 키울 식물을 선택하세요' : '탭하여 키울 식물을 선택하세요';

      galleryGrid.innerHTML = '';
      PLANTS.forEach(p => {
        const w = state.water[p.id];
        const done = w >= MAX_WATER;
        const started = w > 0;
        const isCurrent = p.id === state.current;
        const slot = document.createElement('div');
        slot.className = 'slot' + (done ? ' done' : (started ? '' : ' locked')) + (isCurrent ? ' current' : '');
        // show final form if done, else current grown stage (or silhouette final stage if untouched)
        const showStage = done ? 7 : (started ? stageOf(w) : 7);
        slot.innerHTML = buildPlantSVG(p.id, showStage, false, '')
          + `<span class="badge">${done ? '✓' : (started ? stageOf(w) + '단계' : '')}</span>`
          + `<span class="slot-name">${p.name}</span>`;
        slot.addEventListener('click', e => {
          e.stopPropagation();
          state.current = p.id;
          save();
          closeCollection();
          render();
        });
        galleryGrid.appendChild(slot);
      });
    }

    function openCollection(justCompleted) {
      inCollection = true;
      card.classList.add('collection');
      collectionBtnLabel.textContent = '식물로';
      renderGallery(justCompleted);
    }
    function closeCollection() {
      inCollection = false;
      card.classList.remove('collection');
      collectionBtnLabel.textContent = '컬렉션';
    }
    collectionBtn.addEventListener('click', () => {
      inCollection ? closeCollection() : openCollection(false);
    });

    /* ============ Persistence keys (pos/size) ============ */
    const K_POS  = 'nosion-plant-pos-v1';
    const K_SIZE = 'nosion-plant-size-v1';

    /* ============ Drag to move ============ */
    (function () {
      const wrapper = document.getElementById('widget');
      const BLOCKED = '.resize-handle,button,a,input,.slot,.water-btn';
      let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;

      card.addEventListener('mousedown', e => {
        if (e.target.closest(BLOCKED)) return;
        dragging = true;
        const r = wrapper.getBoundingClientRect();
        ox = r.left; oy = r.top; sx = e.clientX; sy = e.clientY;
        card.classList.add('dragging');
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        wrapper.style.position = 'fixed';
        wrapper.style.left = `${ox + e.clientX - sx}px`;
        wrapper.style.top  = `${oy + e.clientY - sy}px`;
      });
      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('dragging');
        try { localStorage.setItem(K_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top })); } catch (e) {}
      });
      try {
        const p = JSON.parse(localStorage.getItem(K_POS) || 'null');
        if (p) { wrapper.style.position = 'fixed'; wrapper.style.left = p.left; wrapper.style.top = p.top; }
      } catch (e) {}
    })();

    /* ============ Resize ============ */
    (function () {
      const wrapper = document.getElementById('widget');
      const MIN_W = 240, MAX_W = 640, MIN_H = 280, MAX_H = 640;
      let on = false, dir = '', sw = 0, sh = 0, sx = 0, sy = 0, startLeft = 0, startTop = 0;

      document.querySelectorAll('.resize-handle').forEach(h => {
        h.addEventListener('mousedown', e => {
          on = true; dir = h.dataset.direction;
          sw = card.offsetWidth; sh = card.offsetHeight;
          sx = e.clientX; sy = e.clientY;
          if (getComputedStyle(wrapper).position !== 'fixed') {
            const wr = wrapper.getBoundingClientRect();
            wrapper.style.position = 'fixed';
            wrapper.style.left = wr.left + 'px';
            wrapper.style.top = wr.top + 'px';
            wrapper.style.transform = 'none';
          }
          startLeft = parseFloat(wrapper.style.left) || 0;
          startTop = parseFloat(wrapper.style.top) || 0;
          e.preventDefault(); e.stopPropagation();
        });
      });

      document.addEventListener('mousemove', e => {
        if (!on) return;
        const dx = e.clientX - sx, dy = e.clientY - sy;
        if (dir === 'right' || dir === 'left') {
          const delta = dir === 'right' ? dx : -dx;
          const newW = Math.min(MAX_W, Math.max(MIN_W, sw + 2 * delta));
          const actualDelta = newW - sw;
          card.style.width = newW + 'px';
          if (wrapper.style.position === 'fixed') wrapper.style.left = (startLeft - actualDelta / 2) + 'px';
        }
        if (dir === 'bottom' || dir === 'top') {
          const delta = dir === 'bottom' ? dy : -dy;
          const newH = Math.min(MAX_H, Math.max(MIN_H, sh + 2 * delta));
          const actualDelta = newH - sh;
          card.style.height = newH + 'px';
          if (wrapper.style.position === 'fixed') wrapper.style.top = (startTop - actualDelta / 2) + 'px';
        }
      });

      document.addEventListener('mouseup', () => {
        if (!on) return; on = false;
        try {
          localStorage.setItem(K_SIZE, JSON.stringify({ w: card.offsetWidth, h: card.offsetHeight }));
          if (wrapper.style.position === 'fixed') {
            localStorage.setItem(K_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top }));
          }
        } catch (e) {}
      });

      try {
        const s = JSON.parse(localStorage.getItem(K_SIZE) || 'null');
        if (s) { if (s.w) card.style.width = `${s.w}px`; if (s.h) card.style.height = `${s.h}px`; }
      } catch (e) {}
    })();

    /* ============ Keep UI fresh across midnight / refocus ============ */
    document.addEventListener('visibilitychange', () => { if (!document.hidden && !inCollection) render(); });
    window.addEventListener('focus', () => { if (!inCollection) render(); });

    render();
  </script>
</body>
</html>
