<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>식물 키우기</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --foreground:       hsl(220 13% 18%);
      --muted-foreground: hsl(215 14% 50%);
      --border:           hsl(220 9% 76%);
      --muted:            hsl(210 20% 96%);
      --radius:           0.5rem;

      /* Plant palette (monochrome) */
      --ink:    hsl(220 13% 20%);
      --stem:   hsl(220 12% 34%);
      --leaf:   hsl(220 10% 60%);
      --fill:   hsl(220 10% 80%);
      --accent: hsl(220 13% 26%);
      --pot:    hsl(220 10% 87%);
      --soil:   hsl(220 9% 64%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: hsl(0 0% 100%);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== Widget wrapper ===== */
    .widget-wrapper {
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      width: fit-content;
    }

    /* ===== Left panel (hover only) ===== */
    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      flex-shrink: 0;
    }

    .widget-wrapper:hover .left-panel {
      opacity: 1;
      pointer-events: auto;
    }

    .panel-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: hsl(0 0% 100%);
      padding: 0.375rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--foreground);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease;
      height: 2rem;
    }

    .panel-btn:hover { background: var(--muted); }
    .panel-btn.muted-bg { background: var(--muted); }

    .panel-btn svg {
      width: 16px; height: 16px; flex-shrink: 0;
      stroke: currentColor; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ===== Card ===== */
    .card {
      background: hsl(0 0% 100%);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      width: 300px;
      height: 360px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: grab;
    }

    .card.dragging { cursor: grabbing; }

    /* ===== Plant stage ===== */
    .plant-stage {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .plant-svg {
      width: auto;
      height: 100%;
      max-height: 260px;
      overflow: visible;
      transition: opacity 0.25s ease;
    }

    .plant-body { transform-origin: 60px 104px; }

    /* Watering sway */
    @keyframes sway {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(-3.5deg); }
      55%     { transform: rotate(2.5deg); }
      80%     { transform: rotate(-1.2deg); }
    }
    .plant-svg.watering .plant-body { animation: sway 0.7s ease; }

    /* Water drop */
    .drop { opacity: 0; }
    @keyframes drop-fall {
      0%   { transform: translateY(-26px); opacity: 0; }
      25%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { transform: translateY(34px); opacity: 0; }
    }
    .plant-svg.watering .drop { animation: drop-fall 0.7s ease; }

    /* Wilted look */
    .plant-svg.wilted .plant-body {
      opacity: 0.55;
      transform: rotate(4deg);
    }

    /* ===== Hover info overlay ===== */
    .info-top, .info-bottom {
      position: absolute;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
      padding: 0 1.25rem;
    }
    .info-top    { top: 1.25rem; }
    .info-bottom { bottom: 1.25rem; }

    .widget-wrapper:hover .info-top,
    .widget-wrapper:hover .info-bottom { opacity: 1; }
    .widget-wrapper:hover .info-bottom { pointer-events: auto; }

    .plant-name {
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--foreground);
    }

    .plant-meta {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      letter-spacing: 0.01em;
    }

    /* progress bar */
    .progress {
      width: 120px;
      height: 4px;
      border-radius: 99px;
      background: var(--muted);
      overflow: hidden;
      margin-top: 0.35rem;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .water-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--foreground);
      color: hsl(0 0% 100%);
      padding: 0.5rem 1.1rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s ease, background 0.15s ease;
    }
    .water-btn:hover { opacity: 0.88; }
    .water-btn.done {
      background: hsl(0 0% 100%);
      color: var(--muted-foreground);
      cursor: default;
    }
    .water-btn.done:hover { opacity: 1; }
    .water-btn svg { width: 15px; height: 15px; }

    /* ===== Collection gallery ===== */
    .gallery {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      gap: 0.75rem;
    }
    .card.collection .plant-stage,
    .card.collection .info-top,
    .card.collection .info-bottom { display: none; }
    .card.collection .gallery { display: flex; }

    .gallery-title {
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      flex-shrink: 0;
    }
    .gallery-hint {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      text-align: center;
      margin-top: -0.4rem;
      flex-shrink: 0;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      flex: 1;
      align-content: start;
      overflow-y: auto;
    }

    .slot {
      position: relative;
      aspect-ratio: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: hsl(0 0% 100%);
      transition: border-color 0.15s ease, background 0.15s ease;
      overflow: hidden;
    }
    .slot:hover { background: var(--muted); }
    .slot.current { border-color: var(--foreground); border-width: 2px; }
    .slot svg { width: 78%; height: 78%; overflow: visible; }
    .slot.locked svg { opacity: 0.16; }

    .slot .badge {
      position: absolute;
      top: 3px; right: 4px;
      font-size: 0.5625rem;
      line-height: 1;
      color: var(--muted-foreground);
    }
    .slot.done .badge { color: var(--foreground); }
    .slot .slot-name {
      position: absolute;
      bottom: 2px; left: 0; right: 0;
      text-align: center;
      font-size: 0.5625rem;
      color: var(--muted-foreground);
    }

    /* ===== Resize handles ===== */
    .resize-handle {
      position: absolute; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    .handle-top, .handle-bottom { left: 0; right: 0; height: 16px; cursor: ns-resize; }
    .handle-top    { top: 0; }
    .handle-bottom { bottom: 0; }
    .handle-left, .handle-right { top: 0; bottom: 0; width: 16px; cursor: ew-resize; }
    .handle-left  { left: 0; }
    .handle-right { right: 0; }
    .resize-handle .bar {
      border-radius: 99px; background: var(--border);
      opacity: 0; transition: opacity 0.15s ease;
    }
    .handle-top .bar, .handle-bottom .bar { width: 36px; height: 3px; }
    .handle-left .bar, .handle-right .bar { width: 3px; height: 36px; }
    .resize-handle:hover .bar { opacity: 1; }
  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">

    <!-- Left hover panel -->
    <div class="left-panel" id="leftPanel">
      <button class="panel-btn" id="collectionBtn" type="button">
        <svg viewBox="0 0 24 24" stroke-width="1.75">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span id="collectionBtnLabel">컬렉션</span>
      </button>
    </div>

    <!-- Main card -->
    <div class="card" id="card">
      <div class="info-top">
        <div class="plant-name" id="plantName">새싹</div>
        <div class="plant-meta" id="plantMeta">1단계 · 0/30</div>
      </div>

      <div class="plant-stage" id="plantStage"></div>

      <div class="info-bottom">
        <button class="water-btn" id="waterBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2.5C12 2.5 5.5 9.5 5.5 14.5a6.5 6.5 0 0 0 13 0C18.5 9.5 12 2.5 12 2.5z"/>
          </svg>
          <span id="waterBtnLabel">물주기</span>
        </button>
        <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <!-- Collection gallery -->
      <div class="gallery">
        <div class="gallery-title" id="galleryTitle">내 식물 컬렉션</div>
        <div class="gallery-hint" id="galleryHint">탭하여 키울 식물을 선택하세요</div>
        <div class="gallery-grid" id="galleryGrid"></div>
      </div>

      <div class="resize-handle handle-top"    data-direction="top">   <div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left"   data-direction="left">  <div class="bar"></div></div>
      <div class="resize-handle handle-right"  data-direction="right"> <div class="bar"></div></div>
    </div>
  </div>

  <script>
    /* ============ SVG helpers ============ */
    const INK = 'var(--ink)', STEM = 'var(--stem)', LEAF = 'var(--leaf)',
          FILL = 'var(--fill)', ACC = 'var(--accent)';

    const leaf = (x, y, r, s, c = LEAF) =>
      `<path d="M0 0 Q-7 -9 0 -22 Q7 -9 0 0Z" fill="${c}" stroke="${INK}" stroke-width="1.6"
        transform="translate(${x},${y}) rotate(${r}) scale(${s})"/>`;
    const stem = (d, w = 2.6) =>
      `<path d="${d}" fill="none" stroke="${STEM}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>`;
    const disc = (x, y, r, c = LEAF, w = 1.6) =>
      `<circle cx="${x}" cy="${y}" r="${r}" fill="${c}" stroke="${INK}" stroke-width="${w}"/>`;
    const petalRing = (x, y, s, n, c = FILL, ry = 5.5) =>
      `<g transform="translate(${x},${y}) scale(${s})">` +
      Array.from({length: n}, (_, i) =>
        `<ellipse cx="0" cy="-8" rx="3" ry="${ry}" fill="${c}" stroke="${INK}" stroke-width="1.2"
          transform="rotate(${(360/n)*i})"/>`).join('') + `</g>`;
    const blossom = (x, y, s = 1) =>
      `<g transform="translate(${x},${y}) scale(${s})">` +
      [0,72,144,216,288].map(a =>
        `<ellipse cx="0" cy="-4" rx="2.4" ry="3.8" fill="${FILL}" stroke="${INK}" stroke-width="1"
          transform="rotate(${a})"/>`).join('') +
      `<circle cx="0" cy="0" r="1.8" fill="${ACC}"/></g>`;

    /* ============ 10 plants × 7 stages ============ */
    /* Each stage = SVG body string (pot added separately). Grows from ~y=102 upward. */
    const PLANTS = [
      { id: 'sprout', name: '새싹', stages: [
        ``,
        `<ellipse cx="60" cy="98" rx="4" ry="2.8" fill="${LEAF}" stroke="${INK}" stroke-width="1.4"/>`,
        stem('M60 102 V90') + leaf(60, 92, -28, 0.5),
        stem('M60 102 V83') + leaf(61, 86, -34, 0.62) + leaf(59, 86, 34, 0.62),
        stem('M60 102 V72') + leaf(61, 80, -38, 0.78) + leaf(59, 80, 38, 0.78) + leaf(60, 70, -12, 0.6),
        stem('M60 102 V62') + leaf(61, 74, -42, 0.92) + leaf(59, 74, 42, 0.92) + leaf(61, 62, -20, 0.78) + leaf(59, 62, 20, 0.78),
        stem('M60 102 V52') + leaf(61, 70, -46, 1.0) + leaf(59, 70, 46, 1.0) + leaf(61, 56, -22, 0.85) + leaf(59, 56, 22, 0.85) + blossom(60, 48, 1.1),
      ]},

      { id: 'cactus', name: '선인장', stages: [
        ``,
        `<rect x="55" y="92" width="10" height="11" rx="5" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>`,
        `<rect x="53" y="82" width="14" height="21" rx="7" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>` + stem('M60 88 V99', 1),
        `<rect x="51" y="70" width="18" height="33" rx="9" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>` + stem('M60 78 V99', 1),
        `<rect x="51" y="62" width="18" height="41" rx="9" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>`
          + `<path d="M51 84 q-9 0 -9 -9 v-5 q0 -5 5 -5 t5 5" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>`,
        `<rect x="51" y="56" width="18" height="47" rx="9" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>`
          + `<path d="M51 84 q-9 0 -9 -9 v-5 q0 -5 5 -5 t5 5" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>`
          + `<path d="M69 78 q9 0 9 -9 v-5 q0 -5 -5 -5 t-5 5" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>`,
        `<rect x="51" y="52" width="18" height="51" rx="9" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>`
          + `<path d="M51 84 q-9 0 -9 -9 v-5 q0 -5 5 -5 t5 5" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>`
          + `<path d="M69 78 q9 0 9 -9 v-5 q0 -5 -5 -5 t-5 5" fill="${LEAF}" stroke="${INK}" stroke-width="1.8"/>`
          + petalRing(60, 50, 0.85, 7),
      ]},

      { id: 'clover', name: '클로버', stages: (() => {
        const tre = (x, y, s, four) => {
          const angs = four ? [45,135,225,315] : [90,210,330];
          return `<g transform="translate(${x},${y}) scale(${s})">` +
            angs.map(a => `<circle cx="0" cy="-6" r="4.2" fill="${LEAF}" stroke="${INK}" stroke-width="1.3" transform="rotate(${a})"/>`).join('') +
            `</g>`;
        };
        return [
          ``,
          `<circle cx="60" cy="97" r="3" fill="${LEAF}" stroke="${INK}" stroke-width="1.3"/>`,
          stem('M60 102 V92', 2) + tre(60, 88, 0.7),
          stem('M60 102 V88', 2) + stem('M60 96 L52 90', 2) + tre(60, 84, 0.85) + tre(50, 88, 0.66),
          stem('M60 102 V84', 2) + stem('M60 96 L51 88', 2) + stem('M60 94 L69 88', 2)
            + tre(60, 80, 0.95) + tre(49, 86, 0.74) + tre(71, 86, 0.74),
          stem('M60 102 V80', 2) + stem('M60 95 L49 86', 2) + stem('M60 93 L71 86', 2) + stem('M60 92 L60 82', 2)
            + tre(60, 76, 1.0) + tre(47, 84, 0.8) + tre(73, 84, 0.8) + tre(60, 70, 0.74),
          stem('M60 102 V78', 2) + stem('M60 95 L48 84', 2) + stem('M60 93 L72 84', 2) + stem('M60 92 L60 80', 2)
            + tre(60, 74, 1.05) + tre(46, 82, 0.84) + tre(74, 82, 0.84) + tre(60, 67, 0.82, true),
        ];
      })()},

      { id: 'monstera', name: '몬스테라', stages: (() => {
        const mleaf = (x, y, r, s) =>
          `<g transform="translate(${x},${y}) rotate(${r}) scale(${s})">
            <path d="M0 0 C-14 -4 -16 -22 0 -30 C16 -22 14 -4 0 0Z" fill="${LEAF}" stroke="${INK}" stroke-width="1.6"/>
            <path d="M0 -4 V-26" stroke="${INK}" stroke-width="1.2" fill="none"/>
            <path d="M-2 -10 l-7 -2 M-2 -18 l-7 -3 M2 -10 l7 -2 M2 -18 l7 -3" stroke="${INK}" stroke-width="1.1" fill="none"/>
          </g>`;
        return [
          ``,
          `<path d="M60 100 C54 96 56 90 60 92 C64 90 66 96 60 100Z" fill="${LEAF}" stroke="${INK}" stroke-width="1.5"/>`,
          stem('M60 102 V94') + mleaf(60, 94, 0, 0.5),
          stem('M60 102 V90') + stem('M60 96 L52 92') + mleaf(62, 90, 8, 0.62) + mleaf(50, 92, -34, 0.5),
          stem('M60 102 V86') + stem('M60 95 L51 90') + stem('M60 94 L70 89')
            + mleaf(61, 84, 4, 0.78) + mleaf(48, 90, -36, 0.6) + mleaf(72, 88, 36, 0.6),
          stem('M60 102 V80') + stem('M60 94 L49 88') + stem('M60 92 L71 86') + stem('M60 90 L60 78')
            + mleaf(60, 76, 0, 0.92) + mleaf(46, 86, -40, 0.72) + mleaf(74, 84, 40, 0.72) + mleaf(60, 70, 6, 0.62),
          stem('M60 102 V76') + stem('M60 93 L47 86') + stem('M60 91 L73 84') + stem('M60 88 L60 72')
            + mleaf(60, 70, 0, 1.05) + mleaf(43, 84, -42, 0.84) + mleaf(77, 82, 42, 0.84)
            + mleaf(60, 62, 4, 0.72) + mleaf(50, 70, -20, 0.6),
        ];
      })()},

      { id: 'tomato', name: '토마토', stages: (() => {
        const tom = (x, y, r) => disc(x, y, r, FILL, 1.5) +
          `<path d="M${x-2} ${y-r} l-2 -3 M${x} ${y-r} v-3.5 M${x+2} ${y-r} l2 -3" stroke="${STEM}" stroke-width="1.3"/>`;
        return [
          ``,
          `<ellipse cx="60" cy="98" rx="3.5" ry="2.6" fill="${LEAF}" stroke="${INK}" stroke-width="1.3"/>`,
          stem('M60 102 V90') + leaf(61, 92, -36, 0.55) + leaf(59, 92, 36, 0.55),
          stem('M60 102 V80') + leaf(61, 86, -40, 0.7) + leaf(59, 86, 40, 0.7) + leaf(60, 78, -14, 0.55),
          stem('M60 102 V68') + leaf(61, 82, -42, 0.8) + leaf(59, 82, 42, 0.8) + leaf(61, 70, -22, 0.66) + leaf(59, 70, 22, 0.66),
          stem('M60 102 V62') + leaf(61, 80, -44, 0.85) + leaf(59, 80, 44, 0.85) + leaf(61, 68, -24, 0.7) + leaf(59, 68, 24, 0.7)
            + petalRing(54, 62, 0.5, 5) + petalRing(67, 64, 0.5, 5),
          stem('M60 102 V58') + leaf(61, 80, -46, 0.9) + leaf(59, 80, 46, 0.9) + leaf(61, 68, -24, 0.74) + leaf(59, 68, 24, 0.74)
            + tom(52, 70, 5.5) + tom(68, 72, 5.5) + tom(60, 64, 6),
        ];
      })()},

      { id: 'bamboo', name: '대나무', stages: (() => {
        const cane = (x, top, segs) => {
          let d = `<path d="M${x} 102 V${top}" stroke="${STEM}" stroke-width="3.4" stroke-linecap="round" fill="none"/>`;
          for (let i = 0; i <= segs; i++) {
            const yy = 102 - ((102 - top) / segs) * i;
            d += `<path d="M${x-4} ${yy} h8" stroke="${INK}" stroke-width="1.6"/>`;
          }
          return d;
        };
        const bleaf = (x, y, r) => `<path d="M0 0 Q3 -10 0 -20 Q-3 -10 0 0Z" fill="${LEAF}" stroke="${INK}" stroke-width="1.3" transform="translate(${x},${y}) rotate(${r}) scale(0.7)"/>`;
        return [
          ``,
          cane(60, 92, 1),
          cane(60, 80, 2) + bleaf(60, 80, 30),
          cane(60, 66, 3) + bleaf(60, 66, 30) + bleaf(60, 66, -30),
          cane(54, 56, 4) + cane(67, 70, 3) + bleaf(54, 56, -28) + bleaf(54, 56, 18) + bleaf(67, 70, 30),
          cane(52, 48, 5) + cane(66, 62, 4) + bleaf(52, 48, -30) + bleaf(52, 48, 16) + bleaf(66, 62, 30) + bleaf(66, 62, -18),
          cane(50, 40, 5) + cane(60, 56, 4) + cane(71, 66, 3)
            + bleaf(50, 40, -32) + bleaf(50, 40, 14) + bleaf(60, 56, 28) + bleaf(71, 66, 32) + bleaf(71, 66, -16),
        ];
      })()},

      { id: 'cherry', name: '벚꽃나무', stages: (() => {
        const tr = (d) => `<path d="${d}" fill="none" stroke="${STEM}" stroke-width="3" stroke-linecap="round"/>`;
        return [
          ``,
          tr('M60 102 V92'),
          tr('M60 102 V84') + tr('M60 90 L54 84') + tr('M60 90 L66 84'),
          tr('M60 102 V74') + tr('M60 84 L51 76') + tr('M60 84 L69 76') + blossom(51, 74, 0.8) + blossom(69, 74, 0.8) + blossom(60, 71, 0.8),
          tr('M60 102 V66') + tr('M60 78 L48 70') + tr('M60 78 L72 70') + tr('M60 72 L60 64')
            + blossom(48, 67, 0.9) + blossom(72, 67, 0.9) + blossom(60, 61, 0.9) + blossom(55, 66, 0.8) + blossom(66, 66, 0.8),
          tr('M60 102 V60') + tr('M60 72 L46 62') + tr('M60 72 L74 62') + tr('M60 66 L60 56')
            + [[46,60],[74,60],[60,54],[52,60],[68,60],[60,62]].map(p=>blossom(p[0],p[1],0.95)).join(''),
          tr('M60 102 V56') + tr('M60 70 L44 58') + tr('M60 70 L76 58') + tr('M60 62 L60 50')
            + [[44,56],[76,56],[60,48],[50,56],[70,56],[58,58],[66,52],[54,52],[60,60]].map(p=>blossom(p[0],p[1],1.0)).join(''),
        ];
      })()},

      { id: 'sunflower', name: '해바라기', stages: [
        ``,
        `<ellipse cx="60" cy="98" rx="3.5" ry="2.6" fill="${LEAF}" stroke="${INK}" stroke-width="1.3"/>`,
        stem('M60 102 V88') + leaf(62, 92, -42, 0.6) + leaf(58, 94, 42, 0.6),
        stem('M60 102 V76') + leaf(62, 88, -46, 0.72) + leaf(58, 90, 46, 0.72) + leaf(61, 78, -28, 0.6),
        stem('M60 102 V64') + leaf(62, 84, -48, 0.8) + leaf(58, 86, 48, 0.8)
          + `<circle cx="60" cy="60" r="6" fill="${LEAF}" stroke="${INK}" stroke-width="1.6"/>`,
        stem('M60 102 V56') + leaf(62, 82, -50, 0.85) + leaf(58, 84, 50, 0.85)
          + petalRing(60, 50, 0.85, 12) + disc(60, 50, 7, FILL),
        stem('M60 102 V50') + leaf(62, 80, -52, 0.9) + leaf(58, 82, 52, 0.9)
          + petalRing(60, 44, 1.1, 14) + disc(60, 44, 9, ACC) + disc(60, 44, 6, FILL, 1),
      ]},

      { id: 'mushroom', name: '버섯', stages: (() => {
        const shroom = (x, y, s) =>
          `<g transform="translate(${x},${y}) scale(${s})">
            <rect x="-3.5" y="-2" width="7" height="12" rx="3" fill="${FILL}" stroke="${INK}" stroke-width="1.5"/>
            <path d="M-11 -2 Q-11 -15 0 -15 Q11 -15 11 -2 Q0 2 -11 -2Z" fill="${LEAF}" stroke="${INK}" stroke-width="1.6"/>
            <circle cx="-4" cy="-7" r="1.6" fill="hsl(0 0% 100%)"/>
            <circle cx="3" cy="-9" r="1.3" fill="hsl(0 0% 100%)"/>
            <circle cx="5" cy="-5" r="1.1" fill="hsl(0 0% 100%)"/>
          </g>`;
        return [
          ``,
          `<ellipse cx="60" cy="99" rx="4" ry="3" fill="${FILL}" stroke="${INK}" stroke-width="1.4"/>`,
          shroom(60, 92, 0.7),
          shroom(60, 90, 0.95),
          shroom(58, 90, 1.05) + shroom(70, 96, 0.62),
          shroom(57, 88, 1.1) + shroom(71, 95, 0.74) + shroom(48, 97, 0.55),
          shroom(56, 86, 1.15) + shroom(72, 94, 0.82) + shroom(47, 96, 0.66) + shroom(64, 99, 0.5),
        ];
      })()},

      { id: 'oldtree', name: '고목', stages: (() => {
        const trunk = (w, top) => `<path d="M${60-w} 102 Q${60-w*0.6} ${top+8} 60 ${top} Q${60+w*0.6} ${top+8} ${60+w} 102Z" fill="${FILL}" stroke="${INK}" stroke-width="1.8"/>`;
        const canopy = (cs) => cs.map(c => disc(c[0], c[1], c[2], LEAF)).join('');
        return [
          ``,
          stem('M60 102 V93', 3),
          trunk(3, 84) + canopy([[60,80,8]]),
          trunk(4, 76) + `<path d="M60 84 L52 78 M60 82 L68 76" stroke="${STEM}" stroke-width="2" fill="none"/>` + canopy([[52,74,8],[68,72,8],[60,70,9]]),
          trunk(5, 70) + `<path d="M60 80 L50 72 M60 78 L70 70" stroke="${STEM}" stroke-width="2.2" fill="none"/>` + canopy([[50,68,9],[70,66,9],[60,62,11],[58,72,8]]),
          trunk(6, 64) + `<path d="M60 76 L48 66 M60 74 L72 64" stroke="${STEM}" stroke-width="2.4" fill="none"/>` + canopy([[48,62,10],[72,60,10],[60,55,13],[54,66,9],[68,66,9]]),
          trunk(7, 58) + `<path d="M60 72 L46 60 M60 70 L74 58 M60 66 L60 54" stroke="${STEM}" stroke-width="2.6" fill="none"/>`
            + canopy([[46,56,11],[74,54,11],[60,48,15],[50,62,10],[70,60,10],[60,64,11]]),
        ];
      })()},
    ];

    const POT =
      `<path d="M42 105 L46 138 Q46 141 49 141 L71 141 Q74 141 74 138 L78 105 Z"
        fill="var(--pot)" stroke="${INK}" stroke-width="2" stroke-linejoin="round"/>` +
      `<rect x="37" y="99" width="46" height="9" rx="2.5" fill="var(--pot)" stroke="${INK}" stroke-width="2"/>`;
    const DROP = `<path class="drop" d="M60 16 q5 8 0 13 q-5 -5 0 -13z" fill="${ACC}"/>`;

    const TOTAL = PLANTS.length;
    const STAGE_THRESHOLDS = [0, 2, 5, 9, 15, 22, 30]; // water count → stage 1..7
    const MAX_WATER = 30;

    function stageOf(w) {
      let s = 1;
      for (let i = 0; i < STAGE_THRESHOLDS.length; i++) if (w >= STAGE_THRESHOLDS[i]) s = i + 1;
      return s;
    }

    /* ============ State ============ */
    const K_STATE = 'nosion-plant-v1';
    let state = {
      current: 'sprout',
      water: {},            // { plantId: count }
      lastWater: null,      // 'YYYY-MM-DD'
      streak: 0,
      best: 0,
    };

    try {
      const saved = JSON.parse(localStorage.getItem(K_STATE) || 'null');
      if (saved && typeof saved === 'object') state = Object.assign(state, saved);
    } catch (e) {}
    if (!state.water || typeof state.water !== 'object' || Array.isArray(state.water)) state.water = {};
    PLANTS.forEach(p => {
      let v = state.water[p.id];
      if (typeof v !== 'number' || !Number.isFinite(v)) v = 0;
      state.water[p.id] = Math.max(0, Math.min(MAX_WATER, Math.floor(v)));
    });
    if (!PLANTS.some(p => p.id === state.current)) state.current = 'sprout';
    if (typeof state.streak !== 'number' || !Number.isFinite(state.streak) || state.streak < 0) state.streak = 0;
    if (typeof state.best !== 'number' || !Number.isFinite(state.best) || state.best < 0) state.best = 0;
    if (typeof state.lastWater !== 'string') state.lastWater = null;

    function save() { try { localStorage.setItem(K_STATE, JSON.stringify(state)); } catch (e) {} }

    /* ============ Date helpers ============ */
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function daysBetween(a, b) {
      if (!a || !b) return Infinity;
      const da = new Date(a + 'T00:00:00'), db = new Date(b + 'T00:00:00');
      if (!Number.isFinite(da.getTime()) || !Number.isFinite(db.getTime())) return Infinity;
      return Math.round((db - da) / 86400000);
    }

    /* ============ Build SVG ============ */
    function buildPlantSVG(plantId, stage, wilted) {
      const plant = PLANTS.find(p => p.id === plantId);
      const body = (plant.stages[stage - 1] || '');
      return `<svg class="plant-svg ${wilted ? 'wilted' : ''}" id="plantSvg" viewBox="0 0 120 150"
                preserveAspectRatio="xMidYMax meet">
        ${POT}
        <g class="plant-body">${body}</g>
        ${DROP}
      </svg>`;
    }

    /* ============ Render main ============ */
    const card = document.getElementById('card');
    const plantStage = document.getElementById('plantStage');
    const plantName = document.getElementById('plantName');
    const plantMeta = document.getElementById('plantMeta');
    const progressFill = document.getElementById('progressFill');
    const waterBtn = document.getElementById('waterBtn');
    const waterBtnLabel = document.getElementById('waterBtnLabel');

    function isWilted() {
      return daysBetween(state.lastWater, todayStr()) >= 2;
    }
    function wateredToday() {
      return state.lastWater === todayStr();
    }
    // streak is broken the moment a full day is missed (gap >= 2)
    function effectiveStreak() {
      return daysBetween(state.lastWater, todayStr()) >= 2 ? 0 : state.streak;
    }

    function render() {
      const plant = PLANTS.find(p => p.id === state.current);
      const w = state.water[state.current];
      const stage = stageOf(w);
      const wilted = isWilted() && w > 0;
      const done = w >= MAX_WATER;
      const streak = effectiveStreak();

      plantStage.innerHTML = buildPlantSVG(state.current, stage, wilted);

      plantName.textContent = plant.name;
      plantMeta.textContent = done
        ? '🏆 완성!'
        : `${stage}단계 · ${w}/${MAX_WATER}${streak > 0 ? ' · 🔥' + streak + '일' : ''}`;
      progressFill.style.width = Math.min(100, (w / MAX_WATER) * 100) + '%';

      if (done) {
        // completed: button guides to picking a new plant (no more watering)
        waterBtn.classList.remove('done');
        waterBtnLabel.textContent = '새 식물 선택';
      } else if (wateredToday()) {
        waterBtn.classList.add('done');
        waterBtnLabel.textContent = '오늘 완료 ✓';
      } else {
        waterBtn.classList.remove('done');
        waterBtnLabel.textContent = wilted ? '물주기 (시듦)' : '물주기';
      }
    }

    /* ============ Watering ============ */
    function water() {
      if (wateredToday()) return;
      if (state.water[state.current] >= MAX_WATER) return; // already complete
      const today = todayStr();
      const gap = daysBetween(state.lastWater, today);
      state.streak = (gap === 1) ? state.streak + 1 : 1;
      state.best = Math.max(state.best, state.streak);

      const id = state.current;
      const before = state.water[id];
      state.water[id] = Math.min(MAX_WATER, before + 1);
      state.lastWater = today;
      save();

      // animate then re-render
      const svg = document.getElementById('plantSvg');
      if (svg) {
        svg.classList.remove('wilted');   // reviving look
        svg.classList.add('watering');
      }
      setTimeout(render, 720);

      if (before < MAX_WATER && state.water[id] >= MAX_WATER) {
        // only celebrate if this plant is still complete & still selected
        setTimeout(() => { if (state.current === id && state.water[id] >= MAX_WATER) celebrate(); }, 760);
      }
    }

    function celebrate() {
      openCollection(true);
    }

    waterBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (state.water[state.current] >= MAX_WATER) { openCollection(false); return; }
      water();
    });

    /* ============ Collection gallery ============ */
    const collectionBtn = document.getElementById('collectionBtn');
    const collectionBtnLabel = document.getElementById('collectionBtnLabel');
    const galleryGrid = document.getElementById('galleryGrid');
    const galleryTitle = document.getElementById('galleryTitle');
    const galleryHint = document.getElementById('galleryHint');
    let inCollection = false;

    function renderGallery(justCompleted) {
      const doneCount = PLANTS.filter(p => state.water[p.id] >= MAX_WATER).length;
      galleryTitle.textContent = justCompleted ? '🎉 식물을 완성했어요!' : `내 식물 컬렉션 ${doneCount}/${TOTAL}`;
      galleryHint.textContent = justCompleted ? '다음에 키울 식물을 선택하세요' : '탭하여 키울 식물을 선택하세요';

      galleryGrid.innerHTML = '';
      PLANTS.forEach(p => {
        const w = state.water[p.id];
        const done = w >= MAX_WATER;
        const started = w > 0;
        const isCurrent = p.id === state.current;
        const slot = document.createElement('div');
        slot.className = 'slot' + (done ? ' done' : (started ? '' : ' locked')) + (isCurrent ? ' current' : '');
        // show final form if done, else current grown stage (or silhouette stage7 if untouched)
        const showStage = done ? 7 : (started ? stageOf(w) : 7);
        slot.innerHTML = buildPlantSVG(p.id, showStage, false)
          + `<span class="badge">${done ? '✓' : (started ? stageOf(w) + '단계' : '')}</span>`
          + `<span class="slot-name">${p.name}</span>`;
        slot.addEventListener('click', e => {
          e.stopPropagation();
          state.current = p.id;
          save();
          closeCollection();
          render();
        });
        galleryGrid.appendChild(slot);
      });
    }

    function openCollection(justCompleted) {
      inCollection = true;
      card.classList.add('collection');
      collectionBtnLabel.textContent = '식물로';
      renderGallery(justCompleted);
    }
    function closeCollection() {
      inCollection = false;
      card.classList.remove('collection');
      collectionBtnLabel.textContent = '컬렉션';
    }
    collectionBtn.addEventListener('click', () => {
      inCollection ? closeCollection() : openCollection(false);
    });

    /* ============ Persistence keys (pos/size) ============ */
    const K_POS  = 'nosion-plant-pos-v1';
    const K_SIZE = 'nosion-plant-size-v1';

    /* ============ Drag to move ============ */
    (function () {
      const wrapper = document.getElementById('widget');
      const BLOCKED = '.resize-handle,button,a,input,.slot,.water-btn';
      let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;

      card.addEventListener('mousedown', e => {
        if (e.target.closest(BLOCKED)) return;
        dragging = true;
        const r = wrapper.getBoundingClientRect();
        ox = r.left; oy = r.top; sx = e.clientX; sy = e.clientY;
        card.classList.add('dragging');
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        wrapper.style.position = 'fixed';
        wrapper.style.left = `${ox + e.clientX - sx}px`;
        wrapper.style.top  = `${oy + e.clientY - sy}px`;
      });
      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('dragging');
        try { localStorage.setItem(K_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top })); } catch (e) {}
      });
      try {
        const p = JSON.parse(localStorage.getItem(K_POS) || 'null');
        if (p) { wrapper.style.position = 'fixed'; wrapper.style.left = p.left; wrapper.style.top = p.top; }
      } catch (e) {}
    })();

    /* ============ Resize ============ */
    (function () {
      const wrapper = document.getElementById('widget');
      const MIN_W = 240, MAX_W = 640, MIN_H = 280, MAX_H = 640;
      let on = false, dir = '', sw = 0, sh = 0, sx = 0, sy = 0, startLeft = 0, startTop = 0;

      document.querySelectorAll('.resize-handle').forEach(h => {
        h.addEventListener('mousedown', e => {
          on = true; dir = h.dataset.direction;
          sw = card.offsetWidth; sh = card.offsetHeight;
          sx = e.clientX; sy = e.clientY;
          if (getComputedStyle(wrapper).position !== 'fixed') {
            const wr = wrapper.getBoundingClientRect();
            wrapper.style.position = 'fixed';
            wrapper.style.left = wr.left + 'px';
            wrapper.style.top = wr.top + 'px';
            wrapper.style.transform = 'none';
          }
          startLeft = parseFloat(wrapper.style.left) || 0;
          startTop = parseFloat(wrapper.style.top) || 0;
          e.preventDefault(); e.stopPropagation();
        });
      });

      document.addEventListener('mousemove', e => {
        if (!on) return;
        const dx = e.clientX - sx, dy = e.clientY - sy;
        if (dir === 'right' || dir === 'left') {
          const delta = dir === 'right' ? dx : -dx;
          const newW = Math.min(MAX_W, Math.max(MIN_W, sw + 2 * delta));
          const actualDelta = newW - sw;
          card.style.width = newW + 'px';
          if (wrapper.style.position === 'fixed') wrapper.style.left = (startLeft - actualDelta / 2) + 'px';
        }
        if (dir === 'bottom' || dir === 'top') {
          const delta = dir === 'bottom' ? dy : -dy;
          const newH = Math.min(MAX_H, Math.max(MIN_H, sh + 2 * delta));
          const actualDelta = newH - sh;
          card.style.height = newH + 'px';
          if (wrapper.style.position === 'fixed') wrapper.style.top = (startTop - actualDelta / 2) + 'px';
        }
      });

      document.addEventListener('mouseup', () => {
        if (!on) return; on = false;
        try {
          localStorage.setItem(K_SIZE, JSON.stringify({ w: card.offsetWidth, h: card.offsetHeight }));
          if (wrapper.style.position === 'fixed') {
            localStorage.setItem(K_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top }));
          }
        } catch (e) {}
      });

      try {
        const s = JSON.parse(localStorage.getItem(K_SIZE) || 'null');
        if (s) { if (s.w) card.style.width = `${s.w}px`; if (s.h) card.style.height = `${s.h}px`; }
      } catch (e) {}
    })();

    /* ============ Keep UI fresh across midnight / refocus ============ */
    document.addEventListener('visibilitychange', () => { if (!document.hidden && !inCollection) render(); });
    window.addEventListener('focus', () => { if (!inCollection) render(); });

    render();
  </script>
</body>
</html>
