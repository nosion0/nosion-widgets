<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노시언 루틴 트래커</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* ============================================
       노시언 위젯 시그니처 디자인 토큰
       ============================================ */
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --dot-on: hsl(220 13% 15%);
      --dot-off: hsl(220 10% 88%);
      --dot-today-ring: hsl(220 13% 15%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 위젯 래퍼 (노션 임베드 최적화) */
    .widget-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      position: relative;
      width: fit-content;
    }

    /* 카드 */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      width: 360px;
      position: relative;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    /* 드래그 영역은 헤더로 한정 */
    .card .header {
      cursor: grab;
    }

    .card.dragging .header {
      cursor: grabbing;
    }

    /* widget-wrapper에 transform 적용 (위치 이동) */
    .widget-wrapper.moved {
      transition: none;
    }

    .card .header {
      flex-shrink: 0;
    }

    .card .divider {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
    }

    /* 헤더 (좌: 이번 주 | 중앙: 트렌드 차트 | 우: 달성률) */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .header-left,
    .header-right {
      display: flex;
      flex-direction: column;
    }

    .header-right {
      align-items: flex-end;
    }

    /* 헤더 중앙: 7일 트렌드 차트 (빈 공간 자동 확장) */
    .header-center {
      flex: 1 1 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 1.5rem 6px;
      min-width: 60px;
    }

    .trend-chart {
      width: 100%;
      height: 36px;
      display: block;
      overflow: visible;
    }

    .trend-chart .trend-line {
      fill: none;
      stroke: var(--muted-foreground);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.45;
      vector-effect: non-scaling-stroke;
    }

    .week-label,
    .rate-label {
      font-size: 0.75rem;
      letter-spacing: 0.025em;
      color: var(--muted-foreground);
      margin-bottom: 0.375rem;
      font-weight: 400;
    }

    .stats {
      display: flex;
      align-items: baseline;
      gap: 0.125rem;
      line-height: 1;
    }

    .stats .done {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--muted-foreground);
    }

    .stats .divider-slash {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--muted-foreground);
      opacity: 0.6;
      margin: 0 0.125rem;
      font-variant-numeric: tabular-nums;
    }

    .stats .total {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
    }

    /* 우측 상단 전체 달성률 */
    .total-rate {
      display: flex;
      align-items: baseline;
      line-height: 1;
    }

    .total-rate .percent-num {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--muted-foreground);
    }

    .total-rate .percent-symbol {
      font-size: 1.5rem;
      font-weight: 400;
      padding-left: 2px;
      color: var(--muted-foreground);
      opacity: 0.6;
    }

    .total-rate.complete .percent-num {
      color: var(--foreground);
    }

    .total-rate.complete .percent-symbol {
      color: var(--foreground);
      opacity: 1;
    }

    /* 구분선 */
    .divider {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    /* 그리드: [습관명 56px] [도트 7개 1fr씩] [달성률 28px] */
    .tracker {
      display: grid;
      grid-template-columns: 56px repeat(7, minmax(0, 1fr)) auto;
      grid-template-rows: auto repeat(3, minmax(0, 1fr));
      gap: 0.625rem 0.5rem;
      align-items: center;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    /* 요일 헤더 (모든 요일 동일 톤) */
    .day-header {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      padding-bottom: 0.25rem;
      user-select: none;
    }

    /* 습관 이름 */
    .habit-name {
      font-size: 0.8125rem;
      color: var(--foreground);
      cursor: text;
      outline: none;
      padding: 2px 4px;
      margin-left: -4px;
      border-radius: 4px;
      transition: background var(--transition);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -0.005em;
      min-width: 0;
      position: relative;
      z-index: 5;
    }

    .habit-name:hover,
    .habit-name:focus {
      background: var(--muted);
    }

    .habit-name:empty::before {
      content: attr(data-placeholder);
      color: var(--muted-foreground);
      opacity: 0.4;
    }

    /* 도트 셀 */
    .dot-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--dot-off);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.15s ease, transform 0.15s ease;
      position: relative;
      flex-shrink: 0;
    }

    .dot:hover {
      transform: scale(1.15);
    }

    .dot.on {
      background: var(--dot-on);
    }

    /* 루틴별 달성률 */
    .habit-rate {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      text-align: right;
      user-select: none;
      transition: opacity var(--transition), color var(--transition);
      padding-left: 0.375rem;
      white-space: nowrap;
    }

    .habit-rate.complete {
      color: var(--foreground);
      opacity: 1;
      font-weight: 500;
    }

    /* 우측 컨트롤 (평소 살짝 보이고, 호버 시 명확) */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }

    .widget-wrapper:hover .controls {
      opacity: 1;
    }

    .control-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }

    .control-btn:hover:not(:disabled) {
      color: var(--foreground);
    }

    .control-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .control-btn svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    /* 커스텀 툴팁 (아이콘 좌측 등장) */
    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }

    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }

    /* ============================================
       4방향 리사이즈 핸들 (카드 호버 시에만 표시)
       ============================================ */
    .resize-handle {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      z-index: 20;
    }

    .resize-handle .bar {
      background: var(--border);
      transition: opacity var(--transition), background var(--transition),
                  width 0.15s ease, height 0.15s ease;
      border-radius: 999px;
      opacity: 0;
    }

    /* 카드 호버 시 4개 핸들 모두 살짝 보임 */
    .widget-wrapper:hover .resize-handle .bar {
      opacity: 1;
    }

    /* 핸들 직접 호버 시 진하게 + 굵게 */
    .resize-handle:hover .bar {
      background: var(--muted-foreground);
    }

    /* 상단 */
    .handle-top {
      top: 0;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 16px;
      cursor: ns-resize;
    }
    .handle-top .bar { width: 36px; height: 1px; }
    .handle-top:hover .bar { height: 3px; }

    /* 하단 */
    .handle-bottom {
      bottom: 0;
      left: 50%;
      transform: translate(-50%, 50%);
      width: 36px;
      height: 16px;
      cursor: ns-resize;
    }
    .handle-bottom .bar { width: 36px; height: 1px; }
    .handle-bottom:hover .bar { height: 3px; }

    /* 좌측 */
    .handle-left {
      left: 0;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 36px;
      cursor: ew-resize;
    }
    .handle-left .bar { width: 1px; height: 36px; }
    .handle-left:hover .bar { width: 3px; }

    /* 우측 */
    .handle-right {
      right: 0;
      top: 50%;
      transform: translate(50%, -50%);
      width: 16px;
      height: 36px;
      cursor: ew-resize;
    }
    .handle-right .bar { width: 1px; height: 36px; }
    .handle-right:hover .bar { width: 3px; }

    /* 리셋 확인 다이얼로그 */
    .reset-confirm {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      z-index: 100;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
      min-width: 200px;
    }

    .reset-confirm.show { display: flex; }

    .reset-confirm p {
      font-size: 0.8125rem;
      color: var(--foreground);
      text-align: center;
      letter-spacing: -0.005em;
    }

    .reset-confirm .actions {
      display: flex;
      gap: 0.5rem;
    }

    .reset-confirm button {
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.375rem 0.875rem;
      border-radius: 0.375rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--foreground);
      cursor: pointer;
      transition: all var(--transition);
    }

    .reset-confirm button:hover { background: var(--muted); }

    .reset-confirm button.danger {
      background: var(--foreground);
      color: var(--card);
      border-color: var(--foreground);
    }

    .reset-confirm button.danger:hover { opacity: 0.85; }
      /* unify-resize: 내용은 고정폭, 카드를 키우면 바깥 여백만 늘어남 */
    .card {
      align-items: safe center;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: inherit;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">
    <div class="card" id="card">
      <div class="card-body">

      <!-- 헤더 (좌: 이번 주 | 중앙: 7일 트렌드 | 우: 달성률) -->
      <div class="header">
        <div class="header-left">
          <div class="week-label" id="weekLabel">이번 주</div>
          <div class="stats">
            <span class="done" id="statsDone">0</span>
            <span class="divider-slash">/</span>
            <span class="total" id="statsTotal">21</span>
          </div>
        </div>

        <div class="header-center">
          <svg class="trend-chart" viewBox="0 0 100 30" preserveAspectRatio="none" aria-hidden="true">
            <path class="trend-line" id="trendLine" d="" />
          </svg>
        </div>

        <div class="header-right">
          <div class="rate-label">달성률</div>
          <div class="total-rate" id="totalRate">
            <span class="percent-num" id="percentNum">0</span>
            <span class="percent-symbol">%</span>
          </div>
        </div>
      </div>

      <!-- 트래커 그리드 -->
      <div class="divider">
        <div class="tracker" id="tracker"></div>
      </div>

      <!-- 리셋 확인 다이얼로그 -->
      <div class="reset-confirm" id="resetConfirm">
        <p>이번 주 기록을 초기화할까요?</p>
        <div class="actions">
          <button id="cancelReset">취소</button>
          <button class="danger" id="confirmReset">초기화</button>
        </div>
      </div>

      <!-- 4방향 리사이즈 핸들 -->
      </div>

      <div class="resize-handle handle-top" data-direction="top"><div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left" data-direction="left"><div class="bar"></div></div>
      <div class="resize-handle handle-right" data-direction="right"><div class="bar"></div></div>
    </div>

    <!-- 우측 컨트롤 (호버 등장) -->
    <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="크기 초기화" title="크기 초기화"
              aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="control-btn" id="resetBtn"
              data-tooltip="이번 주 초기화" title="이번 주 초기화"
              aria-label="이번 주 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ============================================
       노시언 루틴 트래커 - 로직
       ============================================ */
    const STORAGE_KEY = 'nosion-routine-tracker-v1';
    const DAYS_KO = ['월', '화', '수', '목', '금', '토', '일'];
    const HABITS_COUNT = 3;
    const DAYS_COUNT = 7;

    // 이번 주 월요일 키 (YYYY-MM-DD)
    function getMondayKey(date = new Date()) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    function getTodayIndex() {
      const d = new Date().getDay();
      return d === 0 ? 6 : d - 1;
    }

    const defaultState = () => ({
      weekKey: getMondayKey(),
      habits: ['운동', '독서', '명상'],
      data: Array.from({ length: HABITS_COUNT }, () => Array(DAYS_COUNT).fill(false))
    });

    let state = defaultState();
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.weekKey !== state.weekKey) {
          state = {
            weekKey: state.weekKey,
            habits: parsed.habits || state.habits,
            data: Array.from({ length: HABITS_COUNT }, () => Array(DAYS_COUNT).fill(false))
          };
        } else {
          state = {
            weekKey: parsed.weekKey,
            habits: parsed.habits && parsed.habits.length === HABITS_COUNT
              ? parsed.habits
              : state.habits,
            data: parsed.data && parsed.data.length === HABITS_COUNT
              ? parsed.data.map(row => row && row.length === DAYS_COUNT ? row : Array(DAYS_COUNT).fill(false))
              : state.data
          };
        }
      }
    } catch (e) {
      console.error('localStorage load error:', e);
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }

    const trackerEl = document.getElementById('tracker');
    const statsDoneEl = document.getElementById('statsDone');
    const statsTotalEl = document.getElementById('statsTotal');
    const percentNumEl = document.getElementById('percentNum');
    const totalRateEl = document.getElementById('totalRate');
    const trendLineEl = document.getElementById('trendLine');
    const resetBtn = document.getElementById('resetBtn');
    const resetConfirm = document.getElementById('resetConfirm');
    const cancelReset = document.getElementById('cancelReset');
    const confirmReset = document.getElementById('confirmReset');

    const rateRefs = [];

    function calcHabitRate(h) {
      return state.data[h].filter(Boolean).length;
    }

    function calcTotalStats() {
      let done = 0;
      for (let h = 0; h < HABITS_COUNT; h++) done += calcHabitRate(h);
      return { done, total: HABITS_COUNT * DAYS_COUNT };
    }

    function updateRowRate(h) {
      const rate = calcHabitRate(h);
      const rateEl = rateRefs[h];
      if (!rateEl) return;
      rateEl.textContent = `${rate}/${DAYS_COUNT}`;
      rateEl.classList.toggle('complete', rate === DAYS_COUNT);
    }

    /**
     * 점들을 부드러운 곡선 path로 변환
     * Catmull-Rom 스플라인을 cubic Bezier로 변환
     */
    function pointsToSmoothPath(pts, tension = 0.2) {
      if (pts.length === 0) return '';
      if (pts.length === 1) {
        const [x, y] = pts[0];
        // 점 1개일 때는 짧은 가로선 (round linecap으로 점처럼 보임)
        return `M ${x.toFixed(2)},${y.toFixed(2)} L ${(x + 0.5).toFixed(2)},${y.toFixed(2)}`;
      }

      let d = `M ${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`;

      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[i + 2] || p2;

        const c1x = p1[0] + (p2[0] - p0[0]) * tension;
        const c1y = p1[1] + (p2[1] - p0[1]) * tension;
        const c2x = p2[0] - (p3[0] - p1[0]) * tension;
        const c2y = p2[1] - (p3[1] - p1[1]) * tension;

        d += ` C ${c1x.toFixed(2)},${c1y.toFixed(2)} ${c2x.toFixed(2)},${c2y.toFixed(2)} ${p2[0].toFixed(2)},${p2[1].toFixed(2)}`;
      }

      return d;
    }

    function updateTrendChart() {
      const todayIdx = getTodayIndex();
      // 월요일(0)부터 오늘까지 일별 완료 합계
      const dailySums = [];
      for (let d = 0; d <= todayIdx; d++) {
        let sum = 0;
        for (let h = 0; h < HABITS_COUNT; h++) {
          if (state.data[h][d]) sum++;
        }
        dailySums.push(sum);
      }

      // viewBox 0 0 100 30 기준
      // x: 0 ~ 100 (DAYS_COUNT=7 등분)
      // y: 28 (값 0) ~ 4 (값 HABITS_COUNT=3) — 위아래 4px 패딩
      const Y_BOTTOM = 28;
      const Y_TOP = 4;
      const VALUE_RANGE = HABITS_COUNT;

      const points = dailySums.map((v, i) => {
        const x = (i / (DAYS_COUNT - 1)) * 100;
        const y = Y_BOTTOM - (v / VALUE_RANGE) * (Y_BOTTOM - Y_TOP);
        return [x, y];
      });

      trendLineEl.setAttribute('d', pointsToSmoothPath(points, 0.2));
    }

    function updateTotalStats() {
      const { done, total } = calcTotalStats();
      statsDoneEl.textContent = done;
      statsTotalEl.textContent = total;
      const percent = total > 0 ? Math.round((done / total) * 100) : 0;
      percentNumEl.textContent = percent;
      totalRateEl.classList.toggle('complete', percent === 100);
      updateTrendChart();
    }

    function renderTracker() {
      trackerEl.innerHTML = '';
      rateRefs.length = 0;
      const todayIdx = getTodayIndex();

      // 1행: 빈 셀 + 요일 7개 + 빈 셀
      trackerEl.appendChild(document.createElement('div'));

      DAYS_KO.forEach((day) => {
        const dh = document.createElement('div');
        dh.className = 'day-header';
        dh.textContent = day;
        trackerEl.appendChild(dh);
      });

      trackerEl.appendChild(document.createElement('div'));

      // 2~4행: 습관 + 도트 7개 + 달성률
      for (let h = 0; h < HABITS_COUNT; h++) {
        const name = document.createElement('div');
        name.className = 'habit-name';
        name.contentEditable = 'true';
        name.spellcheck = false;
        name.dataset.placeholder = '습관 ' + (h + 1);
        name.textContent = state.habits[h] || '';

        name.addEventListener('blur', () => {
          const text = name.textContent.trim().slice(0, 8);
          state.habits[h] = text || ('습관 ' + (h + 1));
          name.textContent = state.habits[h];
          save();
        });

        name.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); name.blur(); }
        });

        trackerEl.appendChild(name);

        for (let d = 0; d < DAYS_COUNT; d++) {
          const cell = document.createElement('div');
          cell.className = 'dot-cell';

          const dot = document.createElement('button');
          dot.className = 'dot';
          dot.type = 'button';
          if (state.data[h][d]) dot.classList.add('on');
          if (d === todayIdx) dot.classList.add('today-marker');
          dot.setAttribute('aria-label',
            `${state.habits[h]} ${DAYS_KO[d]}요일 ${state.data[h][d] ? '완료' : '미완료'}`
          );

          dot.addEventListener('click', () => {
            state.data[h][d] = !state.data[h][d];
            save();
            dot.classList.toggle('on');
            updateRowRate(h);
            updateTotalStats();
          });

          cell.appendChild(dot);
          trackerEl.appendChild(cell);
        }

        // 달성률 (행 우측 끝)
        const rate = document.createElement('div');
        rate.className = 'habit-rate';
        const rateNum = calcHabitRate(h);
        rate.textContent = `${rateNum}/${DAYS_COUNT}`;
        if (rateNum === DAYS_COUNT) rate.classList.add('complete');
        trackerEl.appendChild(rate);
        rateRefs[h] = rate;
      }
    }

    // 리셋 흐름
    resetBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      resetConfirm.classList.add('show');
    });

    cancelReset.addEventListener('click', () => {
      resetConfirm.classList.remove('show');
    });

    confirmReset.addEventListener('click', () => {
      state.data = Array.from({ length: HABITS_COUNT }, () => Array(DAYS_COUNT).fill(false));
      save();
      renderTracker();
      updateTotalStats();
      resetConfirm.classList.remove('show');
    });

    document.addEventListener('click', (e) => {
      if (resetConfirm.classList.contains('show')) {
        if (!resetConfirm.contains(e.target) && !resetBtn.contains(e.target)) {
          resetConfirm.classList.remove('show');
        }
      }
    });

    renderTracker();
    updateTotalStats();

    // 새 주 자동 감지 — 지난 주 기록은 history에 보관 후 새 주 시작
    setInterval(() => {
      const currentMonday = getMondayKey();
      if (state.weekKey && currentMonday !== state.weekKey) {
        if (!state.history) state.history = {};
        state.history[state.weekKey] = state.data;
        state.weekKey = currentMonday;
        state.data = Array.from({ length: HABITS_COUNT }, () => Array(DAYS_COUNT).fill(false));
        save();
        renderTracker();
        updateTotalStats();
      }
    }, 60000);

    /* ============================================
       4방향 리사이즈 기능
       ============================================ */
    const SIZE_KEY = 'nosion-routine-tracker-size-v1';
    const MIN_WIDTH = 320;
    const MAX_WIDTH = 720;
    const MIN_HEIGHT = 200;
    const MAX_HEIGHT = 700;

    const cardEl = document.getElementById('card');
    const cardBodyEl = cardEl.querySelector('.card-body');
    const DEFAULT_WIDTH = 360;

    let cardWidth = 360;   // 기본 너비
    let cardHeight = null; // null = 콘텐츠 자동 높이

    // localStorage 로드
    try {
      const savedSize = localStorage.getItem(SIZE_KEY);
      if (savedSize) {
        const s = JSON.parse(savedSize);
        if (typeof s.width === 'number') {
          cardWidth = Math.max(MIN_WIDTH, Math.min(MAX_WIDTH, s.width));
        }
        if (typeof s.height === 'number' && s.height > 0) {
          cardHeight = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, s.height));
        }
      }
    } catch (e) {}

    function applyCardSize() {
      // 반응형: 카드 폭에 비례해 콘텐츠 전체를 zoom (여백 비율 유지)
      cardEl.style.width = cardWidth + 'px';
      cardEl.style.height = '';
      if (cardBodyEl) cardBodyEl.style.zoom = (cardWidth / DEFAULT_WIDTH).toFixed(3);
    }

    function saveSize() {
      try {
        localStorage.setItem(SIZE_KEY, JSON.stringify({
          width: cardWidth,
          height: cardHeight
        }));
      } catch (e) {}
    }

    let resizeDrag = null;
    let startLeft = 0, startTop = 0;

    function startResize(direction, x, y) {
      const rect = cardEl.getBoundingClientRect();
      resizeDrag = {
        direction,
        startX: x,
        startY: y,
        startWidth: rect.width,
        startHeight: rect.height
      };
      if (getComputedStyle(widgetEl).position !== 'fixed') {
        const wrapperRect = widgetEl.getBoundingClientRect();
        widgetEl.style.position = 'fixed';
        widgetEl.style.left = wrapperRect.left + 'px';
        widgetEl.style.top = wrapperRect.top + 'px';
        widgetEl.style.transform = 'none';
      }
      startLeft = parseFloat(widgetEl.style.left) || 0;
      startTop = parseFloat(widgetEl.style.top) || 0;
      // 드래그 중 텍스트 선택 방지
      document.body.style.userSelect = 'none';
      document.body.style.cursor =
        (direction === 'left' || direction === 'right') ? 'ew-resize' : 'ns-resize';
    }

    function moveResize(x, y) {
      if (!resizeDrag) return;
      // 반응형 비례 확대 — 어느 핸들이든 카드 폭을 조절(콘텐츠가 zoom으로 비례)
      const dx = x - resizeDrag.startX, dy = y - resizeDrag.startY, dir = resizeDrag.direction;
      let delta;
      if (dir === 'right') delta = dx;
      else if (dir === 'left') delta = -dx;
      else if (dir === 'bottom') delta = dy;
      else delta = -dy;
      cardWidth = Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, resizeDrag.startWidth + 2 * delta));
      const actual = cardWidth - resizeDrag.startWidth;
      if (widgetEl.style.position === 'fixed') {
        if (dir === 'left' || dir === 'right') widgetEl.style.left = (startLeft - actual / 2) + 'px';
        else widgetEl.style.top = (startTop - actual / 2) + 'px';
      }
      applyCardSize();
    }

    function endResize() {
      if (resizeDrag) {
        saveSize();
        if (widgetEl.style.position === 'fixed') {
          try { localStorage.setItem(POS_KEY, JSON.stringify({ x: offsetX, y: offsetY, left: widgetEl.style.left, top: widgetEl.style.top })); } catch (e) {}
        }
        resizeDrag = null;
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
      }
    }

    // 핸들에 이벤트 바인딩
    const handles = document.querySelectorAll('.resize-handle');

    handles.forEach(handle => {
      // data-direction 우선, fallback으로 클래스명 사용
      let direction = handle.dataset.direction || '';
      if (!direction) {
        if (handle.classList.contains('handle-top')) direction = 'top';
        else if (handle.classList.contains('handle-bottom')) direction = 'bottom';
        else if (handle.classList.contains('handle-left')) direction = 'left';
        else if (handle.classList.contains('handle-right')) direction = 'right';
      }

      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        startResize(direction, e.clientX, e.clientY);
      });

      handle.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        startResize(direction, t.clientX, t.clientY);
      }, { passive: false });
    });

    // 글로벌 마우스/터치 이벤트
    document.addEventListener('mousemove', (e) => {
      if (resizeDrag) {
        e.preventDefault();
        moveResize(e.clientX, e.clientY);
      }
    });

    document.addEventListener('mouseup', endResize);
    document.addEventListener('mouseleave', endResize);

    document.addEventListener('touchmove', (e) => {
      if (resizeDrag) {
        const t = e.touches[0];
        moveResize(t.clientX, t.clientY);
      }
    }, { passive: true });

    document.addEventListener('touchend', endResize);
    document.addEventListener('touchcancel', endResize);

    // 초기 크기 적용
    applyCardSize();

    /* ============================================
       위치 이동 (카드 빈 영역 드래그)
       ============================================ */
    const POS_KEY = 'nosion-routine-tracker-pos-v1';
    const widgetEl = document.getElementById('widget');

    let offsetX = 0;
    let offsetY = 0;
    let moveDrag = null;

    // localStorage 위치 로드
    try {
      const savedPos = localStorage.getItem(POS_KEY);
      if (savedPos) {
        const p = JSON.parse(savedPos);
        if (typeof p.x === 'number') offsetX = p.x;
        if (typeof p.y === 'number') offsetY = p.y;
      }
    } catch (e) {}

    function applyPosition() {
      widgetEl.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
    }

    function savePosition() {
      try {
        localStorage.setItem(POS_KEY, JSON.stringify({ x: offsetX, y: offsetY }));
      } catch (e) {}
    }

    // 드래그 시작 가능한 영역인지 판별 — 상단 헤더 영역에서만 허용
    function isDraggableTarget(target) {
      if (!target.closest) return false;
      if (!target.closest('.header')) return false;
      const blocked = ['.control-btn', '.resize-handle', 'button', '[contenteditable]'];
      for (const sel of blocked) {
        if (target.closest(sel)) return false;
      }
      return true;
    }

    function startMove(x, y) {
      moveDrag = {
        startX: x,
        startY: y,
        startOffsetX: offsetX,
        startOffsetY: offsetY
      };
      document.body.style.userSelect = 'none';
      cardEl.classList.add('dragging');
    }

    function doMove(x, y) {
      if (!moveDrag) return;
      offsetX = moveDrag.startOffsetX + (x - moveDrag.startX); offsetY = moveDrag.startOffsetY + (y - moveDrag.startY); { const __r = cardEl.getBoundingClientRect(); const __bL = __r.left - offsetX; const __bT = __r.top - offsetY; const __MIN = 40; offsetX = Math.max(-__bL - __r.width + __MIN, Math.min(window.innerWidth - __bL - __MIN, offsetX)); offsetY = Math.max(-__bT - __r.height + __MIN, Math.min(window.innerHeight - __bT - __MIN, offsetY)); } applyPosition();
    }

    function endMove() {
      if (moveDrag) {
        savePosition();
        moveDrag = null;
        document.body.style.userSelect = '';
        cardEl.classList.remove('dragging');
      }
    }

    // 초기 위치 적용
    applyPosition();

    // 카드에 mousedown — 단, 인터랙티브 요소는 제외
    cardEl.addEventListener('mousedown', (e) => {
      // 리사이즈 핸들은 별도 핸들러가 이미 처리
      if (!isDraggableTarget(e.target)) return;
      e.preventDefault();
      startMove(e.clientX, e.clientY);
    });

    cardEl.addEventListener('touchstart', (e) => {
      if (!isDraggableTarget(e.target)) return;
      const t = e.touches[0];
      startMove(t.clientX, t.clientY);
    }, { passive: true });

    // 글로벌 이벤트 (이미 등록된 mouseup/touchend는 endResize만 처리하므로 별도 추가)
    document.addEventListener('mousemove', (e) => {
      if (moveDrag) {
        e.preventDefault();
        doMove(e.clientX, e.clientY);
      }
    });

    document.addEventListener('mouseup', endMove);
    document.addEventListener('mouseleave', endMove);

    document.addEventListener('touchmove', (e) => {
      if (moveDrag) {
        const t = e.touches[0];
        doMove(t.clientX, t.clientY);
      }
    }, { passive: true });

    document.addEventListener('touchend', endMove);
    document.addEventListener('touchcancel', endMove);

    // 크기 초기화 버튼 — 크기와 위치 모두 원복
    const resizeResetBtn = document.getElementById('resizeResetBtn');
    resizeResetBtn.addEventListener('click', () => {
      cardWidth = DEFAULT_WIDTH;
      cardHeight = null;
      applyCardSize();
      saveSize();

      offsetX = 0;
      offsetY = 0;
      applyPosition();
      savePosition();
    });
  </script>
</body>
</html>
