<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노시언 루틴 트래커</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* ============================================
       노시언 위젯 시그니처 디자인 토큰
       ============================================ */
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --dot-on: hsl(220 13% 15%);
      --dot-off: hsl(220 10% 88%);
      --dot-today-ring: hsl(220 13% 15%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 위젯 래퍼 (노션 임베드 최적화) */
    .widget-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      position: relative;
      width: fit-content;
    }

    /* 카드 */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      width: 360px;
      position: relative;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    /* 드래그 영역은 헤더로 한정 */
    .card .header {
      cursor: grab;
    }

    .card.dragging .header {
      cursor: grabbing;
    }

    /* widget-wrapper에 transform 적용 (위치 이동) */
    .widget-wrapper.moved {
      transition: none;
    }

    .card .header {
      flex-shrink: 0;
    }

    .card .divider {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
    }

    /* 헤더 (좌: 이번 주 | 중앙: 트렌드 차트 | 우: 달성률) */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .header-left,
    .header-right {
      display: flex;
      flex-direction: column;
    }

    .header-right {
      align-items: flex-end;
    }

    /* 헤더 중앙: 7일 트렌드 차트 (빈 공간 자동 확장) */
    .header-center {
      flex: 1 1 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 1.5rem 6px;
      min-width: 60px;
    }

    .trend-chart {
      width: 100%;
      height: 36px;
      display: block;
      overflow: visible;
    }

    .trend-chart .trend-line {
      fill: none;
      stroke: var(--muted-foreground);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.45;
      vector-effect: non-scaling-stroke;
    }

    .week-label,
    .rate-label {
      font-size: 0.75rem;
      letter-spacing: 0.025em;
      color: var(--muted-foreground);
      margin-bottom: 0.375rem;
      font-weight: 400;
    }

    .stats {
      display: flex;
      align-items: baseline;
      gap: 0.125rem;
      line-height: 1;
    }

    .stats .done {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--muted-foreground);
    }

    .stats .divider-slash {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--muted-foreground);
      opacity: 0.6;
      margin: 0 0.125rem;
      font-variant-numeric: tabular-nums;
    }

    .stats .total {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
    }

    /* 우측 상단 전체 달성률 */
    .total-rate {
      display: flex;
      align-items: baseline;
      line-height: 1;
    }

    .total-rate .percent-num {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--muted-foreground);
    }

    .total-rate .percent-symbol {
      font-size: 1.5rem;
      font-weight: 400;
      padding-left: 2px;
      color: var(--muted-foreground);
      opacity: 0.6;
    }

    .total-rate.complete .percent-num {
      color: var(--foreground);
    }

    .total-rate.complete .percent-symbol {
      color: var(--foreground);
      opacity: 1;
    }

    /* 구분선 */
    .divider {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    /* 그리드: [습관명 56px] [도트 7개 1fr씩] [달성률 28px] */
    .tracker {
      display: grid;
      grid-template-columns: 56px repeat(7, minmax(0, 1fr)) auto;
      grid-template-rows: auto repeat(3, minmax(0, 1fr));
      gap: 0.625rem 0.5rem;
      align-items: center;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    /* 요일 헤더 (모든 요일 동일 톤) */
    .day-header {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      padding-bottom: 0.25rem;
      user-select: none;
    }

    /* 습관 이름 */
    .habit-name {
      font-size: 0.8125rem;
      color: var(--foreground);
      cursor: text;
      outline: none;
      padding: 2px 4px;
      margin-left: -4px;
      border-radius: 4px;
      transition: background var(--transition);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -0.005em;
      min-width: 0;
      position: relative;
      z-index: 5;
    }

    .habit-name:hover,
    .habit-name:focus {
      background: var(--muted);
    }

    .habit-name:empty::before {
      content: attr(data-placeholder);
      color: var(--muted-foreground);
      opacity: 0.4;
    }

    /* 도트 셀 */
    .dot-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--dot-off);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.15s ease, transform 0.15s ease;
      position: relative;
      flex-shrink: 0;
    }

    .dot:hover {
      transform: scale(1.15);
    }

    .dot.on {
      background: var(--dot-on);
    }

    /* 루틴별 달성률 */
    .habit-rate {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      text-align: right;
      user-select: none;
      transition: opacity var(--transition), color var(--transition);
      padding-left: 0.375rem;
      white-space: nowrap;
    }

    .habit-rate.complete {
      color: var(--foreground);
      opacity: 1;
      font-weight: 500;
    }

    /* 우측 컨트롤 (평소 살짝 보이고, 호버 시 명확) */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }

    .widget-wrapper:hover .controls {
      opacity: 1;
    }

    .control-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }

    .control-btn:hover:not(:disabled) {
      color: var(--foreground);
    }

    .control-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .control-btn svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    /* 커스텀 툴팁 (아이콘 좌측 등장) */
    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }

    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }

    /* ============================================
       4방향 리사이즈 핸들 (카드 호버 시에만 표시)
       ============================================ */
    .resize-handle {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      z-index: 20;
    }

    .resize-handle .bar {
      background: var(--border);
      transition: opacity var(--transition), background var(--transition),
                  width 0.15s ease, height 0.15s ease;
      border-radius: 999px;
      opacity: 0;
    }

    /* 카드 호버 시 4개 핸들 모두 살짝 보임 */
    .widget-wrapper:hover .resize-handle .bar {
      opacity: 1;
    }

    /* 핸들 직접 호버 시 진하게 + 굵게 */
    .resize-handle:hover .bar {
      background: var(--muted-foreground);
    }

    /* 상단 */
    .handle-top {
      top: 0;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 16px;
      cursor: ns-resize;
    }
    .handle-top .bar { width: 36px; height: 1px; }
    .handle-top:hover .bar { height: 3px; }

    /* 하단 */
    .handle-bottom {
      bottom: 0;
      left: 50%;
      transform: translate(-50%, 50%);
      width: 36px;
      height: 16px;
      cursor: ns-resize;
    }
    .handle-bottom .bar { width: 36px; height: 1px; }
    .handle-bottom:hover .bar { height: 3px; }

    /* 좌측 */
    .handle-left {
      left: 0;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 36px;
      cursor: ew-resize;
    }
    .handle-left .bar { width: 1px; height: 36px; }
    .handle-left:hover .bar { width: 3px; }

    /* 우측 */
    .handle-right {
      right: 0;
      top: 50%;
      transform: translate(50%, -50%);
      width: 16px;
      height: 36px;
      cursor: ew-resize;
    }
    .handle-right .bar { width: 1px; height: 36px; }
    .handle-right:hover .bar { width: 3px; }

    /* 리셋 확인 다이얼로그 */
    .reset-confirm {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      z-index: 100;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
      min-width: 200px;
    }

    .reset-confirm.show { display: flex; }

    .reset-confirm p {
      font-size: 0.8125rem;
      color: var(--foreground);
      text-align: center;
      letter-spacing: -0.005em;
    }

    .reset-confirm .actions {
      display: flex;
      gap: 0.5rem;
    }

    .reset-confirm button {
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.375rem 0.875rem;
      border-radius: 0.375rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--foreground);
      cursor: pointer;
      transition: all var(--transition);
    }

    .reset-confirm button:hover { background: var(--muted); }

    .reset-confirm button.danger {
      background: var(--foreground);
      color: var(--card);
      border-color: var(--foreground);
    }

    .reset-confirm button.danger:hover { opacity: 0.85; }
      /* unify-resize: 내용은 고정폭, 카드를 키우면 바깥 여백만 늘어남 */
    .card {
      align-items: safe center;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: inherit;
      width: 100%;
    }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동 + 8방향 리사이즈) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      position: absolute; width: auto; height: auto;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; left: auto; bottom: auto;
      display: flex; flex-direction: row; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; padding: 0; }
    #card.card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .rz { position: absolute; z-index: 20; touch-action: none; }
    .rz-n { top: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-s { bottom: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-e { top: 0; bottom: 0; right: 0; width: 7px; cursor: ew-resize; }
    .rz-w { top: 0; bottom: 0; left: 0; width: 7px; cursor: ew-resize; }
    .rz-ne, .rz-nw, .rz-se, .rz-sw { width: 14px; height: 14px; z-index: 21; }
    .rz-ne { top: 0; right: 0; cursor: nesw-resize; }
    .rz-nw { top: 0; left: 0; cursor: nwse-resize; }
    .rz-se { bottom: 0; right: 0; cursor: nwse-resize; }
    .rz-sw { bottom: 0; left: 0; cursor: nesw-resize; }
    .rz-e::after, .rz-w::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 2px; height: 28px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    .rz-n::after, .rz-s::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 2px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    #card.card:hover .rz-n::after, #card.card:hover .rz-s::after, #card.card:hover .rz-e::after, #card.card:hover .rz-w::after { opacity: 0.7; }
    .rz:hover::after { background: var(--muted-foreground) !important; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-body">

      <!-- 헤더 (좌: 이번 주 | 중앙: 7일 트렌드 | 우: 달성률) -->
      <div class="header">
        <div class="header-left">
          <div class="week-label" id="weekLabel">이번 주</div>
          <div class="stats">
            <span class="done" id="statsDone">0</span>
            <span class="divider-slash">/</span>
            <span class="total" id="statsTotal">21</span>
          </div>
        </div>

        <div class="header-center">
          <svg class="trend-chart" viewBox="0 0 100 30" preserveAspectRatio="none" aria-hidden="true">
            <path class="trend-line" id="trendLine" d="" />
          </svg>
        </div>

        <div class="header-right">
          <div class="rate-label">달성률</div>
          <div class="total-rate" id="totalRate">
            <span class="percent-num" id="percentNum">0</span>
            <span class="percent-symbol">%</span>
          </div>
        </div>
      </div>

      <!-- 트래커 그리드 -->
      <div class="divider">
        <div class="tracker" id="tracker"></div>
      </div>

      <!-- 리셋 확인 다이얼로그 -->
      <div class="reset-confirm" id="resetConfirm">
        <p>이번 주 기록을 초기화할까요?</p>
        <div class="actions">
          <button id="cancelReset">취소</button>
          <button class="danger" id="confirmReset">초기화</button>
        </div>
      </div>

      <!-- 4방향 리사이즈 핸들 -->
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="크기 초기화" title="크기 초기화"
              aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="control-btn" id="resetBtn"
              data-tooltip="이번 주 초기화" title="이번 주 초기화"
              aria-label="이번 주 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
      </button>
    </div>

      <div class="rz rz-n"  data-rz="n"></div>
      <div class="rz rz-s"  data-rz="s"></div>
      <div class="rz rz-e"  data-rz="e"></div>
      <div class="rz rz-w"  data-rz="w"></div>
      <div class="rz rz-ne" data-rz="ne"></div>
      <div class="rz rz-nw" data-rz="nw"></div>
      <div class="rz rz-se" data-rz="se"></div>
      <div class="rz rz-sw" data-rz="sw"></div>
</div>

    <!-- 우측 컨트롤 (호버 등장) -->

  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ============================================
       노시언 루틴 트래커 - 로직
       ============================================ */
    const STORAGE_KEY = 'nosion-routine-tracker-v1';
    const DAYS_KO = ['월', '화', '수', '목', '금', '토', '일'];
    const HABITS_COUNT = 3;
    const DAYS_COUNT = 7;

    // 이번 주 월요일 키 (YYYY-MM-DD)
    function getMondayKey(date = new Date()) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    function getTodayIndex() {
      const d = new Date().getDay();
      return d === 0 ? 6 : d - 1;
    }

    const defaultState = () => ({
      weekKey: getMondayKey(),
      habits: ['운동', '독서', '명상'],
      data: Array.from({ length: HABITS_COUNT }, () => Array(DAYS_COUNT).fill(false))
    });

    let state = defaultState();
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.weekKey !== state.weekKey) {
          state = {
            weekKey: state.weekKey,
            habits: parsed.habits || state.habits,
            data: Array.from({ length: HABITS_COUNT }, () => Array(DAYS_COUNT).fill(false))
          };
        } else {
          state = {
            weekKey: parsed.weekKey,
            habits: parsed.habits && parsed.habits.length === HABITS_COUNT
              ? parsed.habits
              : state.habits,
            data: parsed.data && parsed.data.length === HABITS_COUNT
              ? parsed.data.map(row => row && row.length === DAYS_COUNT ? row : Array(DAYS_COUNT).fill(false))
              : state.data
          };
        }
      }
    } catch (e) {
      console.error('localStorage load error:', e);
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }

    const trackerEl = document.getElementById('tracker');
    const statsDoneEl = document.getElementById('statsDone');
    const statsTotalEl = document.getElementById('statsTotal');
    const percentNumEl = document.getElementById('percentNum');
    const totalRateEl = document.getElementById('totalRate');
    const trendLineEl = document.getElementById('trendLine');
    const resetBtn = document.getElementById('resetBtn');
    const resetConfirm = document.getElementById('resetConfirm');
    const cancelReset = document.getElementById('cancelReset');
    const confirmReset = document.getElementById('confirmReset');

    const rateRefs = [];

    function calcHabitRate(h) {
      return state.data[h].filter(Boolean).length;
    }

    function calcTotalStats() {
      let done = 0;
      for (let h = 0; h < HABITS_COUNT; h++) done += calcHabitRate(h);
      return { done, total: HABITS_COUNT * DAYS_COUNT };
    }

    function updateRowRate(h) {
      const rate = calcHabitRate(h);
      const rateEl = rateRefs[h];
      if (!rateEl) return;
      rateEl.textContent = `${rate}/${DAYS_COUNT}`;
      rateEl.classList.toggle('complete', rate === DAYS_COUNT);
    }

    /**
     * 점들을 부드러운 곡선 path로 변환
     * Catmull-Rom 스플라인을 cubic Bezier로 변환
     */
    function pointsToSmoothPath(pts, tension = 0.2) {
      if (pts.length === 0) return '';
      if (pts.length === 1) {
        const [x, y] = pts[0];
        // 점 1개일 때는 짧은 가로선 (round linecap으로 점처럼 보임)
        return `M ${x.toFixed(2)},${y.toFixed(2)} L ${(x + 0.5).toFixed(2)},${y.toFixed(2)}`;
      }

      let d = `M ${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`;

      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[i + 2] || p2;

        const c1x = p1[0] + (p2[0] - p0[0]) * tension;
        const c1y = p1[1] + (p2[1] - p0[1]) * tension;
        const c2x = p2[0] - (p3[0] - p1[0]) * tension;
        const c2y = p2[1] - (p3[1] - p1[1]) * tension;

        d += ` C ${c1x.toFixed(2)},${c1y.toFixed(2)} ${c2x.toFixed(2)},${c2y.toFixed(2)} ${p2[0].toFixed(2)},${p2[1].toFixed(2)}`;
      }

      return d;
    }

    function updateTrendChart() {
      const todayIdx = getTodayIndex();
      // 월요일(0)부터 오늘까지 일별 완료 합계
      const dailySums = [];
      for (let d = 0; d <= todayIdx; d++) {
        let sum = 0;
        for (let h = 0; h < HABITS_COUNT; h++) {
          if (state.data[h][d]) sum++;
        }
        dailySums.push(sum);
      }

      // viewBox 0 0 100 30 기준
      // x: 0 ~ 100 (DAYS_COUNT=7 등분)
      // y: 28 (값 0) ~ 4 (값 HABITS_COUNT=3) — 위아래 4px 패딩
      const Y_BOTTOM = 28;
      const Y_TOP = 4;
      const VALUE_RANGE = HABITS_COUNT;

      const points = dailySums.map((v, i) => {
        const x = (i / (DAYS_COUNT - 1)) * 100;
        const y = Y_BOTTOM - (v / VALUE_RANGE) * (Y_BOTTOM - Y_TOP);
        return [x, y];
      });

      trendLineEl.setAttribute('d', pointsToSmoothPath(points, 0.2));
    }

    function updateTotalStats() {
      const { done, total } = calcTotalStats();
      statsDoneEl.textContent = done;
      statsTotalEl.textContent = total;
      const percent = total > 0 ? Math.round((done / total) * 100) : 0;
      percentNumEl.textContent = percent;
      totalRateEl.classList.toggle('complete', percent === 100);
      updateTrendChart();
    }

    function renderTracker() {
      trackerEl.innerHTML = '';
      rateRefs.length = 0;
      const todayIdx = getTodayIndex();

      // 1행: 빈 셀 + 요일 7개 + 빈 셀
      trackerEl.appendChild(document.createElement('div'));

      DAYS_KO.forEach((day) => {
        const dh = document.createElement('div');
        dh.className = 'day-header';
        dh.textContent = day;
        trackerEl.appendChild(dh);
      });

      trackerEl.appendChild(document.createElement('div'));

      // 2~4행: 습관 + 도트 7개 + 달성률
      for (let h = 0; h < HABITS_COUNT; h++) {
        const name = document.createElement('div');
        name.className = 'habit-name';
        name.contentEditable = 'true';
        name.spellcheck = false;
        name.dataset.placeholder = '습관 ' + (h + 1);
        name.textContent = state.habits[h] || '';

        name.addEventListener('blur', () => {
          const text = name.textContent.trim().slice(0, 8);
          state.habits[h] = text || ('습관 ' + (h + 1));
          name.textContent = state.habits[h];
          save();
        });

        name.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); name.blur(); }
        });

        trackerEl.appendChild(name);

        for (let d = 0; d < DAYS_COUNT; d++) {
          const cell = document.createElement('div');
          cell.className = 'dot-cell';

          const dot = document.createElement('button');
          dot.className = 'dot';
          dot.type = 'button';
          if (state.data[h][d]) dot.classList.add('on');
          if (d === todayIdx) dot.classList.add('today-marker');
          dot.setAttribute('aria-label',
            `${state.habits[h]} ${DAYS_KO[d]}요일 ${state.data[h][d] ? '완료' : '미완료'}`
          );

          dot.addEventListener('click', () => {
            state.data[h][d] = !state.data[h][d];
            save();
            dot.classList.toggle('on');
            updateRowRate(h);
            updateTotalStats();
          });

          cell.appendChild(dot);
          trackerEl.appendChild(cell);
        }

        // 달성률 (행 우측 끝)
        const rate = document.createElement('div');
        rate.className = 'habit-rate';
        const rateNum = calcHabitRate(h);
        rate.textContent = `${rateNum}/${DAYS_COUNT}`;
        if (rateNum === DAYS_COUNT) rate.classList.add('complete');
        trackerEl.appendChild(rate);
        rateRefs[h] = rate;
      }
    }

    // 리셋 흐름
    resetBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      resetConfirm.classList.add('show');
    });

    cancelReset.addEventListener('click', () => {
      resetConfirm.classList.remove('show');
    });

    confirmReset.addEventListener('click', () => {
      state.data = Array.from({ length: HABITS_COUNT }, () => Array(DAYS_COUNT).fill(false));
      save();
      renderTracker();
      updateTotalStats();
      resetConfirm.classList.remove('show');
    });

    document.addEventListener('click', (e) => {
      if (resetConfirm.classList.contains('show')) {
        if (!resetConfirm.contains(e.target) && !resetBtn.contains(e.target)) {
          resetConfirm.classList.remove('show');
        }
      }
    });

    renderTracker();
    updateTotalStats();

    // 새 주 자동 감지 — 지난 주 기록은 history에 보관 후 새 주 시작
    setInterval(() => {
      const currentMonday = getMondayKey();
      if (state.weekKey && currentMonday !== state.weekKey) {
        if (!state.history) state.history = {};
        state.history[state.weekKey] = state.data;
        state.weekKey = currentMonday;
        state.data = Array.from({ length: HABITS_COUNT }, () => Array(DAYS_COUNT).fill(false));
        save();
        renderTracker();
        updateTotalStats();
      }
    }, 60000);


    /* ===================================================================
       드래그 이동 + 8방향 리사이즈 (frame{x,y,w,h} · Pointer Events)
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-routine-tracker-frame-v1', minW: 320, minH: 220, defaultW: 360 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, frame.w); frame.h = Math.max(MIN_H, frame.h);
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';

      /* ----- 8방향 리사이즈 (document 리스너) ----- */
      card.querySelectorAll('[data-rz]').forEach(handle => {
        handle.addEventListener('pointerdown', (e) => {
          if (active) return; active = true;
          e.preventDefault(); e.stopPropagation();
          const dir = handle.dataset.rz, sx = e.clientX, sy = e.clientY, f0 = { x: frame.x, y: frame.y, w: frame.w, h: frame.h };
          card.classList.add('resizing');
          const mv = (ev) => {
            const dx = ev.clientX - sx, dy = ev.clientY - sy;
            if (dir.includes('e')) frame.w = Math.max(MIN_W, f0.w + dx);
            if (dir.includes('s')) frame.h = Math.max(MIN_H, f0.h + dy);
            if (dir.includes('w')) { const nw = Math.max(MIN_W, f0.w - dx); frame.x = f0.x + (f0.w - nw); frame.w = nw; }
            if (dir.includes('n')) { const nh = Math.max(MIN_H, f0.h - dy); frame.y = f0.y + (f0.h - nh); frame.h = nh; }
            applyFrame();
          };
          const up = () => {
            document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
            card.classList.remove('resizing'); active = false; clampFrame(); applyFrame(); saveFrame();
          };
          document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
        });
      });

      /* ----- 드래그 이동 (이동 임계값으로 클릭과 충돌 방지) ----- */
      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-rz], [data-no-drag]')) return;
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        let started = false;
        const mv = (ev) => {
          const ddx = ev.clientX - dx0, ddy = ev.clientY - dy0;
          if (!started) {
            if (Math.abs(ddx) < 4 && Math.abs(ddy) < 4) return;
            started = true; active = true; card.classList.add('dragging');
          }
          frame.x = sx + ddx; frame.y = sy + ddy; applyFrame();
        };
        const up = () => {
          document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
          if (started) { card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame(); }
        };
        document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
      });

      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });
      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
</script>
</body>
</html>
