<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* ============================================
       노시언 위젯 시그니처 디자인 토큰
       ============================================ */
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      width: 360px;
      position: relative;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
      text-align: center;
    }

    .card.dragging { cursor: grabbing; }

    /* === 모드 탭 === */
    .mode-tabs {
      display: flex;
      justify-content: center;
      gap: 0.375rem;
      margin-bottom: 1.5rem;
    }

    .tab {
      font-family: inherit;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.025em;
      color: var(--muted-foreground);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3125rem 0.75rem;
      cursor: pointer;
      transition: background var(--transition), color var(--transition),
                  border-color var(--transition);
    }

    .tab:hover {
      background: var(--muted);
      color: var(--foreground);
    }

    .tab.active {
      background: var(--foreground);
      border-color: var(--foreground);
      color: var(--card);
    }

    /* === 세션 도트 === */
    .session-dots {
      display: flex;
      justify-content: center;
      gap: 0.375rem;
      margin-bottom: 1.5rem;
      min-height: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background var(--transition);
    }

    .dot.done { background: var(--foreground); }
    .dot.current { background: var(--muted-foreground); }

    /* === 링 타이머 === */
    .ring-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 1.5rem;
      flex-shrink: 0;
    }

    .ring-svg {
      width: 180px;
      height: 180px;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 3;
      opacity: 0.55;
    }

    .ring-progress {
      fill: none;
      stroke: var(--foreground);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s linear;
    }

    .ring-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      user-select: none;
    }

    .time-display {
      font-size: 2.5rem;
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .mode-label {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.375rem;
    }

    /* === 타이머 컨트롤 버튼 (노시언 .controls와 이름 충돌 회피: timer-controls) === */
    .timer-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.625rem;
      margin-bottom: 1.25rem;
    }

    .btn-main {
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.005em;
      color: var(--card);
      background: var(--foreground);
      border: 1px solid var(--foreground);
      border-radius: 999px;
      padding: 0.5rem 1.625rem;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .btn-main:hover { opacity: 0.85; }

    .btn-secondary {
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.005em;
      color: var(--muted-foreground);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4375rem 0.875rem;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .btn-secondary:hover {
      background: var(--muted);
      color: var(--foreground);
    }

    /* === 구분선 === */
    .divider {
      height: 1px;
      background: var(--border);
      opacity: 0.5;
      margin: 0 -0.25rem 1.125rem;
      flex-shrink: 0;
    }

    /* === 통계 === */
    .stats {
      display: flex;
      justify-content: center;
      gap: 2.25rem;
    }

    .stat-item { text-align: center; }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 0.6875rem;
      font-weight: 400;
      color: var(--muted-foreground);
      opacity: 0.7;
      margin-top: 0.25rem;
      letter-spacing: 0.03em;
    }

    /* === 우측 컨트롤 (노시언 시그니처) === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }

    .control-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }

    .control-btn:hover:not(:disabled) {
      color: var(--foreground);
    }

    .control-btn svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }

    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }
      /* unify-resize: 내용은 고정폭, 카드를 키우면 바깥 여백만 늘어남 */
    .card {
      align-items: safe center;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: inherit;
      width: 100%;
    }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동 + 8방향 리사이즈) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      position: absolute; width: auto; height: auto;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; left: auto; bottom: auto;
      display: flex; flex-direction: row; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; padding: 0; }
    #card.card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .rz { position: absolute; z-index: 20; touch-action: none; }
    .rz-n { top: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-s { bottom: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-e { top: 0; bottom: 0; right: 0; width: 7px; cursor: ew-resize; }
    .rz-w { top: 0; bottom: 0; left: 0; width: 7px; cursor: ew-resize; }
    .rz-ne, .rz-nw, .rz-se, .rz-sw { width: 14px; height: 14px; z-index: 21; }
    .rz-ne { top: 0; right: 0; cursor: nesw-resize; }
    .rz-nw { top: 0; left: 0; cursor: nwse-resize; }
    .rz-se { bottom: 0; right: 0; cursor: nwse-resize; }
    .rz-sw { bottom: 0; left: 0; cursor: nesw-resize; }
    .rz-e::after, .rz-w::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 2px; height: 28px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    .rz-n::after, .rz-s::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 2px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    #card.card:hover .rz-n::after, #card.card:hover .rz-s::after, #card.card:hover .rz-e::after, #card.card:hover .rz-w::after { opacity: 0.7; }
    .rz:hover::after { background: var(--muted-foreground) !important; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-body">

      <!-- 모드 탭 -->
      <div class="mode-tabs">
        <button class="tab active" id="tab-focus" type="button">집중</button>
        <button class="tab" id="tab-short" type="button">짧은 휴식</button>
        <button class="tab" id="tab-long" type="button">긴 휴식</button>
      </div>

      <!-- 세션 도트 -->
      <div class="session-dots" id="session-dots"></div>

      <!-- 링 타이머 -->
      <div class="ring-wrapper">
        <svg class="ring-svg" viewBox="0 0 180 180">
          <circle class="ring-bg" cx="90" cy="90" r="82"/>
          <circle class="ring-progress" id="ring" cx="90" cy="90" r="82"
            stroke-dasharray="515.2" stroke-dashoffset="0"/>
        </svg>
        <div class="ring-center">
          <div class="time-display" id="time-display">25:00</div>
          <div class="mode-label" id="mode-label">FOCUS</div>
        </div>
      </div>

      <!-- 컨트롤 버튼 -->
      <div class="timer-controls">
        <button class="btn-secondary" id="btn-reset" type="button">초기화</button>
        <button class="btn-main" id="btn-start" type="button">시작</button>
        <button class="btn-secondary" id="btn-skip" type="button">건너뛰기</button>
      </div>

      <div class="divider"></div>

      <!-- 통계 -->
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="stat-sessions">0</div>
          <div class="stat-label">완료 세션</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-focus">0</div>
          <div class="stat-label">집중 분</div>
        </div>
      </div>

      <!-- 4방향 리사이즈 핸들 -->
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="크기 초기화" title="크기 초기화"
              type="button" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

      <div class="rz rz-n"  data-rz="n"></div>
      <div class="rz rz-s"  data-rz="s"></div>
      <div class="rz rz-e"  data-rz="e"></div>
      <div class="rz rz-w"  data-rz="w"></div>
      <div class="rz rz-ne" data-rz="ne"></div>
      <div class="rz rz-nw" data-rz="nw"></div>
      <div class="rz rz-se" data-rz="se"></div>
      <div class="rz rz-sw" data-rz="sw"></div>
</div>

    <!-- 우측 컨트롤 -->

  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ============================================
       Pomodoro Timer — 로직
       ============================================ */
    const MODES = {
      focus: { label: 'FOCUS',       duration: 25 * 60, mins: 25 },
      short: { label: 'SHORT BREAK', duration: 5 * 60,  mins: 5 },
      long:  { label: 'LONG BREAK',  duration: 15 * 60, mins: 15 }
    };
    const CIRCUMFERENCE = 2 * Math.PI * 82; // ~515.2
    const STATS_KEY = 'nosion-pomodoro-timer-stats-v1';

    let mode = 'focus';
    let totalSecs = MODES.focus.duration;
    let remainSecs = totalSecs;
    let running = false;
    let intervalId = null;

    // 오늘 통계 (날짜 변경 시 자동 리셋)
    let focusDone = 0;
    let focusMins = 0;
    let todayKey = new Date().toDateString();
    try {
      const saved = JSON.parse(localStorage.getItem(STATS_KEY) || '{}');
      if (saved.date === todayKey) {
        focusDone = saved.focusDone || 0;
        focusMins = saved.focusMins || 0;
      }
    } catch (e) {}

    // 자정 넘어가면 통계 초기화. saveStats/load 직전 호출
    function refreshTodayKey() {
      const now = new Date().toDateString();
      if (now !== todayKey) {
        todayKey = now;
        focusDone = 0;
        focusMins = 0;
      }
    }
    function saveStats() {
      try {
        refreshTodayKey();
        localStorage.setItem(STATS_KEY, JSON.stringify({
          date: todayKey, focusDone, focusMins
        }));
      } catch (e) {}
    }

    const timeDisplayEl = document.getElementById('time-display');
    const modeLabelEl = document.getElementById('mode-label');
    const ringEl = document.getElementById('ring');
    const statSessionsEl = document.getElementById('stat-sessions');
    const statFocusEl = document.getElementById('stat-focus');
    const sessionDotsEl = document.getElementById('session-dots');
    const btnStartEl = document.getElementById('btn-start');
    const tabFocusEl = document.getElementById('tab-focus');
    const tabShortEl = document.getElementById('tab-short');
    const tabLongEl = document.getElementById('tab-long');

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateDisplay() {
      const m = Math.floor(remainSecs / 60);
      const s = remainSecs % 60;
      timeDisplayEl.textContent = `${pad(m)}:${pad(s)}`;

      // 링 진행 (남은 시간 = 채워진 비율)
      const progress = remainSecs / totalSecs;
      ringEl.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);

      // 통계
      statSessionsEl.textContent = focusDone;
      statFocusEl.textContent = focusMins;

      // 도트 (4세션 사이클)
      sessionDotsEl.innerHTML = '';
      const cycle = focusDone % 4;
      for (let i = 0; i < 4; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        if (i < cycle) dot.classList.add('done');
        else if (i === cycle && mode === 'focus') dot.classList.add('current');
        sessionDotsEl.appendChild(dot);
      }
    }

    function setMode(m) {
      if (running) return;
      mode = m;
      totalSecs = MODES[m].duration;
      remainSecs = totalSecs;

      tabFocusEl.classList.toggle('active', m === 'focus');
      tabShortEl.classList.toggle('active', m === 'short');
      tabLongEl.classList.toggle('active', m === 'long');
      modeLabelEl.textContent = MODES[m].label;
      btnStartEl.textContent = '시작';

      updateDisplay();
    }

    function toggleTimer() {
      if (running) {
        clearInterval(intervalId);
        running = false;
        btnStartEl.textContent = '계속';
      } else {
        running = true;
        btnStartEl.textContent = '일시정지';
        // 백그라운드 탭에서 setInterval이 throttling 되어 drift 발생 → endTime 기반 계산
        const endTime = Date.now() + remainSecs * 1000;
        intervalId = setInterval(() => {
          remainSecs = Math.max(0, Math.round((endTime - Date.now()) / 1000));
          updateDisplay();
          if (remainSecs <= 0) {
            clearInterval(intervalId);
            running = false;
            onComplete();
          }
        }, 1000);
      }
    }

    /**
     * 타이머가 자연 완료되었을 때 호출
     * (사용자가 끝까지 둔 경우 — 세션 카운트 증가)
     */
    function onComplete() {
      const completedMode = mode;  // setMode 호출 전에 캡처 (알림 텍스트 정확성)

      if (completedMode === 'focus') {
        focusDone++;
        focusMins += MODES.focus.mins;
        saveStats();
        // 4세션마다 긴 휴식, 나머지는 짧은 휴식
        if (focusDone % 4 === 0) setMode('long');
        else setMode('short');
      } else {
        setMode('focus');
      }

      // 알림 — 완료된 모드를 기준으로 텍스트 결정
      if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
        new Notification('타이머 완료', {
          body: completedMode === 'focus'
            ? '집중 시간이 끝났습니다. 휴식하세요.'
            : '휴식이 끝났습니다. 다시 집중할 시간입니다.',
          silent: false
        });
      }
    }

    function resetTimer() {
      clearInterval(intervalId);
      running = false;
      remainSecs = totalSecs;
      btnStartEl.textContent = '시작';
      updateDisplay();
    }

    /**
     * 건너뛰기 — 다음 모드로 진행하되 세션 카운트는 증가시키지 않음
     * (사용자가 의도적으로 건너뛴 것이므로 완료된 세션이 아님)
     */
    function skipTimer() {
      clearInterval(intervalId);
      running = false;

      // 다음 모드 결정 — onComplete의 사이클 로직만 재현
      if (mode === 'focus') {
        // 다음 카운트 가정 시점 기준으로 휴식 종류 결정 (실제 카운트는 증가 X)
        const nextFocusDone = focusDone + 1;
        if (nextFocusDone % 4 === 0) setMode('long');
        else setMode('short');
      } else {
        setMode('focus');
      }
    }

    tabFocusEl.addEventListener('click', (e) => { e.stopPropagation(); setMode('focus'); });
    tabShortEl.addEventListener('click', (e) => { e.stopPropagation(); setMode('short'); });
    tabLongEl.addEventListener('click', (e) => { e.stopPropagation(); setMode('long'); });
    btnStartEl.addEventListener('click', (e) => { e.stopPropagation(); toggleTimer(); });
    document.getElementById('btn-reset').addEventListener('click', (e) => { e.stopPropagation(); resetTimer(); });
    document.getElementById('btn-skip').addEventListener('click', (e) => { e.stopPropagation(); skipTimer(); });

    // 알림 권한 요청 (첫 사용자 인터랙션 시점에 한 번)
    if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
      btnStartEl.addEventListener('click', () => {
        if (Notification.permission === 'default') Notification.requestPermission();
      }, { once: true });
    }

    modeLabelEl.textContent = MODES[mode].label;
    updateDisplay();


    /* ===================================================================
       드래그 이동 + 8방향 리사이즈 (frame{x,y,w,h} · Pointer Events)
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-pomodoro-timer-frame-v1', minW: 300, minH: 360, defaultW: 360 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, Math.min(frame.w, window.innerWidth)); frame.h = Math.max(MIN_H, Math.min(frame.h, window.innerHeight));
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';

      /* ----- 8방향 리사이즈 (document 리스너) ----- */
      card.querySelectorAll('[data-rz]').forEach(handle => {
        handle.addEventListener('pointerdown', (e) => {
          if (active) return; active = true;
          e.preventDefault(); e.stopPropagation();
          const dir = handle.dataset.rz, sx = e.clientX, sy = e.clientY, f0 = { x: frame.x, y: frame.y, w: frame.w, h: frame.h };
          card.classList.add('resizing');
          const mv = (ev) => {
            const dx = ev.clientX - sx, dy = ev.clientY - sy;
            if (dir.includes('e')) frame.w = Math.max(MIN_W, f0.w + dx);
            if (dir.includes('s')) frame.h = Math.max(MIN_H, f0.h + dy);
            if (dir.includes('w')) { const nw = Math.max(MIN_W, f0.w - dx); frame.x = f0.x + (f0.w - nw); frame.w = nw; }
            if (dir.includes('n')) { const nh = Math.max(MIN_H, f0.h - dy); frame.y = f0.y + (f0.h - nh); frame.h = nh; }
            applyFrame();
          };
          const up = () => {
            document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
            card.classList.remove('resizing'); active = false; clampFrame(); applyFrame(); saveFrame();
          };
          document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
        });
      });

      /* ----- 드래그 이동 (이동 임계값으로 클릭과 충돌 방지) ----- */
      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-rz], [data-no-drag]')) return;
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        let started = false;
        const mv = (ev) => {
          const ddx = ev.clientX - dx0, ddy = ev.clientY - dy0;
          if (!started) {
            if (Math.abs(ddx) < 4 && Math.abs(ddy) < 4) return;
            started = true; active = true; card.classList.add('dragging');
          }
          frame.x = sx + ddx; frame.y = sy + ddy; applyFrame();
        };
        const up = () => {
          document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
          if (started) {
            card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame();
            const sc = (ce) => { ce.stopPropagation(); ce.preventDefault(); };
            window.addEventListener('click', sc, { capture: true, once: true });
            setTimeout(() => window.removeEventListener('click', sc, true), 0);
          }
        };
        document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
      });

      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });
      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
</script>
</body>
</html>
