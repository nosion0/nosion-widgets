<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일출·일몰</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --track: hsl(220 14% 90%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', sans-serif;
      background: var(--background); color: var(--foreground);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; word-break: keep-all;
    }
    body { padding: 1rem; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem 1.75rem; width: 340px; position: relative; box-shadow: none;
      display: flex; flex-direction: column; align-items: safe center;
      box-sizing: border-box; overflow: hidden; min-width: 0; min-height: 0;
    }
    .card.dragging { cursor: grabbing; }
    .card-body { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; width: 100%; }

    .caption { font-size: 0.6875rem; color: var(--muted-foreground); letter-spacing: 0.08em; text-transform: uppercase; user-select: none; }

    .arc-wrap { width: 100%; }
    .arc-svg { width: 100%; height: auto; display: block; overflow: visible; }
    .arc-svg .horizon { stroke: var(--border); stroke-width: 1.2; }
    .arc-svg .arc-base { fill: none; stroke: var(--track); stroke-width: 2.5; stroke-linecap: round; }
    .arc-svg .arc-prog { fill: none; stroke: var(--foreground); stroke-width: 2.5; stroke-linecap: round; }
    .arc-svg .sun-c { fill: var(--card); stroke: var(--foreground); stroke-width: 1.6; }
    .arc-svg .sun-ray { stroke: var(--foreground); stroke-width: 1.6; stroke-linecap: round; }
    .arc-svg .moon-c { fill: none; stroke: var(--muted-foreground); stroke-width: 1.6; stroke-linejoin: round; }

    .ends { display: flex; justify-content: space-between; width: 100%; margin-top: -0.25rem; }
    .end { display: flex; flex-direction: column; gap: 0.15rem; }
    .end.right { align-items: flex-end; }
    .end-label { font-size: 0.6875rem; color: var(--muted-foreground); letter-spacing: 0.02em; }
    .end-time { font-size: 1.0625rem; font-weight: 600; color: var(--foreground); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

    .status { font-size: 0.9375rem; color: var(--foreground); font-weight: 500; text-align: center; }
    .status .accent { font-variant-numeric: tabular-nums; }

    .divider { height: 1px; width: 100%; background: var(--border); opacity: 0.5; }

    .info-grid { display: flex; flex-direction: column; gap: 0.875rem; width: 100%; }
    .info-row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
    .info-label { font-size: 0.8125rem; color: var(--muted-foreground); }
    .info-value { font-size: 0.8125rem; color: var(--foreground); font-weight: 500; font-variant-numeric: tabular-nums; }

    .footer { font-size: 0.6875rem; color: var(--muted-foreground); opacity: 0.6; letter-spacing: 0.03em; text-align: center; user-select: none; position: relative; }
    .footer:hover { opacity: 0.8; }
    .city-selector { font: inherit; letter-spacing: inherit; background: none; border: none; color: inherit; cursor: pointer; padding: 0 2px; border-radius: 3px; transition: background var(--transition), color var(--transition); }
    .city-selector:hover { color: var(--foreground); background: var(--muted); }
    .city-selector.open { color: var(--foreground); }
    .city-sep { margin: 0 0.25rem; opacity: 0.6; }
    .pin { width: 0.85em; height: 0.85em; display: inline-block; vertical-align: -1.5px; margin-right: 3px; stroke: var(--foreground); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    .city-dropdown { position: absolute; bottom: calc(100% + 0.25rem); left: 50%; transform: translateX(-50%) translateY(4px); background: var(--card); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.3125rem; box-shadow: 0 4px 16px rgba(0,0,0,0.06); display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; min-width: 150px; z-index: 100; opacity: 0; pointer-events: none; visibility: hidden; transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s; }
    .city-dropdown.show { opacity: 1; pointer-events: auto; visibility: visible; transform: translateX(-50%) translateY(0); }
    .city-option { font-family: inherit; font-size: 0.75rem; color: var(--muted-foreground); background: none; border: none; cursor: pointer; padding: 0.375rem 0.625rem; border-radius: 0.25rem; text-align: center; transition: background var(--transition), color var(--transition); }
    .city-option:hover { background: var(--muted); color: var(--foreground); }
    .city-option.selected { color: var(--foreground); font-weight: 500; background: var(--muted); }

    /* 컨트롤 */
    .controls { display: flex; flex-direction: column; gap: 2px; opacity: 0; transition: opacity var(--transition); padding-top: 0.25rem; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; position: relative; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .control-btn[data-tooltip]::before, .control-btn[data-tooltip]::after { position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); opacity: 0; pointer-events: none; transition: opacity 0.15s ease 0s; z-index: 50; }
    .control-btn[data-tooltip]::before { content: attr(data-tooltip); background: var(--card); color: var(--foreground); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.3125rem 0.625rem; font-size: 0.6875rem; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .control-btn[data-tooltip]::after { content: ''; right: calc(100% + 3px); width: 5px; height: 5px; background: var(--card); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transform: translateY(-50%) rotate(-45deg); }
    .control-btn[data-tooltip]:hover::before, .control-btn[data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      position: absolute; width: auto; height: auto;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; left: auto; bottom: auto;
      display: flex; flex-direction: row; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; padding: 0; }
    #card.card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-body">
        <div class="caption">오늘의 해</div>

        <div class="arc-wrap">
          <svg class="arc-svg" viewBox="0 0 200 118" aria-hidden="true">
            <path class="arc-base" d="M20 100 A80 80 0 0 1 180 100"/>
            <path class="arc-prog" id="arcProg" d="M20 100 A80 80 0 0 1 180 100"/>
            <line class="horizon" x1="10" y1="100" x2="190" y2="100"/>
            <g id="sunMarker" style="display:none">
              <circle class="sun-c" cx="0" cy="0" r="6.5"/>
              <line class="sun-ray" x1="0" y1="-10.5" x2="0" y2="-13.5"/>
              <line class="sun-ray" x1="0" y1="10.5" x2="0" y2="13.5"/>
              <line class="sun-ray" x1="-10.5" y1="0" x2="-13.5" y2="0"/>
              <line class="sun-ray" x1="10.5" y1="0" x2="13.5" y2="0"/>
              <line class="sun-ray" x1="-7.6" y1="-7.6" x2="-9.7" y2="-9.7"/>
              <line class="sun-ray" x1="7.6" y1="7.6" x2="9.7" y2="9.7"/>
              <line class="sun-ray" x1="7.6" y1="-7.6" x2="9.7" y2="-9.7"/>
              <line class="sun-ray" x1="-7.6" y1="7.6" x2="-9.7" y2="9.7"/>
            </g>
            <path class="moon-c" id="nightMoon" style="display:none" d="M106 32a11 11 0 1 1-9-17 8.5 8.5 0 0 0 9 17z"/>
          </svg>
        </div>

        <div class="ends">
          <div class="end left">
            <span class="end-label">일출</span>
            <span class="end-time" id="sunriseTime">—</span>
          </div>
          <div class="end right">
            <span class="end-label">일몰</span>
            <span class="end-time" id="sunsetTime">—</span>
          </div>
        </div>

        <div class="status" id="status">—</div>

        <div class="divider"></div>

        <div class="info-grid">
          <div class="info-row"><span class="info-label">낮 길이</span><span class="info-value" id="dayLength">—</span></div>
          <div class="info-row"><span class="info-label">남중 시각</span><span class="info-value" id="solarNoon">—</span></div>
        </div>

        <div class="footer">
          <button class="city-selector" id="citySelector" type="button" aria-haspopup="true" aria-expanded="false" aria-label="도시 선택">서울</button>
          <span class="city-sep">·</span>
          <span id="footerDate">—</span>
          <div class="city-dropdown" id="cityDropdown" role="menu"></div>
        </div>
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn" data-tooltip="위치 초기화" title="위치 초기화" type="button" aria-label="카드 위치 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

</div>


  </div>

  <script>
    'use strict';
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
    const rad = Math.PI / 180;
    const ARC_R = 80, ARC_CX = 100, ARC_CY = 100, ARC_LEN = Math.PI * 80;

    const PIN_SVG = '<svg class="pin" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-6-5.5-6-10a6 6 0 0 1 12 0c0 4.5-6 10-6 10z"/><circle cx="12" cy="11" r="2"/></svg>';
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    /* ===== 태양 일출/일몰 (SunCalc 알고리즘, MIT) ===== */
    const dayMs = 86400000, J1970 = 2440588, J2000 = 2451545;
    const e = rad * 23.4397;
    function toJulian(d) { return d.valueOf() / dayMs - 0.5 + J1970; }
    function fromJulian(j) { return new Date((j + 0.5 - J1970) * dayMs); }
    function toDays(d) { return toJulian(d) - J2000; }
    function declination(l, b) { return Math.asin(Math.sin(b) * Math.cos(e) + Math.cos(b) * Math.sin(e) * Math.sin(l)); }
    function solarMeanAnomaly(d) { return rad * (357.5291 + 0.98560028 * d); }
    function eclipticLongitude(M) {
      const C = rad * (1.9148 * Math.sin(M) + 0.02 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M));
      return M + C + rad * 102.9372 + Math.PI;
    }
    const J0 = 0.0009;
    function julianCycle(d, lw) { return Math.round(d - J0 - lw / (2 * Math.PI)); }
    function approxTransit(Ht, lw, n) { return J0 + (Ht + lw) / (2 * Math.PI) + n; }
    function solarTransitJ(ds, M, L) { return J2000 + ds + 0.0053 * Math.sin(M) - 0.0069 * Math.sin(2 * L); }
    function hourAngle(h, phi, dec) { return Math.acos((Math.sin(h) - Math.sin(phi) * Math.sin(dec)) / (Math.cos(phi) * Math.cos(dec))); }

    function getSunTimes(date, lat, lng) {
      const lw = rad * -lng, phi = rad * lat, d = toDays(date);
      const n = julianCycle(d, lw);
      const ds = approxTransit(0, lw, n);
      const M = solarMeanAnomaly(ds);
      const L = eclipticLongitude(M);
      const dec = declination(L, 0);
      const Jnoon = solarTransitJ(ds, M, L);
      const h0 = -0.833 * rad;
      const w0 = hourAngle(h0, phi, dec);  // NaN이면 백야/극야
      if (isNaN(w0)) {
        const sunHigh = dec > 0 ? (lat > 0) : (lat < 0); // 태양이 늘 떠 있는지 대략 판단
        return { sunrise: null, sunset: null, solarNoon: fromJulian(Jnoon), polar: sunHigh ? 'day' : 'night' };
      }
      const Jset = solarTransitJ(approxTransit(w0, lw, n), M, L);
      const Jrise = Jnoon - (Jset - Jnoon);
      return { sunrise: fromJulian(Jrise), sunset: fromJulian(Jset), solarNoon: fromJulian(Jnoon), polar: null };
    }

    /* ===== 도시 / 위치 자동감지 ===== */
    const CITIES = [
      { name: '서울', lat: 37.57, lng: 126.98, tz: 'Asia/Seoul' },
      { name: '도쿄', lat: 35.68, lng: 139.65, tz: 'Asia/Tokyo' },
      { name: '뉴욕', lat: 40.71, lng: -74.01, tz: 'America/New_York' },
      { name: '런던', lat: 51.51, lng: -0.13, tz: 'Europe/London' },
      { name: '파리', lat: 48.86, lng: 2.35, tz: 'Europe/Paris' },
      { name: '두바이', lat: 25.20, lng: 55.27, tz: 'Asia/Dubai' },
      { name: '시드니', lat: -33.87, lng: 151.21, tz: 'Australia/Sydney' },
      { name: '상파울루', lat: -23.55, lng: -46.63, tz: 'America/Sao_Paulo' }
    ];
    const CITY_KEY = 'nosion-sun-city-v1';
    let manualName = null;
    try { manualName = localStorage.getItem(CITY_KEY); } catch (e) {}
    let autoLoc = null;
    let currentCity = CITIES[0];

    function resolveActive() {
      if (manualName) { const f = CITIES.find(c => c.name === manualName); if (f) return f; }
      return autoLoc || CITIES[0];
    }
    function applyActive() { currentCity = resolveActive(); buildCityDropdown(); update(); }

    function fetchJSON(url, ms) {
      let ctrl = null, to = null;
      try { ctrl = new AbortController(); to = setTimeout(() => ctrl.abort(), ms || 4500); } catch (e) {}
      return fetch(url, ctrl ? { signal: ctrl.signal } : undefined)
        .then(r => (r && r.ok) ? r.json() : null)
        .then(d => { if (to) clearTimeout(to); return d; })
        .catch(() => { if (to) clearTimeout(to); return null; });
    }
    function reverseKo(lat, lng) {
      const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=ko`;
      return fetchJSON(url, 4500).then(d => d ? (d.city || d.locality || d.principalSubdivision || null) : null);
    }
    function getAutoLocation() {
      return (function(){
        try {
          const __raw = localStorage.getItem('nosion-iploc-cache-v1');
          if (__raw) {
            const __c = JSON.parse(__raw);
            if (__c && __c.ts && (Date.now() - __c.ts) < 43200000 && __c.data) return Promise.resolve(__c.data);
          }
        } catch (e) {}
        return fetchJSON('https://ipapi.co/json/', 4500).then(__d => {
          if (__d && typeof __d.latitude === 'number' && typeof __d.longitude === 'number') {
            try { localStorage.setItem('nosion-iploc-cache-v1', JSON.stringify({ ts: Date.now(), data: __d })); } catch (e) {}
          }
          return __d;
        });
      })().then(d => {
        if (!d || typeof d.latitude !== 'number' || typeof d.longitude !== 'number') return null;
        const base = { name: d.city || '현재 위치', lat: d.latitude, lng: d.longitude, tz: d.timezone || undefined, auto: true };
        return reverseKo(base.lat, base.lng).then(ko => { if (ko) base.name = ko; return base; }).catch(() => base);
      });
    }

    /* ===== 렌더링 ===== */
    const arcProg = document.getElementById('arcProg');
    const sunMarker = document.getElementById('sunMarker');
    const nightMoon = document.getElementById('nightMoon');
    const sunriseTimeEl = document.getElementById('sunriseTime');
    const sunsetTimeEl = document.getElementById('sunsetTime');
    const statusEl = document.getElementById('status');
    const dayLengthEl = document.getElementById('dayLength');
    const solarNoonEl = document.getElementById('solarNoon');
    const citySelectorEl = document.getElementById('citySelector');
    const cityDropdownEl = document.getElementById('cityDropdown');
    const footerDateEl = document.getElementById('footerDate');

    function fmtTime(date, tz) {
      if (!date) return '—';
      return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: tz });
    }
    function fmtDur(ms) {
      if (ms < 0) ms = 0;
      const m = Math.round(ms / 60000);
      const h = Math.floor(m / 60);
      return `${h}시간 ${m % 60}분`;
    }
    function sunXY(f) {
      const theta = f * Math.PI;
      return { x: ARC_CX - ARC_R * Math.cos(theta), y: ARC_CY - ARC_R * Math.sin(theta) };
    }

    function update() {
      const now = new Date();
      const tz = currentCity.tz;
      const t = getSunTimes(now, currentCity.lat, currentCity.lng);

      sunriseTimeEl.textContent = fmtTime(t.sunrise, tz);
      sunsetTimeEl.textContent = fmtTime(t.sunset, tz);
      solarNoonEl.textContent = fmtTime(t.solarNoon, tz);

      // 극지 백야/극야
      if (!t.sunrise || !t.sunset) {
        sunMarker.style.display = 'none';
        nightMoon.style.display = t.polar === 'night' ? '' : 'none';
        arcProg.setAttribute('stroke-dasharray', `0 ${ARC_LEN}`);
        dayLengthEl.textContent = t.polar === 'day' ? '하루 종일 낮' : '하루 종일 밤';
        statusEl.textContent = t.polar === 'day' ? '해가 지지 않아요' : '해가 뜨지 않아요';
      } else {
        const sr = t.sunrise.getTime(), ss = t.sunset.getTime(), nw = now.getTime();
        dayLengthEl.textContent = fmtDur(ss - sr);

        if (nw >= sr && nw <= ss) {
          // 낮
          const f = (nw - sr) / (ss - sr);
          const p = sunXY(f);
          sunMarker.setAttribute('transform', `translate(${p.x.toFixed(1)} ${p.y.toFixed(1)})`);
          sunMarker.style.display = '';
          nightMoon.style.display = 'none';
          arcProg.setAttribute('stroke-dasharray', `${(f * ARC_LEN).toFixed(1)} ${ARC_LEN}`);
          statusEl.innerHTML = `일몰까지 <span class="accent">${escapeHtml(fmtDur(ss - nw))}</span>`;
        } else {
          // 밤
          sunMarker.style.display = 'none';
          nightMoon.style.display = '';
          arcProg.setAttribute('stroke-dasharray', `0 ${ARC_LEN}`);
          let nextRise;
          if (nw < sr) nextRise = sr;
          else nextRise = getSunTimes(new Date(nw + dayMs), currentCity.lat, currentCity.lng).sunrise;
          const diff = nextRise ? (nextRise.getTime() - nw) : -1;
          statusEl.innerHTML = diff >= 0 ? `일출까지 <span class="accent">${escapeHtml(fmtDur(diff))}</span>` : '해가 졌어요';
        }
      }

      citySelectorEl.innerHTML = (currentCity.auto ? PIN_SVG : '') + escapeHtml(currentCity.name);
      // 푸터 날짜도 선택 도시 시간대 기준
      const fm = +new Intl.DateTimeFormat('en-US', { timeZone: tz, month: 'numeric' }).format(now);
      const fd = +new Intl.DateTimeFormat('en-US', { timeZone: tz, day: 'numeric' }).format(now);
      const fw = new Intl.DateTimeFormat('ko-KR', { timeZone: tz, weekday: 'short' }).format(now);
      footerDateEl.textContent = `${fm}월 ${fd}일 (${fw})`;
    }

    /* ===== 드롭다운 ===== */
    function buildCityDropdown() {
      cityDropdownEl.innerHTML = '';
      const autoBtn = document.createElement('button');
      autoBtn.className = 'city-option';
      autoBtn.type = 'button';
      autoBtn.innerHTML = PIN_SVG + '현재 위치';
      autoBtn.setAttribute('role', 'menuitem');
      autoBtn.style.gridColumn = '1 / -1';
      if (!manualName) autoBtn.classList.add('selected');
      autoBtn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        manualName = null;
        try { localStorage.removeItem(CITY_KEY); } catch (er) {}
        closeCityDropdown();
        applyActive();
        if (!autoLoc) getAutoLocation().then(loc => { if (loc && !manualName) { autoLoc = loc; applyActive(); } });
      });
      cityDropdownEl.appendChild(autoBtn);
      CITIES.forEach(city => {
        const btn = document.createElement('button');
        btn.className = 'city-option';
        btn.type = 'button';
        btn.textContent = city.name;
        btn.setAttribute('role', 'menuitem');
        if (manualName === city.name) btn.classList.add('selected');
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          manualName = city.name;
          try { localStorage.setItem(CITY_KEY, city.name); } catch (er) {}
          closeCityDropdown();
          applyActive();
        });
        cityDropdownEl.appendChild(btn);
      });
    }
    function openCityDropdown() { cityDropdownEl.classList.add('show'); citySelectorEl.classList.add('open'); citySelectorEl.setAttribute('aria-expanded', 'true'); }
    function closeCityDropdown() { cityDropdownEl.classList.remove('show'); citySelectorEl.classList.remove('open'); citySelectorEl.setAttribute('aria-expanded', 'false'); }
    citySelectorEl.addEventListener('click', (ev) => { ev.stopPropagation(); if (cityDropdownEl.classList.contains('show')) closeCityDropdown(); else openCityDropdown(); });
    document.addEventListener('click', (ev) => { if (!cityDropdownEl.contains(ev.target) && ev.target !== citySelectorEl) closeCityDropdown(); });
    document.addEventListener('keydown', (ev) => { if (ev.key === 'Escape') closeCityDropdown(); });

    applyActive();
    if (!manualName) getAutoLocation().then(loc => { if (loc && !manualName) { autoLoc = loc; applyActive(); } });
    setInterval(update, 60 * 1000);


    /* ===================================================================
       드래그 이동 (frame{x,y} · Pointer Events)
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-sunrise-sunset-frame-v1', minW: 290, minH: 360, defaultW: 340 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, Math.min(frame.w, window.innerWidth)); frame.h = Math.max(MIN_H, Math.min(frame.h, window.innerHeight));
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';


      /* ----- 드래그 이동 (이동 임계값으로 클릭과 충돌 방지) ----- */
      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-no-drag]')) return;
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        let started = false;
        const mv = (ev) => {
          const ddx = ev.clientX - dx0, ddy = ev.clientY - dy0;
          if (!started) {
            if (Math.abs(ddx) < 4 && Math.abs(ddy) < 4) return;
            started = true; active = true; card.classList.add('dragging');
          }
          frame.x = sx + ddx; frame.y = sy + ddy; applyFrame();
        };
        const up = () => {
          document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
          if (started) {
            card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame();
            const sc = (ce) => { ce.stopPropagation(); ce.preventDefault(); };
            window.addEventListener('click', sc, { capture: true, once: true });
            setTimeout(() => window.removeEventListener('click', sc, true), 0);
          }
        };
        document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
      });

      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });
      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
</script>
</body>
