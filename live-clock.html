<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Clock</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* ============================================
       노시언 위젯 시그니처 디자인 토큰
       ============================================ */
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0; min-height: 0;
    }

    .card.dragging { cursor: grabbing; }

    /* === 시간 표시 영역 === */
    .clock-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      user-select: none;
    }

    .period {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      min-height: 0.875rem;  /* 24H 모드에서도 자리 유지 */
    }

    .period.hidden {
      visibility: hidden;
    }

    .time-wrapper {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.25rem;
    }

    .time-display {
      font-size: 3.75rem;             /* 60px — 더 차분하게 */
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .seconds {
      font-size: 1.625rem;            /* 26px */
      font-weight: 500;
      color: hsl(220 10% 65%);         /* 옅은 회색 */
      letter-spacing: -0.02em;
      line-height: 1;
      margin-left: 0.125rem;
      font-variant-numeric: tabular-nums;
      transition: opacity var(--transition);
    }

    .seconds.hidden {
      display: none;
    }

    /* === 구분선 === */
    .divider {
      height: 1px;
      background: var(--border);
      opacity: 0.5;
      margin: 1.5rem 0 1.25rem;
      flex-shrink: 0;
    }

    /* === 날짜 영역 === */
    .date-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
      user-select: none;
    }

    .date-text {
      font-size: 0.9375rem;
      font-weight: 500;
      color: hsl(220 10% 42%);
      letter-spacing: -0.005em;
      font-variant-numeric: tabular-nums;
    }

    .day-text {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      opacity: 0.7;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* === 포맷 토글 (노시언 톤) === */
    .format-toggle {
      display: flex;
      justify-content: center;
      gap: 0.375rem;
      margin-top: 1.5rem;
      opacity: 0.35;
      transition: opacity var(--transition);
    }

    .toggle-btn {
      font-family: inherit;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.025em;
      color: var(--muted-foreground);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.25rem 0.625rem;
      cursor: pointer;
      transition: background var(--transition), color var(--transition),
                  border-color var(--transition);
    }

    .toggle-btn:hover {
      background: var(--muted);
      color: var(--foreground);
    }

    .toggle-btn.active {
      background: var(--foreground);
      border-color: var(--foreground);
      color: var(--card);
    }

    /* === 우측 컨트롤 === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }

    .control-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }

    .control-btn:hover:not(:disabled) {
      color: var(--foreground);
    }

    .control-btn svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }

    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }
      /* unify-resize: 내용은 고정폭, 카드를 키우면 바깥 여백만 늘어남 */
    .card {
      align-items: safe center;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: inherit;
      width: 100%;
    }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    /* .controls를 카드 바깥 우측으로 — 마우스 오버 시 노출 */
    #w.card { overflow: visible; }
    #w .controls { position: absolute; top: 0.5rem; right: -34px; left: auto; bottom: auto;
      display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: opacity 0.2s ease; z-index: 30; padding: 0; pointer-events: none; }
    #w:hover .controls { opacity: 1; pointer-events: auto; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
  
    /* === NOSION FRAME SPEC (드래그 이동 + 8방향 리사이즈) === */
    html,body{background:transparent;height:100%;overflow:hidden;}
    *{box-sizing:border-box;}
    .stage{position:fixed;inset:0;}
    .card{position:absolute;display:flex;flex-direction:column;touch-action:none;container-type:size;}
    .card.dragging,.card.resizing{user-select:none;box-shadow:0 12px 36px rgba(55,53,47,.16);}
    .whead{flex:none;cursor:grab;min-height:20px;width:100%;position:relative;z-index:2;background:inherit;}
    .whead:active{cursor:grabbing;}
    .wbody{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;overflow:hidden;width:100%;align-self:stretch;}
    .rz{position:absolute;z-index:5;}
    .rz.n{top:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.s{bottom:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.e{right:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.w{left:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.ne{top:-5px;right:-5px;width:14px;height:14px;cursor:nesw-resize;}
    .rz.nw{top:-5px;left:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.se{bottom:-5px;right:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.sw{bottom:-5px;left:-5px;width:14px;height:14px;cursor:nesw-resize;}
  </style>
</head>
<body>
  <div class="stage">
    <div class="card" id="w">
      <div class="whead"></div>
      <div class="wbody">

      <!-- 시간 표시 -->
      <div class="clock-display">
        <div class="period" id="period">AM</div>
        <div class="time-wrapper">
          <div class="time-display" id="time">12:00</div>
          <div class="seconds" id="seconds">00</div>
        </div>
      </div>

      <!-- 구분선 -->
      <div class="divider"></div>

      <!-- 날짜 -->
      <div class="date-display">
        <div class="date-text" id="date">—</div>
        <div class="day-text" id="day">—</div>
      </div>

      <!-- 포맷 토글 -->
      <div class="format-toggle">
        <button class="toggle-btn active" id="btn-12" type="button">12H</button>
        <button class="toggle-btn" id="btn-24" type="button">24H</button>
        <button class="toggle-btn active" id="btn-sec" type="button">초</button>
      </div>

      <!-- 4방향 리사이즈 핸들 -->
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="위치 초기화" title="위치 초기화"
              type="button" aria-label="카드 위치 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

</div>

    <!-- 우측 컨트롤 -->

  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ============================================
       Live Clock — 로직
       ============================================ */
    const FORMAT_KEY = 'nosion-live-clock-format-v1';
    const SECONDS_KEY = 'nosion-live-clock-seconds-v1';

    const DAYS_EN = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];

    let format = 12;
    let showSeconds = true;

    try {
      const sf = localStorage.getItem(FORMAT_KEY);
      if (sf === '12' || sf === '24') format = parseInt(sf);
      const ss = localStorage.getItem(SECONDS_KEY);
      if (ss === '0') showSeconds = false;
    } catch (e) {}

    const periodEl = document.getElementById('period');
    const timeEl = document.getElementById('time');
    const secondsEl = document.getElementById('seconds');
    const dateEl = document.getElementById('date');
    const dayEl = document.getElementById('day');
    const btn12 = document.getElementById('btn-12');
    const btn24 = document.getElementById('btn-24');
    const btnSec = document.getElementById('btn-sec');

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      const h24 = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();

      if (format === 12) {
        const h12 = h24 % 12 || 12;
        timeEl.textContent = `${h12}:${pad(m)}`;
        periodEl.textContent = h24 < 12 ? 'AM' : 'PM';
        periodEl.classList.remove('hidden');
      } else {
        timeEl.textContent = `${pad(h24)}:${pad(m)}`;
        periodEl.classList.add('hidden');
      }

      secondsEl.textContent = pad(s);

      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const date = now.getDate();
      dateEl.textContent = `${year}년 ${month}월 ${date}일`;
      dayEl.textContent = DAYS_EN[now.getDay()];
    }

    function applyFormatUI() {
      btn12.classList.toggle('active', format === 12);
      btn24.classList.toggle('active', format === 24);
    }

    function applySecondsUI() {
      secondsEl.classList.toggle('hidden', !showSeconds);
      btnSec.classList.toggle('active', showSeconds);
    }

    function setFormat(f) {
      format = f;
      applyFormatUI();
      try { localStorage.setItem(FORMAT_KEY, String(f)); } catch (e) {}
      tick();
    }

    function toggleSeconds() {
      showSeconds = !showSeconds;
      applySecondsUI();
      try { localStorage.setItem(SECONDS_KEY, showSeconds ? '1' : '0'); } catch (e) {}
    }

    btn12.addEventListener('click', (e) => { e.stopPropagation(); setFormat(12); });
    btn24.addEventListener('click', (e) => { e.stopPropagation(); setFormat(24); });
    btnSec.addEventListener('click', (e) => { e.stopPropagation(); toggleSeconds(); });

    applyFormatUI();
    applySecondsUI();
    tick();
    setInterval(tick, 1000);
</script>
  <script>
(function(){
  var card=document.getElementById('w');
  var head=card.querySelector('.whead');
  var KEY='nosion-live-clock-frame', MINW=230, MINH=200, DEFW=340, DEFH=300;
  ['n','s','e','w','ne','nw','se','sw'].forEach(function(d){
    var el=document.createElement('div');el.className='rz '+d;el.setAttribute('data-rz',d);card.appendChild(el);
  });
  var frame=load();
  function load(){try{var f=JSON.parse(localStorage.getItem(KEY));if(f&&f.w)return f;}catch(e){}
    var w=Math.min(DEFW,window.innerWidth-28),h=Math.min(DEFH,window.innerHeight-28);
    return{x:(window.innerWidth-w)/2,y:Math.max(14,(window.innerHeight-h)/2),w:w,h:h};}
  function clamp(){frame.w=Math.max(MINW,Math.min(frame.w,window.innerWidth-8));
    frame.h=Math.max(MINH,Math.min(frame.h,window.innerHeight-8));
    frame.x=Math.max(4,Math.min(frame.x,window.innerWidth-frame.w-4));
    frame.y=Math.max(4,Math.min(frame.y,window.innerHeight-frame.h-4));}
  function apply(){clamp();card.style.left=frame.x+'px';card.style.top=frame.y+'px';
    card.style.width=frame.w+'px';card.style.height=frame.h+'px';}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(frame));}catch(e){}}
  head.addEventListener('pointerdown',function(e){
    if(e.target.closest('button,input,a,.seg,.ic,.pill,[data-nodrag]'))return;drag(e);});
  card.querySelectorAll('.rz').forEach(function(hd){
    hd.addEventListener('pointerdown',function(e){resize(e,hd.getAttribute('data-rz'));});});
  function drag(e){e.preventDefault();card.classList.add('dragging');
    var sx=e.clientX,sy=e.clientY,ox=frame.x,oy=frame.y;
    function m(ev){frame.x=ox+(ev.clientX-sx);frame.y=oy+(ev.clientY-sy);apply();}
    function u(){card.classList.remove('dragging');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  function resize(e,dir){e.preventDefault();e.stopPropagation();card.classList.add('resizing');
    var sx=e.clientX,sy=e.clientY,o={x:frame.x,y:frame.y,w:frame.w,h:frame.h};
    function m(ev){var dx=ev.clientX-sx,dy=ev.clientY-sy;
      if(dir.indexOf('e')>=0){frame.w=Math.max(MINW,o.w+dx);}
      if(dir.indexOf('s')>=0){frame.h=Math.max(MINH,o.h+dy);}
      if(dir.indexOf('w')>=0){var nw=Math.max(MINW,o.w-dx);frame.x=o.x+(o.w-nw);frame.w=nw;}
      if(dir.indexOf('n')>=0){var nh=Math.max(MINH,o.h-dy);frame.y=o.y+(o.h-nh);frame.h=nh;}
      apply();}
    function u(){card.classList.remove('resizing');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  window.addEventListener('resize',apply);
  apply();
})();
</script>
</body>
</html>
