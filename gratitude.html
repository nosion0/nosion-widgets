<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>감사 일기</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', sans-serif;
      background: var(--background); color: var(--foreground);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; word-break: keep-all;
    }
    body { padding: 1rem; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .widget-wrapper { display: flex; align-items: flex-start; gap: 0.5rem; position: relative; width: fit-content; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem 1.75rem; width: 320px; position: relative; box-shadow: none;
      display: flex; flex-direction: column; align-items: safe center;
      box-sizing: border-box; overflow: hidden; min-width: 0; min-height: 0;
    }
    .card.dragging { cursor: grabbing; }
    .card-body { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 280px; }

    .head { display: flex; align-items: baseline; justify-content: space-between; }
    .title { font-size: 1.0625rem; font-weight: 600; color: var(--foreground); letter-spacing: -0.01em; }
    .date { font-size: 0.6875rem; color: var(--muted-foreground); font-variant-numeric: tabular-nums; }

    .prompt { font-size: 0.8125rem; color: var(--muted-foreground); }
    .today-input {
      width: 100%; border: none; border-bottom: 1.5px solid var(--border); outline: none; background: none;
      font-family: inherit; font-size: 0.9375rem; color: var(--foreground); padding: 0.4rem 0; line-height: 1.5;
      transition: border-color var(--transition);
    }
    .today-input:focus { border-bottom-color: var(--foreground); }
    .today-input::placeholder { color: var(--muted-foreground); opacity: 0.6; }
    .saved-tag { font-size: 0.625rem; color: var(--muted-foreground); opacity: 0; transition: opacity var(--transition); }
    .saved-tag.show { opacity: 0.7; }

    .divider { height: 1px; width: 100%; background: var(--border); opacity: 0.5; }
    .past-label { font-size: 0.625rem; color: var(--muted-foreground); letter-spacing: 0.08em; text-transform: uppercase; }
    .past-list { display: flex; flex-direction: column; gap: 0.7rem; max-height: 200px; overflow-y: auto; margin: 0 -0.4rem; padding: 0 0.4rem; }
    .past-item { display: flex; flex-direction: column; gap: 0.15rem; }
    .past-date { font-size: 0.625rem; color: var(--muted-foreground); }
    .past-text { font-size: 0.8125rem; color: var(--foreground); line-height: 1.5; word-break: break-word; }
    .empty { font-size: 0.75rem; color: var(--muted-foreground); opacity: 0.7; text-align: center; padding: 0.5rem 0; }

    /* 컨트롤 */
    .controls { display: flex; flex-direction: column; gap: 2px; opacity: 0; transition: opacity var(--transition); padding-top: 0.25rem; }
    .widget-wrapper:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; position: relative; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .control-btn[data-tooltip]::before, .control-btn[data-tooltip]::after { position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); opacity: 0; pointer-events: none; transition: opacity 0.15s ease 0s; z-index: 50; }
    .control-btn[data-tooltip]::before { content: attr(data-tooltip); background: var(--card); color: var(--foreground); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.3125rem 0.625rem; font-size: 0.6875rem; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .control-btn[data-tooltip]::after { content: ''; right: calc(100% + 3px); width: 5px; height: 5px; background: var(--card); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transform: translateY(-50%) rotate(-45deg); }
    .control-btn[data-tooltip]:hover::before, .control-btn[data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }

    /* 리사이즈 */
    .resize-handle { position: absolute; display: flex; align-items: center; justify-content: center; user-select: none; z-index: 20; }
    .resize-handle .bar { background: var(--border); transition: opacity var(--transition), background var(--transition), width 0.15s ease, height 0.15s ease; border-radius: 999px; opacity: 0; }
    .widget-wrapper:hover .resize-handle .bar { opacity: 1; }
    .resize-handle:hover .bar { background: var(--muted-foreground); }
    .handle-top { top: 0; left: 50%; transform: translate(-50%,-50%); width: 36px; height: 16px; cursor: ns-resize; }
    .handle-top .bar { width: 36px; height: 1px; } .handle-top:hover .bar { height: 3px; }
    .handle-bottom { bottom: 0; left: 50%; transform: translate(-50%,50%); width: 36px; height: 16px; cursor: ns-resize; }
    .handle-bottom .bar { width: 36px; height: 1px; } .handle-bottom:hover .bar { height: 3px; }
    .handle-left { left: 0; top: 50%; transform: translate(-50%,-50%); width: 16px; height: 36px; cursor: ew-resize; }
    .handle-left .bar { width: 1px; height: 36px; } .handle-left:hover .bar { width: 3px; }
    .handle-right { right: 0; top: 50%; transform: translate(50%,-50%); width: 16px; height: 36px; cursor: ew-resize; }
    .handle-right .bar { width: 1px; height: 36px; } .handle-right:hover .bar { width: 3px; }
  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">
    <div class="card" id="card">
      <div class="card-body">
        <div class="head">
          <span class="title">감사 일기</span>
          <span class="date" id="date">—</span>
        </div>
        <div class="prompt">오늘 감사한 일은?</div>
        <input class="today-input" id="todayInput" type="text" maxlength="140" placeholder="한 줄로 적어보세요 · Enter 저장" autocomplete="off" aria-label="오늘 감사한 일" />
        <span class="saved-tag" id="savedTag">저장됨 ✓</span>

        <div class="divider"></div>
        <div class="past-label">지난 기록</div>
        <div class="past-list" id="pastList"></div>
      </div>

      <div class="resize-handle handle-top" data-direction="top"><div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left" data-direction="left"><div class="bar"></div></div>
      <div class="resize-handle handle-right" data-direction="right"><div class="bar"></div></div>
    </div>

    <div class="controls">
      <button class="control-btn" id="resizeResetBtn" data-tooltip="크기 초기화" title="크기 초기화" type="button" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    'use strict';
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
    const STORE_KEY = 'nosion-gratitude-v1';
    const WEEKDAY = ['일','월','화','수','목','금','토'];
    const todayInput = document.getElementById('todayInput');
    const savedTag = document.getElementById('savedTag');
    const pastListEl = document.getElementById('pastList');
    const dateEl = document.getElementById('date');

    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function todayKey() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`; }
    function fmtDate(d) { return `${d.getMonth() + 1}월 ${d.getDate()}일 (${WEEKDAY[d.getDay()]})`; }

    let entries = {};
    try { const s = JSON.parse(localStorage.getItem(STORE_KEY) || 'null'); if (s && typeof s === 'object') entries = s; } catch (e) {}

    function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(entries)); } catch (e) {} }

    function renderPast() {
      const tk = todayKey();
      const keys = Object.keys(entries).filter(k => /^\d{4}-\d{1,2}-\d{1,2}$/.test(k) && k !== tk && entries[k] && String(entries[k]).trim());
      keys.sort((a, b) => {
        const pa = a.split('-').map(Number), pb = b.split('-').map(Number);
        return new Date(pb[0], pb[1] - 1, pb[2]) - new Date(pa[0], pa[1] - 1, pa[2]);
      });
      pastListEl.innerHTML = '';
      if (keys.length === 0) {
        const e = document.createElement('div');
        e.className = 'empty';
        e.textContent = '아직 지난 기록이 없어요';
        pastListEl.appendChild(e);
        return;
      }
      keys.slice(0, 30).forEach(k => {
        const p = k.split('-').map(Number);
        const d = new Date(p[0], p[1] - 1, p[2]);
        const item = document.createElement('div');
        item.className = 'past-item';
        item.innerHTML = `<span class="past-date">${fmtDate(d)}</span><span class="past-text">${escapeHtml(entries[k])}</span>`;
        pastListEl.appendChild(item);
      });
    }

    const now = new Date();
    dateEl.textContent = fmtDate(now);
    todayInput.value = entries[todayKey()] || '';
    renderPast();

    let savedTimer = null;
    function commit() {
      const v = todayInput.value.trim();
      if (v) entries[todayKey()] = v; else delete entries[todayKey()];
      save();
      renderPast();
      savedTag.classList.add('show');
      clearTimeout(savedTimer);
      savedTimer = setTimeout(() => savedTag.classList.remove('show'), 1500);
    }
    todayInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); todayInput.blur(); } });
    todayInput.addEventListener('blur', commit);

    /* ===== 리사이즈 ===== */
    const SIZE_KEY = 'nosion-gratitude-size-v1';
    const MIN_WIDTH = 270, MAX_WIDTH = 520, MIN_HEIGHT = 280, MAX_HEIGHT = 600, DEFAULT_WIDTH = 320;
    const cardEl = document.getElementById('card');
    const widgetEl = document.getElementById('widget');
    let cardWidth = DEFAULT_WIDTH, cardHeight = null;
    try {
      const s = JSON.parse(localStorage.getItem(SIZE_KEY) || 'null');
      if (s) { if (typeof s.width === 'number') cardWidth = Math.max(MIN_WIDTH, Math.min(MAX_WIDTH, s.width)); if (typeof s.height === 'number' && s.height > 0) cardHeight = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, s.height)); }
    } catch (e) {}
    function applyCardSize() { cardEl.style.width = cardWidth + 'px'; cardEl.style.height = cardHeight !== null ? cardHeight + 'px' : ''; }
    function saveSize() { try { localStorage.setItem(SIZE_KEY, JSON.stringify({ width: cardWidth, height: cardHeight })); } catch (e) {} }
    let resizeDrag = null, startLeft = 0, startTop = 0;
    function startResize(direction, x, y) {
      const rect = cardEl.getBoundingClientRect();
      resizeDrag = { direction, startX: x, startY: y, startWidth: rect.width, startHeight: rect.height };
      if (getComputedStyle(widgetEl).position !== 'fixed') {
        const wr = widgetEl.getBoundingClientRect();
        widgetEl.style.position = 'fixed'; widgetEl.style.left = wr.left + 'px'; widgetEl.style.top = wr.top + 'px'; widgetEl.style.transform = 'none';
        offsetX = 0; offsetY = 0;
      }
      startLeft = parseFloat(widgetEl.style.left) || 0; startTop = parseFloat(widgetEl.style.top) || 0;
      document.body.style.userSelect = 'none';
      document.body.style.cursor = (direction === 'left' || direction === 'right') ? 'ew-resize' : 'ns-resize';
    }
    function moveResize(x, y) {
      if (!resizeDrag) return;
      const dx = x - resizeDrag.startX, dy = y - resizeDrag.startY, dir = resizeDrag.direction;
      if (dir === 'right' || dir === 'left') {
        const delta = dir === 'right' ? dx : -dx;
        cardWidth = Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, resizeDrag.startWidth + 2 * delta));
        const actual = cardWidth - resizeDrag.startWidth;
        if (widgetEl.style.position === 'fixed') widgetEl.style.left = (startLeft - actual / 2) + 'px';
      }
      if (dir === 'bottom' || dir === 'top') {
        const delta = dir === 'bottom' ? dy : -dy;
        cardHeight = Math.min(MAX_HEIGHT, Math.max(MIN_HEIGHT, resizeDrag.startHeight + 2 * delta));
        const actual = cardHeight - resizeDrag.startHeight;
        if (widgetEl.style.position === 'fixed') widgetEl.style.top = (startTop - actual / 2) + 'px';
      }
      applyCardSize();
    }
    function endResize() { if (!resizeDrag) return; saveSize(); resizeDrag = null; document.body.style.userSelect = ''; document.body.style.cursor = ''; }
    document.querySelectorAll('.resize-handle').forEach(handle => {
      const direction = handle.dataset.direction;
      handle.addEventListener('mousedown', (e) => { e.preventDefault(); e.stopPropagation(); startResize(direction, e.clientX, e.clientY); });
      handle.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; startResize(direction, t.clientX, t.clientY); }, { passive: false });
    });
    document.addEventListener('mousemove', (e) => { if (resizeDrag) { e.preventDefault(); moveResize(e.clientX, e.clientY); } });
    document.addEventListener('mouseup', endResize);
    document.addEventListener('touchmove', (e) => { if (resizeDrag) { const t = e.touches[0]; moveResize(t.clientX, t.clientY); } }, { passive: true });
    document.addEventListener('touchend', endResize);
    document.addEventListener('touchcancel', endResize);
    applyCardSize();

    /* ===== 드래그 이동 ===== */
    const POS_KEY = 'nosion-gratitude-pos-v1';
    let offsetX = 0, offsetY = 0, moveDrag = null;
    try { const p = JSON.parse(localStorage.getItem(POS_KEY) || 'null'); if (p) { if (typeof p.x === 'number') offsetX = p.x; if (typeof p.y === 'number') offsetY = p.y; } } catch (e) {}
    function applyPosition() { widgetEl.style.transform = `translate(${offsetX}px, ${offsetY}px)`; }
    function savePosition() { try { localStorage.setItem(POS_KEY, JSON.stringify({ x: offsetX, y: offsetY })); } catch (e) {} }
    function isDraggableTarget(target) {
      if (!target.closest) return false;
      const blocked = ['.control-btn', '.resize-handle', 'button', '[contenteditable]', 'a', 'input', '.past-list'];
      for (const sel of blocked) if (target.closest(sel)) return false;
      return true;
    }
    function startMove(x, y) { moveDrag = { startX: x, startY: y, startOffsetX: offsetX, startOffsetY: offsetY }; document.body.style.userSelect = 'none'; cardEl.classList.add('dragging'); }
    function doMove(x, y) { if (!moveDrag) return; offsetX = moveDrag.startOffsetX + (x - moveDrag.startX); offsetY = moveDrag.startOffsetY + (y - moveDrag.startY); { const __r = cardEl.getBoundingClientRect(); const __bL = __r.left - offsetX; const __bT = __r.top - offsetY; const __MIN = 40; offsetX = Math.max(-__bL - __r.width + __MIN, Math.min(window.innerWidth - __bL - __MIN, offsetX)); offsetY = Math.max(-__bT - __r.height + __MIN, Math.min(window.innerHeight - __bT - __MIN, offsetY)); } applyPosition(); }
    function endMove() { if (!moveDrag) return; savePosition(); moveDrag = null; document.body.style.userSelect = ''; cardEl.classList.remove('dragging'); }
    applyPosition();
    cardEl.addEventListener('mousedown', (e) => { if (!isDraggableTarget(e.target)) return; e.preventDefault(); startMove(e.clientX, e.clientY); });
    cardEl.addEventListener('touchstart', (e) => { if (!isDraggableTarget(e.target)) return; const t = e.touches[0]; startMove(t.clientX, t.clientY); }, { passive: true });
    document.addEventListener('mousemove', (e) => { if (moveDrag) { e.preventDefault(); doMove(e.clientX, e.clientY); } });
    document.addEventListener('mouseup', endMove);
    document.addEventListener('touchmove', (e) => { if (moveDrag) { const t = e.touches[0]; doMove(t.clientX, t.clientY); } }, { passive: true });
    document.addEventListener('touchend', endMove);
    document.addEventListener('touchcancel', endMove);

    document.getElementById('resizeResetBtn').addEventListener('click', () => {
      cardWidth = DEFAULT_WIDTH; cardHeight = null; applyCardSize(); saveSize();
      offsetX = 0; offsetY = 0; applyPosition(); savePosition();
    });
  </script>
</body>
</html>
