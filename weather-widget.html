<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날씨 위젯</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 10% 55%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .widget-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      position: relative;
      width: fit-content;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 2rem 1.5rem;
      width: 360px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow: hidden;
      box-shadow: none;
      cursor: grab;
    }

    .card.dragging { cursor: grabbing; }

    /* === Setup / error overlay === */
    .overlay {
      position: absolute;
      inset: 0;
      background: var(--card);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      z-index: 20;
    }

    .overlay.hidden { display: none; }

    .overlay-title {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--foreground);
      text-align: center;
    }

    .overlay-desc {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      text-align: center;
      line-height: 1.6;
    }

    .overlay-desc a {
      color: var(--foreground);
    }

    .api-input-group {
      display: flex;
      width: 100%;
      gap: 0.5rem;
    }

    .api-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--foreground);
      background: var(--muted);
      outline: none;
      transition: border-color var(--transition);
    }

    .api-input:focus { border-color: var(--foreground); }

    .api-save-btn {
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.875rem;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--foreground);
      background: var(--muted);
      cursor: pointer;
      transition: background var(--transition);
      white-space: nowrap;
    }

    .api-save-btn:hover { background: var(--border); }

    /* === City row === */
    .city-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .city-name {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      letter-spacing: 0.03em;
    }

    .updated-time {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
    }

    /* === Main weather row === */
    .main-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
    }

    .temp-block {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .temp-value {
      font-size: 3.5rem;
      font-weight: 400;
      color: var(--foreground);
      letter-spacing: -0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .temp-feels {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
    }

    .weather-icon {
      font-size: 3rem;
      line-height: 1;
      opacity: 0.8;
      user-select: none;
    }

    /* === Detail row === */
    .detail-row {
      display: flex;
      gap: 0;
    }

    .detail-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .detail-item + .detail-item {
      border-left: 1px solid var(--border);
    }

    .detail-value {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--foreground);
      font-variant-numeric: tabular-nums;
    }

    .detail-label {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* === Outfit suggestion === */
    .outfit-section {
      background: var(--muted);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .outfit-icon {
      font-size: 1.25rem;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 0.05rem;
      user-select: none;
    }

    .outfit-text {
      font-size: 0.8125rem;
      color: var(--foreground);
      line-height: 1.5;
    }

    /* === Forecast === */
    .forecast-section {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .section-label {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .forecast-list {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .forecast-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .fc-day {
      font-size: 0.8125rem;
      color: var(--foreground);
      width: 2.5rem;
    }

    .fc-icon { font-size: 1rem; line-height: 1; user-select: none; }

    .fc-desc {
      flex: 1;
      font-size: 0.75rem;
      color: var(--muted-foreground);
      margin: 0 0.75rem;
    }

    .fc-temp {
      font-size: 0.8125rem;
      color: var(--foreground);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .fc-temp .low { color: var(--muted-foreground); margin-left: 0.375rem; }

    /* === Resize handles === */
    .resize-handle {
      position: absolute;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .handle-top, .handle-bottom { left: 0; right: 0; height: 12px; cursor: ns-resize; }
    .handle-top { top: 0; }
    .handle-bottom { bottom: 0; }
    .handle-left, .handle-right { top: 0; bottom: 0; width: 12px; cursor: ew-resize; }
    .handle-left { left: 0; }
    .handle-right { right: 0; }

    .resize-handle .bar {
      border-radius: 99px;
      background: var(--border);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .handle-top .bar, .handle-bottom .bar { width: 32px; height: 3px; }
    .handle-left .bar, .handle-right .bar { width: 3px; height: 32px; }
    .resize-handle:hover .bar { opacity: 1; }

    /* === Controls === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      opacity: 0.25;
      transition: opacity var(--transition);
    }
    .widget-wrapper:hover .controls { opacity: 1; }

    .control-btn {
      width: 28px;
      height: 28px;
      border-radius: 0.4rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted-foreground);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background var(--transition), color var(--transition);
      position: relative;
    }
    .control-btn:hover { background: var(--muted); color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 1.75; }

    .control-btn[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: hsl(220 10% 30%);
      color: #fff;
      font-size: 0.6875rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.35rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .control-btn[data-tooltip]:hover::after { opacity: 1; }
  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">
    <div class="card" id="card">

      <!-- API key setup overlay -->
      <div class="overlay" id="setupOverlay">
        <div class="overlay-title">날씨 위젯 설정</div>
        <div class="overlay-desc">
          <a href="https://openweathermap.org/api" target="_blank" rel="noopener">OpenWeatherMap</a>에서<br>
          무료 API 키를 발급받아 입력하세요.
        </div>
        <div class="api-input-group">
          <input class="api-input" type="text" id="apiKeyInput" placeholder="API 키 입력" autocomplete="off" />
          <button class="api-save-btn" id="apiSaveBtn" type="button">저장</button>
        </div>
        <div class="overlay-desc" id="citySetupRow" style="display:flex;gap:0.5rem;width:100%;">
          <input class="api-input" type="text" id="cityInput" placeholder="도시 (예: Seoul)" style="flex:1" />
        </div>
      </div>

      <!-- Main content -->
      <div class="city-row">
        <span class="city-name" id="cityLabel">서울</span>
        <span class="updated-time" id="updatedTime"></span>
      </div>

      <div class="main-row">
        <div class="temp-block">
          <span class="temp-value" id="tempValue">—°</span>
          <span class="temp-feels" id="tempFeels">체감 —°</span>
        </div>
        <span class="weather-icon" id="weatherIcon" aria-hidden="true">—</span>
      </div>

      <div class="detail-row">
        <div class="detail-item">
          <span class="detail-value" id="humidity">—%</span>
          <span class="detail-label">습도</span>
        </div>
        <div class="detail-item">
          <span class="detail-value" id="windSpeed">—m/s</span>
          <span class="detail-label">풍속</span>
        </div>
        <div class="detail-item">
          <span class="detail-value" id="tempRange">—/—°</span>
          <span class="detail-label">최고/최저</span>
        </div>
      </div>

      <div class="outfit-section">
        <span class="outfit-icon" id="outfitIcon" aria-hidden="true">🧥</span>
        <span class="outfit-text" id="outfitText">날씨 정보를 불러오는 중...</span>
      </div>

      <div class="forecast-section">
        <span class="section-label">5일 예보</span>
        <div class="forecast-list" id="forecastList">
          <div class="forecast-item" style="justify-content:center;padding:0.5rem 0;">
            <span style="font-size:0.8125rem;color:var(--muted-foreground)">로딩 중...</span>
          </div>
        </div>
      </div>

      <div class="resize-handle handle-top" data-direction="top"><div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left" data-direction="left"><div class="bar"></div></div>
      <div class="resize-handle handle-right" data-direction="right"><div class="bar"></div></div>
    </div>

    <div class="controls">
      <button class="control-btn" id="resizeResetBtn" type="button"
              data-tooltip="크기 초기화" title="크기 초기화" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="refreshBtn" type="button"
              data-tooltip="날씨 새로고침" title="날씨 새로고침" aria-label="날씨 새로고침">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="control-btn" id="settingsBtn" type="button"
              data-tooltip="API 설정" title="API 설정" aria-label="API 키 설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    /* ===== localStorage keys ===== */
    const KEY_API  = 'nosion-weather-apikey-v1';
    const KEY_CITY = 'nosion-weather-city-v1';
    const KEY_SIZE = 'nosion-weather-size-v1';
    const KEY_POS  = 'nosion-weather-pos-v1';

    /* ===== State ===== */
    let apiKey = '';
    let city   = 'Seoul';

    try {
      apiKey = localStorage.getItem(KEY_API) || '';
      city   = localStorage.getItem(KEY_CITY) || 'Seoul';
    } catch (e) {}

    /* ===== Weather icon map (OWM condition codes) ===== */
    function condIcon(id, isDay) {
      if (id >= 200 && id < 300) return '⛈';
      if (id >= 300 && id < 400) return '🌦';
      if (id >= 500 && id < 510) return isDay ? '🌧' : '🌧';
      if (id === 511)            return '🌨';
      if (id >= 520 && id < 600) return '🌧';
      if (id >= 600 && id < 700) return '❄';
      if (id >= 700 && id < 800) return '🌫';
      if (id === 800)            return isDay ? '☀' : '🌙';
      if (id === 801)            return isDay ? '🌤' : '🌤';
      if (id === 802)            return '⛅';
      if (id >= 803)             return '☁';
      return '🌡';
    }

    /* ===== Outfit advice by temperature ===== */
    function outfitAdvice(temp) {
      if (temp >= 28) return { icon: '👕', text: '매우 더운 날씨입니다. 반팔·반바지에 선크림을 꼭 챙기세요.' };
      if (temp >= 23) return { icon: '👔', text: '따뜻한 날씨입니다. 얇은 셔츠나 반팔이 잘 어울려요.' };
      if (temp >= 17) return { icon: '🧥', text: '선선한 날씨입니다. 가디건이나 얇은 재킷을 걸치세요.' };
      if (temp >= 12) return { icon: '🧣', text: '약간 쌀쌀합니다. 가벼운 자켓과 긴팔을 입어요.' };
      if (temp >= 7)  return { icon: '🧤', text: '제법 춥습니다. 코트나 두꺼운 재킷을 입고 목도리도 챙기세요.' };
      return { icon: '🧣', text: '매우 춥습니다. 패딩·목도리·장갑으로 완전 무장하세요.' };
    }

    /* ===== Fetch current weather ===== */
    async function fetchWeather() {
      if (!apiKey) { showSetup(); return; }

      const base = 'https://api.openweathermap.org/data/2.5';
      const params = `q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric&lang=kr`;

      try {
        const [curRes, foreRes] = await Promise.all([
          fetch(`${base}/weather?${params}`),
          fetch(`${base}/forecast?${params}&cnt=40`),
        ]);

        if (!curRes.ok) {
          const err = await curRes.json().catch(() => ({}));
          throw new Error(err.message || `HTTP ${curRes.status}`);
        }

        const cur  = await curRes.json();
        const fore = await foreRes.json();
        renderWeather(cur, fore);
        hideSetup();
      } catch (err) {
        renderError(err.message);
      }
    }

    function renderWeather(cur, fore) {
      const temp    = Math.round(cur.main.temp);
      const feels   = Math.round(cur.main.feels_like);
      const high    = Math.round(cur.main.temp_max);
      const low     = Math.round(cur.main.temp_min);
      const hum     = cur.main.humidity;
      const wind    = cur.wind.speed.toFixed(1);
      const id      = cur.weather[0].id;
      const now     = new Date();
      const isDay   = now.getHours() >= 6 && now.getHours() < 19;
      const cityKo  = cur.name;

      document.getElementById('cityLabel').textContent = cityKo;
      document.getElementById('updatedTime').textContent =
        now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) + ' 기준';
      document.getElementById('tempValue').textContent    = `${temp}°`;
      document.getElementById('tempFeels').textContent    = `체감 ${feels}°`;
      document.getElementById('weatherIcon').textContent  = condIcon(id, isDay);
      document.getElementById('humidity').textContent     = `${hum}%`;
      document.getElementById('windSpeed').textContent    = `${wind}m/s`;
      document.getElementById('tempRange').textContent    = `${high}/${low}°`;

      const { icon, text } = outfitAdvice(temp);
      document.getElementById('outfitIcon').textContent = icon;
      document.getElementById('outfitText').textContent = text;

      // 5-day forecast — pick noon entry per day
      const days = {};
      (fore.list || []).forEach(item => {
        const date = item.dt_txt.slice(0, 10);
        if (!days[date]) days[date] = [];
        days[date].push(item);
      });

      const DAY_KO = ['일', '월', '화', '수', '목', '금', '토'];
      const todayStr = new Date().toISOString().slice(0, 10);
      const foreItems = Object.entries(days)
        .filter(([d]) => d !== todayStr)
        .slice(0, 5)
        .map(([date, items]) => {
          const noon = items.reduce((a, b) =>
            Math.abs(+new Date(a.dt_txt) - +new Date(date + ' 12:00:00')) <
            Math.abs(+new Date(b.dt_txt) - +new Date(date + ' 12:00:00')) ? a : b);
          const hiItem = items.reduce((a, b) => a.main.temp_max > b.main.temp_max ? a : b);
          const loItem = items.reduce((a, b) => a.main.temp_min < b.main.temp_min ? a : b);
          const d = new Date(date);
          return {
            day: DAY_KO[d.getDay()] + '요일',
            icon: condIcon(noon.weather[0].id, true),
            desc: noon.weather[0].description,
            hi: Math.round(hiItem.main.temp_max),
            lo: Math.round(loItem.main.temp_min),
          };
        });

      const list = document.getElementById('forecastList');
      list.innerHTML = '';
      foreItems.forEach(({ day, icon, desc, hi, lo }) => {
        const el = document.createElement('div');
        el.className = 'forecast-item';
        el.innerHTML = `
          <span class="fc-day">${day}</span>
          <span class="fc-icon">${icon}</span>
          <span class="fc-desc">${desc}</span>
          <span class="fc-temp">${hi}°<span class="low">${lo}°</span></span>`;
        list.appendChild(el);
      });
    }

    function renderError(msg) {
      document.getElementById('outfitText').textContent = `오류: ${msg}`;
      document.getElementById('forecastList').innerHTML =
        '<div class="forecast-item" style="justify-content:center;padding:0.5rem 0;"><span style="font-size:0.8125rem;color:var(--muted-foreground)">예보를 불러올 수 없습니다</span></div>';
    }

    /* ===== Setup overlay ===== */
    function showSetup() {
      document.getElementById('apiKeyInput').value = apiKey;
      document.getElementById('cityInput').value   = city;
      document.getElementById('setupOverlay').classList.remove('hidden');
    }

    function hideSetup() {
      document.getElementById('setupOverlay').classList.add('hidden');
    }

    document.getElementById('apiSaveBtn').addEventListener('click', () => {
      const k = document.getElementById('apiKeyInput').value.trim();
      const c = document.getElementById('cityInput').value.trim() || 'Seoul';
      if (!k) return;
      apiKey = k;
      city   = c;
      try {
        localStorage.setItem(KEY_API, apiKey);
        localStorage.setItem(KEY_CITY, city);
      } catch (e) {}
      hideSetup();
      fetchWeather();
    });

    document.getElementById('settingsBtn').addEventListener('click', showSetup);
    document.getElementById('refreshBtn').addEventListener('click', fetchWeather);

    /* ===== Resize reset ===== */
    document.getElementById('resizeResetBtn').addEventListener('click', () => {
      const card = document.getElementById('card');
      card.style.width  = '360px';
      card.style.height = '';
      try { localStorage.removeItem(KEY_SIZE); } catch (e) {}
    });

    /* ===== Drag to move ===== */
    (function initDrag() {
      const wrapper = document.getElementById('widget');
      const card    = document.getElementById('card');
      const BLOCKED = '.control-btn,.resize-handle,button,[contenteditable],a,input,.overlay';
      let dragging = false, startX = 0, startY = 0, origLeft = 0, origTop = 0;

      card.addEventListener('mousedown', e => {
        if (e.target.closest(BLOCKED)) return;
        dragging = true;
        const rect = wrapper.getBoundingClientRect();
        origLeft = rect.left;
        origTop  = rect.top;
        startX   = e.clientX;
        startY   = e.clientY;
        card.classList.add('dragging');
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        wrapper.style.position = 'fixed';
        wrapper.style.left = `${origLeft + e.clientX - startX}px`;
        wrapper.style.top  = `${origTop  + e.clientY - startY}px`;
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('dragging');
        try {
          localStorage.setItem(KEY_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top }));
        } catch (e) {}
      });

      try {
        const pos = JSON.parse(localStorage.getItem(KEY_POS) || 'null');
        if (pos) { wrapper.style.position = 'fixed'; wrapper.style.left = pos.left; wrapper.style.top = pos.top; }
      } catch (e) {}
    })();

    /* ===== Resize handles ===== */
    (function initResize() {
      const wrapper = document.getElementById('widget');
      const card = document.getElementById('card');
      const MIN_W = 280, MAX_W = 560, MIN_H = 200;
      let resizing = false, dir = '', startW = 0, startH = 0, startX = 0, startY = 0, startLeft = 0, startTop = 0;

      document.querySelectorAll('.resize-handle').forEach(h => {
        h.addEventListener('mousedown', e => {
          resizing = true;
          dir    = h.dataset.direction;
          startW = card.offsetWidth;
          startH = card.offsetHeight;
          startX = e.clientX;
          startY = e.clientY;
          startLeft = parseFloat(wrapper.style.left) || 0;
          startTop = parseFloat(wrapper.style.top) || 0;
          e.preventDefault();
          e.stopPropagation();
        });
      });

      document.addEventListener('mousemove', e => {
        if (!resizing) return;
        const dx = e.clientX - startX, dy = e.clientY - startY;
        if (dir === 'right' || dir === 'left') {
          const delta = dir === 'right' ? dx : -dx;
          const newW = Math.min(MAX_W, Math.max(MIN_W, startW + delta));
          const actualDelta = newW - startW;
          card.style.width = `${newW}px`;
          if (wrapper.style.position === 'fixed') {
            wrapper.style.left = `${startLeft - actualDelta / 2}px`;
          }
        }
        if (dir === 'bottom' || dir === 'top') {
          const delta = dir === 'bottom' ? dy : -dy;
          const newH = Math.max(MIN_H, startH + delta);
          const actualDelta = newH - startH;
          card.style.height = `${newH}px`;
          if (wrapper.style.position === 'fixed') {
            wrapper.style.top = `${startTop - actualDelta / 2}px`;
          }
        }
      });

      document.addEventListener('mouseup', () => {
        if (!resizing) return;
        resizing = false;
        try {
          localStorage.setItem(KEY_SIZE, JSON.stringify({ w: card.offsetWidth, h: card.offsetHeight }));
          if (wrapper.style.position === 'fixed') {
            localStorage.setItem(KEY_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top }));
          }
        } catch (e) {}
      });

      try {
        const s = JSON.parse(localStorage.getItem(KEY_SIZE) || 'null');
        if (s) { if (s.w) card.style.width = `${s.w}px`; if (s.h) card.style.height = `${s.h}px`; }
      } catch (e) {}
    })();

    /* ===== Init ===== */
    if (!apiKey) {
      showSetup();
    } else {
      fetchWeather();
      // Auto-refresh every 30 minutes
      setInterval(fetchWeather, 30 * 60 * 1000);
    }
  </script>
