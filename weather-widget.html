<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날씨 위젯</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .widget-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      position: relative;
      width: fit-content;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 1.75rem;
      width: 290px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      gap: 1.25rem;
      overflow: hidden;
      box-shadow: none;
      cursor: grab;
    }

    .card.dragging { cursor: grabbing; }

    /* === Setup / error overlay === */
    .overlay {
      position: absolute;
      inset: 0;
      background: var(--card);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      z-index: 20;
    }

    .overlay.hidden { display: none; }

    .overlay-title {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--foreground);
      text-align: center;
    }

    .overlay-desc {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      text-align: center;
      line-height: 1.6;
    }

    .overlay-desc a {
      color: var(--foreground);
    }

    .api-input-group {
      display: flex;
      width: 100%;
      gap: 0.5rem;
    }

    .api-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--foreground);
      background: var(--muted);
      outline: none;
      transition: border-color var(--transition);
    }

    .api-input:focus { border-color: var(--foreground); }

    .api-save-btn {
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.875rem;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--foreground);
      background: var(--muted);
      cursor: pointer;
      transition: background var(--transition);
      white-space: nowrap;
    }

    .api-save-btn:hover { background: var(--border); }

    /* === Header (city + condition) === */
    .city-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .city-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--foreground);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .updated-time {        /* '오늘 · 흐림' */
      font-size: 12px;
      color: var(--muted-foreground);
      font-weight: 400;
      letter-spacing: -0.005em;
    }

    /* === Main weather row (icon + temp + range stacked right) === */
    .main-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin: 14px 0 0;
    }
    .temp-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .temp-value {
      font-size: 36px;
      font-weight: 800;
      color: var(--foreground);
      letter-spacing: -1px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .detail-row {
      font-size: 11px;
      color: var(--muted-foreground);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.005em;
    }
    .weather-icon { line-height: 0; user-select: none; width: 44px; height: 44px; }
    .weather-icon svg {
      width: 44px; height: 44px;
      display: block; overflow: visible;
      stroke: var(--foreground); stroke-width: 1.6;
      fill: var(--muted);
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* === Outfit advice (얇은 divider 위) === */
    .outfit-section {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      font-weight: 400;
      color: var(--foreground);
      letter-spacing: -0.005em;
    }
    .outfit-section .outfit-icon { display: none; }

    /* === (sun moon 등은 작은 동그라미만 — temp-feels/detail-item/forecast 미사용) === */

    .fc-desc { display: none; }

    .fc-temp {
      font-size: 0.75rem;
      color: var(--foreground);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.05rem;
    }

    .fc-temp .low { color: var(--muted-foreground); margin-left: 0; }

    /* === Resize handles === */
    .resize-handle {
      position: absolute;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .handle-top, .handle-bottom { left: 0; right: 0; height: 12px; cursor: ns-resize; }
    .handle-top { top: 0; }
    .handle-bottom { bottom: 0; }
    .handle-left, .handle-right { top: 0; bottom: 0; width: 12px; cursor: ew-resize; }
    .handle-left { left: 0; }
    .handle-right { right: 0; }

    .resize-handle .bar {
      border-radius: 99px;
      background: var(--border);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .handle-top .bar, .handle-bottom .bar { width: 32px; height: 3px; }
    .handle-left .bar, .handle-right .bar { width: 3px; height: 32px; }
    .resize-handle:hover .bar { opacity: 1; }

    /* === Controls === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .widget-wrapper:hover .controls { opacity: 1; }

    .control-btn {
      width: 28px;
      height: 28px;
      border-radius: 0.4rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted-foreground);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background var(--transition), color var(--transition);
      position: relative;
    }
    .control-btn:hover { background: var(--muted); color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 1.75; }

    .control-btn[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      font-size: 0.6875rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.35rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .control-btn[data-tooltip]:hover::after { opacity: 1; }
      /* unify-resize: 내용은 고정폭, 카드를 키우면 바깥 여백만 늘어남 */
    .card {
      align-items: safe center;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: inherit;
      width: 100%;
    }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동 + 8방향 리사이즈) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      position: absolute; width: auto; height: auto;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; left: auto; bottom: auto;
      display: flex; flex-direction: row; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; padding: 0; }
    #card.card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .rz { position: absolute; z-index: 20; touch-action: none; }
    .rz-n { top: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-s { bottom: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-e { top: 0; bottom: 0; right: 0; width: 7px; cursor: ew-resize; }
    .rz-w { top: 0; bottom: 0; left: 0; width: 7px; cursor: ew-resize; }
    .rz-ne, .rz-nw, .rz-se, .rz-sw { width: 14px; height: 14px; z-index: 21; }
    .rz-ne { top: 0; right: 0; cursor: nesw-resize; }
    .rz-nw { top: 0; left: 0; cursor: nwse-resize; }
    .rz-se { bottom: 0; right: 0; cursor: nwse-resize; }
    .rz-sw { bottom: 0; left: 0; cursor: nesw-resize; }
    .rz-e::after, .rz-w::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 2px; height: 28px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    .rz-n::after, .rz-s::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 2px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    #card.card:hover .rz-n::after, #card.card:hover .rz-s::after, #card.card:hover .rz-e::after, #card.card:hover .rz-w::after { opacity: 0.7; }
    .rz:hover::after { background: var(--muted-foreground) !important; }
  </style>
</head>
<body>
  <!-- 손그림 rough 필터 (노시언 스타일 선 아이콘용) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="1" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs></svg>

  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-body">

      <!-- City setup overlay (API 키 불필요 — Open-Meteo) -->
      <div class="overlay hidden" id="setupOverlay">
        <div class="overlay-title">도시 설정</div>
        <div class="overlay-desc">도시 이름을 입력하세요 (예: Seoul, Busan, Tokyo)</div>
        <div class="api-input-group">
          <input class="api-input" type="text" id="cityInput" placeholder="도시 입력" autocomplete="off" />
          <button class="api-save-btn" id="citySaveBtn" type="button">저장</button>
        </div>
      </div>

      <!-- Main content (simplified) -->
      <div class="city-row">
        <span class="city-name" id="cityLabel">서울</span>
        <span class="updated-time" id="updatedTime">오늘 · —</span>
      </div>

      <div class="main-row">
        <span class="weather-icon" id="weatherIcon" aria-hidden="true"></span>
        <div class="temp-block">
          <span class="temp-value" id="tempValue">—°</span>
          <span class="detail-row" id="tempRange">최고 —° · 최저 —°</span>
        </div>
      </div>

      <div class="outfit-section">
        <span class="outfit-text" id="outfitText">날씨 정보를 불러오는 중...</span>
      </div>

      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn" type="button"
              data-tooltip="크기 초기화" title="크기 초기화" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="control-btn" id="refreshBtn" type="button"
              data-tooltip="새로고침" title="새로고침" aria-label="새로고침">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="control-btn" id="settingsBtn" type="button"
              data-tooltip="도시 변경" title="도시 변경" aria-label="도시 변경">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </button>
    </div>

      <div class="rz rz-n"  data-rz="n"></div>
      <div class="rz rz-s"  data-rz="s"></div>
      <div class="rz rz-e"  data-rz="e"></div>
      <div class="rz rz-w"  data-rz="w"></div>
      <div class="rz rz-ne" data-rz="ne"></div>
      <div class="rz rz-nw" data-rz="nw"></div>
      <div class="rz rz-se" data-rz="se"></div>
      <div class="rz rz-sw" data-rz="sw"></div>
</div>


  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ===== localStorage keys ===== */
    const KEY_CITY = 'nosion-weather-city-v1';
    const KEY_SIZE = 'nosion-weather-size-v1';
    const KEY_POS  = 'nosion-weather-pos-v1';
    const KEY_FC   = 'nosion-weather-forecast-open-v1';

    /* ===== State ===== */
    let city = 'Seoul';
    try { city = localStorage.getItem(KEY_CITY) || 'Seoul'; } catch (e) {}

    /* ===== Weather code map (WMO codes — Open-Meteo) → 노시언 선 아이콘 ===== */
    function wmoIcon(code, isDay) {
      const w = (inner) => `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><g filter="url(#rough)">${inner}</g></svg>`;
      const CLOUD = '<path d="M7 17h9a3.1 3.1 0 0 0 .3-6.2 4.1 4.1 0 0 0-7.8-1.1A3.3 3.3 0 0 0 7 17z"/>';
      const CLOUD_HI = '<path d="M6.5 14.5h9a3 3 0 0 0 .3-6 4 4 0 0 0-7.7-1.1A3.2 3.2 0 0 0 6.5 14.5z"/>';
      if (code === 0) return isDay
        ? w('<circle cx="12" cy="12" r="4.2"/><path d="M12 3.4v2M12 18.6v2M3.4 12h2M18.6 12h2M5.9 5.9l1.5 1.5M16.6 16.6l1.5 1.5M18.1 5.9l-1.5 1.5M7.4 16.6l-1.5 1.5"/>')
        : w('<path d="M20 14.6A8 8 0 1 1 10.8 4.7a6.2 6.2 0 0 0 9.2 9.9z"/>');
      if (code === 1 || code === 2) return w('<circle cx="8.5" cy="8.5" r="2.7"/><path d="M8.5 3.7v1.3M4.2 8.5H2.9M5.3 5.3l-.9-.9"/>' + CLOUD);
      if (code === 3) return w(CLOUD);
      if (code === 45 || code === 48) return w('<path d="M4 8.5h15M5 12.5h14M4 16.5h12M6 20h11"/>');
      if ((code >= 51 && code <= 57) || (code >= 61 && code <= 67) || (code >= 80 && code <= 82))
        return w(CLOUD_HI + '<path d="M9 17.8l-1 2.4M13 17.8l-1 2.4M17 17.8l-1 2.4"/>');
      if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86))
        return w(CLOUD_HI + '<path d="M9.5 18.6v.01M13 18.6v.01M11.2 21v.01M15 21v.01"/>');
      if (code >= 95) return w(CLOUD_HI + '<path d="M12.5 17l-2.3 3.6h2.7l-1.6 3"/>');
      return w(CLOUD);
    }
    function wmoDesc(code) {
      const M = {
        0:'맑음', 1:'대체로 맑음', 2:'부분 흐림', 3:'흐림',
        45:'안개', 48:'안개',
        51:'약한 이슬비', 53:'이슬비', 55:'강한 이슬비', 56:'언 이슬비', 57:'언 이슬비',
        61:'약한 비', 63:'비', 65:'강한 비', 66:'언 비', 67:'언 비',
        71:'약한 눈', 73:'눈', 75:'강한 눈', 77:'싸락눈',
        80:'소나기', 81:'소나기', 82:'강한 소나기', 85:'소나기눈', 86:'소나기눈',
        95:'뇌우', 96:'우박 뇌우', 99:'우박 뇌우',
      };
      return M[code] || '—';
    }

    /* ===== Nosion-style 옷차림 선 아이콘 (검정 손그림) ===== */
    const OUTFIT = {
      tshirt:    '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><g filter="url(#rough)"><path d="M9 4 L4.5 7 L6.6 9.6 L8.5 8.1 V20 H15.5 V8.1 L17.4 9.6 L19.5 7 L15 4 C14 5.4 13.1 6 12 6 C10.9 6 10 5.4 9 4 Z"/></g></svg>',
      long:      '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><g filter="url(#rough)"><path d="M9 4 L5 6 L3.6 14 L6.1 14.6 L7.6 9.2 V20 H16.4 V9.2 L17.9 14.6 L20.4 14 L19 6 L15 4 C14 5.4 13.1 6 12 6 C10.9 6 10 5.4 9 4 Z"/></g></svg>',
      coat:      '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><g filter="url(#rough)"><path d="M9 4 L5.6 6 L6.6 13 H8 V21 H16 V13 H17.4 L18.4 6 L15 4 L12 7 Z"/><path d="M12 7 V20"/></g></svg>',
      coatScarf: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><g filter="url(#rough)"><path d="M9 5 L5.6 7 L6.6 13.5 H8 V21 H16 V13.5 H17.4 L18.4 7 L15 5 L12 8 Z"/><path d="M12 8 V20"/><path d="M9.2 5.4 Q12 8.2 14.8 5.4"/></g></svg>',
    };

    /* ===== Outfit advice by temperature ===== */
    function outfitAdvice(temp) {
      if (temp >= 28) return { icon: OUTFIT.tshirt,    text: '매우 더운 날씨입니다. 반팔·반바지에 선크림을 꼭 챙기세요.' };
      if (temp >= 23) return { icon: OUTFIT.tshirt,    text: '따뜻한 날씨입니다. 얇은 셔츠나 반팔이 잘 어울려요.' };
      if (temp >= 17) return { icon: OUTFIT.long,      text: '선선한 날씨입니다. 가디건이나 얇은 재킷을 걸치세요.' };
      if (temp >= 12) return { icon: OUTFIT.coat,      text: '약간 쌀쌀합니다. 가벼운 자켓과 긴팔을 입어요.' };
      if (temp >= 7)  return { icon: OUTFIT.coat,      text: '제법 춥습니다. 코트나 두꺼운 재킷을 입고 목도리도 챙기세요.' };
      return            { icon: OUTFIT.coatScarf, text: '매우 춥습니다. 패딩·목도리·장갑으로 완전 무장하세요.' };
    }

    /* ===== Fetch current weather (Open-Meteo — API 키 불필요) ===== */
    async function fetchWeather() {
      try {
        // 1) 도시명 → 좌표 (무료 지오코딩, 키 없음)
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ko&format=json`);
        const geo = await geoRes.json();
        if (!geo.results || !geo.results.length) throw new Error('도시를 찾을 수 없습니다');
        const { latitude, longitude, name } = geo.results[0];

        // 2) 현재 날씨 + 6일 일별 예보
        const url = 'https://api.open-meteo.com/v1/forecast'
          + `?latitude=${latitude}&longitude=${longitude}`
          + '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code'
          + '&daily=weather_code,temperature_2m_max,temperature_2m_min'
          + '&timezone=auto&forecast_days=6';
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        renderWeather(data, name);
        hideSetup();
      } catch (err) {
        renderError(err.message);
      }
    }

    function renderWeather(data, cityName) {
      const c = data.current, d = data.daily;
      const temp  = Math.round(c.temperature_2m);
      const feels = Math.round(c.apparent_temperature);
      const hum   = Math.round(c.relative_humidity_2m);
      const code  = c.weather_code;
      const now   = new Date();
      const isDay = now.getHours() >= 6 && now.getHours() < 19;
      const high  = Math.round(d.temperature_2m_max[0]);
      const low   = Math.round(d.temperature_2m_min[0]);

      document.getElementById('cityLabel').textContent = cityName;
      document.getElementById('updatedTime').textContent = `오늘 · ${wmoDesc(code)}`;
      document.getElementById('tempValue').textContent   = `${temp}°`;
      document.getElementById('weatherIcon').innerHTML   = wmoIcon(code, isDay);
      document.getElementById('tempRange').textContent   = `최고 ${high}° · 최저 ${low}°`;

      const { text } = outfitAdvice(temp);
      document.getElementById('outfitText').textContent = text;
    }

    function renderError(msg) {
      document.getElementById('outfitText').textContent = `오류: ${msg}`;
    }

    /* ===== City setup overlay ===== */
    function showSetup() {
      const input = document.getElementById('cityInput');
      input.value = city;
      document.getElementById('setupOverlay').classList.remove('hidden');
      input.focus();
    }

    function hideSetup() {
      document.getElementById('setupOverlay').classList.add('hidden');
    }

    document.getElementById('citySaveBtn').addEventListener('click', () => {
      const c = document.getElementById('cityInput').value.trim() || 'Seoul';
      city = c;
      try { localStorage.setItem(KEY_CITY, city); } catch (e) {}
      hideSetup();
      fetchWeather();
    });
    document.getElementById('cityInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('citySaveBtn').click();
    });

    document.getElementById('settingsBtn').addEventListener('click', showSetup);
    document.getElementById('refreshBtn').addEventListener('click', fetchWeather);

    /* ===== Init ===== */
    fetchWeather();
    setInterval(fetchWeather, 30 * 60 * 1000); // 30분마다 자동 갱신
  

    /* ===================================================================
       드래그 이동 + 8방향 리사이즈 (frame{x,y,w,h} · Pointer Events)
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-weather-frame-v1', minW: 280, minH: 240, defaultW: 290 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, Math.min(frame.w, window.innerWidth)); frame.h = Math.max(MIN_H, Math.min(frame.h, window.innerHeight));
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';

      /* ----- 8방향 리사이즈 (document 리스너) ----- */
      card.querySelectorAll('[data-rz]').forEach(handle => {
        handle.addEventListener('pointerdown', (e) => {
          if (active) return; active = true;
          e.preventDefault(); e.stopPropagation();
          const dir = handle.dataset.rz, sx = e.clientX, sy = e.clientY, f0 = { x: frame.x, y: frame.y, w: frame.w, h: frame.h };
          card.classList.add('resizing');
          const mv = (ev) => {
            const dx = ev.clientX - sx, dy = ev.clientY - sy;
            if (dir.includes('e')) frame.w = Math.max(MIN_W, f0.w + dx);
            if (dir.includes('s')) frame.h = Math.max(MIN_H, f0.h + dy);
            if (dir.includes('w')) { const nw = Math.max(MIN_W, f0.w - dx); frame.x = f0.x + (f0.w - nw); frame.w = nw; }
            if (dir.includes('n')) { const nh = Math.max(MIN_H, f0.h - dy); frame.y = f0.y + (f0.h - nh); frame.h = nh; }
            applyFrame();
          };
          const up = () => {
            document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
            card.classList.remove('resizing'); active = false; clampFrame(); applyFrame(); saveFrame();
          };
          document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
        });
      });

      /* ----- 드래그 이동 (이동 임계값으로 클릭과 충돌 방지) ----- */
      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-rz], [data-no-drag]')) return;
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        let started = false;
        const mv = (ev) => {
          const ddx = ev.clientX - dx0, ddy = ev.clientY - dy0;
          if (!started) {
            if (Math.abs(ddx) < 4 && Math.abs(ddy) < 4) return;
            started = true; active = true; card.classList.add('dragging');
          }
          frame.x = sx + ddx; frame.y = sy + ddy; applyFrame();
        };
        const up = () => {
          document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
          if (started) {
            card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame();
            const sc = (ce) => { ce.stopPropagation(); ce.preventDefault(); };
            window.addEventListener('click', sc, { capture: true, once: true });
            setTimeout(() => window.removeEventListener('click', sc, true), 0);
          }
        };
        document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
      });

      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });
      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
</script>
