<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날씨 위젯</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 1.75rem;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      gap: 1.25rem;
      overflow: hidden;
      box-shadow: none;
      cursor: grab;
    }

    .card.dragging { cursor: grabbing; }

    /* === Setup / error overlay === */
    .overlay {
      position: absolute;
      inset: 0;
      background: var(--card);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      z-index: 20;
    }

    .overlay.hidden { display: none; }

    .overlay-title {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--foreground);
      text-align: center;
    }

    .overlay-desc {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      text-align: center;
      line-height: 1.6;
    }

    .overlay-desc a {
      color: var(--foreground);
    }

    .api-input-group {
      display: flex;
      width: 100%;
      gap: 0.5rem;
    }

    .api-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--foreground);
      background: var(--muted);
      outline: none;
      transition: border-color var(--transition);
    }

    .api-input:focus { border-color: var(--foreground); }

    .api-save-btn {
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.875rem;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--foreground);
      background: var(--muted);
      cursor: pointer;
      transition: background var(--transition);
      white-space: nowrap;
    }

    .api-save-btn:hover { background: var(--border); }

    /* === Header (city + condition) === */
    .city-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .city-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--foreground);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .updated-time {        /* '오늘 · 흐림' */
      font-size: 12px;
      color: var(--muted-foreground);
      font-weight: 400;
      letter-spacing: -0.005em;
    }

    /* === Main weather row (icon + temp + range stacked right) === */
    .main-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin: 14px 0 0;
    }
    .temp-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .temp-value {
      font-size: 36px;
      font-weight: 800;
      color: var(--foreground);
      letter-spacing: -1px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .detail-row {
      font-size: 11px;
      color: var(--muted-foreground);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.005em;
    }
    .weather-icon { line-height: 0; user-select: none; width: 44px; height: 44px; }
    .weather-icon svg {
      width: 44px; height: 44px;
      display: block; overflow: visible;
      stroke: var(--foreground); stroke-width: 1.6;
      fill: var(--muted);
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* === Outfit advice (얇은 divider 위) === */
    .outfit-section {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      font-weight: 400;
      color: var(--foreground);
      letter-spacing: -0.005em;
    }
    .outfit-section .outfit-icon { display: none; }

    /* === (sun moon 등은 작은 동그라미만 — temp-feels/detail-item/forecast 미사용) === */

    .fc-desc { display: none; }

    .fc-temp {
      font-size: 0.75rem;
      color: var(--foreground);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.05rem;
    }

    .fc-temp .low { color: var(--muted-foreground); margin-left: 0; }

    /* === Controls === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .control-btn {
      width: 28px;
      height: 28px;
      border-radius: 0.4rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted-foreground);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background var(--transition), color var(--transition);
      position: relative;
    }
    .control-btn:hover { background: var(--muted); color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 1.75; }

    .control-btn[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      font-size: 0.6875rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.35rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .control-btn[data-tooltip]:hover::after { opacity: 1; }
      /* unify-resize: 내용은 고정폭, 카드를 키우면 바깥 여백만 늘어남 */
    .card {
      align-items: safe center;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: inherit;
      width: 100%;
    }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    /* .controls를 카드 바깥 우측으로 — 마우스 오버 시 노출 */
    #w.card { overflow: visible; }
    #w .controls { position: absolute; top: 0.5rem; right: -34px; left: auto; bottom: auto;
      display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: opacity 0.2s ease; z-index: 30; padding: 0; pointer-events: none; }
    #w:hover .controls { opacity: 1; pointer-events: auto; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
  
    /* === NOSION FRAME SPEC (드래그 이동 + 8방향 리사이즈) === */
    html,body{background:transparent;height:100%;overflow:hidden;}
    *{box-sizing:border-box;}
    .stage{position:fixed;inset:0;}
    .card{position:absolute;display:flex;flex-direction:column;touch-action:none;container-type:size;}
    .card.dragging,.card.resizing{user-select:none;box-shadow:0 12px 36px rgba(55,53,47,.16);}
    .whead{flex:none;cursor:grab;min-height:20px;width:100%;position:relative;z-index:2;background:inherit;}
    .whead:active{cursor:grabbing;}
    .wbody{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;overflow:hidden;width:100%;align-self:stretch;}
    .rz{position:absolute;z-index:5;}
    .rz.n{top:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.s{bottom:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.e{right:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.w{left:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.ne{top:-5px;right:-5px;width:14px;height:14px;cursor:nesw-resize;}
    .rz.nw{top:-5px;left:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.se{bottom:-5px;right:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.sw{bottom:-5px;left:-5px;width:14px;height:14px;cursor:nesw-resize;}
  </style>
</head>
<body>
  <!-- 손그림 rough 필터 (노시언 스타일 선 아이콘용) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="1" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs></svg>

  <div class="stage">
    <div class="card" id="w">
      <div class="whead"></div>
      <div class="wbody">

      <!-- City setup overlay (API 키 불필요 — Open-Meteo) -->
      <div class="overlay hidden" id="setupOverlay">
        <div class="overlay-title">도시 설정</div>
        <div class="overlay-desc">도시 이름을 입력하세요 (예: Seoul, Busan, Tokyo)</div>
        <div class="api-input-group">
          <input class="api-input" type="text" id="cityInput" placeholder="도시 입력" autocomplete="off" />
          <button class="api-save-btn" id="citySaveBtn" type="button">저장</button>
        </div>
      </div>

      <!-- Main content (simplified) -->
      <div class="city-row">
        <span class="city-name" id="cityLabel">서울</span>
        <span class="updated-time" id="updatedTime">오늘 · —</span>
      </div>

      <div class="main-row">
        <span class="weather-icon" id="weatherIcon" aria-hidden="true"></span>
        <div class="temp-block">
          <span class="temp-value" id="tempValue">—°</span>
          <span class="detail-row" id="tempRange">최고 —° · 최저 —°</span>
        </div>
      </div>

      <div class="outfit-section">
        <span class="outfit-text" id="outfitText">날씨 정보를 불러오는 중...</span>
      </div>

      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn" type="button"
              data-tooltip="위치 초기화" title="위치 초기화" aria-label="카드 위치 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="control-btn" id="refreshBtn" type="button"
              data-tooltip="새로고침" title="새로고침" aria-label="새로고침">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="control-btn" id="settingsBtn" type="button"
              data-tooltip="도시 변경" title="도시 변경" aria-label="도시 변경">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </button>
    </div>

</div>


  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ===== localStorage keys ===== */
    const KEY_CITY = 'nosion-weather-city-v1';
    const KEY_FC   = 'nosion-weather-forecast-open-v1';

    /* ===== State ===== */
    let city = 'Seoul';
    try { city = localStorage.getItem(KEY_CITY) || 'Seoul'; } catch (e) {}

    /* ===== Weather code map (WMO codes — Open-Meteo) → 노시언 선 아이콘 ===== */
    function wmoIcon(code, isDay) {
      const w = (inner) => `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><g filter="url(#rough)">${inner}</g></svg>`;
      const CLOUD = '<path d="M7 17h9a3.1 3.1 0 0 0 .3-6.2 4.1 4.1 0 0 0-7.8-1.1A3.3 3.3 0 0 0 7 17z"/>';
      const CLOUD_HI = '<path d="M6.5 14.5h9a3 3 0 0 0 .3-6 4 4 0 0 0-7.7-1.1A3.2 3.2 0 0 0 6.5 14.5z"/>';
      if (code === 0) return isDay
        ? w('<circle cx="12" cy="12" r="4.2"/><path d="M12 3.4v2M12 18.6v2M3.4 12h2M18.6 12h2M5.9 5.9l1.5 1.5M16.6 16.6l1.5 1.5M18.1 5.9l-1.5 1.5M7.4 16.6l-1.5 1.5"/>')
        : w('<path d="M20 14.6A8 8 0 1 1 10.8 4.7a6.2 6.2 0 0 0 9.2 9.9z"/>');
      if (code === 1 || code === 2) return w('<circle cx="8.5" cy="8.5" r="2.7"/><path d="M8.5 3.7v1.3M4.2 8.5H2.9M5.3 5.3l-.9-.9"/>' + CLOUD);
      if (code === 3) return w(CLOUD);
      if (code === 45 || code === 48) return w('<path d="M4 8.5h15M5 12.5h14M4 16.5h12M6 20h11"/>');
      if ((code >= 51 && code <= 57) || (code >= 61 && code <= 67) || (code >= 80 && code <= 82))
        return w(CLOUD_HI + '<path d="M9 17.8l-1 2.4M13 17.8l-1 2.4M17 17.8l-1 2.4"/>');
      if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86))
        return w(CLOUD_HI + '<path d="M9.5 18.6v.01M13 18.6v.01M11.2 21v.01M15 21v.01"/>');
      if (code >= 95) return w(CLOUD_HI + '<path d="M12.5 17l-2.3 3.6h2.7l-1.6 3"/>');
      return w(CLOUD);
    }
    function wmoDesc(code) {
      const M = {
        0:'맑음', 1:'대체로 맑음', 2:'부분 흐림', 3:'흐림',
        45:'안개', 48:'안개',
        51:'약한 이슬비', 53:'이슬비', 55:'강한 이슬비', 56:'언 이슬비', 57:'언 이슬비',
        61:'약한 비', 63:'비', 65:'강한 비', 66:'언 비', 67:'언 비',
        71:'약한 눈', 73:'눈', 75:'강한 눈', 77:'싸락눈',
        80:'소나기', 81:'소나기', 82:'강한 소나기', 85:'소나기눈', 86:'소나기눈',
        95:'뇌우', 96:'우박 뇌우', 99:'우박 뇌우',
      };
      return M[code] || '—';
    }

    /* ===== Nosion-style 옷차림 선 아이콘 (검정 손그림) ===== */
    const OUTFIT = {
      tshirt:    '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><g filter="url(#rough)"><path d="M9 4 L4.5 7 L6.6 9.6 L8.5 8.1 V20 H15.5 V8.1 L17.4 9.6 L19.5 7 L15 4 C14 5.4 13.1 6 12 6 C10.9 6 10 5.4 9 4 Z"/></g></svg>',
      long:      '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><g filter="url(#rough)"><path d="M9 4 L5 6 L3.6 14 L6.1 14.6 L7.6 9.2 V20 H16.4 V9.2 L17.9 14.6 L20.4 14 L19 6 L15 4 C14 5.4 13.1 6 12 6 C10.9 6 10 5.4 9 4 Z"/></g></svg>',
      coat:      '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><g filter="url(#rough)"><path d="M9 4 L5.6 6 L6.6 13 H8 V21 H16 V13 H17.4 L18.4 6 L15 4 L12 7 Z"/><path d="M12 7 V20"/></g></svg>',
      coatScarf: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><g filter="url(#rough)"><path d="M9 5 L5.6 7 L6.6 13.5 H8 V21 H16 V13.5 H17.4 L18.4 7 L15 5 L12 8 Z"/><path d="M12 8 V20"/><path d="M9.2 5.4 Q12 8.2 14.8 5.4"/></g></svg>',
    };

    /* ===== Outfit advice by temperature ===== */
    function outfitAdvice(temp) {
      if (temp >= 28) return { icon: OUTFIT.tshirt,    text: '매우 더운 날씨입니다. 반팔·반바지에 선크림을 꼭 챙기세요.' };
      if (temp >= 23) return { icon: OUTFIT.tshirt,    text: '따뜻한 날씨입니다. 얇은 셔츠나 반팔이 잘 어울려요.' };
      if (temp >= 17) return { icon: OUTFIT.long,      text: '선선한 날씨입니다. 가디건이나 얇은 재킷을 걸치세요.' };
      if (temp >= 12) return { icon: OUTFIT.coat,      text: '약간 쌀쌀합니다. 가벼운 자켓과 긴팔을 입어요.' };
      if (temp >= 7)  return { icon: OUTFIT.coat,      text: '제법 춥습니다. 코트나 두꺼운 재킷을 입고 목도리도 챙기세요.' };
      return            { icon: OUTFIT.coatScarf, text: '매우 춥습니다. 패딩·목도리·장갑으로 완전 무장하세요.' };
    }

    /* ===== Fetch current weather (Open-Meteo — API 키 불필요) ===== */
    async function fetchWeather() {
      try {
        // 1) 도시명 → 좌표 (무료 지오코딩, 키 없음)
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ko&format=json`);
        const geo = await geoRes.json();
        if (!geo.results || !geo.results.length) throw new Error('도시를 찾을 수 없습니다');
        const { latitude, longitude, name } = geo.results[0];

        // 2) 현재 날씨 + 6일 일별 예보
        const url = 'https://api.open-meteo.com/v1/forecast'
          + `?latitude=${latitude}&longitude=${longitude}`
          + '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code'
          + '&daily=weather_code,temperature_2m_max,temperature_2m_min'
          + '&timezone=auto&forecast_days=6';
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        renderWeather(data, name);
        hideSetup();
      } catch (err) {
        renderError(err.message);
      }
    }

    function renderWeather(data, cityName) {
      const c = data.current, d = data.daily;
      const temp  = Math.round(c.temperature_2m);
      const feels = Math.round(c.apparent_temperature);
      const hum   = Math.round(c.relative_humidity_2m);
      const code  = c.weather_code;
      const now   = new Date();
      const isDay = now.getHours() >= 6 && now.getHours() < 19;
      const high  = Math.round(d.temperature_2m_max[0]);
      const low   = Math.round(d.temperature_2m_min[0]);

      document.getElementById('cityLabel').textContent = cityName;
      document.getElementById('updatedTime').textContent = `오늘 · ${wmoDesc(code)}`;
      document.getElementById('tempValue').textContent   = `${temp}°`;
      document.getElementById('weatherIcon').innerHTML   = wmoIcon(code, isDay);
      document.getElementById('tempRange').textContent   = `최고 ${high}° · 최저 ${low}°`;

      const { text } = outfitAdvice(temp);
      document.getElementById('outfitText').textContent = text;
    }

    function renderError(msg) {
      document.getElementById('outfitText').textContent = `오류: ${msg}`;
    }

    /* ===== City setup overlay ===== */
    function showSetup() {
      const input = document.getElementById('cityInput');
      input.value = city;
      document.getElementById('setupOverlay').classList.remove('hidden');
      input.focus();
    }

    function hideSetup() {
      document.getElementById('setupOverlay').classList.add('hidden');
    }

    document.getElementById('citySaveBtn').addEventListener('click', () => {
      const c = document.getElementById('cityInput').value.trim() || 'Seoul';
      city = c;
      try { localStorage.setItem(KEY_CITY, city); } catch (e) {}
      hideSetup();
      fetchWeather();
    });
    document.getElementById('cityInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('citySaveBtn').click();
    });

    document.getElementById('settingsBtn').addEventListener('click', showSetup);
    document.getElementById('refreshBtn').addEventListener('click', fetchWeather);

    /* ===== Init ===== */
    fetchWeather();
    setInterval(fetchWeather, 30 * 60 * 1000); // 30분마다 자동 갱신
</script>
  <script>
(function(){
  var card=document.getElementById('w');
  var head=card.querySelector('.whead');
  var KEY='nosion-weather-widget-frame', MINW=230, MINH=200, DEFW=340, DEFH=300;
  ['n','s','e','w','ne','nw','se','sw'].forEach(function(d){
    var el=document.createElement('div');el.className='rz '+d;el.setAttribute('data-rz',d);card.appendChild(el);
  });
  var frame=load();
  function load(){try{var f=JSON.parse(localStorage.getItem(KEY));if(f&&f.w)return f;}catch(e){}
    var w=Math.min(DEFW,window.innerWidth-28),h=Math.min(DEFH,window.innerHeight-28);
    return{x:(window.innerWidth-w)/2,y:Math.max(14,(window.innerHeight-h)/2),w:w,h:h};}
  function clamp(){frame.w=Math.max(MINW,Math.min(frame.w,window.innerWidth-8));
    frame.h=Math.max(MINH,Math.min(frame.h,window.innerHeight-8));
    frame.x=Math.max(4,Math.min(frame.x,window.innerWidth-frame.w-4));
    frame.y=Math.max(4,Math.min(frame.y,window.innerHeight-frame.h-4));}
  function apply(){clamp();card.style.left=frame.x+'px';card.style.top=frame.y+'px';
    card.style.width=frame.w+'px';card.style.height=frame.h+'px';}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(frame));}catch(e){}}
  head.addEventListener('pointerdown',function(e){
    if(e.target.closest('button,input,a,.seg,.ic,.pill,[data-nodrag]'))return;drag(e);});
  card.querySelectorAll('.rz').forEach(function(hd){
    hd.addEventListener('pointerdown',function(e){resize(e,hd.getAttribute('data-rz'));});});
  function drag(e){e.preventDefault();card.classList.add('dragging');
    var sx=e.clientX,sy=e.clientY,ox=frame.x,oy=frame.y;
    function m(ev){frame.x=ox+(ev.clientX-sx);frame.y=oy+(ev.clientY-sy);apply();}
    function u(){card.classList.remove('dragging');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  function resize(e,dir){e.preventDefault();e.stopPropagation();card.classList.add('resizing');
    var sx=e.clientX,sy=e.clientY,o={x:frame.x,y:frame.y,w:frame.w,h:frame.h};
    function m(ev){var dx=ev.clientX-sx,dy=ev.clientY-sy;
      if(dir.indexOf('e')>=0){frame.w=Math.max(MINW,o.w+dx);}
      if(dir.indexOf('s')>=0){frame.h=Math.max(MINH,o.h+dy);}
      if(dir.indexOf('w')>=0){var nw=Math.max(MINW,o.w-dx);frame.x=o.x+(o.w-nw);frame.w=nw;}
      if(dir.indexOf('n')>=0){var nh=Math.max(MINH,o.h-dy);frame.y=o.y+(o.h-nh);frame.h=nh;}
      apply();}
    function u(){card.classList.remove('resizing');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  window.addEventListener('resize',apply);
  apply();
})();
</script>
