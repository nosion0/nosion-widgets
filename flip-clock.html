<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플립워치</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
      --flap-bg: hsl(220 13% 18%);     /* 플립 칸 배경(어둡게) */
      --flap-fg: hsl(0 0% 100%);       /* 숫자 색 */
      --flap-gap: hsl(220 13% 12%);    /* 위/아래 사이 분할선 */
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.875rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0; min-height: 0;
      transition: padding-top 0.2s ease;
    }
    .card.has-period { padding-top: 2.5rem; }
    .card.dragging { cursor: grabbing; }

    /* === 플립 디스플레이 === */
    .flip-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: calc(4px * var(--scale, 1));
      user-select: none;
    }

    /* 콜론 자리 — 점 없이 시·분 사이 간격만 유지 */
    .colon {
      width: calc(14px * var(--scale, 1));
      height: calc(104px * var(--scale, 1));
      flex-shrink: 0;
    }

    /* 셀: 한 자리 숫자 (TWEMCO 비율 2:3, --scale로 반응형) */
    .cell {
      position: relative;
      width: calc(70px * var(--scale, 1));
      height: calc(104px * var(--scale, 1));
      perspective: 320px;
      flex-shrink: 0;
    }

    /* 상/하단 정적 반쪽 (각각 새 값 / 이전 값) */
    .half {
      position: absolute;
      left: 0; right: 0;
      height: 50%;
      overflow: hidden;
      background: var(--flap-bg);
    }
    .half.top {
      top: 0;
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid var(--flap-gap);
    }
    .half.bottom {
      bottom: 0;
      border-radius: 0 0 8px 8px;
    }

    .half .text,
    .flap .text {
      position: absolute;
      left: 0; right: 0;
      height: calc(104px * var(--scale, 1));  /* cell 전체 높이와 동일 */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(4rem * var(--scale, 1));
      font-weight: 500;
      color: var(--flap-fg);
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .half.top .text { top: 0; }
    .half.bottom .text { bottom: 0; }

    /* 떨어지는 윗쪽 = 이전 값, 0 → -90 회전 */
    .flap {
      position: absolute;
      left: 0; right: 0;
      height: 50%;
      overflow: hidden;
      background: var(--flap-bg);
      backface-visibility: hidden;
      will-change: transform;
      z-index: 2;
    }
    .flap.top {
      top: 0;
      transform-origin: bottom;
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid var(--flap-gap);
      animation: flip-top 0.55s ease-in forwards;
    }
    .flap.bottom {
      bottom: 0;
      transform-origin: top;
      border-radius: 0 0 8px 8px;
      transform: rotateX(90deg);
      animation: flip-bottom 0.5s ease-out 0.55s forwards;
    }
    .flap.top .text { top: 0; }
    .flap.bottom .text { bottom: 0; }

    @keyframes flip-top {
      from { transform: rotateX(0deg); }
      to   { transform: rotateX(-90deg); }
    }
    @keyframes flip-bottom {
      from { transform: rotateX(90deg); }
      to   { transform: rotateX(0deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .flap.top, .flap.bottom { animation-duration: 0.01s; }
      .colon { animation: none; }
    }

    /* === 24H/12H 토글 (카드 바깥, 호버 시) === */
    .format-toggle {
      display: flex;
      justify-content: center;
      gap: 0.375rem;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .toggle-btn {
      font-family: inherit;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.025em;
      color: var(--muted-foreground);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.25rem 0.625rem;
      cursor: pointer;
      transition: background var(--transition), color var(--transition),
                  border-color var(--transition);
    }
    .toggle-btn:hover { background: var(--muted); color: var(--foreground); }
    .toggle-btn.active {
      background: var(--foreground);
      border-color: var(--foreground);
      color: var(--card);
    }

    /* === 색상 선택 (카드 바깥, 호버 시) === */
    .color-toggle {
      display: flex;
      justify-content: center;
      gap: 6px;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .color-chip {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid var(--border);
      cursor: pointer;
      padding: 0;
      background: var(--chip);
      transition: transform 0.12s ease, border-color var(--transition);
    }
    .color-chip:hover { transform: scale(1.15); }
    .color-chip.active {
      border-color: var(--foreground);
      box-shadow: 0 0 0 1.5px var(--card), 0 0 0 2.5px var(--foreground);
    }

    /* AM/PM 표시 (12H일 때만) — layout에서 빠지게 절대 위치 */
    .period {
      position: absolute;
      top: 0.875rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
    }
    .period.hidden { display: none; }

    /* === 우측 컨트롤 === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }
    .control-btn {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }
    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }
    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px; height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }
    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    /* .controls를 카드 바깥 우측으로 — 마우스 오버 시 노출 (호버 브리지로 끊김 방지) */
    #w.card { overflow: visible; }
    #w.card::after { content: ''; position: absolute; top: 0; bottom: 0; right: -40px; width: 40px; pointer-events: auto; }
    #w .controls { position: absolute; top: 0.5rem; right: -34px; left: auto; bottom: auto;
      display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: opacity 0.2s ease 0.1s; z-index: 30; padding: 0; pointer-events: none; }
    #w:hover .controls, #w .controls:hover { opacity: 1; pointer-events: auto; transition-delay: 0s; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    /* flip-clock: 시계 가운데 정렬 유지 + 토글을 카드 하단 호버 바로 이동 */
    #card.card { align-items: center; justify-content: center; }
    #card.card > .toggles { position: absolute; left: 0; right: 0; bottom: 0.75rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      opacity: 0; pointer-events: none; transition: opacity var(--transition); z-index: 25; }
    #card.card:hover > .toggles { opacity: 1; pointer-events: auto; }
    .format-toggle, .color-toggle { opacity: 1; }
  
    /* === NOSION FRAME SPEC (드래그 이동 + 8방향 리사이즈) === */
    html,body{background:transparent;height:100%;overflow:hidden;}
    *{box-sizing:border-box;}
    .stage{position:fixed;inset:0;}
    .card{position:absolute;display:flex;flex-direction:column;touch-action:none;container-type:size;}
    .card.dragging,.card.resizing{user-select:none;box-shadow:0 12px 36px rgba(55,53,47,.16);}
    .whead{flex:none;cursor:grab;min-height:20px;width:100%;position:relative;z-index:2;background:inherit;}
    .whead:active{cursor:grabbing;}
    .wbody{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;overflow:hidden;width:100%;align-self:stretch;}
    .rz{position:absolute;z-index:5;}
    .rz.n{top:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.s{bottom:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.e{right:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.w{left:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.ne{top:-5px;right:-5px;width:14px;height:14px;cursor:nesw-resize;}
    .rz.nw{top:-5px;left:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.se{bottom:-5px;right:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.sw{bottom:-5px;left:-5px;width:14px;height:14px;cursor:nesw-resize;}
  </style>
</head>
<body>
  <div class="stage">
    <div class="card" id="w">
      <div class="whead"></div>
      <div class="wbody">
      <div class="period" id="period"></div>

      <div class="flip-row" id="flipRow">
        <div class="cell" data-pos="h1"><div class="half top"><div class="text">0</div></div><div class="half bottom"><div class="text">0</div></div></div>
      </div>
        <div class="cell" data-pos="h2"><div class="half top"><div class="text">0</div></div><div class="half bottom"><div class="text">0</div></div></div>
        <div class="colon" aria-hidden="true"></div>
        <div class="cell" data-pos="m1"><div class="half top"><div class="text">0</div></div><div class="half bottom"><div class="text">0</div></div></div>
        <div class="cell" data-pos="m2"><div class="half top"><div class="text">0</div></div><div class="half bottom"><div class="text">0</div></div></div>
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="위치 초기화" title="위치 초기화"
              type="button" aria-label="카드 위치 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>

      <div class="toggles">
        <div class="format-toggle">
          <button class="toggle-btn" type="button" data-format="24">24H</button>
          <button class="toggle-btn" type="button" data-format="12">12H</button>
        </div>
        <div class="color-toggle">
          <button class="color-chip" type="button" data-color="black" style="--chip: hsl(220 13% 18%);" aria-label="검정"></button>
          <button class="color-chip" type="button" data-color="dark"  style="--chip: hsl(220 10% 38%);" aria-label="진한 회색"></button>
          <button class="color-chip" type="button" data-color="mid"   style="--chip: hsl(220 10% 60%);" aria-label="중간 회색"></button>
          <button class="color-chip" type="button" data-color="light" style="--chip: hsl(220 10% 82%);" aria-label="옅은 회색"></button>
        </div>
      </div>

    </div>
  </div>

  <script>
    'use strict';
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();

    const FORMAT_KEY = 'nosion-flip-clock-format-v1';
    const COLOR_KEY  = 'nosion-flip-clock-color-v1';
    /* ============================================
       색상 테마 (플립 칸 배경 + 숫자색 + 분할선)
       ============================================ */
    const COLORS = {
      black: { bg: 'hsl(220 13% 18%)', fg: 'hsl(0 0% 100%)',     gap: 'hsl(220 13% 11%)' },
      dark:  { bg: 'hsl(220 10% 38%)', fg: 'hsl(0 0% 100%)',     gap: 'hsl(220 10% 30%)' },
      mid:   { bg: 'hsl(220 10% 60%)', fg: 'hsl(0 0% 100%)',     gap: 'hsl(220 10% 52%)' },
      light: { bg: 'hsl(220 10% 82%)', fg: 'hsl(220 13% 24%)',   gap: 'hsl(220 10% 74%)' }
    };
    let color = 'black';
    try { color = COLORS[localStorage.getItem(COLOR_KEY)] ? localStorage.getItem(COLOR_KEY) : 'black'; } catch (e) {}
    function applyColor() {
      const c = COLORS[color] || COLORS.black;
      document.documentElement.style.setProperty('--flap-bg', c.bg);
      document.documentElement.style.setProperty('--flap-fg', c.fg);
      document.documentElement.style.setProperty('--flap-gap', c.gap);
      document.querySelectorAll('.color-chip').forEach(b => b.classList.toggle('active', b.dataset.color === color));
    }
    document.querySelectorAll('.color-chip').forEach(b => {
      b.addEventListener('click', () => {
        color = b.dataset.color;
        try { localStorage.setItem(COLOR_KEY, color); } catch (e) {}
        applyColor();
      });
    });
    applyColor();

    /* ============================================
       플립 메커니즘 — 셀당 현재 값 추적, 변경 시 split-flap 애니메이션
       ============================================ */
    const cells = {};
    document.querySelectorAll('.cell').forEach(cell => {
      const pos = cell.dataset.pos;
      cells[pos] = { el: cell, value: '0' };
    });
    const KEYS = Object.keys(cells);

    function flipCell(pos, newValue) {
      const cell = cells[pos];
      const oldValue = cell.value;
      const next = String(newValue);
      if (oldValue === next) return;
      cell.value = next;

      const halfTopText    = cell.el.querySelector('.half.top .text');
      const halfBottomText = cell.el.querySelector('.half.bottom .text');

      // 윗쪽 정적 반쪽은 새 값 즉시 표시 (떨어지는 플랩에 가려 있음)
      halfTopText.textContent = next;
      // 아랫쪽 정적 반쪽은 일단 옛 값 유지 — 애니메이션 종료 후 갱신

      // 플랩 두 개 생성: 위쪽(옛 값, 떨어짐) + 아래쪽(새 값, 올라옴)
      const flapTop = document.createElement('div');
      flapTop.className = 'flap top';
      flapTop.innerHTML = `<div class="text">${oldValue}</div>`;

      const flapBottom = document.createElement('div');
      flapBottom.className = 'flap bottom';
      flapBottom.innerHTML = `<div class="text">${next}</div>`;

      cell.el.appendChild(flapTop);
      cell.el.appendChild(flapBottom);

      // 아래쪽 플랩 애니메이션 끝나면 정적 아랫쪽 반쪽 갱신 + 플랩 제거
      flapBottom.addEventListener('animationend', () => {
        halfBottomText.textContent = next;
        flapTop.remove();
        flapBottom.remove();
      }, { once: true });
    }

    /* ============================================
       포맷 (24H / 12H)
       ============================================ */
    let format = '24';
    try { format = localStorage.getItem(FORMAT_KEY) || '24'; } catch (e) {}
    function applyFormat() {
      document.querySelectorAll('.toggle-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.format === format);
      });
      document.getElementById('w').classList.toggle('has-period', format === '12');
    }
    document.querySelectorAll('.toggle-btn').forEach(b => {
      b.addEventListener('click', () => {
        format = b.dataset.format;
        try { localStorage.setItem(FORMAT_KEY, format); } catch (e) {}
        applyFormat();
        update(true);  // 즉시 갱신 (애니 없이)
      });
    });
    applyFormat();

    /* ============================================
       시각 갱신
       ============================================ */
    const periodEl = document.getElementById('period');

    function pad(n) { return String(n).padStart(2, '0'); }

    function update(silent) {
      const now = new Date();
      let h = now.getHours();
      const m = now.getMinutes();

      if (format === '12') {
        periodEl.textContent = h >= 12 ? 'PM' : 'AM';
        h = h % 12;
        if (h === 0) h = 12;
        periodEl.classList.remove('hidden');
      } else {
        periodEl.textContent = '';
        periodEl.classList.add('hidden');
      }

      const hh = pad(h);
      const mm = pad(m);
      const next = { h1: hh[0], h2: hh[1], m1: mm[0], m2: mm[1] };

      if (silent) {
        KEYS.forEach(k => {
          const cell = cells[k];
          cell.value = next[k];
          cell.el.querySelector('.half.top .text').textContent = next[k];
          cell.el.querySelector('.half.bottom .text').textContent = next[k];
        });
      } else {
        KEYS.forEach(k => flipCell(k, next[k]));
      }
    }

    update(true);
    // 분 단위로만 변하므로 매 초 호출해도 next 비교로 no-op
    setInterval(update, 1000);

    /* flip-clock: 카드 폭에 따라 --scale 비례 조절(스펙 외 위젯 자체 동작) */
    new ResizeObserver(function(){
      var c=document.getElementById('w'); if(!c) return;
      var s=Math.max(0.75,Math.min(1.6, c.getBoundingClientRect().width/360));
      c.style.setProperty('--scale', s.toFixed(3));
    }).observe(document.getElementById('w'));
</script>
  <script>
(function(){
  var card=document.getElementById('w');
  var head=card.querySelector('.whead');
  var KEY='nosion-flip-clock-frame', MINW=230, MINH=200, DEFW=340, DEFH=300;
  ['n','s','e','w','ne','nw','se','sw'].forEach(function(d){
    var el=document.createElement('div');el.className='rz '+d;el.setAttribute('data-rz',d);card.appendChild(el);
  });
  var frame=load();
  function load(){try{var f=JSON.parse(localStorage.getItem(KEY));if(f&&f.w)return f;}catch(e){}
    var w=Math.min(DEFW,window.innerWidth-28),h=Math.min(DEFH,window.innerHeight-28);
    return{x:(window.innerWidth-w)/2,y:Math.max(14,(window.innerHeight-h)/2),w:w,h:h};}
  function clamp(){frame.w=Math.max(MINW,Math.min(frame.w,window.innerWidth-8));
    frame.h=Math.max(MINH,Math.min(frame.h,window.innerHeight-8));
    frame.x=Math.max(4,Math.min(frame.x,window.innerWidth-frame.w-4));
    frame.y=Math.max(4,Math.min(frame.y,window.innerHeight-frame.h-4));}
  function apply(){clamp();card.style.left=frame.x+'px';card.style.top=frame.y+'px';
    card.style.width=frame.w+'px';card.style.height=frame.h+'px';}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(frame));}catch(e){}}
  head.addEventListener('pointerdown',function(e){
    if(e.target.closest('button,input,a,.seg,.ic,.pill,[data-nodrag]'))return;drag(e);});
  card.querySelectorAll('.rz').forEach(function(hd){
    hd.addEventListener('pointerdown',function(e){resize(e,hd.getAttribute('data-rz'));});});
  function drag(e){e.preventDefault();card.classList.add('dragging');
    var sx=e.clientX,sy=e.clientY,ox=frame.x,oy=frame.y;
    function m(ev){frame.x=ox+(ev.clientX-sx);frame.y=oy+(ev.clientY-sy);apply();}
    function u(){card.classList.remove('dragging');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  function resize(e,dir){e.preventDefault();e.stopPropagation();card.classList.add('resizing');
    var sx=e.clientX,sy=e.clientY,o={x:frame.x,y:frame.y,w:frame.w,h:frame.h};
    function m(ev){var dx=ev.clientX-sx,dy=ev.clientY-sy;
      if(dir.indexOf('e')>=0){frame.w=Math.max(MINW,o.w+dx);}
      if(dir.indexOf('s')>=0){frame.h=Math.max(MINH,o.h+dy);}
      if(dir.indexOf('w')>=0){var nw=Math.max(MINW,o.w-dx);frame.x=o.x+(o.w-nw);frame.w=nw;}
      if(dir.indexOf('n')>=0){var nh=Math.max(MINH,o.h-dy);frame.y=o.y+(o.h-nh);frame.h=nh;}
      apply();}
    function u(){card.classList.remove('resizing');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  window.addEventListener('resize',apply);
  apply();
})();
</script>
</body>
</html>
