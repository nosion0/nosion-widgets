<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플립워치</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
      --flap-bg: hsl(220 13% 18%);     /* 플립 칸 배경(어둡게) */
      --flap-fg: hsl(0 0% 100%);       /* 숫자 색 */
      --flap-gap: hsl(220 13% 12%);    /* 위/아래 사이 분할선 */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .widget-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      position: relative;
      width: fit-content;
    }

    .card-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.875rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 360px;
      position: relative;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
      transition: padding-top 0.2s ease;
    }
    .card.has-period { padding-top: 2.5rem; }
    .card.dragging { cursor: grabbing; }

    /* === 플립 디스플레이 === */
    .flip-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: calc(4px * var(--scale, 1));
      user-select: none;
    }

    /* 콜론 자리 — 점 없이 시·분 사이 간격만 유지 */
    .colon {
      width: calc(14px * var(--scale, 1));
      height: calc(104px * var(--scale, 1));
      flex-shrink: 0;
    }

    /* 셀: 한 자리 숫자 (TWEMCO 비율 2:3, --scale로 반응형) */
    .cell {
      position: relative;
      width: calc(70px * var(--scale, 1));
      height: calc(104px * var(--scale, 1));
      perspective: 320px;
      flex-shrink: 0;
    }

    /* 상/하단 정적 반쪽 (각각 새 값 / 이전 값) */
    .half {
      position: absolute;
      left: 0; right: 0;
      height: 50%;
      overflow: hidden;
      background: var(--flap-bg);
    }
    .half.top {
      top: 0;
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid var(--flap-gap);
    }
    .half.bottom {
      bottom: 0;
      border-radius: 0 0 8px 8px;
    }

    .half .text,
    .flap .text {
      position: absolute;
      left: 0; right: 0;
      height: calc(104px * var(--scale, 1));  /* cell 전체 높이와 동일 */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(4rem * var(--scale, 1));
      font-weight: 500;
      color: var(--flap-fg);
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .half.top .text { top: 0; }
    .half.bottom .text { bottom: 0; }

    /* 떨어지는 윗쪽 = 이전 값, 0 → -90 회전 */
    .flap {
      position: absolute;
      left: 0; right: 0;
      height: 50%;
      overflow: hidden;
      background: var(--flap-bg);
      backface-visibility: hidden;
      will-change: transform;
      z-index: 2;
    }
    .flap.top {
      top: 0;
      transform-origin: bottom;
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid var(--flap-gap);
      animation: flip-top 0.55s ease-in forwards;
    }
    .flap.bottom {
      bottom: 0;
      transform-origin: top;
      border-radius: 0 0 8px 8px;
      transform: rotateX(90deg);
      animation: flip-bottom 0.5s ease-out 0.55s forwards;
    }
    .flap.top .text { top: 0; }
    .flap.bottom .text { bottom: 0; }

    @keyframes flip-top {
      from { transform: rotateX(0deg); }
      to   { transform: rotateX(-90deg); }
    }
    @keyframes flip-bottom {
      from { transform: rotateX(90deg); }
      to   { transform: rotateX(0deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .flap.top, .flap.bottom { animation-duration: 0.01s; }
      .colon { animation: none; }
    }

    /* === 24H/12H 토글 (카드 바깥, 호버 시) === */
    .format-toggle {
      display: flex;
      justify-content: center;
      gap: 0.375rem;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .widget-wrapper:hover .format-toggle { opacity: 1; }

    .toggle-btn {
      font-family: inherit;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.025em;
      color: var(--muted-foreground);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.25rem 0.625rem;
      cursor: pointer;
      transition: background var(--transition), color var(--transition),
                  border-color var(--transition);
    }
    .toggle-btn:hover { background: var(--muted); color: var(--foreground); }
    .toggle-btn.active {
      background: var(--foreground);
      border-color: var(--foreground);
      color: var(--card);
    }

    /* === 색상 선택 (카드 바깥, 호버 시) === */
    .color-toggle {
      display: flex;
      justify-content: center;
      gap: 6px;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .widget-wrapper:hover .color-toggle { opacity: 1; }
    .color-chip {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid var(--border);
      cursor: pointer;
      padding: 0;
      background: var(--chip);
      transition: transform 0.12s ease, border-color var(--transition);
    }
    .color-chip:hover { transform: scale(1.15); }
    .color-chip.active {
      border-color: var(--foreground);
      box-shadow: 0 0 0 1.5px var(--card), 0 0 0 2.5px var(--foreground);
    }

    /* AM/PM 표시 (12H일 때만) — layout에서 빠지게 절대 위치 */
    .period {
      position: absolute;
      top: 0.875rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
    }
    .period.hidden { display: none; }

    /* === 우측 컨트롤 === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }
    .widget-wrapper:hover .controls { opacity: 1; }
    .control-btn {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }
    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }
    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px; height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }
    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }

    /* === 리사이즈 핸들 === */
    .resize-handle {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      user-select: none; z-index: 20;
    }
    .resize-handle .bar {
      background: var(--border);
      transition: opacity var(--transition), background var(--transition),
                  width 0.15s ease, height 0.15s ease;
      border-radius: 999px;
      opacity: 0;
    }
    .widget-wrapper:hover .resize-handle .bar { opacity: 1; }
    .resize-handle:hover .bar { background: var(--muted-foreground); }
    .handle-top { top: 0; left: 50%; transform: translate(-50%, -50%); width: 36px; height: 16px; cursor: ns-resize; }
    .handle-top .bar { width: 36px; height: 1px; }
    .handle-top:hover .bar { height: 3px; }
    .handle-bottom { bottom: 0; left: 50%; transform: translate(-50%, 50%); width: 36px; height: 16px; cursor: ns-resize; }
    .handle-bottom .bar { width: 36px; height: 1px; }
    .handle-bottom:hover .bar { height: 3px; }
    .handle-left { left: 0; top: 50%; transform: translate(-50%, -50%); width: 16px; height: 36px; cursor: ew-resize; }
    .handle-left .bar { width: 1px; height: 36px; }
    .handle-left:hover .bar { width: 3px; }
    .handle-right { right: 0; top: 50%; transform: translate(50%, -50%); width: 16px; height: 36px; cursor: ew-resize; }
    .handle-right .bar { width: 1px; height: 36px; }
    .handle-right:hover .bar { width: 3px; }
  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">
    <div class="card-stack">
    <div class="card" id="card">

      <div class="period" id="period"></div>

      <div class="flip-row" id="flipRow">
        <div class="cell" data-pos="h1"><div class="half top"><div class="text">0</div></div><div class="half bottom"><div class="text">0</div></div></div>
        <div class="cell" data-pos="h2"><div class="half top"><div class="text">0</div></div><div class="half bottom"><div class="text">0</div></div></div>
        <div class="colon" aria-hidden="true"></div>
        <div class="cell" data-pos="m1"><div class="half top"><div class="text">0</div></div><div class="half bottom"><div class="text">0</div></div></div>
        <div class="cell" data-pos="m2"><div class="half top"><div class="text">0</div></div><div class="half bottom"><div class="text">0</div></div></div>
      </div>

      <div class="resize-handle handle-top" data-direction="top"><div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left" data-direction="left"><div class="bar"></div></div>
      <div class="resize-handle handle-right" data-direction="right"><div class="bar"></div></div>
    </div>

      <div class="format-toggle">
        <button class="toggle-btn" type="button" data-format="24">24H</button>
        <button class="toggle-btn" type="button" data-format="12">12H</button>
      </div>
      <div class="color-toggle">
        <button class="color-chip" type="button" data-color="black" style="--chip: hsl(220 13% 18%);" aria-label="검정"></button>
        <button class="color-chip" type="button" data-color="dark"  style="--chip: hsl(220 10% 38%);" aria-label="진한 회색"></button>
        <button class="color-chip" type="button" data-color="mid"   style="--chip: hsl(220 10% 60%);" aria-label="중간 회색"></button>
        <button class="color-chip" type="button" data-color="light" style="--chip: hsl(220 10% 82%);" aria-label="옅은 회색"></button>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="크기 초기화" title="크기 초기화"
              type="button" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    'use strict';

    const FORMAT_KEY = 'nosion-flip-clock-format-v1';
    const COLOR_KEY  = 'nosion-flip-clock-color-v1';
    const SIZE_KEY   = 'nosion-flip-clock-size-v1';
    const POS_KEY    = 'nosion-flip-clock-pos-v1';

    /* ============================================
       색상 테마 (플립 칸 배경 + 숫자색 + 분할선)
       ============================================ */
    const COLORS = {
      black: { bg: 'hsl(220 13% 18%)', fg: 'hsl(0 0% 100%)',     gap: 'hsl(220 13% 11%)' },
      dark:  { bg: 'hsl(220 10% 38%)', fg: 'hsl(0 0% 100%)',     gap: 'hsl(220 10% 30%)' },
      mid:   { bg: 'hsl(220 10% 60%)', fg: 'hsl(0 0% 100%)',     gap: 'hsl(220 10% 52%)' },
      light: { bg: 'hsl(220 10% 82%)', fg: 'hsl(220 13% 24%)',   gap: 'hsl(220 10% 74%)' }
    };
    let color = 'black';
    try { color = COLORS[localStorage.getItem(COLOR_KEY)] ? localStorage.getItem(COLOR_KEY) : 'black'; } catch (e) {}
    function applyColor() {
      const c = COLORS[color] || COLORS.black;
      document.documentElement.style.setProperty('--flap-bg', c.bg);
      document.documentElement.style.setProperty('--flap-fg', c.fg);
      document.documentElement.style.setProperty('--flap-gap', c.gap);
      document.querySelectorAll('.color-chip').forEach(b => b.classList.toggle('active', b.dataset.color === color));
    }
    document.querySelectorAll('.color-chip').forEach(b => {
      b.addEventListener('click', () => {
        color = b.dataset.color;
        try { localStorage.setItem(COLOR_KEY, color); } catch (e) {}
        applyColor();
      });
    });
    applyColor();

    /* ============================================
       플립 메커니즘 — 셀당 현재 값 추적, 변경 시 split-flap 애니메이션
       ============================================ */
    const cells = {};
    document.querySelectorAll('.cell').forEach(cell => {
      const pos = cell.dataset.pos;
      cells[pos] = { el: cell, value: '0' };
    });
    const KEYS = Object.keys(cells);

    function flipCell(pos, newValue) {
      const cell = cells[pos];
      const oldValue = cell.value;
      const next = String(newValue);
      if (oldValue === next) return;
      cell.value = next;

      const halfTopText    = cell.el.querySelector('.half.top .text');
      const halfBottomText = cell.el.querySelector('.half.bottom .text');

      // 윗쪽 정적 반쪽은 새 값 즉시 표시 (떨어지는 플랩에 가려 있음)
      halfTopText.textContent = next;
      // 아랫쪽 정적 반쪽은 일단 옛 값 유지 — 애니메이션 종료 후 갱신

      // 플랩 두 개 생성: 위쪽(옛 값, 떨어짐) + 아래쪽(새 값, 올라옴)
      const flapTop = document.createElement('div');
      flapTop.className = 'flap top';
      flapTop.innerHTML = `<div class="text">${oldValue}</div>`;

      const flapBottom = document.createElement('div');
      flapBottom.className = 'flap bottom';
      flapBottom.innerHTML = `<div class="text">${next}</div>`;

      cell.el.appendChild(flapTop);
      cell.el.appendChild(flapBottom);

      // 아래쪽 플랩 애니메이션 끝나면 정적 아랫쪽 반쪽 갱신 + 플랩 제거
      flapBottom.addEventListener('animationend', () => {
        halfBottomText.textContent = next;
        flapTop.remove();
        flapBottom.remove();
      }, { once: true });
    }

    /* ============================================
       포맷 (24H / 12H)
       ============================================ */
    let format = '24';
    try { format = localStorage.getItem(FORMAT_KEY) || '24'; } catch (e) {}
    function applyFormat() {
      document.querySelectorAll('.toggle-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.format === format);
      });
      document.getElementById('card').classList.toggle('has-period', format === '12');
    }
    document.querySelectorAll('.toggle-btn').forEach(b => {
      b.addEventListener('click', () => {
        format = b.dataset.format;
        try { localStorage.setItem(FORMAT_KEY, format); } catch (e) {}
        applyFormat();
        update(true);  // 즉시 갱신 (애니 없이)
      });
    });
    applyFormat();

    /* ============================================
       시각 갱신
       ============================================ */
    const periodEl = document.getElementById('period');

    function pad(n) { return String(n).padStart(2, '0'); }

    function update(silent) {
      const now = new Date();
      let h = now.getHours();
      const m = now.getMinutes();

      if (format === '12') {
        periodEl.textContent = h >= 12 ? 'PM' : 'AM';
        h = h % 12;
        if (h === 0) h = 12;
        periodEl.classList.remove('hidden');
      } else {
        periodEl.textContent = '';
        periodEl.classList.add('hidden');
      }

      const hh = pad(h);
      const mm = pad(m);
      const next = { h1: hh[0], h2: hh[1], m1: mm[0], m2: mm[1] };

      if (silent) {
        KEYS.forEach(k => {
          const cell = cells[k];
          cell.value = next[k];
          cell.el.querySelector('.half.top .text').textContent = next[k];
          cell.el.querySelector('.half.bottom .text').textContent = next[k];
        });
      } else {
        KEYS.forEach(k => flipCell(k, next[k]));
      }
    }

    update(true);
    // 분 단위로만 변하므로 매 초 호출해도 next 비교로 no-op
    setInterval(update, 1000);

    /* ============================================
       4방향 리사이즈
       ============================================ */
    const MIN_WIDTH = 280, MAX_WIDTH = 600, MIN_HEIGHT = 200, MAX_HEIGHT = 420;
    const DEFAULT_WIDTH = 360;
    const cardEl = document.getElementById('card');
    const widgetEl = document.getElementById('widget');

    let cardWidth = DEFAULT_WIDTH;
    let cardHeight = null;
    try {
      const sz = JSON.parse(localStorage.getItem(SIZE_KEY) || 'null');
      if (sz) {
        if (typeof sz.width === 'number')  cardWidth  = Math.max(MIN_WIDTH,  Math.min(MAX_WIDTH,  sz.width));
        if (typeof sz.height === 'number' && sz.height > 0) cardHeight = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, sz.height));
      }
    } catch (e) {}

    function applyCardSize() {
      cardEl.style.width = cardWidth + 'px';
      cardEl.style.height = cardHeight !== null ? cardHeight + 'px' : '';
    }

    /* 카드 width에 비례해 시계 크기 자동 조정 (0.75 ~ 1.6배 사이) */
    function updateScale() {
      const w = cardEl.getBoundingClientRect().width;
      const scale = Math.max(0.75, Math.min(1.6, w / 360));
      cardEl.style.setProperty('--scale', scale.toFixed(3));
    }
    new ResizeObserver(updateScale).observe(cardEl);
    updateScale();
    function saveSize() {
      try { localStorage.setItem(SIZE_KEY, JSON.stringify({ width: cardWidth, height: cardHeight })); } catch (e) {}
    }

    let resizeDrag = null, startLeft = 0, startTop = 0;
    function startResize(direction, x, y) {
      const rect = cardEl.getBoundingClientRect();
      resizeDrag = { direction, startX: x, startY: y, startWidth: rect.width, startHeight: rect.height };
      if (getComputedStyle(widgetEl).position !== 'fixed') {
        const wr = widgetEl.getBoundingClientRect();
        widgetEl.style.position = 'fixed';
        widgetEl.style.left = wr.left + 'px';
        widgetEl.style.top = wr.top + 'px';
        widgetEl.style.transform = 'none';
        offsetX = 0; offsetY = 0;
      }
      startLeft = parseFloat(widgetEl.style.left) || 0;
      startTop = parseFloat(widgetEl.style.top) || 0;
      document.body.style.userSelect = 'none';
      document.body.style.cursor = (direction === 'left' || direction === 'right') ? 'ew-resize' : 'ns-resize';
    }
    function moveResize(x, y) {
      if (!resizeDrag) return;
      const dx = x - resizeDrag.startX, dy = y - resizeDrag.startY, dir = resizeDrag.direction;
      if (dir === 'right' || dir === 'left') {
        const delta = dir === 'right' ? dx : -dx;
        cardWidth = Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, resizeDrag.startWidth + 2 * delta));
        const actual = cardWidth - resizeDrag.startWidth;
        if (widgetEl.style.position === 'fixed') widgetEl.style.left = (startLeft - actual / 2) + 'px';
      }
      if (dir === 'bottom' || dir === 'top') {
        const delta = dir === 'bottom' ? dy : -dy;
        cardHeight = Math.min(MAX_HEIGHT, Math.max(MIN_HEIGHT, resizeDrag.startHeight + 2 * delta));
        const actual = cardHeight - resizeDrag.startHeight;
        if (widgetEl.style.position === 'fixed') widgetEl.style.top = (startTop - actual / 2) + 'px';
      }
      applyCardSize();
    }
    function endResize() {
      if (!resizeDrag) return;
      saveSize();
      resizeDrag = null;
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
    }
    document.querySelectorAll('.resize-handle').forEach(handle => {
      const direction = handle.dataset.direction;
      handle.addEventListener('mousedown', (e) => { e.preventDefault(); e.stopPropagation(); startResize(direction, e.clientX, e.clientY); });
      handle.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; startResize(direction, t.clientX, t.clientY); }, { passive: false });
    });
    document.addEventListener('mousemove', (e) => { if (resizeDrag) { e.preventDefault(); moveResize(e.clientX, e.clientY); } });
    document.addEventListener('mouseup', endResize);
    document.addEventListener('touchmove', (e) => { if (resizeDrag) { const t = e.touches[0]; moveResize(t.clientX, t.clientY); } }, { passive: true });
    document.addEventListener('touchend', endResize);
    document.addEventListener('touchcancel', endResize);
    applyCardSize();

    /* ============================================
       위치 이동 (카드 빈 영역 드래그)
       ============================================ */
    let offsetX = 0, offsetY = 0, moveDrag = null;
    try {
      const p = JSON.parse(localStorage.getItem(POS_KEY) || 'null');
      if (p) { if (typeof p.x === 'number') offsetX = p.x; if (typeof p.y === 'number') offsetY = p.y; }
    } catch (e) {}
    function applyPosition() { widgetEl.style.transform = `translate(${offsetX}px, ${offsetY}px)`; }
    function savePosition() { try { localStorage.setItem(POS_KEY, JSON.stringify({ x: offsetX, y: offsetY })); } catch (e) {} }

    function isDraggableTarget(target) {
      if (!target.closest) return false;
      const blocked = ['.control-btn', '.resize-handle', 'button', '[contenteditable]', 'a', 'input'];
      for (const sel of blocked) if (target.closest(sel)) return false;
      return true;
    }
    function startMove(x, y) {
      moveDrag = { startX: x, startY: y, startOffsetX: offsetX, startOffsetY: offsetY };
      document.body.style.userSelect = 'none';
      cardEl.classList.add('dragging');
    }
    function doMove(x, y) {
      if (!moveDrag) return;
      offsetX = moveDrag.startOffsetX + (x - moveDrag.startX);
      offsetY = moveDrag.startOffsetY + (y - moveDrag.startY);
      applyPosition();
    }
    function endMove() {
      if (!moveDrag) return;
      savePosition();
      moveDrag = null;
      document.body.style.userSelect = '';
      cardEl.classList.remove('dragging');
    }
    applyPosition();
    cardEl.addEventListener('mousedown', (e) => { if (!isDraggableTarget(e.target)) return; e.preventDefault(); startMove(e.clientX, e.clientY); });
    cardEl.addEventListener('touchstart', (e) => { if (!isDraggableTarget(e.target)) return; const t = e.touches[0]; startMove(t.clientX, t.clientY); }, { passive: true });
    document.addEventListener('mousemove', (e) => { if (moveDrag) { e.preventDefault(); doMove(e.clientX, e.clientY); } });
    document.addEventListener('mouseup', endMove);
    document.addEventListener('touchmove', (e) => { if (moveDrag) { const t = e.touches[0]; doMove(t.clientX, t.clientY); } }, { passive: true });
    document.addEventListener('touchend', endMove);
    document.addEventListener('touchcancel', endMove);

    document.getElementById('resizeResetBtn').addEventListener('click', () => {
      cardWidth = DEFAULT_WIDTH; cardHeight = null; applyCardSize(); saveSize();
      offsetX = 0; offsetY = 0; applyPosition(); savePosition();
    });
  </script>
</body>
</html>
