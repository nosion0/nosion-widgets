<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데이카운터</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: hsl(0 0% 100%);
      color: hsl(220 10% 55%);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ===== Widget wrapper ===== */
    .widget-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: relative;
      width: fit-content;
    }

    /* ===== Left panel (hover only) ===== */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      flex-shrink: 0;
    }

    .widget-wrapper:hover .left-panel {
      opacity: 1;
      pointer-events: auto;
    }

    .panel-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid hsl(220 9% 86%);
      border-radius: 0.5rem;
      background: hsl(0 0% 100%);
      padding: 0.4rem 0.7rem;
      font-size: 0.75rem;
      font-family: inherit;
      color: hsl(215 14% 50%);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      text-align: left;
    }

    .panel-btn:hover {
      background: hsl(210 20% 96%);
    }

    .panel-btn.cols-active {
      border-color: hsl(145 45% 48%);
      color: hsl(145 45% 38%);
    }

    .panel-btn svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      stroke: currentColor;
    }

    /* Legend */
    .legend {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      padding: 0.375rem 0.25rem 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.6875rem;
      color: hsl(215 14% 50%);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot.past    { background: hsl(220 15% 16%); }
    .legend-dot.future  { background: hsl(220 9% 87%); }
    .legend-dot.holiday { background: hsl(215 12% 65%); }

    /* ===== Card ===== */
    .card {
      background: hsl(0 0% 100%);
      border: 1px solid hsl(220 9% 88%);
      border-radius: 0.875rem;
      padding: 1.5rem 1.25rem 1.25rem;
      width: 280px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      overflow: hidden;
      box-shadow: none;
      cursor: grab;
    }

    .card.dragging { cursor: grabbing; }

    /* ===== Mode title ===== */
    .mode-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: hsl(220 15% 16%);
      letter-spacing: -0.02em;
      user-select: none;
    }

    /* ===== Dot grid ===== */
    .dot-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 7), 1fr);
      gap: 2.5px;
      width: 100%;
      transition: opacity 0.15s ease;
    }

    .dot-grid.fading { opacity: 0; }

    .dot {
      aspect-ratio: 1;
      border-radius: 50%;
      background: hsl(220 15% 16%);
    }

    .dot.future        { background: hsl(220 9% 87%); }
    .dot.holiday-past  { background: hsl(215 12% 65%); }
    .dot.holiday-future{ background: hsl(215 10% 78%); }

    /* ===== Resize handles ===== */
    .resize-handle {
      position: absolute;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .handle-top, .handle-bottom { left: 0; right: 0; height: 12px; cursor: ns-resize; }
    .handle-top    { top: 0; }
    .handle-bottom { bottom: 0; }
    .handle-left, .handle-right { top: 0; bottom: 0; width: 12px; cursor: ew-resize; }
    .handle-left  { left: 0; }
    .handle-right { right: 0; }

    .resize-handle .bar {
      border-radius: 99px;
      background: hsl(220 9% 84%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .handle-top .bar, .handle-bottom .bar { width: 32px; height: 3px; }
    .handle-left .bar, .handle-right .bar { width: 3px; height: 32px; }
    .resize-handle:hover .bar { opacity: 1; }
  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">

    <!-- Left hover panel -->
    <div class="left-panel" id="leftPanel">
      <button class="panel-btn" id="modeBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span id="modeBtnLabel">분기</span>
      </button>

      <button class="panel-btn" id="holidayBtn" type="button">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span id="holidayBtnLabel">휴일: 표시</span>
      </button>

      <button class="panel-btn cols-active" id="colBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span id="colBtnLabel">7열</span>
      </button>

      <div class="legend" id="legend">
        <div class="legend-item">
          <span class="legend-dot past"></span>지난 날
        </div>
        <div class="legend-item">
          <span class="legend-dot future"></span>미래
        </div>
        <div class="legend-item" id="holidayLegend">
          <span class="legend-dot holiday"></span>휴일
        </div>
      </div>
    </div>

    <!-- Main card -->
    <div class="card" id="card">
      <div class="mode-title" id="modeTitle">2분기</div>
      <div class="dot-grid" id="dotGrid"></div>

      <div class="resize-handle handle-top"    data-direction="top">   <div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left"   data-direction="left">  <div class="bar"></div></div>
      <div class="resize-handle handle-right"  data-direction="right"> <div class="bar"></div></div>
    </div>
  </div>

  <script>
    /* ===== Korean public holidays 2025–2026 ===== */
    const HOLIDAYS = new Set([
      '2025-01-01','2025-01-28','2025-01-29','2025-01-30',
      '2025-03-01','2025-04-06','2025-05-05','2025-05-06',
      '2025-06-06','2025-08-15','2025-10-03','2025-10-05',
      '2025-10-06','2025-10-07','2025-10-08','2025-10-09','2025-12-25',
      '2026-01-01','2026-02-16','2026-02-17','2026-02-18',
      '2026-03-01','2026-05-05','2026-05-24','2026-06-06',
      '2026-08-15','2026-09-24','2026-09-25','2026-09-26',
      '2026-10-03','2026-10-09','2026-12-25',
    ]);

    /* ===== localStorage keys ===== */
    const KEY_MODE     = 'nosion-day-counter-mode-v1';
    const KEY_HOLIDAYS = 'nosion-day-counter-holidays-v1';
    const KEY_COLS     = 'nosion-day-counter-cols-v1';
    const KEY_SIZE     = 'nosion-day-counter-size-v1';
    const KEY_POS      = 'nosion-day-counter-pos-v1';

    /* ===== Column options per mode ===== */
    const COL_OPTIONS = {
      year:    [15, 20, 25],
      quarter: [7, 10, 13],
    };

    /* ===== State ===== */
    let mode = 'quarter';
    let showHolidays = true;
    let colIdx = { year: 0, quarter: 0 };

    try {
      const m = localStorage.getItem(KEY_MODE);
      if (m === 'year' || m === 'quarter') mode = m;
      const h = localStorage.getItem(KEY_HOLIDAYS);
      if (h !== null) showHolidays = h === 'true';
      const c = JSON.parse(localStorage.getItem(KEY_COLS) || 'null');
      if (c) colIdx = { ...colIdx, ...c };
    } catch (e) {}

    /* ===== Date utilities ===== */
    function today() {
      const d = new Date();
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function dateKey(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function diffDays(a, b) { return Math.round((b - a) / 86400000); }

    function getRange() {
      const now = today();
      const y = now.getFullYear();
      const mo = now.getMonth();

      if (mode === 'year') {
        const start = new Date(y, 0, 1);
        const end   = new Date(y, 11, 31);
        const total   = diffDays(start, end) + 1;
        const elapsed = diffDays(start, now);
        return { start, total, elapsed, label: '1년' };
      }

      // quarter
      const q     = Math.floor(mo / 3);
      const start = new Date(y, q * 3, 1);
      const end   = new Date(y, q * 3 + 3, 0);
      const total   = diffDays(start, end) + 1;
      const elapsed = diffDays(start, now);
      return { start, total, elapsed, label: `${q + 1}분기` };
    }

    /* ===== Render ===== */
    function render() {
      const { start, total, elapsed, label } = getRange();
      const cols = COL_OPTIONS[mode][colIdx[mode]];

      document.getElementById('modeTitle').textContent = label;
      document.getElementById('dotGrid').style.setProperty('--cols', cols);

      const frag = document.createDocumentFragment();
      for (let i = 0; i < total; i++) {
        const d    = new Date(start.getTime() + i * 86400000);
        const key  = dateKey(d);
        const isHol = showHolidays && HOLIDAYS.has(key);
        const isPast = i < elapsed;

        const dot = document.createElement('div');
        if (isHol) {
          dot.className = isPast ? 'dot holiday-past' : 'dot holiday-future';
        } else {
          dot.className = isPast ? 'dot' : 'dot future';
        }
        frag.appendChild(dot);
      }

      const grid = document.getElementById('dotGrid');
      grid.innerHTML = '';
      grid.appendChild(frag);

      updateUI();
    }

    function updateUI() {
      const cols = COL_OPTIONS[mode][colIdx[mode]];

      // Mode button
      document.getElementById('modeBtnLabel').textContent = mode === 'year' ? '1년통' : '분기';

      // Holiday button
      const eyeSVG = mode === 'year' ? '' : ''; // same icon, label changes
      document.getElementById('holidayBtnLabel').textContent = `휴일: ${showHolidays ? '표시' : '숨김'}`;
      document.getElementById('holidayLegend').style.display = showHolidays ? '' : 'none';

      // Eye icon: slash when hidden
      const eyePath = document.getElementById('eyeIcon');
      if (!showHolidays) {
        eyePath.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        eyePath.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }

      // Columns button
      document.getElementById('colBtnLabel').textContent = `${cols}열`;
    }

    /* ===== Animated transition ===== */
    function animate(fn) {
      const grid = document.getElementById('dotGrid');
      grid.classList.add('fading');
      setTimeout(() => { if (fn) fn(); render(); grid.classList.remove('fading'); }, 150);
    }

    /* ===== Panel buttons ===== */
    document.getElementById('modeBtn').addEventListener('click', () => {
      mode = mode === 'year' ? 'quarter' : 'year';
      try { localStorage.setItem(KEY_MODE, mode); } catch (e) {}
      animate();
    });

    document.getElementById('holidayBtn').addEventListener('click', () => {
      showHolidays = !showHolidays;
      try { localStorage.setItem(KEY_HOLIDAYS, String(showHolidays)); } catch (e) {}
      animate();
    });

    document.getElementById('colBtn').addEventListener('click', () => {
      colIdx[mode] = (colIdx[mode] + 1) % COL_OPTIONS[mode].length;
      try { localStorage.setItem(KEY_COLS, JSON.stringify(colIdx)); } catch (e) {}
      animate();
    });

    /* ===== Drag to move ===== */
    (function initDrag() {
      const wrapper = document.getElementById('widget');
      const card    = document.getElementById('card');
      const BLOCKED = '.resize-handle,button,[contenteditable],a,input';
      let dragging = false, startX = 0, startY = 0, origLeft = 0, origTop = 0;

      card.addEventListener('mousedown', e => {
        if (e.target.closest(BLOCKED)) return;
        dragging = true;
        const rect = wrapper.getBoundingClientRect();
        origLeft = rect.left; origTop = rect.top;
        startX = e.clientX;   startY  = e.clientY;
        card.classList.add('dragging');
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        wrapper.style.position = 'fixed';
        wrapper.style.left = `${origLeft + e.clientX - startX}px`;
        wrapper.style.top  = `${origTop  + e.clientY - startY}px`;
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('dragging');
        try {
          localStorage.setItem(KEY_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top }));
        } catch (e) {}
      });

      try {
        const pos = JSON.parse(localStorage.getItem(KEY_POS) || 'null');
        if (pos) { wrapper.style.position = 'fixed'; wrapper.style.left = pos.left; wrapper.style.top = pos.top; }
      } catch (e) {}
    })();

    /* ===== Resize handles ===== */
    (function initResize() {
      const card = document.getElementById('card');
      const MIN_W = 200, MAX_W = 480, MIN_H = 160;
      let resizing = false, dir = '', startW = 0, startH = 0, startX = 0, startY = 0;

      document.querySelectorAll('.resize-handle').forEach(h => {
        h.addEventListener('mousedown', e => {
          resizing = true;
          dir    = h.dataset.direction;
          startW = card.offsetWidth; startH = card.offsetHeight;
          startX = e.clientX;        startY = e.clientY;
          e.preventDefault(); e.stopPropagation();
        });
      });

      document.addEventListener('mousemove', e => {
        if (!resizing) return;
        const dx = e.clientX - startX, dy = e.clientY - startY;
        if (dir === 'right')  card.style.width  = `${Math.min(MAX_W, Math.max(MIN_W, startW + dx))}px`;
        if (dir === 'left')   card.style.width  = `${Math.min(MAX_W, Math.max(MIN_W, startW - dx))}px`;
        if (dir === 'bottom') card.style.height = `${Math.max(MIN_H, startH + dy)}px`;
        if (dir === 'top')    card.style.height = `${Math.max(MIN_H, startH - dy)}px`;
      });

      document.addEventListener('mouseup', () => {
        if (!resizing) return;
        resizing = false;
        try {
          localStorage.setItem(KEY_SIZE, JSON.stringify({ w: card.offsetWidth, h: card.offsetHeight }));
        } catch (e) {}
      });

      try {
        const s = JSON.parse(localStorage.getItem(KEY_SIZE) || 'null');
        if (s) { if (s.w) card.style.width = `${s.w}px`; if (s.h) card.style.height = `${s.h}px`; }
      } catch (e) {}
    })();

    /* ===== Init ===== */
    render();
  </script>
</body>
</html>
