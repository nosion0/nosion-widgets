<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데이카운터</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 10% 55%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .widget-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      position: relative;
      width: fit-content;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      width: 360px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow: hidden;
      box-shadow: none;
      cursor: grab;
    }

    .card.dragging { cursor: grabbing; }

    /* === Segment control === */
    .seg-control {
      display: flex;
      background: var(--muted);
      border-radius: 0.5rem;
      padding: 3px;
      gap: 2px;
    }

    .seg-btn {
      flex: 1;
      border: none;
      background: transparent;
      border-radius: 0.375rem;
      padding: 0.3rem 0;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted-foreground);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      letter-spacing: 0.02em;
    }

    .seg-btn.active {
      background: var(--card);
      color: var(--foreground);
    }

    /* === Period row === */
    .period-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .period-label {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.01em;
    }

    .period-pct {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      font-variant-numeric: tabular-nums;
    }

    /* === Dot grid === */
    .dot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, var(--dot-size, 5px));
      gap: var(--dot-gap, 2.5px);
      transition: opacity 0.15s ease;
    }

    .dot-grid.fading { opacity: 0; }

    .dot {
      width: var(--dot-size, 5px);
      height: var(--dot-size, 5px);
      border-radius: 50%;
      background: var(--border);
    }

    .dot.filled { background: var(--foreground); }

    .dot.today {
      background: hsl(220 10% 42%);
      box-shadow: 0 0 0 1.5px hsl(220 10% 42%), 0 0 0 3px hsl(220 10% 90%);
    }

    /* === Stats === */
    .stats-row {
      display: flex;
    }

    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .stat-item + .stat-item {
      border-left: 1px solid var(--border);
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--foreground);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .stat-label {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* === Holiday section === */
    .holiday-section {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .holiday-section.hidden { display: none; }

    .section-label {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .holiday-list {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .holiday-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .holiday-name {
      font-size: 0.8125rem;
      color: var(--foreground);
    }

    .holiday-meta {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .holiday-date {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      font-variant-numeric: tabular-nums;
    }

    .holiday-dday {
      font-size: 0.75rem;
      color: hsl(220 10% 42%);
      font-variant-numeric: tabular-nums;
      min-width: 3rem;
      text-align: right;
      font-weight: 500;
    }

    .holiday-dday.dday { color: var(--muted-foreground); }

    /* === Resize handles === */
    .resize-handle {
      position: absolute;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .handle-top, .handle-bottom { left: 0; right: 0; height: 12px; cursor: ns-resize; }
    .handle-top { top: 0; }
    .handle-bottom { bottom: 0; }
    .handle-left, .handle-right { top: 0; bottom: 0; width: 12px; cursor: ew-resize; }
    .handle-left { left: 0; }
    .handle-right { right: 0; }

    .resize-handle .bar {
      border-radius: 99px;
      background: var(--border);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .handle-top .bar, .handle-bottom .bar { width: 32px; height: 3px; }
    .handle-left .bar, .handle-right .bar { width: 3px; height: 32px; }
    .resize-handle:hover .bar { opacity: 1; }

    /* === Controls === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      opacity: 0.25;
      transition: opacity var(--transition);
    }
    .widget-wrapper:hover .controls { opacity: 1; }

    .control-btn {
      width: 28px;
      height: 28px;
      border-radius: 0.4rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted-foreground);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background var(--transition), color var(--transition);
      position: relative;
    }
    .control-btn:hover { background: var(--muted); color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 1.75; }

    .control-btn[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: hsl(220 10% 30%);
      color: #fff;
      font-size: 0.6875rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.35rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .control-btn[data-tooltip]:hover::after { opacity: 1; }
  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">
    <div class="card" id="card">

      <div class="seg-control" id="segControl">
        <button class="seg-btn" data-mode="year" type="button">연간</button>
        <button class="seg-btn" data-mode="quarter" type="button">분기</button>
        <button class="seg-btn" data-mode="month" type="button">월간</button>
      </div>

      <div class="period-row">
        <span class="period-label" id="periodLabel">2026년</span>
        <span class="period-pct" id="periodPct">0%</span>
      </div>

      <div class="dot-grid" id="dotGrid"></div>

      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-value" id="elapsedDays">—</span>
          <span class="stat-label">경과</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="remainingDays">—</span>
          <span class="stat-label">남은</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="totalDays">—</span>
          <span class="stat-label">전체</span>
        </div>
      </div>

      <div class="holiday-section" id="holidaySection">
        <span class="section-label">다음 공휴일</span>
        <div class="holiday-list" id="holidayList"></div>
      </div>

      <div class="resize-handle handle-top" data-direction="top"><div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left" data-direction="left"><div class="bar"></div></div>
      <div class="resize-handle handle-right" data-direction="right"><div class="bar"></div></div>
    </div>

    <div class="controls">
      <button class="control-btn" id="resizeResetBtn" type="button"
              data-tooltip="크기 초기화" title="크기 초기화" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="holidayToggleBtn" type="button"
              data-tooltip="공휴일 토글" title="공휴일 토글" aria-label="공휴일 표시 토글">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    /* ===== Korean public holidays 2025–2026 ===== */
    const HOLIDAYS = [
      { date: '2025-01-01', name: '신정' },
      { date: '2025-01-28', name: '설날 연휴' },
      { date: '2025-01-29', name: '설날' },
      { date: '2025-01-30', name: '설날 연휴' },
      { date: '2025-03-01', name: '삼일절' },
      { date: '2025-04-06', name: '국회의원선거' },
      { date: '2025-05-05', name: '어린이날·석가탄신일' },
      { date: '2025-05-06', name: '대체공휴일' },
      { date: '2025-06-06', name: '현충일' },
      { date: '2025-08-15', name: '광복절' },
      { date: '2025-10-03', name: '개천절' },
      { date: '2025-10-05', name: '추석 연휴' },
      { date: '2025-10-06', name: '추석' },
      { date: '2025-10-07', name: '추석 연휴' },
      { date: '2025-10-08', name: '대체공휴일' },
      { date: '2025-10-09', name: '한글날' },
      { date: '2025-12-25', name: '성탄절' },
      { date: '2026-01-01', name: '신정' },
      { date: '2026-02-16', name: '설날 연휴' },
      { date: '2026-02-17', name: '설날' },
      { date: '2026-02-18', name: '설날 연휴' },
      { date: '2026-03-01', name: '삼일절' },
      { date: '2026-05-05', name: '어린이날' },
      { date: '2026-05-24', name: '석가탄신일' },
      { date: '2026-06-06', name: '현충일' },
      { date: '2026-08-15', name: '광복절' },
      { date: '2026-09-24', name: '추석 연휴' },
      { date: '2026-09-25', name: '추석' },
      { date: '2026-09-26', name: '추석 연휴' },
      { date: '2026-10-03', name: '개천절' },
      { date: '2026-10-09', name: '한글날' },
      { date: '2026-12-25', name: '성탄절' },
    ];

    /* ===== localStorage keys ===== */
    const KEY_MODE     = 'nosion-day-counter-mode-v1';
    const KEY_HOLIDAYS = 'nosion-day-counter-holidays-v1';
    const KEY_SIZE     = 'nosion-day-counter-size-v1';
    const KEY_POS      = 'nosion-day-counter-pos-v1';

    /* ===== State ===== */
    let mode = 'year';
    let showHolidays = true;

    try {
      const m = localStorage.getItem(KEY_MODE);
      if (['year', 'quarter', 'month'].includes(m)) mode = m;
      const h = localStorage.getItem(KEY_HOLIDAYS);
      if (h !== null) showHolidays = h === 'true';
    } catch (e) {}

    /* ===== Date utilities ===== */
    function today() {
      const d = new Date();
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function diffDays(a, b) { return Math.round((b - a) / 86400000); }

    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function getRange() {
      const now = today();
      const y = now.getFullYear();
      const mo = now.getMonth();

      if (mode === 'year') {
        const start = new Date(y, 0, 1);
        const end   = new Date(y, 11, 31);
        const total   = diffDays(start, end) + 1;
        const elapsed = diffDays(start, now);
        return { total, elapsed, label: `${y}년` };
      }

      if (mode === 'quarter') {
        const q     = Math.floor(mo / 3);
        const start = new Date(y, q * 3, 1);
        const end   = new Date(y, q * 3 + 3, 0);
        const total   = diffDays(start, end) + 1;
        const elapsed = diffDays(start, now);
        return { total, elapsed, label: `${y}년 ${q + 1}분기` };
      }

      // month
      const start   = new Date(y, mo, 1);
      const end     = new Date(y, mo + 1, 0);
      const total   = end.getDate();
      const elapsed = now.getDate() - 1;
      return { total, elapsed, label: `${y}년 ${mo + 1}월` };
    }

    /* ===== Dot config per mode ===== */
    const DOT_CFG = {
      year:    { size: '5px',  gap: '2.5px' },
      quarter: { size: '7px',  gap: '3px'   },
      month:   { size: '11px', gap: '4px'   },
    };

    /* ===== Render ===== */
    function render() {
      const { total, elapsed, label } = getRange();
      const remaining = Math.max(0, total - elapsed - 1);
      const pct = total > 0 ? Math.round((elapsed / total) * 100) : 0;

      document.getElementById('periodLabel').textContent = label;
      document.getElementById('periodPct').textContent = `${pct}%`;
      document.getElementById('elapsedDays').textContent = elapsed;
      document.getElementById('remainingDays').textContent = remaining;
      document.getElementById('totalDays').textContent = total;

      // Dot grid
      const cfg  = DOT_CFG[mode];
      const grid = document.getElementById('dotGrid');
      grid.style.setProperty('--dot-size', cfg.size);
      grid.style.setProperty('--dot-gap', cfg.gap);

      const frag = document.createDocumentFragment();
      for (let i = 0; i < total; i++) {
        const dot = document.createElement('div');
        dot.className = i < elapsed ? 'dot filled' : i === elapsed ? 'dot today' : 'dot';
        frag.appendChild(dot);
      }
      grid.innerHTML = '';
      grid.appendChild(frag);

      renderHolidays();
    }

    function renderHolidays() {
      const section = document.getElementById('holidaySection');
      if (!showHolidays) { section.classList.add('hidden'); return; }
      section.classList.remove('hidden');

      const now = today();
      const upcoming = HOLIDAYS
        .map(h => ({ ...h, d: parseDate(h.date) }))
        .filter(h => h.d >= now)
        .slice(0, 4);

      const list = document.getElementById('holidayList');
      list.innerHTML = '';

      if (upcoming.length === 0) {
        const el = document.createElement('div');
        el.className = 'holiday-item';
        el.innerHTML = '<span class="holiday-name" style="color:var(--muted-foreground)">등록된 공휴일이 없습니다</span>';
        list.appendChild(el);
        return;
      }

      upcoming.forEach(({ name, date, d }) => {
        const diff = diffDays(now, d);
        const [, m, day] = date.split('-').map(Number);
        const item = document.createElement('div');
        item.className = 'holiday-item';
        item.innerHTML = `
          <span class="holiday-name">${name}</span>
          <div class="holiday-meta">
            <span class="holiday-date">${m}월 ${day}일</span>
            <span class="holiday-dday${diff === 0 ? ' dday' : ''}">${diff === 0 ? 'D-Day' : `D-${diff}`}</span>
          </div>`;
        list.appendChild(item);
      });
    }

    /* ===== Segment control ===== */
    document.getElementById('segControl').addEventListener('click', e => {
      const btn = e.target.closest('.seg-btn');
      if (!btn || btn.dataset.mode === mode) return;
      mode = btn.dataset.mode;
      try { localStorage.setItem(KEY_MODE, mode); } catch (e) {}
      document.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      const grid = document.getElementById('dotGrid');
      grid.classList.add('fading');
      setTimeout(() => { render(); grid.classList.remove('fading'); }, 150);
    });

    /* ===== Holiday toggle ===== */
    document.getElementById('holidayToggleBtn').addEventListener('click', () => {
      showHolidays = !showHolidays;
      try { localStorage.setItem(KEY_HOLIDAYS, String(showHolidays)); } catch (e) {}
      renderHolidays();
    });

    /* ===== Resize reset ===== */
    document.getElementById('resizeResetBtn').addEventListener('click', () => {
      const card = document.getElementById('card');
      card.style.width = '360px';
      card.style.height = '';
      try { localStorage.removeItem(KEY_SIZE); } catch (e) {}
      render();
    });

    /* ===== Drag to move ===== */
    (function initDrag() {
      const wrapper = document.getElementById('widget');
      const card    = document.getElementById('card');
      const BLOCKED = '.control-btn,.resize-handle,button,[contenteditable],a,input,.seg-btn';
      let dragging = false, startX = 0, startY = 0, origLeft = 0, origTop = 0;

      card.addEventListener('mousedown', e => {
        if (e.target.closest(BLOCKED)) return;
        dragging = true;
        const rect = wrapper.getBoundingClientRect();
        origLeft = rect.left;
        origTop  = rect.top;
        startX   = e.clientX;
        startY   = e.clientY;
        card.classList.add('dragging');
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        wrapper.style.position = 'fixed';
        wrapper.style.left = `${origLeft + e.clientX - startX}px`;
        wrapper.style.top  = `${origTop  + e.clientY - startY}px`;
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('dragging');
        try {
          localStorage.setItem(KEY_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top }));
        } catch (e) {}
      });

      try {
        const pos = JSON.parse(localStorage.getItem(KEY_POS) || 'null');
        if (pos) { wrapper.style.position = 'fixed'; wrapper.style.left = pos.left; wrapper.style.top = pos.top; }
      } catch (e) {}
    })();

    /* ===== Resize handles ===== */
    (function initResize() {
      const card = document.getElementById('card');
      const MIN_W = 280, MAX_W = 580, MIN_H = 180;
      let resizing = false, dir = '', startW = 0, startH = 0, startX = 0, startY = 0;

      document.querySelectorAll('.resize-handle').forEach(h => {
        h.addEventListener('mousedown', e => {
          resizing = true;
          dir    = h.dataset.direction;
          startW = card.offsetWidth;
          startH = card.offsetHeight;
          startX = e.clientX;
          startY = e.clientY;
          e.preventDefault();
          e.stopPropagation();
        });
      });

      document.addEventListener('mousemove', e => {
        if (!resizing) return;
        const dx = e.clientX - startX, dy = e.clientY - startY;
        if (dir === 'right')  card.style.width  = `${Math.min(MAX_W, Math.max(MIN_W, startW + dx))}px`;
        if (dir === 'left')   card.style.width  = `${Math.min(MAX_W, Math.max(MIN_W, startW - dx))}px`;
        if (dir === 'bottom') card.style.height = `${Math.max(MIN_H, startH + dy)}px`;
        if (dir === 'top')    card.style.height = `${Math.max(MIN_H, startH - dy)}px`;
      });

      document.addEventListener('mouseup', () => {
        if (!resizing) return;
        resizing = false;
        try {
          localStorage.setItem(KEY_SIZE, JSON.stringify({ w: card.offsetWidth, h: card.offsetHeight }));
        } catch (e) {}
      });

      try {
        const s = JSON.parse(localStorage.getItem(KEY_SIZE) || 'null');
        if (s) { if (s.w) card.style.width = `${s.w}px`; if (s.h) card.style.height = `${s.h}px`; }
      } catch (e) {}
    })();

    /* ===== Init ===== */
    document.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    render();
  </script>
</body>
</html>
