<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데이카운터</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --foreground:       hsl(220 13% 18%);
      --muted-foreground: hsl(215 14% 50%);
      --border:           hsl(220 9% 76%);
      --muted:            hsl(210 20% 96%);
      --radius:           0.5rem;
      --day-passed:  hsl(220 13% 15%);
      --day-today:   hsl(220 13% 15%);
      --day-future:  hsl(220 10% 88%);
      --day-weekend: hsl(220 10% 70%);
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
      --day-passed:  hsl(0 0% 88%);
      --day-today:   hsl(0 0% 88%);
      --day-future:  hsl(220 13% 24%);
      --day-weekend: hsl(220 10% 38%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== Widget wrapper ===== */
    .widget-wrapper {
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      width: fit-content;
    }

    /* ===== Left panel (hover only) ===== */
    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      flex-shrink: 0;
    }

    .widget-wrapper:hover .left-panel {
      opacity: 1;
      pointer-events: auto;
    }

    .panel-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 0.375rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--foreground);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease;
      height: 2rem;
    }

    .panel-btn:hover { background: var(--muted); }

    .panel-btn.muted-bg { background: var(--muted); }

    .panel-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      stroke: currentColor;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Legend */
    .legend {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.5rem 0.25rem 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted-foreground);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot.passed  { background: var(--day-passed); }
    .legend-dot.future  { background: var(--day-future); }
    .legend-dot.weekend { background: var(--day-weekend); }

    /* ===== Card ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 2rem;
      width: 400px;
      height: 560px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      align-items: center;
      gap: 1.5rem;
      overflow-x: hidden;
      overflow-y: auto;
      cursor: grab;
    }

    .card.dragging { cursor: grabbing; }

    /* ===== Mode title ===== */
    .mode-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--foreground);
      letter-spacing: -0.02em;
      user-select: none;
    }

    /* ===== Dot container ===== */
    #dotContainer {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== Dot grid ===== */
    .dot-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 7), 12px);
      gap: 8px;
      justify-content: center;
      transition: opacity 0.15s ease;
    }

    /* ===== Dot ===== */
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--day-passed);
      transition: transform 0.2s;
      cursor: default;
      flex-shrink: 0;
    }

    .dot:hover       { transform: scale(1.25); }
    .dot.today       { background: var(--day-today); }
    .dot.future      { background: var(--day-future); }
    .dot.weekend     { background: var(--day-passed); }   /* 지나간 휴일도 검정(지난날과 동일) */
    .dot.future.weekend { background: var(--day-weekend); } /* 다가올 휴일만 연한 회색 */

    /* ===== Year view ===== */
    .year-sections {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      width: 100%;
    }

    .quarter-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .quarter-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--foreground);
    }

    .quarter-section .dot-grid { align-self: center; }

    /* ===== Resize handles ===== */
    .resize-handle {
      position: absolute;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .handle-top, .handle-bottom { left: 0; right: 0; height: 16px; cursor: ns-resize; }
    .handle-top    { top: 0; }
    .handle-bottom { bottom: 0; }
    .handle-left, .handle-right { top: 0; bottom: 0; width: 16px; cursor: ew-resize; }
    .handle-left  { left: 0; }
    .handle-right { right: 0; }

    .resize-handle .bar {
      border-radius: 99px;
      background: var(--border);
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .handle-top .bar, .handle-bottom .bar { width: 36px; height: 3px; }
    .handle-left .bar, .handle-right .bar { width: 3px; height: 36px; }
    .resize-handle:hover .bar { opacity: 1; }

    .controls { display: flex; flex-direction: column; gap: 2px; opacity: 0; transition: opacity 0.2s ease; padding-top: 0.25rem; align-self: flex-start; }
    .widget-wrapper:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color 0.2s ease; border-radius: 4px; position: relative; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .control-btn[data-tooltip]::before, .control-btn[data-tooltip]::after { position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); opacity: 0; pointer-events: none; transition: opacity 0.15s ease 0s; z-index: 50; }
    .control-btn[data-tooltip]::before { content: attr(data-tooltip); background: var(--card); color: var(--foreground); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.3125rem 0.625rem; font-size: 0.6875rem; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .control-btn[data-tooltip]::after { content: ''; right: calc(100% + 3px); width: 5px; height: 5px; background: var(--card); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transform: translateY(-50%) rotate(-45deg); }
    .control-btn[data-tooltip]:hover::before, .control-btn[data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }

  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">

    <!-- Left hover panel -->
    <div class="left-panel" id="leftPanel">
      <button class="panel-btn" id="modeBtn" type="button">
        <svg viewBox="0 0 24 24" stroke-width="1.75">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span id="modeBtnLabel">분기</span>
      </button>

      <button class="panel-btn" id="weekendBtn" type="button">
        <svg id="eyeIcon" viewBox="0 0 24 24" stroke-width="1.75">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span id="weekendBtnLabel">휴일: 표시</span>
      </button>

      <button class="panel-btn" id="colBtn" type="button">
        <svg viewBox="0 0 24 24" stroke-width="1.75">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span id="colBtnLabel">7열</span>
      </button>

      <div class="legend">
        <div class="legend-item">
          <span class="legend-dot passed"></span>지난 날
        </div>
        <div class="legend-item">
          <span class="legend-dot future"></span>미래
        </div>
        <div class="legend-item" id="weekendLegend">
          <span class="legend-dot weekend"></span>휴일
        </div>
      </div>
    </div>

    <!-- Main card -->
    <div class="card" id="card">
      <div class="mode-title" id="modeTitle">2분기</div>
      <div id="dotContainer"></div>

      <div class="resize-handle handle-top"    data-direction="top">   <div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left"   data-direction="left">  <div class="bar"></div></div>
      <div class="resize-handle handle-right"  data-direction="right"> <div class="bar"></div></div>
    </div>

    <div class="controls">
      <button class="control-btn" id="resizeResetBtn" data-tooltip="크기 초기화" title="크기 초기화" type="button" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn" data-tooltip="테마 전환" title="테마 전환" type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ===== Korean public holidays 2025–2026 ===== */
    const HOLIDAYS = new Set([
      '2025-01-01','2025-01-28','2025-01-29','2025-01-30',
      '2025-03-01','2025-04-06','2025-05-05','2025-05-06',
      '2025-06-06','2025-08-15','2025-10-03','2025-10-05',
      '2025-10-06','2025-10-07','2025-10-08','2025-10-09','2025-12-25',
      '2026-01-01','2026-02-16','2026-02-17','2026-02-18',
      '2026-03-01','2026-05-05','2026-05-24','2026-06-06',
      '2026-08-15','2026-09-24','2026-09-25','2026-09-26',
      '2026-10-03','2026-10-09','2026-12-25',
    ]);

    function isWeekend(date) { const d = date.getDay(); return d === 0 || d === 6; }

    /* ===== Keys ===== */
    const K_MODE     = 'nosion-dc-mode-v2';
    const K_WEEKENDS = 'nosion-dc-weekends-v2';
    const K_COLS     = 'nosion-dc-cols-v2';
    const K_SIZE     = 'nosion-dc-size-v2';
    const K_POS      = 'nosion-dc-pos-v2';

    const COL_OPTIONS  = [5, 7, 10, 15];
    const VIEW_MODES   = ['month', 'quarter', 'year', 'continuous'];
    const VIEW_LABELS  = { month: '한달', quarter: '분기', year: '연도', continuous: '1년통' };
    const MONTH_NAMES  = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

    /* ===== State ===== */
    let mode = 'quarter';
    let showWeekends = true;
    let colIdx = 1;

    try {
      const m = localStorage.getItem(K_MODE);
      if (VIEW_MODES.includes(m)) mode = m;
      const w = localStorage.getItem(K_WEEKENDS);
      if (w !== null) showWeekends = w === 'true';
      const c = parseInt(localStorage.getItem(K_COLS) || '');
      if (c >= 0 && c < COL_OPTIONS.length) colIdx = c;
    } catch (e) {}

    /* ===== Date helpers ===== */
    function todayDate() {
      const d = new Date();
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function dateKey(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function monthDays(y, m) {
      const days = [], total = new Date(y, m + 1, 0).getDate();
      for (let i = 1; i <= total; i++) days.push(new Date(y, m, i));
      return days;
    }

    function quarterDays(y, q) {
      const sm = (q - 1) * 3, days = [];
      for (let m = sm; m < sm + 3; m++) days.push(...monthDays(y, m));
      return days;
    }

    function yearDays(y) {
      const days = [];
      for (let m = 0; m < 12; m++) days.push(...monthDays(y, m));
      return days;
    }

    /* ===== Build sections per mode ===== */
    function getSections() {
      const now = todayDate();
      const y = now.getFullYear(), mo = now.getMonth(), q = Math.floor(mo / 3) + 1;

      if (mode === 'month')
        return { title: MONTH_NAMES[mo], sections: [{ days: monthDays(y, mo), label: null }] };
      if (mode === 'quarter')
        return { title: `${q}분기`, sections: [{ days: quarterDays(y, q), label: null }] };
      if (mode === 'year')
        return { title: String(y), sections: [1,2,3,4].map(qq => ({ days: quarterDays(y, qq), label: `${qq}분기` })) };
      return { title: '1년통', sections: [{ days: yearDays(y), label: null }] };
    }

    /* ===== Build a single dot ===== */
    function makeDot(date, now, todayStr) {
      const key     = dateKey(date);
      const isToday = key === todayStr;
      const isPast  = date < now && !isToday;
      const isWknd  = showWeekends && (isWeekend(date) || HOLIDAYS.has(key));
      const isFuture = !isPast && !isToday;

      const dot = document.createElement('div');
      const cls = ['dot'];
      if (isFuture) cls.push('future');
      if (isWknd)   cls.push('weekend');
      dot.className = cls.join(' ');
      return dot;
    }

    /* ===== Build a dot grid ===== */
    function makeGrid(days, now, todayStr, cols) {
      const grid = document.createElement('div');
      grid.className = 'dot-grid';
      grid.style.setProperty('--cols', cols);
      days.forEach(d => grid.appendChild(makeDot(d, now, todayStr)));
      return grid;
    }

    /* ===== Render ===== */
    function render() {
      const now = todayDate();
      const todayStr = dateKey(now);
      const cols = COL_OPTIONS[colIdx];
      const { title, sections } = getSections();

      document.getElementById('modeTitle').textContent = title;

      const container = document.getElementById('dotContainer');
      container.innerHTML = '';

      if (sections.length === 1) {
        container.appendChild(makeGrid(sections[0].days, now, todayStr, cols));
      } else {
        const wrap = document.createElement('div');
        wrap.className = 'year-sections';
        sections.forEach(({ days, label }) => {
          const sec = document.createElement('div');
          sec.className = 'quarter-section';
          if (label) {
            const lbl = document.createElement('div');
            lbl.className = 'quarter-label';
            lbl.textContent = label;
            sec.appendChild(lbl);
          }
          sec.appendChild(makeGrid(days, now, todayStr, cols));
          wrap.appendChild(sec);
        });
        container.appendChild(wrap);
      }

      syncUI();
    }

    /* ===== Sync panel UI ===== */
    function syncUI() {
      const cols = COL_OPTIONS[colIdx];
      document.getElementById('modeBtnLabel').textContent    = VIEW_LABELS[mode];
      document.getElementById('weekendBtnLabel').textContent = `휴일: ${showWeekends ? '표시' : '숨김'}`;
      document.getElementById('weekendLegend').style.display = showWeekends ? '' : 'none';
      document.getElementById('weekendBtn').classList.toggle('muted-bg', !showWeekends);
      document.getElementById('colBtnLabel').textContent     = `${cols}열`;

      const eye = document.getElementById('eyeIcon');
      eye.innerHTML = showWeekends
        ? `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
        : `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`;
    }

    /* ===== Animated swap ===== */
    function animate(fn) {
      const c = document.getElementById('dotContainer');
      c.style.transition = 'opacity 0.15s ease';
      c.style.opacity = '0';
      setTimeout(() => { fn && fn(); render(); c.style.opacity = '1'; }, 150);
    }

    /* ===== Panel interactions ===== */
    document.getElementById('modeBtn').addEventListener('click', () => {
      mode = VIEW_MODES[(VIEW_MODES.indexOf(mode) + 1) % VIEW_MODES.length];
      try { localStorage.setItem(K_MODE, mode); } catch (e) {}
      animate();
    });

    document.getElementById('weekendBtn').addEventListener('click', () => {
      showWeekends = !showWeekends;
      try { localStorage.setItem(K_WEEKENDS, String(showWeekends)); } catch (e) {}
      animate();
    });

    document.getElementById('colBtn').addEventListener('click', () => {
      colIdx = (colIdx + 1) % COL_OPTIONS.length;
      try { localStorage.setItem(K_COLS, String(colIdx)); } catch (e) {}
      animate();
    });

    /* ===== Drag to move ===== */
    (function () {
      const wrapper = document.getElementById('widget');
      const card    = document.getElementById('card');
      const BLOCKED = '.resize-handle,button,a,input';
      let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;

      card.addEventListener('mousedown', e => {
        if (e.target.closest(BLOCKED)) return;
        dragging = true;
        const r = wrapper.getBoundingClientRect();
        ox = r.left; oy = r.top; sx = e.clientX; sy = e.clientY;
        card.classList.add('dragging');
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        wrapper.style.position = 'fixed';
        wrapper.style.left = `${ox + e.clientX - sx}px`;
        wrapper.style.top  = `${oy + e.clientY - sy}px`;
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('dragging');
        try { localStorage.setItem(K_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top })); } catch (e) {}
      });

      try {
        const p = JSON.parse(localStorage.getItem(K_POS) || 'null');
        if (p) { wrapper.style.position = 'fixed'; wrapper.style.left = p.left; wrapper.style.top = p.top; }
      } catch (e) {}
    })();

    /* ===== Resize ===== */
    (function () {
      const wrapper = document.getElementById('widget');
      const card = document.getElementById('card');
      const MIN_W = 220, MAX_W = 700, MIN_H = 160;
      let on = false, dir = '', sw = 0, sh = 0, sx = 0, sy = 0, startLeft = 0, startTop = 0;

      document.querySelectorAll('.resize-handle').forEach(h => {
        h.addEventListener('mousedown', e => {
          on = true; dir = h.dataset.direction;
          sw = card.offsetWidth; sh = card.offsetHeight;
          sx = e.clientX; sy = e.clientY;
          if (getComputedStyle(wrapper).position !== 'fixed') {
            const wrapperRect = wrapper.getBoundingClientRect();
            wrapper.style.position = 'fixed';
            wrapper.style.left = wrapperRect.left + 'px';
            wrapper.style.top = wrapperRect.top + 'px';
            wrapper.style.transform = 'none';
          }
          startLeft = parseFloat(wrapper.style.left) || 0;
          startTop = parseFloat(wrapper.style.top) || 0;
          e.preventDefault(); e.stopPropagation();
        });
      });

      document.addEventListener('mousemove', e => {
        if (!on) return;
        const dx = e.clientX - sx, dy = e.clientY - sy;
        if (dir === 'right' || dir === 'left') {
          const delta = dir === 'right' ? dx : -dx;
          const newW = Math.min(MAX_W, Math.max(MIN_W, sw + 2 * delta));
          const actualDelta = newW - sw;
          card.style.width = newW + 'px';
          if (wrapper.style.position === 'fixed') {
            wrapper.style.left = (startLeft - actualDelta / 2) + 'px';
          }
        }
        if (dir === 'bottom' || dir === 'top') {
          const delta = dir === 'bottom' ? dy : -dy;
          const newH = Math.max(MIN_H, sh + 2 * delta);
          const actualDelta = newH - sh;
          card.style.height = newH + 'px';
          if (wrapper.style.position === 'fixed') {
            wrapper.style.top = (startTop - actualDelta / 2) + 'px';
          }
        }
      });

      document.addEventListener('mouseup', () => {
        if (!on) return; on = false;
        try {
          localStorage.setItem(K_SIZE, JSON.stringify({ w: card.offsetWidth, h: card.offsetHeight }));
          if (wrapper.style.position === 'fixed') {
            localStorage.setItem(K_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top }));
          }
        } catch (e) {}
      });

      try {
        const s = JSON.parse(localStorage.getItem(K_SIZE) || 'null');
        if (s) { if (s.w) card.style.width = `${s.w}px`; if (s.h) card.style.height = `${s.h}px`; }
      } catch (e) {}
    })();

    render();
  
    // 크기/위치 초기화 — 컨트롤 박스 호버 노출
    (function(){
      const btn = document.getElementById("resizeResetBtn");
      if (!btn) return;
      btn.addEventListener("click", () => {
        const c = document.getElementById("card");
        const w = document.getElementById("widget");
        if (c) { c.style.width = ""; c.style.height = ""; }
        if (w) { w.style.left = ""; w.style.top = ""; w.style.transform = ""; }
        try { localStorage.removeItem("nosion-dc-size-v2"); localStorage.removeItem("nosion-dc-pos-v2"); } catch (e) {}
      });
    })();

</script>
</body>
</html>
