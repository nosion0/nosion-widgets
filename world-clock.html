<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세계 시계</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --hairline: hsl(220 14% 94%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
      --hairline: hsl(220 13% 19%);
    }
    html[data-theme="dark"] body { background: var(--background); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', sans-serif;
      background: var(--background); color: var(--foreground);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; word-break: keep-all;
    }
    body { padding: 1rem; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem 1.75rem; box-shadow: none;
      display: flex; flex-direction: column; align-items: safe center;
      box-sizing: border-box; overflow: hidden; min-width: 0; min-height: 0;
    }
    .card.dragging { cursor: grabbing; }
    .card-body { display: flex; flex-direction: column; width: 100%; }

    .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.1rem; }
    .title { font-size: 1.0625rem; font-weight: 600; color: var(--foreground); letter-spacing: -0.01em; }
    .head-date { font-size: 0.6875rem; color: var(--muted-foreground); font-variant-numeric: tabular-nums; }

    .clock-list { display: flex; flex-direction: column; }
    .clock-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0; position: relative; }
    .clock-row + .clock-row { border-top: 1px solid var(--hairline); }

    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; background: var(--muted-foreground); }
    .dot.day { background: var(--foreground); }
    .dot.night { background: var(--muted-foreground); opacity: 0.45; }
    .city-block { flex: 1; display: flex; flex-direction: column; gap: 0.05rem; min-width: 0; }
    .city { font-size: 0.9375rem; font-weight: 600; color: var(--foreground); letter-spacing: -0.01em; line-height: 1.2; }
    .gmt { font-size: 0.6875rem; color: var(--muted-foreground); letter-spacing: 0.01em; font-variant-numeric: tabular-nums; }
    .offset { font-size: 0.625rem; color: var(--muted-foreground); background: var(--muted); border-radius: 99px; padding: 0.1rem 0.4rem; letter-spacing: 0.02em; }
    .time { font-size: 1.125rem; font-weight: 700; color: var(--foreground); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; transition: transform var(--transition); }
    .ampm { font-size: 0.6875rem; color: var(--muted-foreground); margin-left: 0.25rem; font-variant-numeric: tabular-nums; }
    /* 호버 시 time을 왼쪽으로 살짝 밀어 삭제 버튼 공간 확보 (평소 time 끝 = 날짜 끝) */
    .clock-row:hover .time { transform: translateX(-22px); }

    /* 행 삭제 버튼 — 우측 끝 absolute, 호버 시 표시 */
    .row-del { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; border: none; background: none; cursor: pointer; color: var(--muted-foreground); opacity: 0; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: opacity var(--transition), color var(--transition); }
    .clock-row:hover .row-del { opacity: 0.55; }
    .row-del:hover { opacity: 1; color: var(--foreground); }
    .row-del svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; }

    /* 도시 추가 행 — 평소 접힘(공간 0), 호버/입력 시 펼침 */
    .add-city {
      display: flex; align-items: center; gap: 0.625rem;
      position: relative;
      max-height: 0; opacity: 0; overflow: hidden;
      margin-top: 0; padding-top: 0; border-top: 0 dashed var(--border);
      transition: max-height var(--transition), opacity var(--transition),
                  padding-top var(--transition), margin-top var(--transition);
    }
    .add-city:focus-within {
      max-height: 60px; opacity: 1; overflow: visible;
      margin-top: 0.5rem; padding-top: 0.7rem; border-top-width: 1px;
    }
    .add-city-plus { width: 15px; height: 15px; flex-shrink: 0; stroke: var(--muted-foreground); stroke-width: 2; fill: none; stroke-linecap: round; }
    .add-city-input { flex: 1; border: none; outline: none; background: none; font-family: inherit; font-size: 0.875rem; color: var(--foreground); padding: 0.1rem 0; }
    .add-city-input::placeholder { color: var(--muted-foreground); opacity: 0.7; }

    .city-results {
      position: absolute; bottom: calc(100% + 4px); left: 0; right: 0;
      background: var(--card); border: 1px solid var(--border); border-radius: 0.5rem;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.06); max-height: 200px; overflow-y: auto;
      z-index: 100; display: none;
    }
    .city-results.show { display: block; }
    .city-opt { padding: 0.5rem 0.75rem; cursor: pointer; font-size: 0.8125rem; color: var(--foreground); display: flex; justify-content: space-between; gap: 0.5rem; transition: background var(--transition); }
    .city-opt + .city-opt { border-top: 1px solid var(--hairline); }
    .city-opt:hover, .city-opt.focused { background: var(--muted); }
    .city-opt .tz { font-size: 0.6875rem; color: var(--muted-foreground); }
    .city-empty { padding: 0.6rem 0.75rem; font-size: 0.75rem; color: var(--muted-foreground); text-align: center; }

    /* 컨트롤 */
    .controls { display: flex; flex-direction: column; gap: 2px; opacity: 0; transition: opacity var(--transition); padding-top: 0.25rem; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; position: relative; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .control-btn[data-tooltip]::before, .control-btn[data-tooltip]::after { position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); opacity: 0; pointer-events: none; transition: opacity 0.15s ease 0s; z-index: 50; }
    .control-btn[data-tooltip]::before { content: attr(data-tooltip); background: var(--card); color: var(--foreground); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.3125rem 0.625rem; font-size: 0.6875rem; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .control-btn[data-tooltip]::after { content: ''; right: calc(100% + 3px); width: 5px; height: 5px; background: var(--card); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transform: translateY(-50%) rotate(-45deg); }
    .control-btn[data-tooltip]:hover::before, .control-btn[data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    /* .controls를 카드 바깥 우측으로 — 마우스 오버 시 노출 (호버 브리지로 끊김 방지) */
    #w.card { overflow: visible; }
    #w.card::after { content: ''; position: absolute; top: 0; bottom: 0; right: -40px; width: 40px; pointer-events: auto; }
    #w .controls { position: absolute; top: 0.5rem; right: -34px; left: auto; bottom: auto;
      display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: opacity 0.2s ease 0.1s; z-index: 30; padding: 0; pointer-events: none; }
    #w:hover .controls, #w .controls:hover { opacity: 1; pointer-events: auto; transition-delay: 0s; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
  
    /* === NOSION FRAME SPEC (드래그 이동 + 8방향 리사이즈) === */
    html,body{background:transparent;height:100%;overflow:hidden;}
    *{box-sizing:border-box;}
    .stage{position:fixed;inset:0;}
    .card{position:absolute;display:flex;flex-direction:column;touch-action:none;container-type:size;}
    .card.dragging,.card.resizing{user-select:none;box-shadow:0 12px 36px rgba(55,53,47,.16);}
    .whead{flex:none;cursor:grab;min-height:20px;width:100%;position:relative;z-index:2;background:inherit;}
    .whead:active{cursor:grabbing;}
    .wbody{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;overflow:hidden;width:100%;align-self:stretch;}
    .rz{position:absolute;z-index:5;}
    .rz.n{top:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.s{bottom:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.e{right:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.w{left:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.ne{top:-5px;right:-5px;width:14px;height:14px;cursor:nesw-resize;}
    .rz.nw{top:-5px;left:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.se{bottom:-5px;right:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.sw{bottom:-5px;left:-5px;width:14px;height:14px;cursor:nesw-resize;}
  </style>
</head>
<body>
  <div class="stage">
    <div class="card" id="w">
      <div class="whead"><div class="head">
          <span class="title">세계 시계</span>
          <span class="head-date" id="headDate">—</span>
        </div></div>
      <div class="wbody">

        <div class="clock-list" id="list"></div>

        <div class="add-city">
          <svg class="add-city-plus" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <input class="add-city-input" id="addCityInput" type="text" placeholder="도시 추가..." autocomplete="off" maxlength="20" aria-label="도시 추가" />
          <div class="city-results" id="cityResults" role="listbox"></div>
        </div>
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn" data-tooltip="위치 초기화" title="위치 초기화" type="button" aria-label="카드 위치 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>

</div>


  </div>

  <script>
    'use strict';
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
    const DEFAULT_CITIES = [
      { name: '서울', tz: 'Asia/Seoul' },
      { name: '도쿄', tz: 'Asia/Tokyo' },
      { name: '시드니', tz: 'Australia/Sydney' },
      { name: '두바이', tz: 'Asia/Dubai' },
      { name: '런던', tz: 'Europe/London' },
      { name: '파리', tz: 'Europe/Paris' },
      { name: '뉴욕', tz: 'America/New_York' },
      { name: 'LA', tz: 'America/Los_Angeles' }
    ];

    // 추가 가능한 전 세계 주요 도시 풀
    const CITY_PRESETS = [
      { name: '서울', tz: 'Asia/Seoul' }, { name: '도쿄', tz: 'Asia/Tokyo' },
      { name: '베이징', tz: 'Asia/Shanghai' }, { name: '상하이', tz: 'Asia/Shanghai' },
      { name: '홍콩', tz: 'Asia/Hong_Kong' }, { name: '타이베이', tz: 'Asia/Taipei' },
      { name: '싱가포르', tz: 'Asia/Singapore' }, { name: '방콕', tz: 'Asia/Bangkok' },
      { name: '자카르타', tz: 'Asia/Jakarta' }, { name: '뉴델리', tz: 'Asia/Kolkata' },
      { name: '뭄바이', tz: 'Asia/Kolkata' }, { name: '두바이', tz: 'Asia/Dubai' },
      { name: '이스탄불', tz: 'Europe/Istanbul' }, { name: '모스크바', tz: 'Europe/Moscow' },
      { name: '시드니', tz: 'Australia/Sydney' }, { name: '멜버른', tz: 'Australia/Melbourne' },
      { name: '오클랜드', tz: 'Pacific/Auckland' }, { name: '호놀룰루', tz: 'Pacific/Honolulu' },
      { name: '런던', tz: 'Europe/London' }, { name: '파리', tz: 'Europe/Paris' },
      { name: '베를린', tz: 'Europe/Berlin' }, { name: '로마', tz: 'Europe/Rome' },
      { name: '마드리드', tz: 'Europe/Madrid' }, { name: '암스테르담', tz: 'Europe/Amsterdam' },
      { name: '취리히', tz: 'Europe/Zurich' }, { name: '스톡홀름', tz: 'Europe/Stockholm' },
      { name: '뉴욕', tz: 'America/New_York' }, { name: '워싱턴', tz: 'America/New_York' },
      { name: '시카고', tz: 'America/Chicago' }, { name: '덴버', tz: 'America/Denver' },
      { name: 'LA', tz: 'America/Los_Angeles' }, { name: '샌프란시스코', tz: 'America/Los_Angeles' },
      { name: '시애틀', tz: 'America/Los_Angeles' }, { name: '토론토', tz: 'America/Toronto' },
      { name: '밴쿠버', tz: 'America/Vancouver' }, { name: '멕시코시티', tz: 'America/Mexico_City' },
      { name: '상파울루', tz: 'America/Sao_Paulo' }, { name: '부에노스아이레스', tz: 'America/Argentina/Buenos_Aires' },
      { name: '카이로', tz: 'Africa/Cairo' }, { name: '요하네스버그', tz: 'Africa/Johannesburg' }
    ];

    const CITY_KEY = 'nosion-worldclock-cities-v1';
    let CITIES = DEFAULT_CITIES.slice();
    try {
      const saved = JSON.parse(localStorage.getItem(CITY_KEY) || 'null');
      if (Array.isArray(saved)) {
        const valid = saved.filter(c => c && typeof c.name === 'string' && typeof c.tz === 'string');
        if (valid.length) CITIES = valid.map(c => ({ name: c.name.slice(0, 20), tz: c.tz }));
      }
    } catch (e) {}
    function saveCities() {
      try { localStorage.setItem(CITY_KEY, JSON.stringify(CITIES)); } catch (e) {}
    }


    const listEl = document.getElementById('list');
    const headDateEl = document.getElementById('headDate');

    // 특정 타임존의 현재 시/분 + 날짜
    function zoned(tz) {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: tz, hourCycle: 'h23',
        year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
      }).formatToParts(new Date()).reduce((a, x) => (a[x.type] = x.value, a), {});
      return { y: +parts.year, mo: +parts.month, d: +parts.day, h: +parts.hour, mi: +parts.minute };
    }
    // 현재 같은 순간의 도시 절대 시각(UTC 대비 분 offset) — 시간순 정렬용
    function tzOffsetMin(z) {
      const now = new Date();
      const asUTC = Date.UTC(z.y, z.mo - 1, z.d, z.h, z.mi);
      const real = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), now.getUTCHours(), now.getUTCMinutes());
      return Math.round((asUTC - real) / 60000);
    }

    function gmtLabel(offMin) {
      const h = offMin / 60;
      const sign = h >= 0 ? '+' : '-';
      const abs = Math.abs(h);
      return 'GMT' + sign + (Number.isInteger(abs) ? abs : abs.toFixed(1));
    }

    function update() {
      headDateEl.textContent = '현재 시각';

      // 각 도시 현재 시각 기준 정렬(이른 시각 → 늦은 시각, 즉 서쪽 → 동쪽)
      const sorted = CITIES.map(c => ({ c, z: zoned(c.tz) }));
      sorted.sort((a, b) => tzOffsetMin(a.z) - tzOffsetMin(b.z));

      listEl.innerHTML = '';
      sorted.forEach(({ c, z }) => {
        const isDay = z.h >= 6 && z.h < 18;

        const row = document.createElement('div');
        row.className = 'clock-row';

        const dot = document.createElement('span');
        dot.className = 'dot ' + (isDay ? 'day' : 'night');

        const block = document.createElement('div');
        block.className = 'city-block';
        const city = document.createElement('span');
        city.className = 'city';
        city.textContent = c.name;
        const gmt = document.createElement('span');
        gmt.className = 'gmt';
        gmt.textContent = gmtLabel(tzOffsetMin(z));
        block.appendChild(city);
        block.appendChild(gmt);

        const time = document.createElement('span');
        time.className = 'time';
        time.textContent = `${String(z.h).padStart(2, '0')}:${String(z.mi).padStart(2, '0')}`;

        const del = document.createElement('button');
        del.className = 'row-del';
        del.type = 'button';
        del.setAttribute('aria-label', c.name + ' 삭제');
        del.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        del.addEventListener('click', () => {
          CITIES = CITIES.filter(x => x !== c);
          saveCities(); update();
        });

        row.appendChild(dot);
        row.appendChild(block);
        row.appendChild(time);
        row.appendChild(del);
        listEl.appendChild(row);
      });
    }

    /* ===== 도시 추가 — 검색 드롭다운 ===== */
    const addInput = document.getElementById('addCityInput');
    const resultsEl = document.getElementById('cityResults');
    let curResults = [], focusedIdx = -1;

    function closeResults() {
      resultsEl.classList.remove('show');
      resultsEl.innerHTML = '';
      curResults = []; focusedIdx = -1;
    }
    function searchCities(q) {
      const lower = q.toLowerCase();
      const existing = new Set(CITIES.map(c => c.name + '|' + c.tz));
      return CITY_PRESETS
        .filter(c => c.name.toLowerCase().includes(lower) && !existing.has(c.name + '|' + c.tz))
        .slice(0, 8);
    }
    function renderResults(items) {
      curResults = items;
      focusedIdx = items.length ? 0 : -1;
      if (!items.length) {
        resultsEl.innerHTML = '<div class="city-empty">검색 결과 없음</div>';
      } else {
        resultsEl.innerHTML = items.map((c, i) =>
          `<div class="city-opt${i === 0 ? ' focused' : ''}" data-idx="${i}" role="option">` +
          `<span>${c.name}</span><span class="tz">${c.tz.split('/').pop().replace(/_/g, ' ')}</span></div>`
        ).join('');
        Array.from(resultsEl.querySelectorAll('.city-opt')).forEach(el => {
          el.addEventListener('mousedown', (e) => { e.preventDefault(); pick(+el.dataset.idx); });
          el.addEventListener('mouseenter', () => { focusedIdx = +el.dataset.idx; updateFocus(); });
        });
      }
      resultsEl.classList.add('show');
    }
    function updateFocus() {
      resultsEl.querySelectorAll('.city-opt').forEach((el, i) => el.classList.toggle('focused', i === focusedIdx));
    }
    function pick(i) {
      const c = curResults[i];
      if (!c) return;
      CITIES.push({ name: c.name, tz: c.tz });
      saveCities();
      addInput.value = '';
      closeResults();
      update();
    }
    addInput.addEventListener('input', () => {
      const q = addInput.value.trim();
      if (!q) { closeResults(); return; }
      renderResults(searchCities(q));
    });
    addInput.addEventListener('keydown', (e) => {
      if (!resultsEl.classList.contains('show')) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); if (curResults.length) { focusedIdx = Math.min(curResults.length - 1, focusedIdx + 1); updateFocus(); } }
      else if (e.key === 'ArrowUp') { e.preventDefault(); if (curResults.length) { focusedIdx = Math.max(0, focusedIdx - 1); updateFocus(); } }
      else if (e.key === 'Enter') { e.preventDefault(); if (focusedIdx >= 0) pick(focusedIdx); }
      else if (e.key === 'Escape') closeResults();
    });
    document.addEventListener('click', (e) => {
      if (!resultsEl.contains(e.target) && e.target !== addInput) closeResults();
    });

    update();
    // 분 단위 표시라 30초 간격이면 충분 (모바일 배터리 절약)
    setInterval(update, 30000);
</script>
  <script>
(function(){
  var card=document.getElementById('w');
  var head=card.querySelector('.whead');
  var KEY='nosion-world-clock-frame', MINW=230, MINH=200, DEFW=340, DEFH=300;
  ['n','s','e','w','ne','nw','se','sw'].forEach(function(d){
    var el=document.createElement('div');el.className='rz '+d;el.setAttribute('data-rz',d);card.appendChild(el);
  });
  var frame=load();
  function load(){try{var f=JSON.parse(localStorage.getItem(KEY));if(f&&f.w)return f;}catch(e){}
    var w=Math.min(DEFW,window.innerWidth-28),h=Math.min(DEFH,window.innerHeight-28);
    return{x:(window.innerWidth-w)/2,y:Math.max(14,(window.innerHeight-h)/2),w:w,h:h};}
  function clamp(){frame.w=Math.max(MINW,Math.min(frame.w,window.innerWidth-8));
    frame.h=Math.max(MINH,Math.min(frame.h,window.innerHeight-8));
    frame.x=Math.max(4,Math.min(frame.x,window.innerWidth-frame.w-4));
    frame.y=Math.max(4,Math.min(frame.y,window.innerHeight-frame.h-4));}
  function apply(){clamp();card.style.left=frame.x+'px';card.style.top=frame.y+'px';
    card.style.width=frame.w+'px';card.style.height=frame.h+'px';}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(frame));}catch(e){}}
  head.addEventListener('pointerdown',function(e){
    if(e.target.closest('button,input,a,.seg,.ic,.pill,[data-nodrag]'))return;drag(e);});
  card.querySelectorAll('.rz').forEach(function(hd){
    hd.addEventListener('pointerdown',function(e){resize(e,hd.getAttribute('data-rz'));});});
  function drag(e){e.preventDefault();card.classList.add('dragging');
    var sx=e.clientX,sy=e.clientY,ox=frame.x,oy=frame.y;
    function m(ev){frame.x=ox+(ev.clientX-sx);frame.y=oy+(ev.clientY-sy);apply();}
    function u(){card.classList.remove('dragging');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  function resize(e,dir){e.preventDefault();e.stopPropagation();card.classList.add('resizing');
    var sx=e.clientX,sy=e.clientY,o={x:frame.x,y:frame.y,w:frame.w,h:frame.h};
    function m(ev){var dx=ev.clientX-sx,dy=ev.clientY-sy;
      if(dir.indexOf('e')>=0){frame.w=Math.max(MINW,o.w+dx);}
      if(dir.indexOf('s')>=0){frame.h=Math.max(MINH,o.h+dy);}
      if(dir.indexOf('w')>=0){var nw=Math.max(MINW,o.w-dx);frame.x=o.x+(o.w-nw);frame.w=nw;}
      if(dir.indexOf('n')>=0){var nh=Math.max(MINH,o.h-dy);frame.y=o.y+(o.h-nh);frame.h=nh;}
      apply();}
    function u(){card.classList.remove('resizing');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  window.addEventListener('resize',apply);
  apply();
})();
</script>
</body>
