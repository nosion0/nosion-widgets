<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', sans-serif;
      background: var(--background); color: var(--foreground);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; word-break: keep-all;
    }
    body { padding: 1rem; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    /* 검색 드롭다운이 카드 위쪽으로 펼쳐질 때 잘리지 않도록 편집 모드에선 overflow 허용 */
    .card.editing { overflow: visible; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem 1.75rem; box-shadow: none;
      display: flex; flex-direction: column; align-items: safe center;
      box-sizing: border-box; overflow: hidden; min-width: 0; min-height: 0;
    }
    .card.dragging { cursor: grabbing; }
    .card-body { display: flex; flex-direction: column; gap: 0.85rem; width: 100%; }

    .head { display: flex; align-items: baseline; justify-content: space-between; }
    .title { font-size: 1.0625rem; font-weight: 600; color: var(--foreground); letter-spacing: -0.01em; }
    .edit-btn { font-family: inherit; font-size: 0.6875rem; color: var(--muted-foreground); background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 0.3rem; transition: background var(--transition), color var(--transition); }
    .edit-btn:hover { background: var(--muted); color: var(--foreground); }

    .list { display: flex; flex-direction: column; }
    .srow { display: flex; align-items: center; gap: 0.625rem; padding: 0.55rem 0; }
    .srow + .srow { border-top: 1px solid hsl(220 14% 93%); }
    .sname { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.1rem; }
    .sname .nm { font-size: 0.875rem; color: var(--foreground); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sname .sym { font-size: 0.625rem; color: var(--muted-foreground); letter-spacing: 0.02em; }
    .spark { width: 64px; height: 26px; flex-shrink: 0; overflow: visible; }
    .spark polyline { fill: none; stroke: var(--muted-foreground); stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
    .sright { text-align: right; min-width: 78px; }
    .sprice { font-size: 0.9375rem; font-weight: 600; color: var(--foreground); font-variant-numeric: tabular-nums; }
    .schg { font-size: 0.6875rem; font-variant-numeric: tabular-nums; color: var(--muted-foreground); margin-top: 0.05rem; }
    .schg.up::before { content: '▲ '; }
    .schg.down::before { content: '▼ '; }
    .schg.up { color: var(--foreground); }

    .sdel { display: none; width: 20px; height: 20px; flex-shrink: 0; border: none; background: none; cursor: pointer; color: var(--muted-foreground); border-radius: 0.3rem; align-items: center; justify-content: center; font-size: 1rem; line-height: 1; }
    .card.editing .sdel { display: flex; }
    .card.editing .spark { display: none; }
    .sdel:hover { color: var(--foreground); background: var(--muted); }

    .add-row { display: none; gap: 0.4rem; padding-top: 0.5rem; position: relative; }
    .card.editing .add-row { display: flex; }
    .add-input { flex: 1; min-width: 0; border: 1px solid var(--border); border-radius: 0.4rem; outline: none; background: none; font-family: inherit; font-size: 0.8125rem; color: var(--foreground); padding: 0.4rem 0.6rem; }
    .add-input:focus { border-color: var(--foreground); }

    .search-results {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
      max-height: 280px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .search-results.show { display: block; }
    .search-item {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      transition: background var(--transition);
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }
    .search-item + .search-item { border-top: 1px solid var(--border); }
    .search-item:hover, .search-item.focused { background: var(--muted); }
    .search-item .sname { font-size: 0.8125rem; font-weight: 500; color: var(--foreground); letter-spacing: -0.01em; }
    .search-item .smeta { font-size: 0.6875rem; color: var(--muted-foreground); display: flex; gap: 0.5rem; }
    .search-item .smeta .ssym { font-family: 'Menlo','Monaco',monospace; }
    .search-empty, .search-loading {
      padding: 0.625rem 0.75rem;
      font-size: 0.75rem;
      color: var(--muted-foreground);
      text-align: center;
    }

    .foot { font-size: 0.625rem; color: var(--muted-foreground); opacity: 0.6; text-align: center; min-height: 14px; }
    .hint { font-size: 0.625rem; color: var(--muted-foreground); opacity: 0.7; text-align: center; line-height: 1.5; display: none; }
    .card.editing .hint { display: block; }

    /* 컨트롤 */
    .controls { display: flex; flex-direction: column; gap: 2px; opacity: 0; transition: opacity var(--transition); padding-top: 0.25rem; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; position: relative; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .control-btn[data-tooltip]::before, .control-btn[data-tooltip]::after { position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); opacity: 0; pointer-events: none; transition: opacity 0.15s ease 0s; z-index: 50; }
    .control-btn[data-tooltip]::before { content: attr(data-tooltip); background: var(--card); color: var(--foreground); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.3125rem 0.625rem; font-size: 0.6875rem; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .control-btn[data-tooltip]::after { content: ''; right: calc(100% + 3px); width: 5px; height: 5px; background: var(--card); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transform: translateY(-50%) rotate(-45deg); }
    .control-btn[data-tooltip]:hover::before, .control-btn[data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    /* .controls를 카드 바깥 우측으로 — 마우스 오버 시 노출 (호버 브리지로 끊김 방지) */
    #w.card { overflow: visible; }
    #w.card::after { content: ''; position: absolute; top: 0; bottom: 0; right: -40px; width: 40px; pointer-events: auto; }
    #w .controls { position: absolute; top: 0.5rem; right: -34px; left: auto; bottom: auto;
      display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: opacity 0.2s ease 0.1s; z-index: 30; padding: 0; pointer-events: none; }
    #w:hover .controls, #w .controls:hover { opacity: 1; pointer-events: auto; transition-delay: 0s; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
  
    /* === NOSION FRAME SPEC (드래그 이동 + 8방향 리사이즈) === */
    html,body{background:transparent;height:100%;overflow:hidden;}
    *{box-sizing:border-box;}
    .stage{position:fixed;inset:0;}
    .card{position:absolute;display:flex;flex-direction:column;touch-action:none;container-type:size;}
    .card.dragging,.card.resizing{user-select:none;box-shadow:0 12px 36px rgba(55,53,47,.16);}
    .whead{flex:none;cursor:grab;min-height:20px;width:100%;position:relative;z-index:2;background:inherit;}
    .whead:active{cursor:grabbing;}
    .wbody{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;overflow:hidden;width:100%;align-self:stretch;}
    .rz{position:absolute;z-index:5;}
    .rz.n{top:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.s{bottom:-4px;left:10px;right:10px;height:8px;cursor:ns-resize;}
    .rz.e{right:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.w{left:-4px;top:10px;bottom:10px;width:8px;cursor:ew-resize;}
    .rz.ne{top:-5px;right:-5px;width:14px;height:14px;cursor:nesw-resize;}
    .rz.nw{top:-5px;left:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.se{bottom:-5px;right:-5px;width:14px;height:14px;cursor:nwse-resize;}
    .rz.sw{bottom:-5px;left:-5px;width:14px;height:14px;cursor:nesw-resize;}
  </style>
</head>
<body>
  <div class="stage">
    <div class="card" id="w">
      <div class="whead"><div class="head">
          <span class="title">주식</span>
          <button class="edit-btn" id="editBtn" type="button">편집</button>
        </div></div>
      <div class="wbody">

        <div class="list" id="list"></div>
        <div class="add-row">
          <input class="add-input" id="searchInput" type="text" placeholder="회사명/티커 검색 (예: 삼성전자, AAPL)" autocomplete="off" maxlength="40" />
          <div class="search-results" id="searchResults" role="listbox" aria-label="검색 결과"></div>
        </div>
        <div class="hint">회사명을 입력하면 종목 후보가 나타나요 · 클릭하거나 Enter로 추가</div>
        <div class="foot" id="foot"></div>
      </div>


      <div class="controls">
      <button class="control-btn" id="refreshBtn" data-tooltip="새로고침" title="새로고침" type="button" aria-label="새로고침">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.5 9a9 9 0 0 1 14.8-3.4L23 10M1 14l4.7 4.4A9 9 0 0 0 20.5 15"/></svg>
      </button>
      <button class="control-btn" id="resizeResetBtn" data-tooltip="위치 초기화" title="위치 초기화" type="button" aria-label="카드 위치 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>

</div>


  </div>

  <script>
    'use strict';
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    const SYM_KEY = 'nosion-stock-symbols-v1';
    const CACHE_KEY = 'nosion-stock-cache-v1';
    const MAX_SYMBOLS = 7;

    const DEFAULTS = [
      { sym: '^KS11', name: '코스피' },
      { sym: '^KQ11', name: '코스닥' },
      { sym: '005930.KS', name: '삼성전자' },
      { sym: 'AAPL', name: '애플' },
      { sym: 'NVDA', name: '엔비디아' }
    ];

    let symbols = DEFAULTS.slice();
    try {
      const s = JSON.parse(localStorage.getItem(SYM_KEY) || 'null');
      // 저장된 배열이 있으면(빈 배열 포함) 그대로 사용 — 사용자가 전부 삭제한 상태도 보존
      if (Array.isArray(s)) symbols = s.filter(x => x && typeof x.sym === 'string').slice(0, MAX_SYMBOLS).map(x => ({ sym: x.sym, name: x.name || x.sym }));
    } catch (e) {}
    let cache = {};
    try { const c = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null'); if (c && typeof c === 'object') cache = c; } catch (e) {}

    function saveSymbols() { try { localStorage.setItem(SYM_KEY, JSON.stringify(symbols)); } catch (e) {} }
    function saveCache() { try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch (e) {} }

    const listEl = document.getElementById('list');
    const footEl = document.getElementById('foot');
    const cardEl = document.getElementById('w');
    const cardBodyEl = cardEl.querySelector('.wbody');

    /* ===== 데이터: Yahoo chart를 CORS 프록시 체인으로 ===== */
    function fetchText(url, ms) {
      let ctrl = null, to = null;
      try { ctrl = new AbortController(); to = setTimeout(() => ctrl.abort(), ms || 6000); } catch (e) {}
      return fetch(url, ctrl ? { signal: ctrl.signal } : undefined)
        .then(r => (r && r.ok) ? r.text() : null)
        .then(t => { if (to) clearTimeout(to); return t; })
        .catch(() => { if (to) clearTimeout(to); return null; });
    }
    function proxify(url, i) {
      const enc = encodeURIComponent(url);
      if (i === 0) return 'https://api.codetabs.com/v1/proxy/?quest=' + enc;
      if (i === 1) return 'https://api.allorigins.win/raw?url=' + enc;
      return 'https://r.jina.ai/' + url;
    }
    async function fetchYahoo(sym) {
      const yurl = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(sym) + '?range=1mo&interval=1d';
      for (let i = 0; i < 3; i++) {
        const txt = await fetchText(proxify(yurl, i), 6500);
        if (!txt) continue;
        const a = txt.indexOf('{'), b = txt.lastIndexOf('}');
        if (a < 0 || b < 0) continue;
        try {
          const data = JSON.parse(txt.slice(a, b + 1));
          const r = data && data.chart && data.chart.result && data.chart.result[0];
          if (r && r.meta && typeof r.meta.regularMarketPrice === 'number') return r;
        } catch (e) {}
      }
      return null;
    }
    function parseResult(r, name) {
      const m = r.meta;
      const prev = (typeof m.chartPreviousClose === 'number') ? m.chartPreviousClose : m.previousClose;
      let closes = [];
      try { closes = (r.indicators.quote[0].close || []).filter(v => typeof v === 'number'); } catch (e) {}
      return {
        name: name, price: m.regularMarketPrice, prev: prev, cur: m.currency || 'USD',
        closes: closes.slice(-24), time: Date.now()
      };
    }

    function fmtPrice(v, cur) {
      if (cur === 'KRW' || cur === 'JPY') return Math.round(v).toLocaleString('en-US');
      return (cur === 'USD' ? '$' : '') + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function sparkline(closes) {
      if (!closes || closes.length < 2) return '';
      const w = 64, h = 26, n = closes.length;
      const min = Math.min.apply(null, closes), max = Math.max.apply(null, closes);
      const span = (max - min) || 1;
      const pts = closes.map((v, i) => {
        const x = (i / (n - 1)) * w;
        const y = h - 2 - ((v - min) / span) * (h - 4);
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');
      return `<polyline points="${pts}"/>`;
    }

    function render() {
      listEl.innerHTML = '';
      symbols.forEach(item => {
        const d = cache[item.sym];
        const row = document.createElement('div');
        row.className = 'srow';

        const nameWrap = document.createElement('div');
        nameWrap.className = 'sname';
        nameWrap.innerHTML = `<span class="nm">${escapeHtml(item.name)}</span><span class="sym">${escapeHtml(item.sym)}</span>`;

        const spark = document.createElement('div');
        spark.className = 'spark-wrap';
        if (d && d.closes && d.closes.length >= 2) {
          spark.innerHTML = `<svg class="spark" viewBox="0 0 64 26" aria-hidden="true">${sparkline(d.closes)}</svg>`;
        }

        const right = document.createElement('div');
        right.className = 'sright';
        if (d && typeof d.price === 'number') {
          const chg = (typeof d.prev === 'number' && d.prev) ? ((d.price - d.prev) / d.prev * 100) : 0;
          const dir = chg > 0.005 ? 'up' : (chg < -0.005 ? 'down' : '');
          right.innerHTML = `<div class="sprice">${fmtPrice(d.price, d.cur)}</div><div class="schg ${dir}">${Math.abs(chg).toFixed(2)}%</div>`;
        } else {
          right.innerHTML = `<div class="sprice" style="color:var(--muted-foreground);font-weight:400">—</div>`;
        }

        const del = document.createElement('button');
        del.className = 'sdel'; del.type = 'button'; del.textContent = '×';
        del.setAttribute('aria-label', '삭제');
        del.addEventListener('click', () => { symbols = symbols.filter(x => x.sym !== item.sym); delete cache[item.sym]; saveSymbols(); saveCache(); render(); });

        row.appendChild(nameWrap);
        if (spark.firstChild) row.appendChild(spark.firstChild);
        row.appendChild(right);
        row.appendChild(del);
        listEl.appendChild(row);
      });
    }

    let lastOk = 0, anyFail = false;
    // 캐시에 남아있는 가장 최근 갱신 시각으로 초기화(리로드 후 캐시 표시 시 푸터 메시지 정합성)
    Object.keys(cache).forEach(k => { const d = cache[k]; if (d && typeof d.time === 'number' && d.time > lastOk) lastOk = d.time; });
    function refresh() {
      anyFail = false;
      footEl.textContent = '불러오는 중...';
      let done = 0;
      const total = symbols.length;
      symbols.forEach(item => {
        fetchYahoo(item.sym).then(r => {
          if (r) { cache[item.sym] = parseResult(r, item.name); lastOk = Date.now(); saveCache(); }
          else { anyFail = true; }
          render();
        }).catch(() => { anyFail = true; }).then(() => {
          done++;
          if (done === total) {
            const t = lastOk ? new Date(lastOk).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }) : '';
            if (lastOk) footEl.textContent = (anyFail ? '일부 갱신 실패 · ' : '') + `${t} 기준 · Yahoo Finance`;
            else footEl.textContent = '주가를 불러올 수 없어요 · 5분 뒤 자동 재시도';
          }
        });
      });
      if (total === 0) footEl.textContent = '종목을 추가해 보세요';
    }

    /* ===== 편집 ===== */
    document.getElementById('editBtn').addEventListener('click', () => {
      const on = cardEl.classList.toggle('editing');
      document.getElementById('editBtn').textContent = on ? '완료' : '편집';
    });

    /* ===== 종목 추가 (검색 결과 선택 시 호출) ===== */
    function addSymbol(sym, name) {
      if (!sym) return;
      if (symbols.length >= MAX_SYMBOLS) { footEl.textContent = `최대 ${MAX_SYMBOLS}개까지 추가할 수 있어요`; return; }
      if (symbols.some(x => x.sym.toLowerCase() === sym.toLowerCase())) {
        footEl.textContent = `이미 추가된 종목이에요 (${sym})`;
        return;
      }
      const safeName = (name || sym).slice(0, 30);
      symbols.push({ sym: sym, name: safeName });
      saveSymbols();
      render();
      fetchYahoo(sym).then(r => { if (r) { cache[sym] = parseResult(r, safeName); lastOk = Date.now(); saveCache(); render(); } });
    }

    /* ===== Yahoo 검색 — 회사명/티커 → 후보 목록 ===== */
    async function searchYahoo(q) {
      const url = 'https://query1.finance.yahoo.com/v1/finance/search?q=' + encodeURIComponent(q) + '&quotesCount=8&newsCount=0';
      for (let i = 0; i < 3; i++) {
        const txt = await fetchText(proxify(url, i), 5000);
        if (!txt) continue;
        const a = txt.indexOf('{'), b = txt.lastIndexOf('}');
        if (a < 0 || b < 0) continue;
        try {
          const data = JSON.parse(txt.slice(a, b + 1));
          const arr = (data && Array.isArray(data.quotes)) ? data.quotes : [];
          return arr.filter(x => x && typeof x.symbol === 'string').slice(0, 8);
        } catch (e) {}
      }
      return null;
    }

    /* ===== 검색 UI ===== */
    const searchInput = document.getElementById('searchInput');
    const searchResultsEl = document.getElementById('searchResults');
    let searchTimer = null;
    let searchToken = 0;
    let focusedIdx = -1;
    let currentResults = [];

    function closeResults() {
      // 진행 중인 검색 무효화 — 늦게 도착한 응답이 드롭다운 되살리지 않게
      searchToken++;
      if (searchTimer) { clearTimeout(searchTimer); searchTimer = null; }
      searchResultsEl.classList.remove('show');
      searchResultsEl.innerHTML = '';
      currentResults = [];
      focusedIdx = -1;
    }

    function updateFocus() {
      const items = searchResultsEl.querySelectorAll('.search-item');
      items.forEach((el, i) => {
        el.classList.toggle('focused', i === focusedIdx);
        if (i === focusedIdx) el.scrollIntoView({ block: 'nearest' });
      });
    }

    function renderResults(items, isError) {
      currentResults = items || [];
      focusedIdx = currentResults.length > 0 ? 0 : -1;
      if (isError) {
        searchResultsEl.innerHTML = '<div class="search-empty">검색 실패 — 잠시 후 다시 시도</div>';
      } else if (currentResults.length === 0) {
        searchResultsEl.innerHTML = '<div class="search-empty">검색 결과 없음</div>';
      } else {
        searchResultsEl.innerHTML = currentResults.map((it, i) => {
          const name = it.shortname || it.longname || it.symbol;
          const exch = it.exchDisp || '';
          const type = it.typeDisp || '';
          const metaParts = [`<span class="ssym">${escapeHtml(it.symbol)}</span>`];
          if (exch) metaParts.push(`<span>${escapeHtml(exch)}</span>`);
          if (type) metaParts.push(`<span>${escapeHtml(type)}</span>`);
          return `<div class="search-item${i === focusedIdx ? ' focused' : ''}" data-idx="${i}" role="option">
            <div class="sname">${escapeHtml(name)}</div>
            <div class="smeta">${metaParts.join('')}</div>
          </div>`;
        }).join('');
        Array.from(searchResultsEl.querySelectorAll('.search-item')).forEach(el => {
          el.addEventListener('mousedown', (e) => { e.preventDefault(); selectResult(+el.dataset.idx); });
          el.addEventListener('mouseenter', () => { focusedIdx = +el.dataset.idx; updateFocus(); });
        });
      }
      searchResultsEl.classList.add('show');
    }

    function selectResult(idx) {
      const it = currentResults[idx];
      if (!it) return;
      const sym = String(it.symbol).slice(0, 20);
      const name = String(it.shortname || it.longname || sym).slice(0, 30);
      addSymbol(sym, name);
      searchInput.value = '';
      closeResults();
    }

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      if (searchTimer) clearTimeout(searchTimer);
      if (q.length < 1) { closeResults(); return; }
      searchResultsEl.innerHTML = '<div class="search-loading">검색 중...</div>';
      searchResultsEl.classList.add('show');
      const myToken = ++searchToken;
      searchTimer = setTimeout(async () => {
        const items = await searchYahoo(q);
        if (myToken !== searchToken) return;  // stale 응답 무시
        renderResults(items, items === null);
      }, 300);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (!searchResultsEl.classList.contains('show')) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (currentResults.length > 0) { focusedIdx = Math.min(currentResults.length - 1, focusedIdx + 1); updateFocus(); }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (currentResults.length > 0) { focusedIdx = Math.max(0, focusedIdx - 1); updateFocus(); }
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (focusedIdx >= 0) selectResult(focusedIdx);
      } else if (e.key === 'Escape') {
        closeResults();
      }
    });

    document.addEventListener('click', (e) => {
      if (!searchResultsEl.contains(e.target) && e.target !== searchInput) closeResults();
    });

    document.getElementById('refreshBtn').addEventListener('click', refresh);

    render();
    refresh();
    setInterval(refresh, 5 * 60 * 1000);
</script>
  <script>
(function(){
  var card=document.getElementById('w');
  var head=card.querySelector('.whead');
  var KEY='nosion-stock-ticker-frame', MINW=230, MINH=200, DEFW=340, DEFH=300;
  ['n','s','e','w','ne','nw','se','sw'].forEach(function(d){
    var el=document.createElement('div');el.className='rz '+d;el.setAttribute('data-rz',d);card.appendChild(el);
  });
  var frame=load();
  function load(){try{var f=JSON.parse(localStorage.getItem(KEY));if(f&&f.w)return f;}catch(e){}
    var w=Math.min(DEFW,window.innerWidth-28),h=Math.min(DEFH,window.innerHeight-28);
    return{x:(window.innerWidth-w)/2,y:Math.max(14,(window.innerHeight-h)/2),w:w,h:h};}
  function clamp(){frame.w=Math.max(MINW,Math.min(frame.w,window.innerWidth-8));
    frame.h=Math.max(MINH,Math.min(frame.h,window.innerHeight-8));
    frame.x=Math.max(4,Math.min(frame.x,window.innerWidth-frame.w-4));
    frame.y=Math.max(4,Math.min(frame.y,window.innerHeight-frame.h-4));}
  function apply(){clamp();card.style.left=frame.x+'px';card.style.top=frame.y+'px';
    card.style.width=frame.w+'px';card.style.height=frame.h+'px';}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(frame));}catch(e){}}
  head.addEventListener('pointerdown',function(e){
    if(e.target.closest('button,input,a,.seg,.ic,.pill,[data-nodrag]'))return;drag(e);});
  card.querySelectorAll('.rz').forEach(function(hd){
    hd.addEventListener('pointerdown',function(e){resize(e,hd.getAttribute('data-rz'));});});
  function drag(e){e.preventDefault();card.classList.add('dragging');
    var sx=e.clientX,sy=e.clientY,ox=frame.x,oy=frame.y;
    function m(ev){frame.x=ox+(ev.clientX-sx);frame.y=oy+(ev.clientY-sy);apply();}
    function u(){card.classList.remove('dragging');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  function resize(e,dir){e.preventDefault();e.stopPropagation();card.classList.add('resizing');
    var sx=e.clientX,sy=e.clientY,o={x:frame.x,y:frame.y,w:frame.w,h:frame.h};
    function m(ev){var dx=ev.clientX-sx,dy=ev.clientY-sy;
      if(dir.indexOf('e')>=0){frame.w=Math.max(MINW,o.w+dx);}
      if(dir.indexOf('s')>=0){frame.h=Math.max(MINH,o.h+dy);}
      if(dir.indexOf('w')>=0){var nw=Math.max(MINW,o.w-dx);frame.x=o.x+(o.w-nw);frame.w=nw;}
      if(dir.indexOf('n')>=0){var nh=Math.max(MINH,o.h-dy);frame.y=o.y+(o.h-nh);frame.h=nh;}
      apply();}
    function u(){card.classList.remove('resizing');save();
      document.removeEventListener('pointermove',m);document.removeEventListener('pointerup',u);}
    document.addEventListener('pointermove',m);document.addEventListener('pointerup',u);}
  window.addEventListener('resize',apply);
  apply();
})();
</script>
