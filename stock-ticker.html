<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', sans-serif;
      background: var(--background); color: var(--foreground);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; word-break: keep-all;
    }
    body { padding: 1rem; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .widget-wrapper { display: flex; align-items: flex-start; gap: 0.5rem; position: relative; width: fit-content; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.75rem 1.75rem 1.5rem; width: 350px; position: relative; box-shadow: none;
      display: flex; flex-direction: column; align-items: safe center;
      box-sizing: border-box; overflow: hidden; min-width: 0; min-height: 0;
    }
    .card.dragging { cursor: grabbing; }
    .card-body { display: flex; flex-direction: column; gap: 0.85rem; width: 100%; max-width: 314px; }

    .head { display: flex; align-items: baseline; justify-content: space-between; }
    .title { font-size: 1.0625rem; font-weight: 600; color: var(--foreground); letter-spacing: -0.01em; }
    .edit-btn { font-family: inherit; font-size: 0.6875rem; color: var(--muted-foreground); background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 0.3rem; transition: background var(--transition), color var(--transition); }
    .edit-btn:hover { background: var(--muted); color: var(--foreground); }

    .list { display: flex; flex-direction: column; }
    .srow { display: flex; align-items: center; gap: 0.625rem; padding: 0.55rem 0; }
    .srow + .srow { border-top: 1px solid hsl(220 14% 93%); }
    .sname { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.1rem; }
    .sname .nm { font-size: 0.875rem; color: var(--foreground); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sname .sym { font-size: 0.625rem; color: var(--muted-foreground); letter-spacing: 0.02em; }
    .spark { width: 64px; height: 26px; flex-shrink: 0; overflow: visible; }
    .spark polyline { fill: none; stroke: var(--muted-foreground); stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
    .sright { text-align: right; min-width: 78px; }
    .sprice { font-size: 0.9375rem; font-weight: 600; color: var(--foreground); font-variant-numeric: tabular-nums; }
    .schg { font-size: 0.6875rem; font-variant-numeric: tabular-nums; color: var(--muted-foreground); margin-top: 0.05rem; }
    .schg.up::before { content: '▲ '; }
    .schg.down::before { content: '▼ '; }
    .schg.up { color: var(--foreground); }

    .sdel { display: none; width: 20px; height: 20px; flex-shrink: 0; border: none; background: none; cursor: pointer; color: var(--muted-foreground); border-radius: 0.3rem; align-items: center; justify-content: center; font-size: 1rem; line-height: 1; }
    .card.editing .sdel { display: flex; }
    .card.editing .spark { display: none; }
    .sdel:hover { color: var(--foreground); background: var(--muted); }

    .add-row { display: none; gap: 0.4rem; padding-top: 0.5rem; }
    .card.editing .add-row { display: flex; }
    .add-input { flex: 1; min-width: 0; border: 1px solid var(--border); border-radius: 0.4rem; outline: none; background: none; font-family: inherit; font-size: 0.8125rem; color: var(--foreground); padding: 0.4rem 0.6rem; }
    .add-input:focus { border-color: var(--foreground); }
    .add-go { font-family: inherit; font-size: 0.8125rem; font-weight: 500; color: var(--card); background: var(--foreground); border: none; border-radius: 0.4rem; padding: 0.4rem 0.8rem; cursor: pointer; flex-shrink: 0; }

    .foot { font-size: 0.625rem; color: var(--muted-foreground); opacity: 0.6; text-align: center; min-height: 14px; }
    .hint { font-size: 0.625rem; color: var(--muted-foreground); opacity: 0.7; text-align: center; line-height: 1.5; display: none; }
    .card.editing .hint { display: block; }

    /* 컨트롤 */
    .controls { display: flex; flex-direction: column; gap: 2px; opacity: 0; transition: opacity var(--transition); padding-top: 0.25rem; }
    .widget-wrapper:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; position: relative; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .control-btn[data-tooltip]::before, .control-btn[data-tooltip]::after { position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); opacity: 0; pointer-events: none; transition: opacity 0.15s ease 0s; z-index: 50; }
    .control-btn[data-tooltip]::before { content: attr(data-tooltip); background: var(--card); color: var(--foreground); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.3125rem 0.625rem; font-size: 0.6875rem; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .control-btn[data-tooltip]::after { content: ''; right: calc(100% + 3px); width: 5px; height: 5px; background: var(--card); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transform: translateY(-50%) rotate(-45deg); }
    .control-btn[data-tooltip]:hover::before, .control-btn[data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }

    /* 리사이즈 */
    .resize-handle { position: absolute; display: flex; align-items: center; justify-content: center; user-select: none; z-index: 20; }
    .resize-handle .bar { background: var(--border); transition: opacity var(--transition), background var(--transition), width 0.15s ease, height 0.15s ease; border-radius: 999px; opacity: 0; }
    .widget-wrapper:hover .resize-handle .bar { opacity: 1; }
    .resize-handle:hover .bar { background: var(--muted-foreground); }
    .handle-top { top: 0; left: 50%; transform: translate(-50%,-50%); width: 36px; height: 16px; cursor: ns-resize; }
    .handle-top .bar { width: 36px; height: 1px; } .handle-top:hover .bar { height: 3px; }
    .handle-bottom { bottom: 0; left: 50%; transform: translate(-50%,50%); width: 36px; height: 16px; cursor: ns-resize; }
    .handle-bottom .bar { width: 36px; height: 1px; } .handle-bottom:hover .bar { height: 3px; }
    .handle-left { left: 0; top: 50%; transform: translate(-50%,-50%); width: 16px; height: 36px; cursor: ew-resize; }
    .handle-left .bar { width: 1px; height: 36px; } .handle-left:hover .bar { width: 3px; }
    .handle-right { right: 0; top: 50%; transform: translate(50%,-50%); width: 16px; height: 36px; cursor: ew-resize; }
    .handle-right .bar { width: 1px; height: 36px; } .handle-right:hover .bar { width: 3px; }
  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">
    <div class="card" id="card">
      <div class="card-body">
        <div class="head">
          <span class="title">주식</span>
          <button class="edit-btn" id="editBtn" type="button">편집</button>
        </div>
        <div class="list" id="list"></div>
        <div class="add-row">
          <input class="add-input" id="addSym" type="text" placeholder="티커 (예: 005930.KS, AAPL)" autocomplete="off" />
          <input class="add-input" id="addName" type="text" placeholder="이름(선택)" autocomplete="off" style="max-width:84px" />
          <button class="add-go" id="addGo" type="button">추가</button>
        </div>
        <div class="hint">티커 예: 코스피 ^KS11 · 코스닥 ^KQ11 · 삼성전자 005930.KS · 애플 AAPL · 비트코인 BTC-USD</div>
        <div class="foot" id="foot"></div>
      </div>

      <div class="resize-handle handle-top" data-direction="top"><div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left" data-direction="left"><div class="bar"></div></div>
      <div class="resize-handle handle-right" data-direction="right"><div class="bar"></div></div>
    </div>

    <div class="controls">
      <button class="control-btn" id="refreshBtn" data-tooltip="새로고침" title="새로고침" type="button" aria-label="새로고침">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.5 9a9 9 0 0 1 14.8-3.4L23 10M1 14l4.7 4.4A9 9 0 0 0 20.5 15"/></svg>
      </button>
      <button class="control-btn" id="resizeResetBtn" data-tooltip="크기 초기화" title="크기 초기화" type="button" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    'use strict';
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    const SYM_KEY = 'nosion-stock-symbols-v1';
    const CACHE_KEY = 'nosion-stock-cache-v1';
    const MAX_SYMBOLS = 7;

    const DEFAULTS = [
      { sym: '^KS11', name: '코스피' },
      { sym: '^KQ11', name: '코스닥' },
      { sym: '005930.KS', name: '삼성전자' },
      { sym: 'AAPL', name: '애플' },
      { sym: 'NVDA', name: '엔비디아' }
    ];

    let symbols = DEFAULTS.slice();
    try {
      const s = JSON.parse(localStorage.getItem(SYM_KEY) || 'null');
      if (Array.isArray(s) && s.length) symbols = s.filter(x => x && typeof x.sym === 'string').slice(0, MAX_SYMBOLS).map(x => ({ sym: x.sym, name: x.name || x.sym }));
    } catch (e) {}
    let cache = {};
    try { const c = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null'); if (c && typeof c === 'object') cache = c; } catch (e) {}

    function saveSymbols() { try { localStorage.setItem(SYM_KEY, JSON.stringify(symbols)); } catch (e) {} }
    function saveCache() { try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch (e) {} }

    const listEl = document.getElementById('list');
    const footEl = document.getElementById('foot');
    const cardEl = document.getElementById('card');

    /* ===== 데이터: Yahoo chart를 CORS 프록시 체인으로 ===== */
    function fetchText(url, ms) {
      let ctrl = null, to = null;
      try { ctrl = new AbortController(); to = setTimeout(() => ctrl.abort(), ms || 6000); } catch (e) {}
      return fetch(url, ctrl ? { signal: ctrl.signal } : undefined)
        .then(r => (r && r.ok) ? r.text() : null)
        .then(t => { if (to) clearTimeout(to); return t; })
        .catch(() => { if (to) clearTimeout(to); return null; });
    }
    function proxify(url, i) {
      const enc = encodeURIComponent(url);
      if (i === 0) return 'https://api.codetabs.com/v1/proxy/?quest=' + enc;
      if (i === 1) return 'https://api.allorigins.win/raw?url=' + enc;
      return 'https://r.jina.ai/' + url;
    }
    async function fetchYahoo(sym) {
      const yurl = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(sym) + '?range=1mo&interval=1d';
      for (let i = 0; i < 3; i++) {
        const txt = await fetchText(proxify(yurl, i), 6500);
        if (!txt) continue;
        const a = txt.indexOf('{'), b = txt.lastIndexOf('}');
        if (a < 0 || b < 0) continue;
        try {
          const data = JSON.parse(txt.slice(a, b + 1));
          const r = data && data.chart && data.chart.result && data.chart.result[0];
          if (r && r.meta && typeof r.meta.regularMarketPrice === 'number') return r;
        } catch (e) {}
      }
      return null;
    }
    function parseResult(r, name) {
      const m = r.meta;
      const prev = (typeof m.chartPreviousClose === 'number') ? m.chartPreviousClose : m.previousClose;
      let closes = [];
      try { closes = (r.indicators.quote[0].close || []).filter(v => typeof v === 'number'); } catch (e) {}
      return {
        name: name, price: m.regularMarketPrice, prev: prev, cur: m.currency || 'USD',
        closes: closes.slice(-24), time: Date.now()
      };
    }

    function fmtPrice(v, cur) {
      if (cur === 'KRW' || cur === 'JPY') return Math.round(v).toLocaleString('en-US');
      return (cur === 'USD' ? '$' : '') + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function sparkline(closes) {
      if (!closes || closes.length < 2) return '';
      const w = 64, h = 26, n = closes.length;
      const min = Math.min.apply(null, closes), max = Math.max.apply(null, closes);
      const span = (max - min) || 1;
      const pts = closes.map((v, i) => {
        const x = (i / (n - 1)) * w;
        const y = h - 2 - ((v - min) / span) * (h - 4);
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');
      return `<polyline points="${pts}"/>`;
    }

    function render() {
      listEl.innerHTML = '';
      symbols.forEach(item => {
        const d = cache[item.sym];
        const row = document.createElement('div');
        row.className = 'srow';

        const nameWrap = document.createElement('div');
        nameWrap.className = 'sname';
        nameWrap.innerHTML = `<span class="nm">${escapeHtml(item.name)}</span><span class="sym">${escapeHtml(item.sym)}</span>`;

        const spark = document.createElement('div');
        spark.className = 'spark-wrap';
        if (d && d.closes && d.closes.length >= 2) {
          spark.innerHTML = `<svg class="spark" viewBox="0 0 64 26" aria-hidden="true">${sparkline(d.closes)}</svg>`;
        }

        const right = document.createElement('div');
        right.className = 'sright';
        if (d && typeof d.price === 'number') {
          const chg = (typeof d.prev === 'number' && d.prev) ? ((d.price - d.prev) / d.prev * 100) : 0;
          const dir = chg > 0.005 ? 'up' : (chg < -0.005 ? 'down' : '');
          right.innerHTML = `<div class="sprice">${fmtPrice(d.price, d.cur)}</div><div class="schg ${dir}">${Math.abs(chg).toFixed(2)}%</div>`;
        } else {
          right.innerHTML = `<div class="sprice" style="color:var(--muted-foreground);font-weight:400">—</div>`;
        }

        const del = document.createElement('button');
        del.className = 'sdel'; del.type = 'button'; del.textContent = '×';
        del.setAttribute('aria-label', '삭제');
        del.addEventListener('click', () => { symbols = symbols.filter(x => x.sym !== item.sym); delete cache[item.sym]; saveSymbols(); saveCache(); render(); });

        row.appendChild(nameWrap);
        if (spark.firstChild) row.appendChild(spark.firstChild);
        row.appendChild(right);
        row.appendChild(del);
        listEl.appendChild(row);
      });
    }

    let lastOk = 0, anyFail = false;
    function refresh() {
      anyFail = false;
      footEl.textContent = '불러오는 중...';
      let done = 0;
      const total = symbols.length;
      symbols.forEach(item => {
        fetchYahoo(item.sym).then(r => {
          if (r) { cache[item.sym] = parseResult(r, item.name); lastOk = Date.now(); saveCache(); }
          else { anyFail = true; }
          render();
        }).catch(() => { anyFail = true; }).then(() => {
          done++;
          if (done === total) {
            const t = lastOk ? new Date(lastOk).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }) : '';
            if (lastOk) footEl.textContent = (anyFail ? '일부 갱신 실패 · ' : '') + `${t} 기준`;
            else footEl.textContent = '주가를 불러올 수 없어요 · 잠시 후 자동 재시도';
          }
        });
      });
      if (total === 0) footEl.textContent = '종목을 추가해 보세요';
    }

    /* ===== 편집 ===== */
    document.getElementById('editBtn').addEventListener('click', () => {
      const on = cardEl.classList.toggle('editing');
      document.getElementById('editBtn').textContent = on ? '완료' : '편집';
    });
    function addSymbol() {
      const sym = document.getElementById('addSym').value.trim();
      if (!sym) return;
      if (symbols.length >= MAX_SYMBOLS) { footEl.textContent = `최대 ${MAX_SYMBOLS}개까지 추가할 수 있어요`; return; }
      if (symbols.some(x => x.sym.toLowerCase() === sym.toLowerCase())) return;
      const name = document.getElementById('addName').value.trim() || sym.toUpperCase();
      symbols.push({ sym: sym, name: name });
      saveSymbols();
      document.getElementById('addSym').value = '';
      document.getElementById('addName').value = '';
      render();
      fetchYahoo(sym).then(r => { if (r) { cache[sym] = parseResult(r, name); lastOk = Date.now(); saveCache(); render(); } });
    }
    document.getElementById('addGo').addEventListener('click', addSymbol);
    document.getElementById('addSym').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addSymbol(); } });
    document.getElementById('addName').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addSymbol(); } });
    document.getElementById('refreshBtn').addEventListener('click', refresh);

    render();
    refresh();
    setInterval(refresh, 5 * 60 * 1000);

    /* ===== 리사이즈 ===== */
    const SIZE_KEY = 'nosion-stock-size-v1';
    const MIN_WIDTH = 300, MAX_WIDTH = 560, MIN_HEIGHT = 300, MAX_HEIGHT = 680, DEFAULT_WIDTH = 350;
    const widgetEl = document.getElementById('widget');
    let cardWidth = DEFAULT_WIDTH, cardHeight = null;
    try {
      const s = JSON.parse(localStorage.getItem(SIZE_KEY) || 'null');
      if (s) { if (typeof s.width === 'number') cardWidth = Math.max(MIN_WIDTH, Math.min(MAX_WIDTH, s.width)); if (typeof s.height === 'number' && s.height > 0) cardHeight = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, s.height)); }
    } catch (e) {}
    function applyCardSize() { cardEl.style.width = cardWidth + 'px'; cardEl.style.height = cardHeight !== null ? cardHeight + 'px' : ''; }
    function saveSize() { try { localStorage.setItem(SIZE_KEY, JSON.stringify({ width: cardWidth, height: cardHeight })); } catch (e) {} }
    let resizeDrag = null, startLeft = 0, startTop = 0;
    function startResize(direction, x, y) {
      const rect = cardEl.getBoundingClientRect();
      resizeDrag = { direction, startX: x, startY: y, startWidth: rect.width, startHeight: rect.height };
      if (getComputedStyle(widgetEl).position !== 'fixed') {
        const wr = widgetEl.getBoundingClientRect();
        widgetEl.style.position = 'fixed'; widgetEl.style.left = wr.left + 'px'; widgetEl.style.top = wr.top + 'px'; widgetEl.style.transform = 'none';
        offsetX = 0; offsetY = 0;
      }
      startLeft = parseFloat(widgetEl.style.left) || 0; startTop = parseFloat(widgetEl.style.top) || 0;
      document.body.style.userSelect = 'none';
      document.body.style.cursor = (direction === 'left' || direction === 'right') ? 'ew-resize' : 'ns-resize';
    }
    function moveResize(x, y) {
      if (!resizeDrag) return;
      const dx = x - resizeDrag.startX, dy = y - resizeDrag.startY, dir = resizeDrag.direction;
      if (dir === 'right' || dir === 'left') {
        const delta = dir === 'right' ? dx : -dx;
        cardWidth = Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, resizeDrag.startWidth + 2 * delta));
        const actual = cardWidth - resizeDrag.startWidth;
        if (widgetEl.style.position === 'fixed') widgetEl.style.left = (startLeft - actual / 2) + 'px';
      }
      if (dir === 'bottom' || dir === 'top') {
        const delta = dir === 'bottom' ? dy : -dy;
        cardHeight = Math.min(MAX_HEIGHT, Math.max(MIN_HEIGHT, resizeDrag.startHeight + 2 * delta));
        const actual = cardHeight - resizeDrag.startHeight;
        if (widgetEl.style.position === 'fixed') widgetEl.style.top = (startTop - actual / 2) + 'px';
      }
      applyCardSize();
    }
    function endResize() { if (!resizeDrag) return; saveSize(); resizeDrag = null; document.body.style.userSelect = ''; document.body.style.cursor = ''; }
    document.querySelectorAll('.resize-handle').forEach(handle => {
      const direction = handle.dataset.direction;
      handle.addEventListener('mousedown', (e) => { e.preventDefault(); e.stopPropagation(); startResize(direction, e.clientX, e.clientY); });
      handle.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; startResize(direction, t.clientX, t.clientY); }, { passive: false });
    });
    document.addEventListener('mousemove', (e) => { if (resizeDrag) { e.preventDefault(); moveResize(e.clientX, e.clientY); } });
    document.addEventListener('mouseup', endResize);
    document.addEventListener('touchmove', (e) => { if (resizeDrag) { const t = e.touches[0]; moveResize(t.clientX, t.clientY); } }, { passive: true });
    document.addEventListener('touchend', endResize);
    document.addEventListener('touchcancel', endResize);
    applyCardSize();

    /* ===== 드래그 이동 ===== */
    const POS_KEY = 'nosion-stock-pos-v1';
    let offsetX = 0, offsetY = 0, moveDrag = null;
    try { const p = JSON.parse(localStorage.getItem(POS_KEY) || 'null'); if (p) { if (typeof p.x === 'number') offsetX = p.x; if (typeof p.y === 'number') offsetY = p.y; } } catch (e) {}
    function applyPosition() { widgetEl.style.transform = `translate(${offsetX}px, ${offsetY}px)`; }
    function savePosition() { try { localStorage.setItem(POS_KEY, JSON.stringify({ x: offsetX, y: offsetY })); } catch (e) {} }
    function isDraggableTarget(target) {
      if (!target.closest) return false;
      const blocked = ['.control-btn', '.resize-handle', 'button', '[contenteditable]', 'a', 'input', '.list', '.add-row'];
      for (const sel of blocked) if (target.closest(sel)) return false;
      return true;
    }
    function startMove(x, y) { moveDrag = { startX: x, startY: y, startOffsetX: offsetX, startOffsetY: offsetY }; document.body.style.userSelect = 'none'; cardEl.classList.add('dragging'); }
    function doMove(x, y) { if (!moveDrag) return; offsetX = moveDrag.startOffsetX + (x - moveDrag.startX); offsetY = moveDrag.startOffsetY + (y - moveDrag.startY); applyPosition(); }
    function endMove() { if (!moveDrag) return; savePosition(); moveDrag = null; document.body.style.userSelect = ''; cardEl.classList.remove('dragging'); }
    applyPosition();
    cardEl.addEventListener('mousedown', (e) => { if (!isDraggableTarget(e.target)) return; e.preventDefault(); startMove(e.clientX, e.clientY); });
    cardEl.addEventListener('touchstart', (e) => { if (!isDraggableTarget(e.target)) return; const t = e.touches[0]; startMove(t.clientX, t.clientY); }, { passive: true });
    document.addEventListener('mousemove', (e) => { if (moveDrag) { e.preventDefault(); doMove(e.clientX, e.clientY); } });
    document.addEventListener('mouseup', endMove);
    document.addEventListener('touchmove', (e) => { if (moveDrag) { const t = e.touches[0]; doMove(t.clientX, t.clientY); } }, { passive: true });
    document.addEventListener('touchend', endMove);
    document.addEventListener('touchcancel', endMove);

    document.getElementById('resizeResetBtn').addEventListener('click', () => {
      cardWidth = DEFAULT_WIDTH; cardHeight = null; applyCardSize(); saveSize();
      offsetX = 0; offsetY = 0; applyPosition(); savePosition();
    });
  </script>
</body>
</html>
