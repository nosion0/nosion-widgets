<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', sans-serif;
      background: var(--background); color: var(--foreground);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; word-break: keep-all;
    }

    /* ===== Stage: 전체 화면 위치 기준 ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }

    /* ===== Card: left/top/width/height 는 JS frame 으로만 제어 ===== */
    .card {
      position: absolute;
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 1.5rem 1.75rem; box-shadow: none;
      display: flex; flex-direction: column;
      overflow: hidden; box-sizing: border-box;
      min-width: 0; min-height: 0;
    }

    /* 헤더: 드래그 이동 손잡이, 크기 고정 */
    .card-header {
      flex: none;
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 1.125rem; cursor: grab; touch-action: none;
    }
    .card.dragging .card-header { cursor: grabbing; }
    .title { font-size: 16px; font-weight: 700; color: var(--foreground); letter-spacing: -0.02em; }
    .count { font-size: 13px; color: var(--muted-foreground); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; padding-right: 1.25rem; }

    /* 본문: 남은 공간을 채움 */
    .card-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }

    /* 목록 — flex:1 로 카드 높이를 채움 */
    .list { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 0.125rem; overflow-y: auto; margin: 0 -0.5rem; padding: 0 0.5rem; }
    .empty { font-size: 0.8125rem; color: var(--muted-foreground); opacity: 0.7; text-align: center; padding: 1rem 0; user-select: none; }

    .item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.25rem; border-radius: 0.4rem; transition: background var(--transition); }
    .item:hover { background: var(--muted); }

    .check {
      width: 20px; height: 20px; flex-shrink: 0; border: 1.5px solid var(--border); border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), border-color var(--transition);
    }
    .check svg { width: 12px; height: 12px; stroke: var(--card); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0; }
    .item.done .check { background: var(--foreground); border-color: var(--foreground); }
    .item.done .check svg { opacity: 1; }

    .text { flex: 1; font-size: 14px; color: var(--foreground); line-height: 1.4; cursor: pointer; word-break: break-word; letter-spacing: -0.01em; }
    .item.done .text { color: var(--muted-foreground); text-decoration: line-through; text-decoration-thickness: 1px; }

    .del { width: 20px; height: 20px; flex-shrink: 0; border: none; background: none; cursor: pointer; color: var(--muted-foreground); opacity: 0; display: flex; align-items: center; justify-content: center; border-radius: 0.3rem; transition: opacity var(--transition), color var(--transition); }
    .item:hover .del { opacity: 0.6; }
    .del:hover { opacity: 1; color: var(--foreground); }
    .del svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; }

    /* 하단 "할 일 추가" */
    .add-row {
      flex: none;
      display: flex; align-items: center; gap: 0.75rem;
      margin-top: 0.5rem; padding: 0.875rem 0.25rem 0;
      border-top: 1px dashed var(--border);
    }
    .add-box { width: 20px; height: 20px; flex-shrink: 0; border: 1.5px dashed var(--border); border-radius: 6px; }
    .add-input { flex: 1; border: none; outline: none; background: none; font-family: inherit; font-size: 14px; color: var(--foreground); padding: 0.1rem 0; letter-spacing: -0.01em; }
    .add-input::placeholder { color: var(--muted-foreground); opacity: 0.7; }

    /* ===== 컨트롤 (카드 우상단, 호버 노출) ===== */
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; display: flex; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; }
    .card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-header" data-drag>
        <span class="title">할 일</span>
        <span class="count" id="count">—</span>
      </div>

      <div class="card-body">
        <div class="list" id="list"></div>
        <div class="add-row">
          <div class="add-box" aria-hidden="true"></div>
          <input class="add-input" id="addInput" type="text" placeholder="할 일 추가..." autocomplete="off" maxlength="200" aria-label="할 일 추가" />
        </div>
      </div>

      <div class="controls">
        <button class="control-btn" id="resizeResetBtn" title="위치 초기화" type="button" aria-label="위치 초기화">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
        <button class="control-btn" id="themeBtn" title="테마 전환" type="button" aria-label="라이트/다크 모드 전환">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <script>
    'use strict';
    /* ===== 테마 ===== */
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();

    /* ===== 할 일 로직 ===== */
    const STORE_KEY = 'nosion-todo-list-v1';
    const listEl = document.getElementById('list');
    const addInput = document.getElementById('addInput');
    const countEl = document.getElementById('count');

    const CHECK_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>';
    const X_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

    let todos = [];
    let seq = 1;
    try {
      const saved = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
      if (Array.isArray(saved)) {
        todos = saved.filter(t => t && typeof t.text === 'string').map(t => ({ id: seq++, text: t.text, done: !!t.done }));
      }
    } catch (e) {}

    function save() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(todos.map(t => ({ text: t.text, done: t.done })))); } catch (e) {}
    }

    function render() {
      listEl.innerHTML = '';
      if (todos.length === 0) {
        const e = document.createElement('div');
        e.className = 'empty';
        e.textContent = '할 일을 추가해 보세요';
        listEl.appendChild(e);
      } else {
        todos.forEach(t => {
          const item = document.createElement('div');
          item.className = 'item' + (t.done ? ' done' : '');

          const check = document.createElement('div');
          check.className = 'check';
          check.setAttribute('role', 'checkbox');
          check.setAttribute('aria-checked', t.done ? 'true' : 'false');
          check.innerHTML = CHECK_SVG;
          check.addEventListener('click', () => { t.done = !t.done; save(); render(); });

          const text = document.createElement('span');
          text.className = 'text';
          text.textContent = t.text;
          text.addEventListener('click', () => { t.done = !t.done; save(); render(); });

          const del = document.createElement('button');
          del.className = 'del';
          del.type = 'button';
          del.setAttribute('aria-label', '삭제');
          del.innerHTML = X_SVG;
          del.addEventListener('click', () => { todos = todos.filter(x => x.id !== t.id); save(); render(); });

          item.appendChild(check);
          item.appendChild(text);
          item.appendChild(del);
          listEl.appendChild(item);
        });
      }

      const doneCount = todos.filter(t => t.done).length;
      countEl.textContent = todos.length ? `${doneCount}/${todos.length}` : '';
    }

    function addTodo() {
      const v = addInput.value.trim();
      if (!v) return;
      todos.push({ id: seq++, text: v, done: false });
      addInput.value = '';
      save(); render();
    }
    addInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); addTodo(); } });

    render();

    /* ===================================================================
       드래그 이동
       위젯별 설정만 다르고 컨트롤러 본체는 모든 위젯이 동일.
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-todo-frame-v1', minW: 240, minH: 180, defaultW: 320 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, Math.min(frame.w, window.innerWidth)); frame.h = Math.max(MIN_H, Math.min(frame.h, window.innerHeight));
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';


      /* ----- 드래그 이동 (헤더 또는 카드 빈 영역) ----- */
      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-no-drag]')) return;
        active = true; e.preventDefault();
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        try { dragEl.setPointerCapture(e.pointerId); } catch (_) {}
        card.classList.add('dragging');
        const mv = (ev) => { frame.x = sx + (ev.clientX - dx0); frame.y = sy + (ev.clientY - dy0); applyFrame(); };
        const up = () => {
          dragEl.removeEventListener('pointermove', mv); dragEl.removeEventListener('pointerup', up); dragEl.removeEventListener('pointercancel', up);
          card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame();
        };
        dragEl.addEventListener('pointermove', mv); dragEl.addEventListener('pointerup', up); dragEl.addEventListener('pointercancel', up);
      });

      /* ----- 초기화 ----- */
      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });

      /* ----- 창 크기 변경 시 화면 안으로 보정 ----- */
      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
  </script>
</body>
</html>
