<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진행률</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --track: hsl(220 14% 93%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', sans-serif;
      background: var(--background); color: var(--foreground);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; word-break: keep-all;
    }
    body { padding: 1rem; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .widget-wrapper { display: flex; align-items: flex-start; gap: 0.5rem; position: relative; width: fit-content; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem 1.75rem; width: 340px; position: relative; box-shadow: none;
      display: flex; flex-direction: column; align-items: safe center; justify-content: safe center;
      box-sizing: border-box; overflow: hidden; min-width: 0; min-height: 0;
    }
    .card.dragging { cursor: grabbing; }
    .card-body { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; }

    .caption { font-size: 0.6875rem; color: var(--muted-foreground); letter-spacing: 0.08em; text-transform: uppercase; user-select: none; }

    /* 히어로 (올해) */
    .hero { display: flex; flex-direction: column; gap: 0.75rem; }
    .hero-top { display: flex; align-items: baseline; justify-content: space-between; }
    .hero-label { font-size: 0.9375rem; color: var(--foreground); font-weight: 500; }
    .hero-pct { font-size: 2.5rem; font-weight: 600; color: var(--foreground); letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums; }
    .hero-sub { font-size: 0.75rem; color: var(--muted-foreground); font-variant-numeric: tabular-nums; }

    .bar-track { height: 8px; background: var(--track); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--foreground); border-radius: 99px; width: 0; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
    .bar-track.thin { height: 5px; }

    .divider { height: 1px; width: 100%; background: var(--border); opacity: 0.5; }

    /* 세부 행 (이번 달 / 오늘) */
    .rows { display: flex; flex-direction: column; gap: 1.05rem; }
    .row { display: flex; flex-direction: column; gap: 0.4rem; }
    .row-top { display: flex; align-items: baseline; justify-content: space-between; }
    .row-label { font-size: 0.8125rem; color: var(--muted-foreground); }
    .row-val { font-size: 0.8125rem; color: var(--foreground); font-weight: 500; font-variant-numeric: tabular-nums; }

    .footer { font-size: 0.6875rem; color: var(--muted-foreground); opacity: 0.6; letter-spacing: 0.03em; text-align: center; user-select: none; }

    /* 컨트롤 */
    .controls { display: flex; flex-direction: column; gap: 2px; opacity: 0; transition: opacity var(--transition); padding-top: 0.25rem; }
    .widget-wrapper:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; position: relative; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .control-btn[data-tooltip]::before, .control-btn[data-tooltip]::after { position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); opacity: 0; pointer-events: none; transition: opacity 0.15s ease 0s; z-index: 50; }
    .control-btn[data-tooltip]::before { content: attr(data-tooltip); background: var(--card); color: var(--foreground); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.3125rem 0.625rem; font-size: 0.6875rem; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .control-btn[data-tooltip]::after { content: ''; right: calc(100% + 3px); width: 5px; height: 5px; background: var(--card); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transform: translateY(-50%) rotate(-45deg); }
    .control-btn[data-tooltip]:hover::before, .control-btn[data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }

    /* 리사이즈 */
    .resize-handle { position: absolute; display: flex; align-items: center; justify-content: center; user-select: none; z-index: 20; }
    .resize-handle .bar { background: var(--border); transition: opacity var(--transition), background var(--transition), width 0.15s ease, height 0.15s ease; border-radius: 999px; opacity: 0; }
    .widget-wrapper:hover .resize-handle .bar { opacity: 1; }
    .resize-handle:hover .bar { background: var(--muted-foreground); }
    .handle-top { top: 0; left: 50%; transform: translate(-50%,-50%); width: 36px; height: 16px; cursor: ns-resize; }
    .handle-top .bar { width: 36px; height: 1px; } .handle-top:hover .bar { height: 3px; }
    .handle-bottom { bottom: 0; left: 50%; transform: translate(-50%,50%); width: 36px; height: 16px; cursor: ns-resize; }
    .handle-bottom .bar { width: 36px; height: 1px; } .handle-bottom:hover .bar { height: 3px; }
    .handle-left { left: 0; top: 50%; transform: translate(-50%,-50%); width: 16px; height: 36px; cursor: ew-resize; }
    .handle-left .bar { width: 1px; height: 36px; } .handle-left:hover .bar { width: 3px; }
    .handle-right { right: 0; top: 50%; transform: translate(50%,-50%); width: 16px; height: 36px; cursor: ew-resize; }
    .handle-right .bar { width: 1px; height: 36px; } .handle-right:hover .bar { width: 3px; }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동 + 8방향 리사이즈) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      position: absolute; width: auto; height: auto;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; left: auto; bottom: auto;
      display: flex; flex-direction: row; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; padding: 0; }
    #card.card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .rz { position: absolute; z-index: 20; touch-action: none; }
    .rz-n { top: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-s { bottom: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-e { top: 0; bottom: 0; right: 0; width: 7px; cursor: ew-resize; }
    .rz-w { top: 0; bottom: 0; left: 0; width: 7px; cursor: ew-resize; }
    .rz-ne, .rz-nw, .rz-se, .rz-sw { width: 14px; height: 14px; z-index: 21; }
    .rz-ne { top: 0; right: 0; cursor: nesw-resize; }
    .rz-nw { top: 0; left: 0; cursor: nwse-resize; }
    .rz-se { bottom: 0; right: 0; cursor: nwse-resize; }
    .rz-sw { bottom: 0; left: 0; cursor: nesw-resize; }
    .rz-e::after, .rz-w::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 2px; height: 28px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    .rz-n::after, .rz-s::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 2px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    #card.card:hover .rz-n::after, #card.card:hover .rz-s::after, #card.card:hover .rz-e::after, #card.card:hover .rz-w::after { opacity: 0.7; }
    .rz:hover::after { background: var(--muted-foreground) !important; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-body">
        <div class="caption" id="yearCaption">2026년</div>

        <div class="hero">
          <div class="hero-top">
            <span class="hero-label">올해</span>
            <span class="hero-pct" id="yearPct">—%</span>
          </div>
          <div class="bar-track"><div class="bar-fill" id="yearBar"></div></div>
          <div class="hero-sub" id="yearSub">—</div>
        </div>

        <div class="divider"></div>

        <div class="rows">
          <div class="row">
            <div class="row-top"><span class="row-label">이번 달</span><span class="row-val" id="monthVal">—</span></div>
            <div class="bar-track thin"><div class="bar-fill" id="monthBar"></div></div>
          </div>
          <div class="row">
            <div class="row-top"><span class="row-label">오늘</span><span class="row-val" id="dayVal">—</span></div>
            <div class="bar-track thin"><div class="bar-fill" id="dayBar"></div></div>
          </div>
        </div>

        <div class="footer" id="footer">—</div>
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn" data-tooltip="크기 초기화" title="크기 초기화" type="button" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

      <div class="rz rz-n"  data-rz="n"></div>
      <div class="rz rz-s"  data-rz="s"></div>
      <div class="rz rz-e"  data-rz="e"></div>
      <div class="rz rz-w"  data-rz="w"></div>
      <div class="rz rz-ne" data-rz="ne"></div>
      <div class="rz rz-nw" data-rz="nw"></div>
      <div class="rz rz-se" data-rz="se"></div>
      <div class="rz rz-sw" data-rz="sw"></div>
</div>


  </div>

  <script>
    'use strict';
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
    const WEEKDAY = ['일','월','화','수','목','금','토'];

    function update() {
      const now = new Date();
      const y = now.getFullYear();

      // 올해
      const yStart = new Date(y, 0, 1).getTime();
      const yEnd = new Date(y + 1, 0, 1).getTime();
      const yPct = (now.getTime() - yStart) / (yEnd - yStart);
      // 일수는 달력 날짜 기반(UTC 자정 차)으로 계산해 DST 영향 제거
      const totalDays = Math.round((Date.UTC(y + 1, 0, 1) - Date.UTC(y, 0, 1)) / 86400000);
      const dayOfYear = Math.round((Date.UTC(y, now.getMonth(), now.getDate()) - Date.UTC(y, 0, 1)) / 86400000) + 1;
      const daysLeft = totalDays - dayOfYear;

      // 이번 달
      const mStart = new Date(y, now.getMonth(), 1).getTime();
      const mEnd = new Date(y, now.getMonth() + 1, 1).getTime();
      const mPct = (now.getTime() - mStart) / (mEnd - mStart);

      // 오늘 (하루 중 경과 시간)
      const dStart = new Date(y, now.getMonth(), now.getDate()).getTime();
      const dPct = Math.min(1, Math.max(0, (now.getTime() - dStart) / 86400000));

      document.getElementById('yearCaption').textContent = `${y}년`;
      document.getElementById('yearPct').textContent = (yPct * 100).toFixed(1) + '%';
      document.getElementById('yearBar').style.width = (yPct * 100).toFixed(2) + '%';
      document.getElementById('yearSub').textContent = `${dayOfYear} / ${totalDays}일 · ${daysLeft}일 남음`;

      document.getElementById('monthVal').textContent = Math.round(mPct * 100) + '%';
      document.getElementById('monthBar').style.width = (mPct * 100).toFixed(2) + '%';

      document.getElementById('dayVal').textContent = Math.round(dPct * 100) + '%';
      document.getElementById('dayBar').style.width = (dPct * 100).toFixed(2) + '%';

      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('footer').textContent =
        `${now.getMonth() + 1}월 ${now.getDate()}일 (${WEEKDAY[now.getDay()]}) · ${hh}:${mm}`;
    }

    update();
    setInterval(update, 60 * 1000); // 1분마다 갱신


    /* ===================================================================
       드래그 이동 + 8방향 리사이즈 (frame{x,y,w,h} · Pointer Events)
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-year-progress-frame-v1', minW: 280, minH: 240, defaultW: 340 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, frame.w); frame.h = Math.max(MIN_H, frame.h);
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';

      /* ----- 8방향 리사이즈 (document 리스너) ----- */
      card.querySelectorAll('[data-rz]').forEach(handle => {
        handle.addEventListener('pointerdown', (e) => {
          if (active) return; active = true;
          e.preventDefault(); e.stopPropagation();
          const dir = handle.dataset.rz, sx = e.clientX, sy = e.clientY, f0 = { x: frame.x, y: frame.y, w: frame.w, h: frame.h };
          card.classList.add('resizing');
          const mv = (ev) => {
            const dx = ev.clientX - sx, dy = ev.clientY - sy;
            if (dir.includes('e')) frame.w = Math.max(MIN_W, f0.w + dx);
            if (dir.includes('s')) frame.h = Math.max(MIN_H, f0.h + dy);
            if (dir.includes('w')) { const nw = Math.max(MIN_W, f0.w - dx); frame.x = f0.x + (f0.w - nw); frame.w = nw; }
            if (dir.includes('n')) { const nh = Math.max(MIN_H, f0.h - dy); frame.y = f0.y + (f0.h - nh); frame.h = nh; }
            applyFrame();
          };
          const up = () => {
            document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
            card.classList.remove('resizing'); active = false; clampFrame(); applyFrame(); saveFrame();
          };
          document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
        });
      });

      /* ----- 드래그 이동 (이동 임계값으로 클릭과 충돌 방지) ----- */
      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-rz], [data-no-drag]')) return;
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        let started = false;
        const mv = (ev) => {
          const ddx = ev.clientX - dx0, ddy = ev.clientY - dy0;
          if (!started) {
            if (Math.abs(ddx) < 4 && Math.abs(ddy) < 4) return;
            started = true; active = true; card.classList.add('dragging');
          }
          frame.x = sx + ddx; frame.y = sy + ddy; applyFrame();
        };
        const up = () => {
          document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
          if (started) { card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame(); }
        };
        document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
      });

      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });
      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
</script>
</body>
</html>
