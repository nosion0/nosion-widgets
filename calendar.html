<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>달력</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .widget-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      position: relative;
      width: fit-content;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 1.75rem 1.5rem;
      width: 360px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow: hidden;
      box-shadow: none;
      cursor: grab;
    }

    .card.dragging { cursor: grabbing; }

    /* === Calendar header === */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .month-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.01em;
      user-select: none;
    }

    .month-title .year {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      font-weight: 400;
      margin-right: 0.375rem;
    }

    .nav-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 0.4rem;
      color: var(--muted-foreground);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background var(--transition), color var(--transition);
    }

    .nav-btn:hover { background: var(--muted); color: var(--foreground); }
    .nav-btn svg { width: 14px; height: 14px; stroke-width: 2; }

    /* === Day of week row === */
    .dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .dow-row span {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding-bottom: 0.5rem;
    }

    /* === Date grid === */
    .date-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px 0;
      transition: opacity 0.15s ease;
    }

    .date-grid.fading { opacity: 0; }

    .date-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      color: var(--foreground);
      border-radius: 50%;
      cursor: default;
      position: relative;
      user-select: none;
      transition: background 0.12s ease;
      gap: 2px;
    }

    .date-cell.other-month {
      color: var(--muted-foreground);
      opacity: 0.3;
      cursor: pointer;
    }

    .date-cell.other-month:hover { opacity: 0.6; background: var(--muted); }

    .date-cell.today {
      background: var(--foreground);
      color: var(--card);
      font-weight: 500;
    }

    .date-cell:not(.today):not(.other-month):hover {
      background: var(--muted);
    }

    /* Holiday dot */
    .date-cell .h-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--muted-foreground);
      flex-shrink: 0;
    }

    .date-cell.today .h-dot {
      background: var(--card);
      opacity: 0.6;
    }


    /* === Resize handles === */
    .resize-handle {
      position: absolute;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .handle-top, .handle-bottom { left: 0; right: 0; height: 12px; cursor: ns-resize; }
    .handle-top { top: 0; }
    .handle-bottom { bottom: 0; }
    .handle-left, .handle-right { top: 0; bottom: 0; width: 12px; cursor: ew-resize; }
    .handle-left { left: 0; }
    .handle-right { right: 0; }

    .resize-handle .bar {
      border-radius: 99px;
      background: var(--border);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .handle-top .bar, .handle-bottom .bar { width: 32px; height: 3px; }
    .handle-left .bar, .handle-right .bar { width: 3px; height: 32px; }
    .resize-handle:hover .bar { opacity: 1; }

    /* === Controls === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      opacity: 0.25;
      transition: opacity var(--transition);
    }
    .widget-wrapper:hover .controls { opacity: 1; }

    .control-btn {
      width: 28px;
      height: 28px;
      border-radius: 0.4rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted-foreground);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background var(--transition), color var(--transition);
      position: relative;
    }
    .control-btn:hover { background: var(--muted); color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 1.75; }

    .control-btn[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: hsl(220 10% 30%);
      color: #fff;
      font-size: 0.6875rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.35rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .control-btn[data-tooltip]:hover::after { opacity: 1; }
  </style>
</head>
<body>
  <div class="widget-wrapper" id="widget">
    <div class="card" id="card">

      <div class="cal-header">
        <button class="nav-btn" id="prevBtn" type="button" aria-label="이전 달">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="month-title" id="monthTitle">
          <span class="year" id="titleYear"></span><span id="titleMonth"></span>
        </div>
        <button class="nav-btn" id="nextBtn" type="button" aria-label="다음 달">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>

      <div class="dow-row">
        <span>일</span><span>월</span><span>화</span>
        <span>수</span><span>목</span><span>금</span><span>토</span>
      </div>

      <div class="date-grid" id="dateGrid"></div>

      <div class="resize-handle handle-top" data-direction="top"><div class="bar"></div></div>
      <div class="resize-handle handle-bottom" data-direction="bottom"><div class="bar"></div></div>
      <div class="resize-handle handle-left" data-direction="left"><div class="bar"></div></div>
      <div class="resize-handle handle-right" data-direction="right"><div class="bar"></div></div>
    </div>

    <div class="controls">
      <button class="control-btn" id="resizeResetBtn" type="button"
              data-tooltip="크기 초기화" title="크기 초기화" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="todayBtn" type="button"
              data-tooltip="오늘로 이동" title="오늘로 이동" aria-label="오늘로 이동">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    /* ===== Korean public holidays (2025–2026) ===== */
    const HOLIDAYS = {
      '2025-01-01': '신정',
      '2025-01-28': '설날 연휴',
      '2025-01-29': '설날',
      '2025-01-30': '설날 연휴',
      '2025-03-01': '삼일절',
      '2025-04-06': '국회의원선거',
      '2025-05-05': '어린이날·석가탄신일',
      '2025-05-06': '대체공휴일',
      '2025-06-06': '현충일',
      '2025-08-15': '광복절',
      '2025-10-03': '개천절',
      '2025-10-05': '추석 연휴',
      '2025-10-06': '추석',
      '2025-10-07': '추석 연휴',
      '2025-10-08': '대체공휴일',
      '2025-10-09': '한글날',
      '2025-12-25': '성탄절',
      '2026-01-01': '신정',
      '2026-02-16': '설날 연휴',
      '2026-02-17': '설날',
      '2026-02-18': '설날 연휴',
      '2026-03-01': '삼일절',
      '2026-05-05': '어린이날',
      '2026-05-24': '석가탄신일',
      '2026-06-06': '현충일',
      '2026-08-15': '광복절',
      '2026-09-24': '추석 연휴',
      '2026-09-25': '추석',
      '2026-09-26': '추석 연휴',
      '2026-10-03': '개천절',
      '2026-10-09': '한글날',
      '2026-12-25': '성탄절',
    };

    /* ===== localStorage keys ===== */
    const KEY_SIZE = 'nosion-calendar-size-v1';
    const KEY_POS  = 'nosion-calendar-pos-v1';

    /* ===== State ===== */
    const todayDate = new Date();
    todayDate.setHours(0, 0, 0, 0);

    let viewYear  = todayDate.getFullYear();
    let viewMonth = todayDate.getMonth();

    function toKey(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    /* ===== Render ===== */
    function render() {
      const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
      document.getElementById('titleYear').textContent = `${viewYear}년 `;
      document.getElementById('titleMonth').textContent = MONTHS[viewMonth];

      buildGrid();
    }

    function buildGrid() {
      const grid = document.getElementById('dateGrid');
      const frag = document.createDocumentFragment();

      const firstDay  = new Date(viewYear, viewMonth, 1).getDay();      // 0=Sun
      const daysInMo  = new Date(viewYear, viewMonth + 1, 0).getDate();
      const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

      // Previous month tail
      for (let i = firstDay - 1; i >= 0; i--) {
        const d = daysInPrev - i;
        const [py, pm] = viewMonth === 0 ? [viewYear - 1, 11] : [viewYear, viewMonth - 1];
        frag.appendChild(makeCell(d, py, pm, true));
      }

      // Current month
      for (let d = 1; d <= daysInMo; d++) {
        frag.appendChild(makeCell(d, viewYear, viewMonth, false));
      }

      // Next month head — fill to complete last row
      const total = firstDay + daysInMo;
      const tail  = total % 7 === 0 ? 0 : 7 - (total % 7);
      for (let d = 1; d <= tail; d++) {
        const [ny, nm] = viewMonth === 11 ? [viewYear + 1, 0] : [viewYear, viewMonth + 1];
        frag.appendChild(makeCell(d, ny, nm, true));
      }

      grid.innerHTML = '';
      grid.appendChild(frag);
    }

    function makeCell(day, year, month, isOther) {
      const cell = document.createElement('div');
      const key  = toKey(year, month, day);
      const date = new Date(year, month, day);

      let cls = 'date-cell';
      if (isOther) cls += ' other-month';
      if (!isOther && date.getTime() === todayDate.getTime()) cls += ' today';
      cell.className = cls;

      const num = document.createElement('span');
      num.textContent = day;
      cell.appendChild(num);

      if (HOLIDAYS[key]) {
        const dot = document.createElement('span');
        dot.className = 'h-dot';
        cell.appendChild(dot);
        cell.title = HOLIDAYS[key];
      }

      if (isOther) {
        cell.addEventListener('click', () => {
          viewYear  = year;
          viewMonth = month;
          animate();
        });
      }

      return cell;
    }

    /* ===== Animated transition ===== */
    function animate() {
      const grid = document.getElementById('dateGrid');
      grid.classList.add('fading');
      setTimeout(() => { render(); grid.classList.remove('fading'); }, 150);
    }

    /* ===== Navigation ===== */
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (viewMonth === 0) { viewYear--; viewMonth = 11; }
      else viewMonth--;
      animate();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (viewMonth === 11) { viewYear++; viewMonth = 0; }
      else viewMonth++;
      animate();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      viewYear  = todayDate.getFullYear();
      viewMonth = todayDate.getMonth();
      animate();
    });

    /* ===== Keyboard navigation ===== */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  { document.getElementById('prevBtn').click(); }
      if (e.key === 'ArrowRight') { document.getElementById('nextBtn').click(); }
    });

    /* ===== Resize reset ===== */
    document.getElementById('resizeResetBtn').addEventListener('click', () => {
      const card = document.getElementById('card');
      card.style.width  = '360px';
      card.style.height = '';
      try { localStorage.removeItem(KEY_SIZE); } catch (e) {}
    });

    /* ===== Drag to move ===== */
    (function initDrag() {
      const wrapper = document.getElementById('widget');
      const card    = document.getElementById('card');
      const BLOCKED = '.control-btn,.resize-handle,.nav-btn,button,[contenteditable],a,input';
      let dragging = false, startX = 0, startY = 0, origLeft = 0, origTop = 0;

      card.addEventListener('mousedown', e => {
        if (e.target.closest(BLOCKED)) return;
        dragging = true;
        const rect = wrapper.getBoundingClientRect();
        origLeft = rect.left; origTop = rect.top;
        startX   = e.clientX; startY  = e.clientY;
        card.classList.add('dragging');
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        wrapper.style.position = 'fixed';
        wrapper.style.left = `${origLeft + e.clientX - startX}px`;
        wrapper.style.top  = `${origTop  + e.clientY - startY}px`;
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('dragging');
        try {
          localStorage.setItem(KEY_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top }));
        } catch (e) {}
      });

      try {
        const pos = JSON.parse(localStorage.getItem(KEY_POS) || 'null');
        if (pos) { wrapper.style.position = 'fixed'; wrapper.style.left = pos.left; wrapper.style.top = pos.top; }
      } catch (e) {}
    })();

    /* ===== Resize handles ===== */
    (function initResize() {
      const wrapper = document.getElementById('widget');
      const card = document.getElementById('card');
      const MIN_W = 280, MAX_W = 560, MIN_H = 200;
      let resizing = false, dir = '', startW = 0, startH = 0, startX = 0, startY = 0, startLeft = 0, startTop = 0;

      document.querySelectorAll('.resize-handle').forEach(h => {
        h.addEventListener('mousedown', e => {
          resizing = true;
          dir    = h.dataset.direction;
          startW = card.offsetWidth;
          startH = card.offsetHeight;
          startX = e.clientX; startY = e.clientY;
          if (getComputedStyle(wrapper).position !== 'fixed') {
            const wrapperRect = wrapper.getBoundingClientRect();
            wrapper.style.position = 'fixed';
            wrapper.style.left = wrapperRect.left + 'px';
            wrapper.style.top = wrapperRect.top + 'px';
            wrapper.style.transform = 'none';
          }
          startLeft = parseFloat(wrapper.style.left) || 0;
          startTop = parseFloat(wrapper.style.top) || 0;
          e.preventDefault(); e.stopPropagation();
        });
      });

      document.addEventListener('mousemove', e => {
        if (!resizing) return;
        const dx = e.clientX - startX, dy = e.clientY - startY;
        if (dir === 'right' || dir === 'left') {
          const delta = dir === 'right' ? dx : -dx;
          const newW = Math.min(MAX_W, Math.max(MIN_W, startW + 2 * delta));
          const actualDelta = newW - startW;
          card.style.width = newW + 'px';
          if (wrapper.style.position === 'fixed') {
            wrapper.style.left = (startLeft - actualDelta / 2) + 'px';
          }
        }
        if (dir === 'bottom' || dir === 'top') {
          const delta = dir === 'bottom' ? dy : -dy;
          const newH = Math.max(MIN_H, startH + 2 * delta);
          const actualDelta = newH - startH;
          card.style.height = newH + 'px';
          if (wrapper.style.position === 'fixed') {
            wrapper.style.top = (startTop - actualDelta / 2) + 'px';
          }
        }
      });

      document.addEventListener('mouseup', () => {
        if (!resizing) return;
        resizing = false;
        try {
          localStorage.setItem(KEY_SIZE, JSON.stringify({ w: card.offsetWidth, h: card.offsetHeight }));
          if (wrapper.style.position === 'fixed') {
            localStorage.setItem(KEY_POS, JSON.stringify({ left: wrapper.style.left, top: wrapper.style.top }));
          }
        } catch (e) {}
      });

      try {
        const s = JSON.parse(localStorage.getItem(KEY_SIZE) || 'null');
        if (s) { if (s.w) card.style.width = `${s.w}px`; if (s.h) card.style.height = `${s.h}px`; }
      } catch (e) {}
    })();

    /* ===== Init ===== */
    render();
  </script>
</body>
</html>
