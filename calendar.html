<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>달력</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      width: 380px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      align-items: safe center;
      gap: 1.25rem;
      overflow: hidden;
      box-shadow: none;
      cursor: grab;
    }
    /* inner holder keeps content at a fixed width; resizing the card only grows the surrounding space */
    .card-body {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      width: 100%;
    }

    .card.dragging { cursor: grabbing; }

    /* === Calendar header === */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .month-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.01em;
      user-select: none;
    }

    .month-title .year {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      font-weight: 400;
      margin-right: 0.375rem;
    }

    .nav-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 0.4rem;
      color: hsl(220 9% 75%);   /* 연한 회색 화살표 */
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background var(--transition), color var(--transition);
    }

    .nav-btn:hover { background: var(--muted); color: var(--foreground); }  /* 오버 시 진하게 */
    .nav-btn svg { width: 14px; height: 14px; stroke-width: 2; }

    /* === Day of week row === */
    .dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .dow-row span {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding-bottom: 0.5rem;
    }

    /* === Date grid === */
    .date-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px 0;
      transition: opacity 0.15s ease;
    }

    .date-grid.fading { opacity: 0; }

    .date-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      color: var(--foreground);
      border-radius: 50%;
      cursor: default;
      position: relative;
      user-select: none;
      transition: background 0.12s ease;
      gap: 2px;
    }

    .date-cell.other-month {
      color: var(--muted-foreground);
      opacity: 0.3;
      cursor: pointer;
    }

    .date-cell.other-month:hover { opacity: 0.6; background: var(--muted); }

    .date-cell.today {
      background: var(--foreground);
      color: var(--card);
      font-weight: 500;
    }

    .date-cell:not(.today):not(.other-month):hover {
      background: var(--muted);
    }

    /* Holiday dot */
    .date-cell .h-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--muted-foreground);
      flex-shrink: 0;
    }

    .date-cell.today .h-dot {
      background: var(--card);
      opacity: 0.6;
    }

    /* === Controls === */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .control-btn {
      width: 28px;
      height: 28px;
      border-radius: 0.4rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted-foreground);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background var(--transition), color var(--transition);
      position: relative;
    }
    .control-btn:hover { background: var(--muted); color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 1.75; }

    .control-btn[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: hsl(220 10% 30%);
      color: #fff;
      font-size: 0.6875rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.35rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .control-btn[data-tooltip]:hover::after { opacity: 1; }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동 + 8방향 리사이즈) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      position: absolute; width: auto; height: auto;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; left: auto; bottom: auto;
      display: flex; flex-direction: row; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; padding: 0; }
    #card.card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .rz { position: absolute; z-index: 20; touch-action: none; }
    .rz-n { top: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-s { bottom: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-e { top: 0; bottom: 0; right: 0; width: 7px; cursor: ew-resize; }
    .rz-w { top: 0; bottom: 0; left: 0; width: 7px; cursor: ew-resize; }
    .rz-ne, .rz-nw, .rz-se, .rz-sw { width: 14px; height: 14px; z-index: 21; }
    .rz-ne { top: 0; right: 0; cursor: nesw-resize; }
    .rz-nw { top: 0; left: 0; cursor: nwse-resize; }
    .rz-se { bottom: 0; right: 0; cursor: nwse-resize; }
    .rz-sw { bottom: 0; left: 0; cursor: nesw-resize; }
    .rz-e::after, .rz-w::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 2px; height: 28px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    .rz-n::after, .rz-s::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 2px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    #card.card:hover .rz-n::after, #card.card:hover .rz-s::after, #card.card:hover .rz-e::after, #card.card:hover .rz-w::after { opacity: 0.7; }
    .rz:hover::after { background: var(--muted-foreground) !important; }
    /* 그리드 반응형: 날짜 셀 정사각형 유지(원형 today 표식 보존) + 격자 세로 가운데 정렬 */
    #card.card > .card-body { display: flex; flex-direction: column; justify-content: center; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-body">

      <div class="cal-header">
        <button class="nav-btn" id="prevBtn" type="button" aria-label="이전 달">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="month-title" id="monthTitle">
          <span class="year" id="titleYear"></span><span id="titleMonth"></span>
        </div>
        <button class="nav-btn" id="nextBtn" type="button" aria-label="다음 달">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>

      <div class="dow-row">
        <span>일</span><span>월</span><span>화</span>
        <span>수</span><span>목</span><span>금</span><span>토</span>
      </div>

      <div class="date-grid" id="dateGrid"></div>
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn" type="button"
              data-tooltip="크기 초기화" title="크기 초기화" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="control-btn" id="todayBtn" type="button"
              data-tooltip="오늘로 이동" title="오늘로 이동" aria-label="오늘로 이동">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>
    </div>

      <div class="rz rz-n"  data-rz="n"></div>
      <div class="rz rz-s"  data-rz="s"></div>
      <div class="rz rz-e"  data-rz="e"></div>
      <div class="rz rz-w"  data-rz="w"></div>
      <div class="rz rz-ne" data-rz="ne"></div>
      <div class="rz rz-nw" data-rz="nw"></div>
      <div class="rz rz-se" data-rz="se"></div>
      <div class="rz rz-sw" data-rz="sw"></div>
</div>


  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ===== Korean public holidays (2025–2026) ===== */
    const HOLIDAYS = {
      '2025-01-01': '신정',
      '2025-01-28': '설날 연휴',
      '2025-01-29': '설날',
      '2025-01-30': '설날 연휴',
      '2025-03-01': '삼일절',
      '2025-04-06': '국회의원선거',
      '2025-05-05': '어린이날·석가탄신일',
      '2025-05-06': '대체공휴일',
      '2025-06-06': '현충일',
      '2025-08-15': '광복절',
      '2025-10-03': '개천절',
      '2025-10-05': '추석 연휴',
      '2025-10-06': '추석',
      '2025-10-07': '추석 연휴',
      '2025-10-08': '대체공휴일',
      '2025-10-09': '한글날',
      '2025-12-25': '성탄절',
      '2026-01-01': '신정',
      '2026-02-16': '설날 연휴',
      '2026-02-17': '설날',
      '2026-02-18': '설날 연휴',
      '2026-03-01': '삼일절',
      '2026-05-05': '어린이날',
      '2026-05-24': '석가탄신일',
      '2026-06-06': '현충일',
      '2026-08-15': '광복절',
      '2026-09-24': '추석 연휴',
      '2026-09-25': '추석',
      '2026-09-26': '추석 연휴',
      '2026-10-03': '개천절',
      '2026-10-09': '한글날',
      '2026-12-25': '성탄절',
      // 2027 — 음력 휴일 양력 날짜는 한국천문연구원 발표 기준
      '2027-01-01': '신정',
      '2027-02-06': '설날 연휴',
      '2027-02-07': '설날',
      '2027-02-08': '설날 연휴',
      '2027-02-09': '대체공휴일',
      '2027-03-01': '삼일절',
      '2027-05-05': '어린이날',
      '2027-05-13': '석가탄신일',
      '2027-06-06': '현충일',
      '2027-06-07': '대체공휴일',
      '2027-08-15': '광복절',
      '2027-08-16': '대체공휴일',
      '2027-09-14': '추석 연휴',
      '2027-09-15': '추석',
      '2027-09-16': '추석 연휴',
      '2027-10-03': '개천절',
      '2027-10-04': '대체공휴일',
      '2027-10-09': '한글날',
      '2027-10-11': '대체공휴일',
      '2027-12-25': '성탄절',
      // 2028
      '2028-01-01': '신정',
      '2028-01-26': '설날 연휴',
      '2028-01-27': '설날',
      '2028-01-28': '설날 연휴',
      '2028-03-01': '삼일절',
      '2028-05-02': '석가탄신일',
      '2028-05-05': '어린이날',
      '2028-06-06': '현충일',
      '2028-08-15': '광복절',
      '2028-10-02': '추석 연휴',
      '2028-10-03': '추석·개천절',
      '2028-10-04': '추석 연휴',
      '2028-10-05': '대체공휴일',
      '2028-10-09': '한글날',
      '2028-12-25': '성탄절',
    };

    /* ===== localStorage keys ===== */
    /* ===== State ===== */
    let todayDate = new Date();
    todayDate.setHours(0, 0, 0, 0);

    // 자정 넘어가면 today 강조 갱신
    setInterval(() => {
      const t = new Date(); t.setHours(0, 0, 0, 0);
      if (t.getTime() !== todayDate.getTime()) {
        todayDate = t;
        render();
      }
    }, 60000);

    let viewYear  = todayDate.getFullYear();
    let viewMonth = todayDate.getMonth();

    function toKey(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    /* ===== Render ===== */
    function render() {
      const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
      document.getElementById('titleYear').textContent = `${viewYear}년 `;
      document.getElementById('titleMonth').textContent = MONTHS[viewMonth];

      buildGrid();
    }

    function buildGrid() {
      const grid = document.getElementById('dateGrid');
      const frag = document.createDocumentFragment();

      const firstDay  = new Date(viewYear, viewMonth, 1).getDay();      // 0=Sun
      const daysInMo  = new Date(viewYear, viewMonth + 1, 0).getDate();
      const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

      // Previous month tail
      for (let i = firstDay - 1; i >= 0; i--) {
        const d = daysInPrev - i;
        const [py, pm] = viewMonth === 0 ? [viewYear - 1, 11] : [viewYear, viewMonth - 1];
        frag.appendChild(makeCell(d, py, pm, true));
      }

      // Current month
      for (let d = 1; d <= daysInMo; d++) {
        frag.appendChild(makeCell(d, viewYear, viewMonth, false));
      }

      // Next month head — fill to complete last row
      const total = firstDay + daysInMo;
      const tail  = total % 7 === 0 ? 0 : 7 - (total % 7);
      for (let d = 1; d <= tail; d++) {
        const [ny, nm] = viewMonth === 11 ? [viewYear + 1, 0] : [viewYear, viewMonth + 1];
        frag.appendChild(makeCell(d, ny, nm, true));
      }

      grid.innerHTML = '';
      grid.appendChild(frag);
    }

    function makeCell(day, year, month, isOther) {
      const cell = document.createElement('div');
      const key  = toKey(year, month, day);
      const date = new Date(year, month, day);

      let cls = 'date-cell';
      if (isOther) cls += ' other-month';
      if (!isOther && date.getTime() === todayDate.getTime()) cls += ' today';
      cell.className = cls;

      const num = document.createElement('span');
      num.textContent = day;
      cell.appendChild(num);

      if (HOLIDAYS[key]) {
        const dot = document.createElement('span');
        dot.className = 'h-dot';
        cell.appendChild(dot);
        cell.title = HOLIDAYS[key];
      }

      if (isOther) {
        cell.addEventListener('click', () => {
          viewYear  = year;
          viewMonth = month;
          animate();
        });
      }

      return cell;
    }

    /* ===== Animated transition ===== */
    function animate() {
      const grid = document.getElementById('dateGrid');
      grid.classList.add('fading');
      setTimeout(() => { render(); grid.classList.remove('fading'); }, 150);
    }

    /* ===== Navigation ===== */
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (viewMonth === 0) { viewYear--; viewMonth = 11; }
      else viewMonth--;
      animate();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (viewMonth === 11) { viewYear++; viewMonth = 0; }
      else viewMonth++;
      animate();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      viewYear  = todayDate.getFullYear();
      viewMonth = todayDate.getMonth();
      animate();
    });

    /* ===== Keyboard navigation ===== */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  { document.getElementById('prevBtn').click(); }
      if (e.key === 'ArrowRight') { document.getElementById('nextBtn').click(); }
    });

    /* ===== Init ===== */
    render();
  

    /* ===================================================================
       드래그 이동 + 8방향 리사이즈 (frame{x,y,w,h} · Pointer Events)
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-calendar-frame-v1', minW: 300, minH: 300, defaultW: 380 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, Math.min(frame.w, window.innerWidth)); frame.h = Math.max(MIN_H, Math.min(frame.h, window.innerHeight));
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';

      /* ----- 8방향 리사이즈 (document 리스너) ----- */
      card.querySelectorAll('[data-rz]').forEach(handle => {
        handle.addEventListener('pointerdown', (e) => {
          if (active) return; active = true;
          e.preventDefault(); e.stopPropagation();
          const dir = handle.dataset.rz, sx = e.clientX, sy = e.clientY, f0 = { x: frame.x, y: frame.y, w: frame.w, h: frame.h };
          card.classList.add('resizing');
          const mv = (ev) => {
            const dx = ev.clientX - sx, dy = ev.clientY - sy;
            if (dir.includes('e')) frame.w = Math.max(MIN_W, f0.w + dx);
            if (dir.includes('s')) frame.h = Math.max(MIN_H, f0.h + dy);
            if (dir.includes('w')) { const nw = Math.max(MIN_W, f0.w - dx); frame.x = f0.x + (f0.w - nw); frame.w = nw; }
            if (dir.includes('n')) { const nh = Math.max(MIN_H, f0.h - dy); frame.y = f0.y + (f0.h - nh); frame.h = nh; }
            applyFrame();
          };
          const up = () => {
            document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
            card.classList.remove('resizing'); active = false; clampFrame(); applyFrame(); saveFrame();
          };
          document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
        });
      });

      /* ----- 드래그 이동 (이동 임계값으로 클릭과 충돌 방지) ----- */
      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-rz], [data-no-drag]')) return;
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        let started = false;
        const mv = (ev) => {
          const ddx = ev.clientX - dx0, ddy = ev.clientY - dy0;
          if (!started) {
            if (Math.abs(ddx) < 4 && Math.abs(ddy) < 4) return;
            started = true; active = true; card.classList.add('dragging');
          }
          frame.x = sx + ddx; frame.y = sy + ddy; applyFrame();
        };
        const up = () => {
          document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
          if (started) {
            card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame();
            const sc = (ce) => { ce.stopPropagation(); ce.preventDefault(); };
            window.addEventListener('click', sc, { capture: true, once: true });
            setTimeout(() => window.removeEventListener('click', sc, true), 0);
          }
        };
        document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
      });

      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });
      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
</script>
</body>
</html>
