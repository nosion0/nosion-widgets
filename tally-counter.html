<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카운터</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', sans-serif;
      background: var(--background); color: var(--foreground);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; word-break: keep-all;
    }

    /* ===== Stage + Card (frame 제어) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    .card {
      position: absolute;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem 1.75rem; box-shadow: none;
      display: flex; flex-direction: column;
      overflow: hidden; box-sizing: border-box; min-width: 0; min-height: 0;
      cursor: grab;
    }
    .card.dragging { cursor: grabbing; }
    /* 헤더가 없는 위젯: 본문이 카드 전체를 채우고 콘텐츠를 가운데 정렬 */
    .card-body { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; width: 100%; }

    .label { font-size: 0.9375rem; color: var(--muted-foreground); letter-spacing: 0.01em; text-align: center; outline: none; border-bottom: 1px dashed transparent; min-width: 2rem; max-width: 100%; }
    .label:focus { border-bottom-color: var(--border); color: var(--foreground); }

    .tap {
      width: 100%; display: flex; align-items: center; justify-content: center;
      padding: 1.25rem 0; border-radius: 1rem; cursor: pointer; user-select: none;
      transition: background var(--transition), transform 0.08s ease;
    }
    .tap:hover { background: var(--muted); }
    .tap:active { transform: scale(0.97); }
    .count { font-size: 4rem; font-weight: 700; color: var(--foreground); line-height: 1; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; }

    .ctrls { display: flex; align-items: center; gap: 0.5rem; }
    .ctrl { font-family: inherit; font-size: 0.8125rem; color: var(--muted-foreground); background: none; border: 1px solid var(--border); border-radius: 99px; padding: 0.4rem 0.9rem; cursor: pointer; transition: background var(--transition), color var(--transition); display: inline-flex; align-items: center; gap: 0.3rem; }
    .ctrl:hover { background: var(--muted); color: var(--foreground); }
    .ctrl svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    .hint { font-size: 0.625rem; color: var(--muted-foreground); opacity: 0.6; user-select: none; }

    /* ===== 컨트롤 (카드 우상단, 호버 노출) ===== */
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; display: flex; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; }
    .card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }

    /* ===== 8방향 리사이즈 핸들 ===== */
    .rz { position: absolute; z-index: 20; touch-action: none; }
    .rz-n { top: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-s { bottom: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-e { top: 0; bottom: 0; right: 0; width: 7px; cursor: ew-resize; }
    .rz-w { top: 0; bottom: 0; left: 0; width: 7px; cursor: ew-resize; }
    .rz-ne, .rz-nw, .rz-se, .rz-sw { width: 14px; height: 14px; z-index: 21; }
    .rz-ne { top: 0; right: 0; cursor: nesw-resize; }
    .rz-nw { top: 0; left: 0; cursor: nwse-resize; }
    .rz-se { bottom: 0; right: 0; cursor: nwse-resize; }
    .rz-sw { bottom: 0; left: 0; cursor: nesw-resize; }
    .rz-e::after, .rz-w::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 2px; height: 28px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    .rz-n::after, .rz-s::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 2px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    .card:hover .rz-n::after, .card:hover .rz-s::after, .card:hover .rz-e::after, .card:hover .rz-w::after { opacity: 0.7; }
    .rz:hover::after { background: var(--muted-foreground) !important; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-body">
        <div class="label" id="label" contenteditable="true" spellcheck="false" role="textbox" aria-label="카운터 이름">카운터</div>
        <div class="tap" id="tap" data-no-drag role="button" aria-label="1 더하기"><span class="count" id="count">0</span></div>
        <div class="ctrls">
          <button class="ctrl" id="minusBtn" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/></svg>1 빼기</button>
          <button class="ctrl" id="resetBtn" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.5 15a9 9 0 1 0 2.1-9.4L1 10"/></svg>초기화</button>
        </div>
        <div class="hint">숫자를 누르면 +1</div>
      </div>

      <div class="controls">
        <button class="control-btn" id="resizeResetBtn" title="크기·위치 초기화" type="button" aria-label="크기·위치 초기화">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
        <button class="control-btn" id="themeBtn" title="테마 전환" type="button" aria-label="라이트/다크 모드 전환">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>

      <div class="rz rz-n"  data-rz="n"></div>
      <div class="rz rz-s"  data-rz="s"></div>
      <div class="rz rz-e"  data-rz="e"></div>
      <div class="rz rz-w"  data-rz="w"></div>
      <div class="rz rz-ne" data-rz="ne"></div>
      <div class="rz rz-nw" data-rz="nw"></div>
      <div class="rz rz-se" data-rz="se"></div>
      <div class="rz rz-sw" data-rz="sw"></div>
    </div>
  </div>

  <script>
    'use strict';
    /* ===== 테마 ===== */
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();

    /* ===== 카운터 로직 ===== */
    const STORE_KEY = 'nosion-tally-v1';
    const labelEl = document.getElementById('label');
    const countEl = document.getElementById('count');

    let label = '카운터', count = 0;
    try {
      const s = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
      if (s) {
        if (typeof s.label === 'string' && s.label.trim()) label = s.label;
        if (typeof s.count === 'number' && isFinite(s.count)) count = Math.max(0, Math.round(s.count));
      }
    } catch (e) {}
    labelEl.textContent = label;

    function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify({ label, count })); } catch (e) {} }
    function render() { countEl.textContent = count.toLocaleString('en-US'); }
    render();

    document.getElementById('tap').addEventListener('click', () => { count += 1; save(); render(); });
    document.getElementById('minusBtn').addEventListener('click', () => { if (count > 0) { count -= 1; save(); render(); } });
    document.getElementById('resetBtn').addEventListener('click', () => { count = 0; save(); render(); });
    labelEl.addEventListener('blur', () => { const v = labelEl.textContent.trim(); label = v || '카운터'; labelEl.textContent = label; save(); });
    labelEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); labelEl.blur(); } });

    /* ===================================================================
       드래그 이동 + 8방향 리사이즈
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-tally-frame-v1', minW: 240, minH: 260, defaultW: 300 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, frame.w); frame.h = Math.max(MIN_H, frame.h);
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';

      card.querySelectorAll('[data-rz]').forEach(handle => {
        handle.addEventListener('pointerdown', (e) => {
          if (active) return; active = true;
          e.preventDefault(); e.stopPropagation();
          const dir = handle.dataset.rz, sx = e.clientX, sy = e.clientY, f0 = { ...frame };
          try { handle.setPointerCapture(e.pointerId); } catch (_) {}
          card.classList.add('resizing');
          const mv = (ev) => {
            const dx = ev.clientX - sx, dy = ev.clientY - sy;
            if (dir.includes('e')) frame.w = Math.max(MIN_W, f0.w + dx);
            if (dir.includes('s')) frame.h = Math.max(MIN_H, f0.h + dy);
            if (dir.includes('w')) { const nw = Math.max(MIN_W, f0.w - dx); frame.x = f0.x + (f0.w - nw); frame.w = nw; }
            if (dir.includes('n')) { const nh = Math.max(MIN_H, f0.h - dy); frame.y = f0.y + (f0.h - nh); frame.h = nh; }
            applyFrame();
          };
          const up = () => {
            handle.removeEventListener('pointermove', mv); handle.removeEventListener('pointerup', up); handle.removeEventListener('pointercancel', up);
            card.classList.remove('resizing'); active = false; clampFrame(); applyFrame(); saveFrame();
          };
          handle.addEventListener('pointermove', mv); handle.addEventListener('pointerup', up); handle.addEventListener('pointercancel', up);
        });
      });

      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-rz], [data-no-drag]')) return;
        active = true; e.preventDefault();
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        try { dragEl.setPointerCapture(e.pointerId); } catch (_) {}
        card.classList.add('dragging');
        const mv = (ev) => { frame.x = sx + (ev.clientX - dx0); frame.y = sy + (ev.clientY - dy0); applyFrame(); };
        const up = () => {
          dragEl.removeEventListener('pointermove', mv); dragEl.removeEventListener('pointerup', up); dragEl.removeEventListener('pointercancel', up);
          card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame();
        };
        dragEl.addEventListener('pointermove', mv); dragEl.addEventListener('pointerup', up); dragEl.addEventListener('pointercancel', up);
      });

      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });

      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
  </script>
</body>
</html>
