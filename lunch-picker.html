<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 점심 추첨기</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* ============================================
       노시언 위젯 시그니처 디자인 토큰
       ============================================ */
    :root {
      --background: hsl(0 0% 100%);
      --foreground: hsl(220 13% 18%);
      --card: hsl(0 0% 100%);
      --border: hsl(220 9% 84%);
      --muted: hsl(210 20% 96%);
      --muted-foreground: hsl(215 14% 50%);
      --radius: 0.75rem;
      --transition: 0.2s ease;
    }

    html[data-theme="dark"] {
      --background: hsl(220 13% 10%);
      --foreground: hsl(0 0% 92%);
      --card: hsl(220 13% 14%);
      --border: hsl(220 9% 28%);
      --muted: hsl(220 13% 18%);
      --muted-foreground: hsl(215 10% 65%);
    }
    html[data-theme="dark"] body { background: var(--background); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont,
                   system-ui, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      word-break: keep-all;
    }

    body {
      padding: 1rem;
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .widget-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      position: relative;
      width: fit-content;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      width: 360px;
      position: relative;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: safe center;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    /* 드래그 영역은 헤더로 한정 */
    .card .header {
      cursor: grab;
      flex-shrink: 0;
    }

    .card.dragging .header {
      cursor: grabbing;
    }

    /* 헤더: 제목만, 좌측 정렬 */
    .header {
      display: flex;
      align-items: center;
      padding-bottom: 0.75rem;
    }

    .title {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--foreground);
      letter-spacing: -0.01em;
      user-select: none;
    }

    /* 구분선 */
    .divider-top,
    .divider-bottom {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* 본문 (결과 + 버튼) */
    .picker-body {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1.75rem 0 1.5rem;
      min-height: 0;
      position: relative;
    }

    /* 가상의 수직 원통 위에서 좌→우로 흘러가는 휠 효과 */
    .result-display {
      position: relative;
      width: 100%;
      height: 2.3rem;
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.15;
      user-select: none;
      max-width: 100%;
      word-break: keep-all;
      /* 3D 원근감 (좌우 회전 잘 보이도록 살짝 깊게) */
      perspective: 700px;
      perspective-origin: center;
      overflow: hidden;
    }

    .result-item {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--foreground);
      /* 원통 휠 효과 — 회전축을 텍스트 뒤로 보내 원통 면처럼 휘어짐 */
      transform-origin: center center -80px;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      will-change: transform, opacity;
    }

    .result-item.placeholder {
      color: var(--muted-foreground);
      opacity: 0.55;
      font-size: 1.5rem;     /* 짧은 '?' 대신 긴 문구 들어가도 한 줄에 들어가게 */
      letter-spacing: -0.02em;
    }

    /* 최종 선정 시 터지는 폭죽 레이어 — picker-body 전체 오버레이 */
    .confetti-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
      z-index: 5;
    }

    .confetti-particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
      transform-origin: center;
    }

    /* 변주용 — 작은 사각형 (실제 confetti 종이 조각 느낌) */
    .confetti-particle.square {
      border-radius: 1px;
    }

    /* 결과 텍스트 글로우 펄스 — 모노톤 */
    .result-item.glow {
      animation: result-glow 0.8s ease-out 0.05s both;
    }
    @keyframes result-glow {
      0%   { text-shadow: 0 0 0    rgba(0,0,0,0); }
      40%  { text-shadow: 0 0 22px rgba(0, 0, 0, 0.18), 0 0 6px rgba(0, 0, 0, 0.10); }
      100% { text-shadow: 0 0 0    rgba(0,0,0,0); }
    }
    html[data-theme="dark"] .result-item.glow {
      animation: result-glow-dark 0.8s ease-out 0.05s both;
    }
    @keyframes result-glow-dark {
      0%   { text-shadow: 0 0 0    rgba(255,255,255,0); }
      40%  { text-shadow: 0 0 24px rgba(255, 255, 255, 0.45), 0 0 8px rgba(255, 255, 255, 0.3); }
      100% { text-shadow: 0 0 0    rgba(255,255,255,0); }
    }

    /* 카드 살짝 흔들림 — 추첨 완료 시 */
    .card.celebrate {
      animation: card-pulse 0.55s ease-out 0.05s;
    }
    @keyframes card-pulse {
      0%   { transform: scale(1) rotate(0deg); }
      25%  { transform: scale(1.012) rotate(-0.4deg); }
      55%  { transform: scale(0.997) rotate(0.3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .pick-button {
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: -0.005em;
      padding: 0.5rem 1.5rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--foreground);
      cursor: pointer;
      transition: background var(--transition), color var(--transition),
                  border-color var(--transition), opacity var(--transition);
      user-select: none;
    }

    .pick-button:hover:not(:disabled) {
      background: var(--muted);
    }

    .pick-button:active:not(:disabled) {
      background: var(--border);
    }

    .pick-button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* 하단 편집 영역 */
    .edit-section {
      flex-shrink: 0;
      padding-top: 0.75rem;
    }

    .edit-chip {
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.005em;
      color: var(--muted-foreground);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem 0;
      transition: color var(--transition);
      user-select: none;
    }

    .edit-chip:hover {
      color: var(--foreground);
    }

    .edit-panel {
      display: none;
      flex-direction: column;
      padding-top: 0.625rem;
    }

    .edit-panel.show {
      display: flex;
    }

    .menu-list {
      display: flex;
      flex-direction: column;
      max-height: 200px;
      overflow-y: auto;
      /* 스크롤바 숨김 (노시언 시그니처) */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .menu-list::-webkit-scrollbar {
      display: none;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.375rem 0;
    }

    .menu-text {
      flex: 1;
      font-size: 0.8125rem;
      color: var(--foreground);
      letter-spacing: -0.005em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .delete-btn {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted-foreground);
      opacity: 0.25;
      transition: opacity var(--transition), color var(--transition);
      flex-shrink: 0;
      border-radius: 4px;
      padding: 0;
    }

    .menu-item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      color: var(--foreground);
    }

    .delete-btn svg {
      width: 12px;
      height: 12px;
      stroke-width: 2;
    }

    .menu-add {
      border-top: 1px solid var(--border);
      margin-top: 0.5rem;
      padding-top: 0.375rem;
    }

    .menu-add input {
      width: 100%;
      font-family: inherit;
      font-size: 0.8125rem;
      background: none;
      border: none;
      outline: none;
      padding: 0.375rem 0;
      color: var(--foreground);
      letter-spacing: -0.005em;
    }

    .menu-add input::placeholder {
      color: var(--muted-foreground);
      opacity: 0.5;
    }

    .menu-add.disabled input {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* 우측 컨트롤 */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition);
      padding-top: 0.25rem;
    }

    .widget-wrapper:hover .controls {
      opacity: 1;
    }

    .control-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: rgba(115, 115, 115, 0.5);
      cursor: pointer;
      transition: color var(--transition);
      border-radius: 4px;
      position: relative;
    }

    .control-btn:hover:not(:disabled) {
      color: var(--foreground);
    }

    .control-btn svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    .control-btn[data-tooltip]::before,
    .control-btn[data-tooltip]::after {
      position: absolute;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease 0s;
      z-index: 50;
    }

    .control-btn[data-tooltip]::before {
      content: attr(data-tooltip);
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.3125rem 0.625rem;
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: -0.005em;
      white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .control-btn[data-tooltip]::after {
      content: '';
      right: calc(100% + 3px);
      width: 5px;
      height: 5px;
      background: var(--card);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transform: translateY(-50%) rotate(-45deg);
    }

    .control-btn[data-tooltip]:hover::before,
    .control-btn[data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 0.4s;
    }

    /* 4방향 리사이즈 핸들 */
    .resize-handle {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      z-index: 20;
    }

    .resize-handle .bar {
      background: var(--border);
      transition: opacity var(--transition), background var(--transition),
                  width 0.15s ease, height 0.15s ease;
      border-radius: 999px;
      opacity: 0;
    }

    .widget-wrapper:hover .resize-handle .bar {
      opacity: 1;
    }

    .resize-handle:hover .bar {
      background: var(--muted-foreground);
    }

    .handle-top {
      top: 0;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 16px;
      cursor: ns-resize;
    }
    .handle-top .bar { width: 36px; height: 1px; }
    .handle-top:hover .bar { height: 3px; }

    .handle-bottom {
      bottom: 0;
      left: 50%;
      transform: translate(-50%, 50%);
      width: 36px;
      height: 16px;
      cursor: ns-resize;
    }
    .handle-bottom .bar { width: 36px; height: 1px; }
    .handle-bottom:hover .bar { height: 3px; }

    .handle-left {
      left: 0;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 36px;
      cursor: ew-resize;
    }
    .handle-left .bar { width: 1px; height: 36px; }
    .handle-left:hover .bar { width: 3px; }

    .handle-right {
      right: 0;
      top: 50%;
      transform: translate(50%, -50%);
      width: 16px;
      height: 36px;
      cursor: ew-resize;
    }
    .handle-right .bar { width: 1px; height: 36px; }
    .handle-right:hover .bar { width: 3px; }
      /* unify-resize: 내용은 고정폭, 카드를 키우면 바깥 여백만 늘어남 */
    .card {
      align-items: safe center;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: inherit;
      width: 100%;
    }
  
    /* ===== NOSION FRAME SYSTEM (드래그 이동 + 8방향 리사이즈) ===== */
    .stage { position: fixed; inset: 0; overflow: hidden; }
    #card.card {
      position: absolute; width: auto; height: auto;
      display: flex; flex-direction: column; align-items: stretch;
      overflow: hidden; box-sizing: border-box; cursor: grab;
    }
    #card.card.dragging { cursor: grabbing; }
    #card.card > .card-body { flex: 1 1 auto; min-height: 0; }
    .controls { position: absolute; top: 0.75rem; right: 0.75rem; left: auto; bottom: auto;
      display: flex; flex-direction: row; gap: 2px; opacity: 0; transition: opacity var(--transition); z-index: 30; padding: 0; }
    #card.card:hover .controls { opacity: 1; }
    .control-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: rgba(115,115,115,0.5); cursor: pointer; transition: color var(--transition); border-radius: 4px; }
    .control-btn:hover:not(:disabled) { color: var(--foreground); }
    .control-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .rz { position: absolute; z-index: 20; touch-action: none; }
    .rz-n { top: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-s { bottom: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; }
    .rz-e { top: 0; bottom: 0; right: 0; width: 7px; cursor: ew-resize; }
    .rz-w { top: 0; bottom: 0; left: 0; width: 7px; cursor: ew-resize; }
    .rz-ne, .rz-nw, .rz-se, .rz-sw { width: 14px; height: 14px; z-index: 21; }
    .rz-ne { top: 0; right: 0; cursor: nesw-resize; }
    .rz-nw { top: 0; left: 0; cursor: nwse-resize; }
    .rz-se { bottom: 0; right: 0; cursor: nwse-resize; }
    .rz-sw { bottom: 0; left: 0; cursor: nesw-resize; }
    .rz-e::after, .rz-w::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 2px; height: 28px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    .rz-n::after, .rz-s::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 2px; border-radius: 99px; background: var(--border); opacity: 0; transition: opacity var(--transition); }
    #card.card:hover .rz-n::after, #card.card:hover .rz-s::after, #card.card:hover .rz-e::after, #card.card:hover .rz-w::after { opacity: 0.7; }
    .rz:hover::after { background: var(--muted-foreground) !important; }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="card" id="card" style="visibility:hidden">
      <div class="card-body">

      <!-- 헤더 -->
      <div class="header">
        <div class="title">랜덤 점심 추첨기</div>
      </div>

      <div class="divider-top"></div>

      <!-- 본문 -->
      <div class="picker-body">
        <div class="result-display" id="resultDisplay">
          <div class="result-item placeholder">오늘 점심은?</div>
        </div>
        <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>
        <button class="pick-button" id="pickButton" type="button">돌려보기</button>
      </div>

      <div class="divider-bottom"></div>

      <!-- 편집 영역 -->
      <div class="edit-section">
        <button class="edit-chip" id="editChip" type="button">메뉴 8개 · 편집 ▾</button>
        <div class="edit-panel" id="editPanel">
          <div class="menu-list" id="menuList"></div>
          <div class="menu-add" id="menuAdd">
            <input type="text" id="menuAddInput" placeholder="+ 메뉴 추가" maxlength="12" />
          </div>
        </div>
      </div>

      <!-- 4방향 리사이즈 핸들 -->
      </div>


      <div class="controls">
      <button class="control-btn" id="resizeResetBtn"
              data-tooltip="크기 초기화" title="크기 초기화"
              type="button" aria-label="카드 크기 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <button class="control-btn" id="themeBtn"
              data-tooltip="테마 전환" title="테마 전환"
              type="button" aria-label="라이트/다크 모드 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

      <div class="rz rz-n"  data-rz="n"></div>
      <div class="rz rz-s"  data-rz="s"></div>
      <div class="rz rz-e"  data-rz="e"></div>
      <div class="rz rz-w"  data-rz="w"></div>
      <div class="rz rz-ne" data-rz="ne"></div>
      <div class="rz rz-nw" data-rz="nw"></div>
      <div class="rz rz-se" data-rz="se"></div>
      <div class="rz rz-sw" data-rz="sw"></div>
</div>

    <!-- 우측 컨트롤 (크기 초기화만) -->

  </div>

  <script>
    
    (function() {
      const THEME_KEY = 'nosion-theme-v1';
      function getTheme() { try { return localStorage.getItem(THEME_KEY) || 'light'; } catch (e) { return 'light'; } }
      function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
      applyTheme(getTheme());
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) btn.addEventListener('click', () => applyTheme(getTheme() === 'light' ? 'dark' : 'light'));
      });
    })();
/* ============================================
       랜덤 점심 추첨기 - 로직
       ============================================ */
    const STORAGE_KEY = 'nosion-lunch-picker-v1';
    const DEFAULT_MENUS = ['김치찌개', '된장찌개', '비빔밥', '김밥', '라면', '짜장면', '돈까스', '칼국수'];
    const MAX_MENU_COUNT = 30;
    const MENU_NAME_MAX_LENGTH = 12;

    // 페이드 사이클 (감속)
    const ANIM_TOTAL_MS = 2600;
    const ANIM_START_INTERVAL_MS = 28;     /* 초반 매우 빠르게 — 격렬한 흐름 */
    const ANIM_END_INTERVAL_MS = 360;

    const defaultState = () => ({
      menus: [...DEFAULT_MENUS],
      lastPick: null
    });

    let state = defaultState();
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed.menus)) {
          state.menus = parsed.menus
            .filter(m => typeof m === 'string' && m.trim().length > 0)
            .map(m => m.trim().slice(0, MENU_NAME_MAX_LENGTH))
            .slice(0, MAX_MENU_COUNT);
        }
        if (typeof parsed.lastPick === 'string' && state.menus.includes(parsed.lastPick)) {
          state.lastPick = parsed.lastPick;
        }
      }
    } catch (e) {
      console.error('localStorage load error:', e);
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }

    const resultDisplay = document.getElementById('resultDisplay');
    const confettiLayer = document.getElementById('confettiLayer');
    const pickButton = document.getElementById('pickButton');
    const editChip = document.getElementById('editChip');
    const editPanel = document.getElementById('editPanel');
    const menuListEl = document.getElementById('menuList');
    const menuAddInput = document.getElementById('menuAddInput');
    const menuAddSection = document.getElementById('menuAdd');

    /* ----- 추첨 로직 ----- */
    function pickRandom() {
      if (state.menus.length === 0) return null;
      if (state.menus.length === 1) return state.menus[0];
      const candidates = state.menus.filter(m => m !== state.lastPick);
      const pool = candidates.length > 0 ? candidates : state.menus;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    /* ----- 회전 휠 애니메이션 ----- */
    let animationTimer = null;
    let animationActive = false;

    function clearAnimation() {
      if (animationTimer) {
        clearTimeout(animationTimer);
        animationTimer = null;
      }
      animationActive = false;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    /**
     * 결과 표시: 새 항목을 좌측에서 회전해 들임, 이전 항목은 우측으로 회전해 사라짐
     * 가상의 수직 원통 표면에 메뉴가 적혀있어 좌→우로 흘러가는 느낌
     * Web Animations API 사용 — CSS transition/animation보다 빠른 tick에서 신뢰성 높음
     */
    const ENTER_EASE = 'cubic-bezier(0.15, 0.85, 0.3, 1)';
    const EXIT_EASE = 'cubic-bezier(0.55, 0, 0.85, 0.2)';
    const SETTLE_EASE = 'cubic-bezier(0.34, 1.65, 0.5, 1)';
    const ENTER_MS = 110;                  /* 더 짧고 휙 */
    const EXIT_MS = 100;
    const SETTLE_MS = 540;

    /* ----- 폭죽 효과 (흑백 스펙트럼) ----- */
    // foreground(가장 진함) → border(옅음) 사이 6단계 명도
    const CONFETTI_SHADES = [
      'hsl(220, 13%, 15%)',  // foreground
      'hsl(220, 13%, 28%)',
      'hsl(215, 14%, 45%)',
      'hsl(215, 14%, 60%)',
      'hsl(220, 10%, 75%)',
      'hsl(220, 9%, 85%)'    // border
    ];
    const CONFETTI_COUNT = 38;       /* 16 → 38 더 풍성하게 */

    function spawnConfetti(scale) {
      if (!confettiLayer) return;
      const s = typeof scale === 'number' ? scale : 1;
      const count = Math.max(6, Math.round(CONFETTI_COUNT * s));

      // result-display 중심점을 confettiLayer 좌표계로 변환
      const layerRect = confettiLayer.getBoundingClientRect();
      const targetRect = resultDisplay.getBoundingClientRect();
      const originX = targetRect.left - layerRect.left + targetRect.width / 2;
      const originY = targetRect.top - layerRect.top + targetRect.height / 2;

      const angleStep = (Math.PI * 2) / count;

      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-particle';
        // 35% 확률로 사각형 (종이조각 느낌 변주)
        if (Math.random() < 0.35) p.classList.add('square');

        // 흑백 명도 — 진한 입자는 더 작게, 옅은 입자는 더 크게 (자연스러운 깊이감)
        const shadeIdx = Math.floor(Math.random() * CONFETTI_SHADES.length);
        p.style.background = CONFETTI_SHADES[shadeIdx];

        // 크기 변주 — 3~14px (작은 입자/큰 종이조각 혼합 → 깊이감)
        const size = 3 + Math.random() * 11;
        const w = p.classList.contains('square') ? size * 0.8 : size;
        const h = p.classList.contains('square') ? size * 1.2 : size;
        p.style.width = w + 'px';
        p.style.height = h + 'px';

        // 시작 위치 = result-display 중심
        p.style.left = (originX - w / 2) + 'px';
        p.style.top = (originY - h / 2) + 'px';

        confettiLayer.appendChild(p);

        // 방향: 360도 균등 + 더 큰 랜덤성
        const angle = angleStep * i + (Math.random() - 0.5) * 0.8;
        // 거리: 70~180px (더 멀리)
        const distance = 70 + Math.random() * 110;
        const dx = Math.cos(angle) * distance;
        const dyInitial = Math.sin(angle) * distance - 10;
        const dyFinal = dyInitial + 36 + Math.random() * 30;
        // 회전 — 더 격렬하게 (720°까지)
        const rotation = (Math.random() - 0.5) * 720;
        const duration = 900 + Math.random() * 500;

        p.animate(
          [
            { transform: 'translate(0, 0) scale(0.4) rotate(0deg)',
              opacity: 1, offset: 0 },
            { transform: `translate(${dx * 0.65}px, ${dyInitial * 0.65}px) scale(1) rotate(${rotation * 0.45}deg)`,
              opacity: 1, offset: 0.35 },
            { transform: `translate(${dx}px, ${dyFinal}px) scale(0.7) rotate(${rotation}deg)`,
              opacity: 0, offset: 1 }
          ],
          {
            duration,
            easing: 'cubic-bezier(0.15, 0.6, 0.3, 1)',
            fill: 'forwards'
          }
        ).onfinish = () => p.remove();
      }
    }

    function showResultItem(text, opts = {}) {
      const { isPlaceholder = false, isFinal = false } = opts;

      // 현재 표시 중인 항목들 → 좌측으로 격렬하게 휘리릭
      resultDisplay.querySelectorAll('.result-item:not(.exiting)').forEach(el => {
        el.classList.add('exiting');
        const anim = el.animate(
          [
            { transform: 'rotateY(0deg) translateX(0%) scale(1)',         opacity: 1 },
            { transform: 'rotateY(95deg) translateX(40%) scale(0.7)',     opacity: 0 }
          ],
          { duration: EXIT_MS, easing: EXIT_EASE, fill: 'forwards' }
        );
        anim.onfinish = () => el.remove();
      });

      // 새 항목 생성
      const item = document.createElement('div');
      item.className = 'result-item';
      if (isPlaceholder) item.classList.add('placeholder');
      item.textContent = text;
      // 초기 위치 — 오른쪽 깊이 격렬한 각도에서 시작
      item.style.transform = 'rotateY(-95deg) translateX(-40%) scale(0.7)';
      item.style.opacity = '0';
      resultDisplay.appendChild(item);

      if (isFinal) {
        // 최종 결과 — 큰 overshoot 으로 격렬한 안착
        item.animate(
          [
            { transform: 'rotateY(-60deg) translateX(-25%) scale(0.85)', opacity: 0.4, offset: 0 },
            { transform: 'rotateY(10deg) translateX(5%) scale(1.13)',   opacity: 1,   offset: 0.55 },
            { transform: 'rotateY(-3deg) translateX(-2%) scale(0.97)',  opacity: 1,   offset: 0.8 },
            { transform: 'rotateY(0deg) translateX(0%) scale(1)',        opacity: 1,   offset: 1 }
          ],
          { duration: SETTLE_MS, easing: SETTLE_EASE, fill: 'forwards' }
        );
        // 화려한 완료 효과 — confetti 2-wave + 글로우 + 카드 펄스
        setTimeout(() => {
          spawnConfetti();
          item.classList.add('glow');
          cardEl.classList.add('celebrate');
          setTimeout(() => cardEl.classList.remove('celebrate'), 600);
          setTimeout(() => item.classList.remove('glow'), 900);
        }, 180);
        // 2번째 confetti wave (작게)
        setTimeout(() => spawnConfetti(0.6), 380);
      } else {
        item.animate(
          [
            { transform: 'rotateY(-95deg) translateX(-40%) scale(0.7)', opacity: 0 },
            { transform: 'rotateY(0deg) translateX(0%) scale(1)',        opacity: 1 }
          ],
          { duration: ENTER_MS, easing: ENTER_EASE, fill: 'forwards' }
        );
      }

      return item;
    }

    function runPickAnimation() {
      // 진행 중 재클릭 → 즉시 새 추첨 재시작
      clearAnimation();
      if (state.menus.length === 0) return;

      const finalPick = pickRandom();
      if (!finalPick) return;

      animationActive = true;
      const startTime = performance.now();
      let lastShown = state.lastPick || null;

      function tick() {
        const elapsed = performance.now() - startTime;
        const progress = Math.min(elapsed / ANIM_TOTAL_MS, 1);

        if (progress >= 1) {
          // 최종 결과 — 강조 애니메이션과 함께
          showResultItem(finalPick, { isFinal: true });
          state.lastPick = finalPick;
          save();
          animationActive = false;
          animationTimer = null;
          return;
        }

        // 중간 메뉴 표시 (직전과 다른 걸로)
        let next;
        if (state.menus.length === 1) {
          next = state.menus[0];
        } else {
          let safety = 0;
          do {
            next = state.menus[Math.floor(Math.random() * state.menus.length)];
            safety++;
          } while (next === lastShown && safety < 5);
        }
        lastShown = next;
        showResultItem(next);

        // 감속: 50ms → 300ms
        const eased = easeOutCubic(progress);
        const interval = ANIM_START_INTERVAL_MS + (ANIM_END_INTERVAL_MS - ANIM_START_INTERVAL_MS) * eased;
        animationTimer = setTimeout(tick, interval);
      }

      tick();
    }

    /* ----- 편집 패널 ----- */
    function renderMenuList() {
      menuListEl.innerHTML = '';
      state.menus.forEach((menu, idx) => {
        const item = document.createElement('div');
        item.className = 'menu-item';

        const text = document.createElement('span');
        text.className = 'menu-text';
        text.textContent = menu;
        item.appendChild(text);

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'delete-btn';
        delBtn.setAttribute('aria-label', menu + ' 삭제');
        delBtn.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
          '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          state.menus.splice(idx, 1);
          // 삭제된 메뉴가 마지막 결과면 lastPick도 제거
          if (state.lastPick === menu) state.lastPick = null;
          save();
          renderMenuList();
          updateEditChip();
          updatePickButtonState();
        });
        item.appendChild(delBtn);

        menuListEl.appendChild(item);
      });
    }

    function updateEditChip() {
      const count = state.menus.length;
      const isOpen = editPanel.classList.contains('show');
      const arrow = isOpen ? '▴' : '▾';
      const verb = isOpen ? '접기' : '편집';
      editChip.textContent = `메뉴 ${count}개 · ${verb} ${arrow}`;
    }

    function updatePickButtonState() {
      const empty = state.menus.length === 0;
      pickButton.disabled = empty;
      if (empty) {
        clearAnimation();
        // lastPick 무효화 후 placeholder로 회전
        state.lastPick = null;
        showResultItem('오늘 점심은?', { isPlaceholder: true });
      }
      // 메뉴 한도 도달 시 입력 비활성화
      const full = state.menus.length >= MAX_MENU_COUNT;
      menuAddInput.disabled = full;
      menuAddSection.classList.toggle('disabled', full);
      menuAddInput.placeholder = full ? `최대 ${MAX_MENU_COUNT}개까지` : '+ 메뉴 추가';
    }

    editChip.addEventListener('click', (e) => {
      e.stopPropagation();
      editPanel.classList.toggle('show');
      updateEditChip();
    });

    menuAddInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const value = menuAddInput.value.trim().slice(0, MENU_NAME_MAX_LENGTH);
        if (!value) return;
        if (state.menus.length >= MAX_MENU_COUNT) return;
        if (state.menus.includes(value)) {
          // 중복은 무시 + 입력 클리어
          menuAddInput.value = '';
          return;
        }
        state.menus.push(value);
        save();
        menuAddInput.value = '';
        renderMenuList();
        updateEditChip();
        updatePickButtonState();
        // 스크롤 맨 아래로
        menuListEl.scrollTop = menuListEl.scrollHeight;
      } else if (e.key === 'Escape') {
        menuAddInput.value = '';
        menuAddInput.blur();
      }
    });

    pickButton.addEventListener('click', () => {
      if (state.menus.length === 0) return;
      runPickAnimation();
    });

    /* ----- 초기화 ----- */
    function initDisplay() {
      // 페이지 로드 시 항상 placeholder 문구로 시작 (lastPick은 다음 회전 시작점으로만 사용)
      const initial = resultDisplay.querySelector('.result-item');
      if (!initial) return;
      initial.textContent = '오늘 점심은?';
      initial.classList.add('placeholder');
    }

    renderMenuList();
    updateEditChip();
    updatePickButtonState();
    initDisplay();


    /* ===================================================================
       드래그 이동 + 8방향 리사이즈 (frame{x,y,w,h} · Pointer Events)
       =================================================================== */
    const FRAME_CONFIG = { key: 'nosion-lunch-picker-frame-v1', minW: 300, minH: 240, defaultW: 360 };
    /* ===== NOSION FRAME CONTROLLER (공통 · 모든 위젯 동일) ===== */
    (function (cfg) {
      const card = document.getElementById('card');
      if (!card) return;
      const dragEl = card.querySelector('[data-drag]') || card;
      const MIN_W = cfg.minW || 240, MIN_H = cfg.minH || 160, DEFAULT_W = cfg.defaultW || 320;
      const KEY = cfg.key;
      let active = false, frame;

      function num(v) { return typeof v === 'number' && isFinite(v); }
      function loadFrame() {
        try { const f = JSON.parse(localStorage.getItem(KEY) || 'null');
          if (f && num(f.x) && num(f.y) && num(f.w) && num(f.h)) return f; } catch (e) {}
        return null;
      }
      function saveFrame() { try { localStorage.setItem(KEY, JSON.stringify(frame)); } catch (e) {} }
      function defaultFrame() {
        card.style.left = '0px'; card.style.top = '0px';
        card.style.width = DEFAULT_W + 'px'; card.style.height = 'auto';
        const h = Math.max(MIN_H, card.offsetHeight);
        return { w: DEFAULT_W, h,
          x: Math.round((window.innerWidth - DEFAULT_W) / 2),
          y: Math.round((window.innerHeight - h) / 2) };
      }
      function applyFrame() {
        card.style.left = frame.x + 'px'; card.style.top = frame.y + 'px';
        card.style.width = frame.w + 'px'; card.style.height = frame.h + 'px';
        if (cfg.onResize) cfg.onResize(frame);
      }
      function clampFrame() {
        frame.w = Math.max(MIN_W, frame.w); frame.h = Math.max(MIN_H, frame.h);
        const K = 48;
        frame.x = Math.min(window.innerWidth - K, Math.max(K - frame.w, frame.x));
        frame.y = Math.min(window.innerHeight - K, Math.max(0, frame.y));
      }

      frame = loadFrame() || defaultFrame();
      clampFrame(); applyFrame();
      card.style.visibility = 'visible';

      /* ----- 8방향 리사이즈 (document 리스너) ----- */
      card.querySelectorAll('[data-rz]').forEach(handle => {
        handle.addEventListener('pointerdown', (e) => {
          if (active) return; active = true;
          e.preventDefault(); e.stopPropagation();
          const dir = handle.dataset.rz, sx = e.clientX, sy = e.clientY, f0 = { x: frame.x, y: frame.y, w: frame.w, h: frame.h };
          card.classList.add('resizing');
          const mv = (ev) => {
            const dx = ev.clientX - sx, dy = ev.clientY - sy;
            if (dir.includes('e')) frame.w = Math.max(MIN_W, f0.w + dx);
            if (dir.includes('s')) frame.h = Math.max(MIN_H, f0.h + dy);
            if (dir.includes('w')) { const nw = Math.max(MIN_W, f0.w - dx); frame.x = f0.x + (f0.w - nw); frame.w = nw; }
            if (dir.includes('n')) { const nh = Math.max(MIN_H, f0.h - dy); frame.y = f0.y + (f0.h - nh); frame.h = nh; }
            applyFrame();
          };
          const up = () => {
            document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
            card.classList.remove('resizing'); active = false; clampFrame(); applyFrame(); saveFrame();
          };
          document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
        });
      });

      /* ----- 드래그 이동 (이동 임계값으로 클릭과 충돌 방지) ----- */
      dragEl.addEventListener('pointerdown', (e) => {
        if (active) return;
        if (e.target.closest('button, a, input, select, textarea, [contenteditable], [data-rz], [data-no-drag]')) return;
        const dx0 = e.clientX, dy0 = e.clientY, sx = frame.x, sy = frame.y;
        let started = false;
        const mv = (ev) => {
          const ddx = ev.clientX - dx0, ddy = ev.clientY - dy0;
          if (!started) {
            if (Math.abs(ddx) < 4 && Math.abs(ddy) < 4) return;
            started = true; active = true; card.classList.add('dragging');
          }
          frame.x = sx + ddx; frame.y = sy + ddy; applyFrame();
        };
        const up = () => {
          document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); document.removeEventListener('pointercancel', up);
          if (started) { card.classList.remove('dragging'); active = false; clampFrame(); applyFrame(); saveFrame(); }
        };
        document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up); document.addEventListener('pointercancel', up);
      });

      const rb = document.getElementById('resizeResetBtn');
      if (rb) rb.addEventListener('click', () => { frame = defaultFrame(); clampFrame(); applyFrame(); saveFrame(); });
      window.addEventListener('resize', () => { clampFrame(); applyFrame(); });
    })(FRAME_CONFIG);
</script>
</body>
</html>
